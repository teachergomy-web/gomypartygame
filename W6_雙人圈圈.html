<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>W6 - 雙人圈圈</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --gold: #f1c40f;
            --gold-dark: #e2b16a;
            --gold-glow: rgba(241,196,15,0.4);
            --green: #2ecc71;
            --green-glow: rgba(46,204,113,0.5);
            --bg-dark: #0a0e1a;
            --bg-panel: rgba(10,14,26,0.94);
            --border-gold: #e2b16a;
            --text-dim: #7f8c8d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 100%; height: 100%;
            background: var(--bg-dark);
            overflow: hidden; touch-action: none;
            font-family: 'Press Start 2P', monospace;
            user-select: none; -webkit-user-select: none;
        }

        canvas { display: block; width: 100%; height: 100%; }

        /* ── HUD ── */
        #top-bar {
            position: absolute; top: 0; left: 0; width: 100%; height: 56px;
            background: var(--bg-panel);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 24px;
            border-bottom: 2px solid var(--border-gold);
            box-shadow: 0 2px 20px rgba(226,177,106,0.2);
            pointer-events: none; z-index: 5;
        }
        .hud-block { display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 100px; }
        .hud-label { font-size: 7px; color: var(--text-dim); letter-spacing: 1px; }
        .hud-value { font-size: 13px; color: var(--gold); text-shadow: 0 0 10px var(--gold-glow); }
        .hud-value.green { color: var(--green); text-shadow: 0 0 10px var(--green-glow); }
        .hud-value.white { color: #ecf0f1; text-shadow: none; }
        .hud-title { font-size: 13px; color: var(--gold); text-shadow: 0 0 12px var(--gold-glow); letter-spacing: 2px; }

        /* ── 環節點 ── */
        #round-dots {
            position: absolute; top: 64px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; pointer-events: none; z-index: 5;
        }
        .round-dot {
            width: 10px; height: 10px; border-radius: 50%;
            border: 2px solid var(--border-gold); background: transparent;
            transition: background 0.3s, box-shadow 0.3s;
        }
        .round-dot.done   { background: var(--green); box-shadow: 0 0 8px var(--green-glow); border-color: var(--green); }
        .round-dot.active { background: var(--gold); box-shadow: 0 0 10px var(--gold-glow); border-color: var(--gold); animation: dotPulse 0.7s ease-in-out infinite alternate; }
        @keyframes dotPulse { from{transform:scale(1)} to{transform:scale(1.35)} }

        /* ── 等待畫面 ── */
        #waiting-screen {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--bg-dark); z-index: 30;
        }
        #waiting-screen h1 { font-size: 20px; color: var(--gold); text-shadow: 0 0 20px var(--gold-glow); margin-bottom: 20px; letter-spacing: 3px; }
        #waiting-screen p  { font-size: 9px; color: var(--text-dim); letter-spacing: 2px; animation: blink 1.2s ease-in-out infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* ── 完成畫面 ── */
        #complete-screen {
            position: absolute; inset: 0;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(5,8,18,0.93); backdrop-filter: blur(4px); z-index: 30;
        }
        #complete-box {
            border: 2px solid var(--border-gold); padding: 44px 64px;
            display: flex; flex-direction: column; align-items: center; gap: 18px;
            background: linear-gradient(160deg, rgba(15,20,40,0.99), rgba(10,14,26,0.99));
            box-shadow: 0 0 40px var(--gold-glow); position: relative;
        }
        #complete-box::before { content:'✦'; position:absolute; top:-11px; left:50%; transform:translateX(-50%); color:var(--gold); font-size:18px; opacity:.7; }
        #complete-box::after  { content:'✦'; position:absolute; bottom:-11px; left:50%; transform:translateX(-50%); color:var(--gold); font-size:18px; opacity:.7; }
        .cb-c { position:absolute; width:14px; height:14px; border-color:var(--border-gold); border-style:solid; opacity:.6; }
        .cb-c.tl{top:-2px;left:-2px;border-width:2px 0 0 2px} .cb-c.tr{top:-2px;right:-2px;border-width:2px 2px 0 0}
        .cb-c.bl{bottom:-2px;left:-2px;border-width:0 0 2px 2px} .cb-c.br{bottom:-2px;right:-2px;border-width:0 2px 2px 0}
        #complete-box h1 { font-size: 20px; color: var(--gold); text-shadow: 0 0 16px var(--gold-glow); text-align: center; }
        .c-divider { width:200px; height:1px; background:linear-gradient(90deg,transparent,var(--border-gold),transparent); opacity:.5; }
        .c-sub { font-size:9px; color:#bdc3c7; text-align:center; line-height:2.2; }

        /* ── 閃光 ── */
        #flash { position:absolute; inset:0; pointer-events:none; z-index:25; background:rgba(46,204,113,0); transition:background 0.05s; }
    </style>
</head>
<body>

<div id="top-bar">
    <div class="hud-block">
        <span class="hud-label">LEVEL</span>
        <span class="hud-value" id="hud-level">—</span>
    </div>
    <div class="hud-title">雙人圈圈<span id="robot-badge" style="display:none;font-size:9px;margin-left:8px;color:#2ecc71;text-shadow:0 0 8px rgba(46,204,113,0.6)">🤖 AI</span></div>
    <div class="hud-block" style="flex-direction:row;gap:20px;">
        <div class="hud-block">
            <span class="hud-label">ROUND</span>
            <span class="hud-value green" id="hud-round">0/6</span>
        </div>
        <div class="hud-block">
            <span class="hud-label">TIME</span>
            <span class="hud-value white" id="hud-time">0.0s</span>
        </div>
    </div>
</div>

<div id="round-dots">
    <div class="round-dot" id="dot-0"></div>
    <div class="round-dot" id="dot-1"></div>
    <div class="round-dot" id="dot-2"></div>
    <div class="round-dot" id="dot-3"></div>
    <div class="round-dot" id="dot-4"></div>
    <div class="round-dot" id="dot-5"></div>
</div>

<div id="waiting-screen">
    <h1>雙人圈圈</h1>
    <p>等待老師開始...</p>
</div>

<div id="complete-screen">
    <div id="complete-box">
        <div class="cb-c tl"></div><div class="cb-c tr"></div>
        <div class="cb-c bl"></div><div class="cb-c br"></div>
        <h1>🏆 關卡完成！</h1>
        <div class="c-divider"></div>
        <p class="c-sub" id="complete-time">用時 0.0s</p>
        <p class="c-sub">等待老師進入下一關...</p>
    </div>
</div>

<div id="flash"></div>
<canvas id="gameCanvas"></canvas>

<script>
// ══════════════════════════════════════════════════
//  取得參數
// ══════════════════════════════════════════════════
const params    = new URLSearchParams(location.search);
let MY_GROUP    = params.get('group') ? `第 ${params.get('group')} 組` : '';
let START_LEVEL = parseInt(params.get('autostart') || '0') || 0;
const IS_ROBOT  = params.get('robot') === '1';

// ══════════════════════════════════════════════════
//  Canvas & DOM
// ══════════════════════════════════════════════════
const canvas   = document.getElementById('gameCanvas');
const ctx      = canvas.getContext('2d');
const flashEl  = document.getElementById('flash');
const waitingScreen  = document.getElementById('waiting-screen');
const completeScreen = document.getElementById('complete-screen');
const completeTime   = document.getElementById('complete-time');
const hudLevel = document.getElementById('hud-level');
const hudRound = document.getElementById('hud-round');
const hudTime  = document.getElementById('hud-time');

let cw, ch;
function resize() {
    cw = canvas.width  = window.innerWidth;
    ch = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ══════════════════════════════════════════════════
//  顏色 & 工具
// ══════════════════════════════════════════════════
const COLORS    = ['#4a90e2','#e74c3c','#2ecc71','#f39c12'];
const COL_GOLD  = '#f1c40f';
const COL_GREEN = '#2ecc71';

function hexAlpha(hex, a) {
    const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
}
function lighten(hex) {
    return `rgb(${Math.min(255,parseInt(hex.slice(1,3),16)+55)},${Math.min(255,parseInt(hex.slice(3,5),16)+55)},${Math.min(255,parseInt(hex.slice(5,7),16)+55)})`;
}

// ══════════════════════════════════════════════════
//  關卡參數（1–30）
// ══════════════════════════════════════════════════
function getLevelParams(level) {
    // level 1→30：速度 0.5→1.5，圈圈 35→90（同向，越快越大）
    const t      = (level - 1) / 29;           // 0.0 ~ 1.0
    const speed  = 0.5 + t * 1.0;              // 0.5 ~ 1.5
    // 圈圈以畫面短邊比例，再 clamp 到 35–90 px
    const shortSide  = Math.min(cw, ch);
    const radiusPct  = 0.09 + t * 0.13;        // 9% ~ 22% of shortSide
    const radius     = Math.max(35, Math.min(90, shortSide * radiusPct));
    return { radius, speed };
}

// ══════════════════════════════════════════════════
//  遊戲狀態
// ══════════════════════════════════════════════════
const TOTAL_ROUNDS  = 6;
const PROGRESS_NEED = 100;

let gameState    = 'WAITING';
let currentLevel = 1;
let roundsDone   = 0;
let gameStartTime  = 0;
let sharedProgress = 0;
let circles    = [];
let joysticks  = [];
let cursors    = [];
let particles  = [];
let burstTimer = 0;
let syncTick   = 0;

// ══════════════════════════════════════════════════
//  postMessage — 接收 PLATFORM_START
// ══════════════════════════════════════════════════
window.addEventListener('message', e => {
    const d = e.data;
    if (!d || !d.type) return;
    if (d.type === 'PLATFORM_START') {
        if (d.group) MY_GROUP = d.group;
        startGame(d.level || 1);
    }
    if (d.type === 'PLATFORM_PAUSE')  gameState = 'PAUSED';
    if (d.type === 'PLATFORM_RESUME' && gameState === 'PAUSED') gameState = 'PLAYING';
});

// URL 自動啟動（測試沙盒用）
if (START_LEVEL > 0) {
    setTimeout(() => startGame(START_LEVEL), 300);
}

// 機器人模式：顯示 badge
if (IS_ROBOT) {
    document.getElementById('robot-badge').style.display = 'inline';
}

// ══════════════════════════════════════════════════
//  四個角落（動態）
// ══════════════════════════════════════════════════
function getCorners() {
    const mx = Math.min(cw * 0.18, 110);
    const my = Math.min(ch * 0.18, 110);
    return [
        { x: mx,      y: ch - my },   // 左下
        { x: cw - mx, y: ch - my },   // 右下
        { x: mx,      y: my + 56 },   // 左上
        { x: cw - mx, y: my + 56 },   // 右上
    ];
}

// ══════════════════════════════════════════════════
//  Seeded 隨機（確保同關同環節所有組一致）
// ══════════════════════════════════════════════════
function seededRandom(seed) {
    // mulberry32 — 簡單快速的 32-bit PRNG
    let s = seed >>> 0;
    return function() {
        s += 0x6D2B79F5;
        let t = Math.imul(s ^ s >>> 15, 1 | s);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
}

// ══════════════════════════════════════════════════
//  環節初始化
// ══════════════════════════════════════════════════
function initRound() {
    const { radius, speed } = getLevelParams(currentLevel);

    // ── Seeded random：seed = level * 10 + roundIndex ──
    // 確保同一關同一環節所有組拿到完全相同的圈圈數量與搖桿位置
    const rng   = seededRandom(currentLevel * 10 + roundsDone);
    const count = Math.floor(rng() * 4) + 1; // 1~4，固定結果

    sharedProgress = 0;
    particles = [];
    joysticks = [];
    cursors   = [];
    circles   = [];

    // 用 seeded rng 決定角落順序
    const allCorners = getCorners();
    const shuffled   = [...allCorners].sort(() => rng() - 0.5).slice(0, count);

    // 全畫面可用邊界（所有圈圈共用，不分區）
    const pad = radius + 12;
    const fullBounds = {
        minX: pad,
        maxX: cw - pad,
        minY: 90 + pad,
        maxY: ch * 0.72 - pad
    };

    for (let i = 0; i < count; i++) {
        const color  = COLORS[i % COLORS.length];
        const startX = (cw / (count + 1)) * (i + 1);
        const startY = ch * 0.38;

        circles.push({
            x: startX, y: startY,
            tx: 0, ty: 0,
            radius,
            bounds: fullBounds,
            speeds:    [speed * 2.2, speed * 1.0, speed * 0.3],
            durations: [100, 140, 170],
            cycleIndex: i % 3, cycleTimer: 0,
            currentSpeed: speed,
            dashOffset: 0, glowPulse: 0,
            breathScale: 1.0, color
        });
        pickWaypoint(circles[i]);

        const jPos = shuffled[i];
        joysticks.push({
            id: null,
            bx: jPos.x, by: jPos.y,
            x:  jPos.x, y:  jPos.y,
            dx: 0, dy: 0, active: false, color
        });

        cursors.push({
            x: startX, y: startY,
            vx: 0, vy: 0, color
        });
    }
    // 注意：updateDots() 不在這裡呼叫，由 roundComplete() / startGame() 負責
}

function pickWaypoint(c) {
    c.tx = c.bounds.minX + Math.random() * (c.bounds.maxX - c.bounds.minX);
    c.ty = c.bounds.minY + Math.random() * (c.bounds.maxY - c.bounds.minY);
}

// ══════════════════════════════════════════════════
//  遊戲流程
// ══════════════════════════════════════════════════
function startGame(level) {
    currentLevel  = level;
    roundsDone    = 0;
    gameState     = 'PLAYING';
    gameStartTime = Date.now();
    hudLevel.innerText = `LV.${level}`;
    waitingScreen.style.display  = 'none';
    completeScreen.style.display = 'none';
    initRound();
    updateDots(); // 第0環節 active
}

function roundComplete() {
    roundsDone++;
    triggerBurst();
    gameState = 'TRANSITIONING'; // 先設狀態，再更新 dots
    updateDots(); // roundsDone 已 ++，gameState 為 TRANSITIONING → 不會多標 active

    // 通知老師端目前環節進度
    const elapsed = ((Date.now() - gameStartTime) / 1000).toFixed(1);
    window.parent?.postMessage({
        type: 'W6_ROUND_UPDATE',
        group: MY_GROUP,
        rounds: roundsDone,
        elapsed: parseFloat(elapsed)
    }, '*');

    if (roundsDone >= TOTAL_ROUNDS) {
        gameComplete();
    } else {
        setTimeout(() => {
            gameState = 'PLAYING';
            initRound();
            updateDots(); // 新環節 active 點亮
        }, 420);
    }
}

function gameComplete() {
    gameState = 'COMPLETE';
    const elapsed = ((Date.now() - gameStartTime) / 1000).toFixed(1);
    completeTime.innerText = `用時 ${elapsed}s`;
    completeScreen.style.display = 'flex';

    // 回報給 index.html
    window.parent?.postMessage({
        type: 'W6_COMPLETE',
        group: MY_GROUP,
        elapsed: parseFloat(elapsed),
        level: currentLevel
    }, '*');
}

// ══════════════════════════════════════════════════
//  環節點 UI
// ══════════════════════════════════════════════════
function updateDots() {
    const isPlaying = gameState === 'PLAYING';
    for (let i = 0; i < TOTAL_ROUNDS; i++) {
        const dot = document.getElementById(`dot-${i}`);
        dot.className = 'round-dot';
        if (i < roundsDone)                    dot.classList.add('done');
        else if (i === roundsDone && isPlaying) dot.classList.add('active');
    }
    hudRound.innerText = `${roundsDone}/${TOTAL_ROUNDS}`;
}

// ══════════════════════════════════════════════════
//  搖桿輸入
// ══════════════════════════════════════════════════
const JS_R = 65, JS_K = 28;

function findFreeJoystick(px, py) {
    let best = null, bestDist = 95;
    for (const js of joysticks) {
        if (js.active) continue;
        const d = Math.hypot(px - js.bx, py - js.by);
        if (d < bestDist) { bestDist = d; best = js; }
    }
    return best;
}

canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (gameState !== 'PLAYING') return;
    for (const t of e.changedTouches) {
        const js = findFreeJoystick(t.pageX, t.pageY);
        if (js) { js.id = t.identifier; js.active = true; moveJoystick(js, t.pageX, t.pageY); }
    }
}, {passive:false});

canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches)
        for (const js of joysticks)
            if (js.active && js.id === t.identifier) moveJoystick(js, t.pageX, t.pageY);
}, {passive:false});

canvas.addEventListener('touchend', e => {
    e.preventDefault();
    for (const t of e.changedTouches)
        for (const js of joysticks)
            if (js.active && js.id === t.identifier) resetJoystick(js);
}, {passive:false});

canvas.addEventListener('touchcancel', e => {
    e.preventDefault();
    for (const t of e.changedTouches)
        for (const js of joysticks)
            if (js.id === t.identifier) resetJoystick(js);
}, {passive:false});

// 滑鼠（測試）
let mouseJS = null;
canvas.addEventListener('mousedown', e => {
    if (gameState !== 'PLAYING') return;
    mouseJS = findFreeJoystick(e.clientX, e.clientY);
    if (mouseJS) { mouseJS.id = 'mouse'; mouseJS.active = true; moveJoystick(mouseJS, e.clientX, e.clientY); }
});
canvas.addEventListener('mousemove', e => { if (mouseJS) moveJoystick(mouseJS, e.clientX, e.clientY); });
window.addEventListener('mouseup', () => { if (mouseJS) { resetJoystick(mouseJS); mouseJS = null; } });

function moveJoystick(js, px, py) {
    let dx = px - js.bx, dy = py - js.by;
    const d = Math.hypot(dx, dy);
    if (d > JS_R) { dx = (dx/d)*JS_R; dy = (dy/d)*JS_R; }
    js.x = js.bx + dx; js.y = js.by + dy;
    js.dx = dx / JS_R; js.dy = dy / JS_R;
}
function resetJoystick(js) {
    js.active=false; js.id=null; js.x=js.bx; js.y=js.by; js.dx=0; js.dy=0;
}

// ══════════════════════════════════════════════════
//  粒子
// ══════════════════════════════════════════════════
function spawnParticles(x, y, color, count, fast) {
    for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = fast ? 2 + Math.random()*4 : 1 + Math.random()*2.5;
        particles.push({ x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s,
            life:1, decay:0.02+Math.random()*0.018,
            radius: fast ? 3+Math.random()*4 : 2+Math.random()*3, color });
    }
}

function triggerBurst() {
    for (const c of circles) spawnParticles(c.x, c.y, c.color, 14, true);
    spawnParticles(cw/2, ch/2, COL_GOLD, 10, true);
    burstTimer = 20;
}

// ══════════════════════════════════════════════════
//  邏輯更新
// ══════════════════════════════════════════════════
const ACCEL = 0.5, FRICTION = 0.78;  // 降低摩擦係數讓游標更快停止，降低加速讓操控更精準

function update() {
    if (gameState !== 'PLAYING') return;

    const elapsed = (Date.now() - gameStartTime) / 1000;
    hudTime.innerText = elapsed.toFixed(1) + 's';

    // 圈圈移動
    for (const c of circles) updateCircle(c);

    // 游標移動
    const n = cursors.length;
    for (let i = 0; i < n; i++) {
        const cur = cursors[i];

        if (IS_ROBOT) {
            // ── 機器人 AI：直接追蹤對應圈圈，加一點抖動模擬人味 ──
            const target = circles[i];
            const dx = target.x - cur.x;
            const dy = target.y - cur.y;
            const dist = Math.hypot(dx, dy);
            // 距離越遠加速越快，靠近時放慢
            const force = Math.min(dist * 0.08, 4.5);
            if (dist > 2) {
                cur.vx += (dx / dist) * force;
                cur.vy += (dy / dist) * force;
            }
            // 輕微隨機抖動（模擬人手不穩）
            cur.vx += (Math.random() - 0.5) * 0.3;
            cur.vy += (Math.random() - 0.5) * 0.3;
        } else {
            // 人工搖桿輸入
            const js = joysticks[i];
            cur.vx += js.dx * ACCEL;
            cur.vy += js.dy * ACCEL;
        }

        cur.vx *= FRICTION;
        cur.vy *= FRICTION;
        cur.x  += cur.vx;
        cur.y  += cur.vy;
        cur.x = Math.max(15, Math.min(cw - 15, cur.x));
        cur.y = Math.max(90, Math.min(ch - 15, cur.y));
    }

    // 判定
    let allIn = true;
    for (let i = 0; i < n; i++) {
        const d = Math.hypot(cursors[i].x - circles[i].x, cursors[i].y - circles[i].y);
        const inRange = d < circles[i].radius * circles[i].breathScale;
        circles[i].breathScale += ((inRange ? 1.08 : 1.0) - circles[i].breathScale) * 0.08;
        if (!inRange) allIn = false;
    }

    if (allIn) {
        sharedProgress = Math.min(PROGRESS_NEED, sharedProgress + 0.55);
        syncTick++;
        if (syncTick % 8 === 0)
            for (const c of circles) spawnParticles(c.x, c.y, c.color, 3, false);
    } else {
        sharedProgress = Math.max(0, sharedProgress - 0.2);
        syncTick = 0;
    }

    if (sharedProgress >= PROGRESS_NEED) roundComplete();
}

function updateCircle(c) {
    c.cycleTimer++;
    if (c.cycleTimer >= c.durations[c.cycleIndex]) {
        c.cycleTimer = 0; c.cycleIndex = (c.cycleIndex + 1) % c.speeds.length;
    }
    c.currentSpeed += (c.speeds[c.cycleIndex] - c.currentSpeed) * 0.02;
    const dx = c.tx - c.x, dy = c.ty - c.y;
    const d  = Math.hypot(dx, dy);
    if (d <= c.currentSpeed + 1) pickWaypoint(c);
    else { c.x += (dx/d)*c.currentSpeed; c.y += (dy/d)*c.currentSpeed; }
    c.dashOffset -= c.currentSpeed * 0.8;
    c.glowPulse   = (c.glowPulse + 0.05) % (Math.PI * 2);
}

// ══════════════════════════════════════════════════
//  渲染
// ══════════════════════════════════════════════════
function draw() {
    // 背景
    ctx.fillStyle = '#080c18';
    ctx.fillRect(0, 0, cw, ch);

    // 星點
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    const stars = [[.12,.15],[.33,.08],[.55,.22],[.78,.11],[.9,.33],
                   [.05,.5],[.22,.72],[.45,.85],[.68,.7],[.88,.55],[.15,.4],[.6,.45]];
    for (const [sx,sy] of stars) { ctx.beginPath(); ctx.arc(sx*cw,sy*ch,1.2,0,Math.PI*2); ctx.fill(); }

    if (gameState === 'PLAYING' || gameState === 'TRANSITIONING') {
        for (let i = 0; i < circles.length; i++) {
            const c = circles[i], cur = cursors[i];
            const d = Math.hypot(cur.x - c.x, cur.y - c.y);
            const isIn = d < c.radius * c.breathScale;
            drawCircle(c, isIn);
        }
        for (let i = 0; i < cursors.length; i++) {
            const c = circles[i], cur = cursors[i];
            const d = Math.hypot(cur.x - c.x, cur.y - c.y);
            const isIn = d < c.radius * c.breathScale;
            drawCursorWithRing(cur, cur.color, isIn);
        }
        for (const js of joysticks) { if (!IS_ROBOT) drawJoystick(js); }
    }

    drawParticles();
    updateFlash();
}

// ── 圈圈 ──
function drawCircle(c, isIn) {
    const r = c.radius * c.breathScale;

    if (isIn) {
        const g = ctx.createRadialGradient(c.x, c.y, r*0.4, c.x, c.y, r*1.6);
        g.addColorStop(0, hexAlpha(c.color, 0.2)); g.addColorStop(1, 'transparent');
        ctx.beginPath(); ctx.arc(c.x, c.y, r*1.6, 0, Math.PI*2);
        ctx.fillStyle = g; ctx.fill();
    }

    ctx.save();
    ctx.beginPath(); ctx.arc(c.x, c.y, r, 0, Math.PI*2);
    ctx.lineWidth = isIn ? 3 : 2.5;
    ctx.strokeStyle = isIn ? lighten(c.color) : c.color;
    ctx.setLineDash([12,8]); ctx.lineDashOffset = c.dashOffset;
    ctx.shadowBlur = isIn ? 20 : 8; ctx.shadowColor = c.color;
    ctx.globalAlpha = isIn ? 1.0 : 0.75; ctx.stroke(); ctx.restore();

    ctx.beginPath(); ctx.arc(c.x, c.y, r-8, 0, Math.PI*2);
    ctx.fillStyle = c.color; ctx.globalAlpha = isIn ? 0.15 : 0.07; ctx.fill(); ctx.globalAlpha = 1;

    // 準星
    ctx.save(); ctx.globalAlpha=0.35; ctx.strokeStyle=c.color; ctx.lineWidth=1; ctx.setLineDash([3,4]);
    ctx.beginPath(); ctx.moveTo(c.x-16,c.y); ctx.lineTo(c.x+16,c.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(c.x,c.y-16); ctx.lineTo(c.x,c.y+16); ctx.stroke();
    ctx.restore();

    // 充能波紋
    if (isIn) {
        const rs = 0.5 + 0.5 * Math.abs(Math.sin(c.glowPulse));
        ctx.beginPath(); ctx.arc(c.x, c.y, r*rs, 0, Math.PI*2);
        ctx.lineWidth=1.5; ctx.strokeStyle=c.color;
        ctx.globalAlpha = 0.3*(1-rs); ctx.shadowBlur=8; ctx.shadowColor=c.color;
        ctx.stroke(); ctx.shadowBlur=0; ctx.globalAlpha=1;
    }
}

// ── 游標 + 圓形進度環 ──
function drawCursorWithRing(cur, color, isIn) {
    const RING_R = 22, RING_W = 4;
    const pct   = sharedProgress / PROGRESS_NEED;
    const start = -Math.PI / 2;
    const end   = start + pct * Math.PI * 2;

    // 進度環底色
    ctx.beginPath(); ctx.arc(cur.x, cur.y, RING_R, 0, Math.PI*2);
    ctx.lineWidth = RING_W; ctx.strokeStyle = hexAlpha(color, 0.2); ctx.stroke();

    // 進度弧
    if (pct > 0) {
        ctx.beginPath(); ctx.arc(cur.x, cur.y, RING_R, start, end);
        ctx.lineWidth   = RING_W;
        ctx.strokeStyle = isIn ? COL_GREEN : color;
        ctx.shadowBlur  = isIn ? 14 : 6; ctx.shadowColor = isIn ? COL_GREEN : color;
        ctx.lineCap     = 'round'; ctx.stroke();
        ctx.shadowBlur  = 0; ctx.lineCap = 'butt';
    }

    // 進入時光暈
    if (isIn) {
        ctx.beginPath(); ctx.arc(cur.x, cur.y, 13, 0, Math.PI*2);
        const g = ctx.createRadialGradient(cur.x, cur.y, 0, cur.x, cur.y, 13);
        g.addColorStop(0, hexAlpha(color, 0.4)); g.addColorStop(1,'transparent');
        ctx.fillStyle=g; ctx.fill();
    }

    // 游標圓心
    ctx.beginPath(); ctx.arc(cur.x, cur.y, 10, 0, Math.PI*2);
    ctx.lineWidth=2.5; ctx.strokeStyle=isIn?'#fff':color;
    ctx.shadowBlur=isIn?18:8; ctx.shadowColor=color; ctx.stroke(); ctx.shadowBlur=0;
    ctx.beginPath(); ctx.arc(cur.x, cur.y, 4, 0, Math.PI*2);
    ctx.fillStyle=isIn?'#fff':color; ctx.fill();
}

// ── 搖桿 ──
function drawJoystick(js) {
    const color = js.color;
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.beginPath(); ctx.arc(js.bx, js.by, JS_R, 0, Math.PI*2);
    const bg = ctx.createRadialGradient(js.bx, js.by, 0, js.bx, js.by, JS_R);
    bg.addColorStop(0,'rgba(30,35,55,0.9)'); bg.addColorStop(1,'rgba(10,14,26,0.9)');
    ctx.fillStyle=bg; ctx.fill();
    ctx.lineWidth=2; ctx.strokeStyle=color; ctx.shadowBlur=6; ctx.shadowColor=color; ctx.stroke();
    ctx.restore();

    ctx.save(); ctx.globalAlpha=0.88;
    ctx.beginPath(); ctx.arc(js.x, js.y, JS_K, 0, Math.PI*2);
    const kg = ctx.createRadialGradient(js.x-JS_K*.3, js.y-JS_K*.3, 2, js.x, js.y, JS_K);
    kg.addColorStop(0, lighten(color)); kg.addColorStop(1, color);
    ctx.fillStyle=kg; ctx.shadowBlur=14; ctx.shadowColor=color; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.22)'; ctx.lineWidth=1.5; ctx.shadowBlur=0;
    ctx.beginPath(); ctx.moveTo(js.x-10,js.y); ctx.lineTo(js.x+10,js.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(js.x,js.y-10); ctx.lineTo(js.x,js.y+10); ctx.stroke();

    // 顏色標記點
    ctx.beginPath(); ctx.arc(js.bx, js.by - JS_R - 10, 5, 0, Math.PI*2);
    ctx.fillStyle=color; ctx.shadowBlur=8; ctx.shadowColor=color; ctx.fill(); ctx.shadowBlur=0;
    ctx.restore();
}

// ── 粒子 ──
function drawParticles() {
    for (let i = particles.length-1; i >= 0; i--) {
        const p = particles[i];
        p.x+=p.vx; p.y+=p.vy; p.vy+=0.04; p.life-=p.decay;
        if (p.life<=0) { particles.splice(i,1); continue; }
        ctx.beginPath(); ctx.arc(p.x,p.y,p.radius*p.life,0,Math.PI*2);
        ctx.fillStyle=p.color; ctx.globalAlpha=p.life*0.8;
        ctx.shadowBlur=6; ctx.shadowColor=p.color; ctx.fill();
        ctx.globalAlpha=1; ctx.shadowBlur=0;
    }
}

function updateFlash() {
    if (burstTimer > 0) {
        burstTimer--;
        flashEl.style.background = `rgba(46,204,113,${(burstTimer/20)*0.2})`;
    } else {
        flashEl.style.background = 'rgba(46,204,113,0)';
    }
}

// ══════════════════════════════════════════════════
//  主迴圈
// ══════════════════════════════════════════════════
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
