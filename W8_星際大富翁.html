<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W8 星際大富翁</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --card:rgba(255,255,255,.95);
  --radius:18px;
  --font:'Noto Sans TC','Nunito',sans-serif;
  --orange:#FF8C00;--orange2:#E65100;
  --green:#43A047;--green2:#2E7D32;
  --red:#E53935;--red2:#B71C1C;
  --purple:#8E24AA;
  --yellow:#F9A825;
  --sand:#FFE082;
}
*{box-sizing:border-box;margin:0;padding:0}
body,button,input,select,textarea{font-family:var(--font)}
body{background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);min-height:100vh;overflow:hidden}

/* LOADING */
#loading{position:fixed;inset:0;background:linear-gradient(135deg,#1a237e,#0288D1);
  display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
.logo{font-size:3rem;color:#fff;font-weight:900;margin-bottom:.4rem}
.sub{color:rgba(255,255,255,.7);margin-bottom:1.5rem}
.spinner{width:42px;height:42px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* TEACHER */
#teacher-view{display:none;height:100vh;grid-template-columns:1fr 260px;grid-template-rows:52px 1fr;gap:8px;padding:8px}
.t-header{grid-column:1/-1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  border-radius:12px;display:flex;align-items:center;gap:12px;padding:0 14px;backdrop-filter:blur(10px)}
.t-title{font-size:1.2rem;font-weight:900;color:#fff}
.turn-chip{background:var(--sand);color:#333;font-weight:800;font-size:.88rem;
  padding:5px 14px;border-radius:50px;margin-left:auto;display:flex;align-items:center;gap:6px}

.board-wrap{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:var(--radius);display:flex;align-items:center;justify-content:center;overflow:hidden}

.sidebar{display:flex;flex-direction:column;gap:8px;overflow-y:auto}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px}

.panel{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  border-radius:var(--radius);padding:11px;backdrop-filter:blur(10px)}
.panel-title{font-size:.72rem;font-weight:900;color:rgba(255,255,255,.45);
  letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}

.score-row{display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:9px;margin-bottom:3px;transition:background .2s}
.score-row.active{background:rgba(255,255,255,.12)}
.sr-icon{font-size:1.3rem}.sr-name{flex:1;color:#fff;font-weight:700;font-size:.82rem}
.sr-pts{font-weight:900;font-size:1.05rem;color:var(--sand)}
.sr-tag{font-size:.62rem;font-weight:700;color:var(--orange)}

.event-box{background:rgba(0,0,0,.2);border-radius:11px;padding:11px;min-height:100px;
  margin-bottom:7px;color:#fff;font-size:.88rem;line-height:1.6}
.q-text{font-weight:700;font-size:.92rem;margin-bottom:8px;color:#fff}
.opt-btn{display:block;width:100%;padding:7px 11px;margin-bottom:5px;border-radius:9px;
  border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;
  cursor:pointer;font-family:var(--font);font-size:.85rem;font-weight:700;text-align:left;transition:all .15s}
.opt-btn:hover{border-color:rgba(255,255,255,.5);background:rgba(255,255,255,.15)}
.opt-btn.selected{border-color:var(--yellow);background:rgba(249,168,37,.2)}
.opt-btn.correct{border-color:#69f0ae;background:rgba(105,240,174,.15);color:#69f0ae}
.opt-btn.wrong{border-color:#ff5252;background:rgba(255,82,82,.15);color:#ff5252}

.explain-box{background:rgba(249,168,37,.12);border-left:3px solid var(--yellow);
  border-radius:0 8px 8px 0;padding:7px 9px;font-size:.8rem;color:rgba(255,255,255,.75);
  display:none;margin-bottom:7px}

.btn-pub,.btn-next,.btn-settle{width:100%;padding:9px;border:none;border-radius:11px;
  font-family:var(--font);font-weight:900;font-size:.9rem;cursor:pointer;
  transition:all .15s;margin-bottom:5px}
.btn-pub{background:linear-gradient(135deg,#9C27B0,#6A1B9A);color:#fff;display:none;
  box-shadow:0 3px 12px rgba(156,39,176,.4)}
.btn-next{background:linear-gradient(135deg,#43A047,#2E7D32);color:#fff;display:none;
  box-shadow:0 3px 12px rgba(67,160,71,.4)}
.btn-settle{background:linear-gradient(135deg,#FF8C00,#E65100);color:#fff;
  box-shadow:0 3px 12px rgba(255,140,0,.4)}
.btn-pub:hover,.btn-next:hover,.btn-settle:hover{transform:translateY(-1px);filter:brightness(1.1)}

.ldots{display:flex;align-items:center;justify-content:center;gap:6px;padding:.8rem;color:rgba(255,255,255,.4)}
.ldots span{width:7px;height:7px;background:var(--purple);border-radius:50%;animation:db .7s ease-in-out infinite}
.ldots span:nth-child(2){animation-delay:.15s}.ldots span:nth-child(3){animation-delay:.3s}
@keyframes db{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* STUDENT */
#student-view{display:none;flex-direction:column;min-height:100vh;padding:8px;gap:7px}
.s-header{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:12px;
  padding:9px 14px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(10px)}
.s-title{font-size:1.1rem;font-weight:900;color:#fff}
.my-badge{background:var(--sand);color:#333;font-weight:800;font-size:.82rem;
  padding:4px 12px;border-radius:50px;display:flex;align-items:center;gap:4px}
.s-scores{display:flex;gap:5px;flex-wrap:wrap}
.score-chip{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.15);padding:4px 9px;border-radius:50px;
  font-weight:700;font-size:.8rem;color:#fff}
.score-chip.mine{background:rgba(249,168,37,.25);border-color:var(--yellow);color:var(--sand)}
.s-board-wrap{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:var(--radius);flex:1;min-height:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.s-action{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  border-radius:var(--radius);padding:18px;text-align:center;backdrop-filter:blur(10px);
  min-height:115px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.wait-msg{color:rgba(255,255,255,.4);font-size:.9rem;display:flex;align-items:center;gap:7px}
.pulse{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}

.btn-roll{padding:13px 36px;background:linear-gradient(135deg,var(--orange),var(--orange2));
  color:#fff;border:none;border-radius:18px;font-family:var(--font);font-size:1.7rem;font-weight:900;
  cursor:pointer;box-shadow:0 6px 22px rgba(255,140,0,.5);animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-7px) scale(1.03)}}
.btn-roll:active{transform:scale(.92)!important;animation:none}

.dice-show{display:flex;align-items:center;justify-content:center;gap:10px;margin:5px 0}
.dice-face{width:62px;height:62px;background:#fff;border-radius:13px;
  box-shadow:0 4px 14px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;
  font-size:2rem;animation:diceIn .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes diceIn{from{transform:scale(.4) rotate(-20deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.dice-total{font-weight:900;font-size:1.3rem;color:var(--sand);margin-top:3px}

/* ISO BOARD — true 3D cells */
.iso-scene{perspective:1100px;display:flex;align-items:center;justify-content:center;width:100%;height:100%}
.iso-board{position:relative;transform-style:preserve-3d;transform:rotateX(50deg) rotateZ(-45deg)}

.cell{position:absolute;width:76px;height:76px;transform-style:preserve-3d;cursor:default}
.cell-top{position:absolute;inset:0;border-radius:10px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  border:2px solid rgba(255,255,255,.5);
  box-shadow:inset 0 2px 8px rgba(255,255,255,.25),inset 0 -2px 4px rgba(0,0,0,.15)}
/* south face */
.cell-s{position:absolute;left:0;bottom:-14px;width:76px;height:14px;
  border-radius:0 0 6px 6px;transform-origin:top;transform:rotateX(-90deg)}
/* east face */
.cell-e{position:absolute;top:0;right:-14px;width:14px;height:76px;
  border-radius:0 6px 6px 0;transform-origin:left;transform:rotateY(90deg)}

.cell .c-icon{font-size:1.4rem;line-height:1;filter:drop-shadow(0 2px 3px rgba(0,0,0,.35))}
.cell .c-num{font-size:.58rem;font-weight:900;color:rgba(255,255,255,.8);text-shadow:0 1px 2px rgba(0,0,0,.6)}
.c-dots{display:flex;gap:2px;flex-wrap:wrap;max-width:36px;margin-top:1px}
.team-dot{width:7px;height:7px;border-radius:50%;border:1px solid rgba(255,255,255,.6)}

/* cell colours */
.cell.type-start .cell-top {background:linear-gradient(135deg,#4FC3F7,#0288D1)}
.cell.type-start .cell-s   {background:#015c8a}.cell.type-start .cell-e{background:#0277bd}
.cell.type-q .cell-top     {background:linear-gradient(135deg,#FFF9C4,#FFD54F)}
.cell.type-q .cell-s       {background:#c89000}.cell.type-q .cell-e{background:#f0b800}
.cell.type-lucky .cell-top {background:linear-gradient(135deg,#C8E6C9,#43A047)}
.cell.type-lucky .cell-s   {background:#1b5e20}.cell.type-lucky .cell-e{background:#2e7d32}
.cell.type-bad .cell-top   {background:linear-gradient(135deg,#FFCDD2,#E53935)}
.cell.type-bad .cell-s     {background:#7f0000}.cell.type-bad .cell-e{background:#b71c1c}
.cell.type-special .cell-top{background:linear-gradient(135deg,#E1BEE7,#8E24AA)}
.cell.type-special .cell-s {background:#4a0072}.cell.type-special .cell-e{background:#6a1b9a}

.cell.active .cell-top{animation:glow 1s ease-in-out infinite alternate}
@keyframes glow{
  from{box-shadow:inset 0 2px 8px rgba(255,255,255,.25),0 0 14px rgba(255,220,0,.8)}
  to  {box-shadow:inset 0 2px 8px rgba(255,255,255,.25),0 0 32px rgba(255,220,0,1),0 0 60px rgba(255,180,0,.6)}}

/* PIECES */
.piece{position:absolute;width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;
  border:2px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.45);
  z-index:20;transition:left .55s cubic-bezier(.34,1.56,.64,1),top .55s cubic-bezier(.34,1.56,.64,1);
  animation:pf 2.2s ease-in-out infinite}
@keyframes pf{0%,100%{margin-top:0}50%{margin-top:-7px}}
.stop-badge{position:absolute;top:-5px;right:-5px;background:var(--red);color:#fff;
  font-size:.55rem;font-weight:900;padding:1px 4px;border-radius:8px}

/* TOAST */
.toast{position:fixed;top:68px;left:50%;transform:translateX(-50%) translateY(-14px);
  background:rgba(10,10,10,.9);color:#fff;padding:7px 18px;border-radius:50px;
  font-weight:700;font-size:.88rem;z-index:9000;opacity:0;transition:all .3s;
  pointer-events:none;backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.score-pop{position:fixed;font-weight:900;font-size:2rem;pointer-events:none;z-index:9999;animation:sup 1.4s forwards}
@keyframes sup{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-65px) scale(1.3)}}

/* RESULT */
#result-screen{display:none;position:fixed;inset:0;background:linear-gradient(135deg,#0d0221,#1a237e,#0d47a1);
  z-index:8000;flex-direction:column;align-items:center;justify-content:center}
.r-title{font-size:2.6rem;font-weight:900;color:var(--sand);text-shadow:0 4px 20px rgba(0,0,0,.5);
  margin-bottom:1.4rem;animation:tp .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes tp{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.r-list{display:flex;flex-direction:column;gap:9px;width:100%;max-width:390px}
.r-item{display:flex;align-items:center;gap:11px;background:rgba(255,255,255,.1);
  border-radius:15px;padding:11px 16px;backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.15);animation:rs .5s cubic-bezier(.34,1.56,.64,1) both}
@keyframes rs{from{transform:translateX(-40px);opacity:0}to{transform:translateX(0);opacity:1}}
.r-rank{font-size:1.7rem;width:34px}.r-icon{font-size:1.7rem}
.r-name{flex:1;color:#fff;font-weight:700}.r-score{font-size:1.5rem;font-weight:900;color:#69f0ae}
.confetti-wrap{position:fixed;inset:0;pointer-events:none;overflow:hidden}
.confetti-bit{position:absolute;border-radius:2px;animation:cf linear forwards}
@keyframes cf{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.btn-restart{margin-top:1.4rem;padding:11px 34px;background:#fff;color:#1a237e;border:none;
  border-radius:50px;font-family:var(--font);font-weight:900;font-size:1.05rem;
  cursor:pointer;transition:transform .15s;box-shadow:0 4px 18px rgba(0,0,0,.25)}
.btn-restart:hover{transform:scale(1.05)}

.ev-lucky{background:rgba(67,160,71,.18)!important;border:1px solid rgba(105,240,174,.25)!important}
.ev-bad{background:rgba(229,57,53,.18)!important;border:1px solid rgba(255,82,82,.25)!important}
</style>
</head>
<body>

<div id="loading">
  <div class="logo">🎲 星際大富翁</div>
  <div class="sub">載入中...</div>
  <div class="spinner"></div>
</div>

<!-- TEACHER -->
<div id="teacher-view">
  <div class="t-header">
    <div class="t-title">🎲 星際大富翁</div>
    <div class="turn-chip" id="turn-chip">🐻 第1組 的回合</div>
  </div>
  <div class="board-wrap">
    <div class="iso-scene"><div id="board" class="iso-board"></div></div>
  </div>
  <div class="sidebar">
    <div class="panel">
      <div class="panel-title">🏆 各組分數</div>
      <div id="t-scores"></div>
    </div>
    <div class="panel" style="flex:1">
      <div class="panel-title">📋 事件面板</div>
      <div id="event-box" class="event-box">
        <div class="wait-msg" style="justify-content:center;padding:.4rem"><div class="pulse"></div> 等待擲骰...</div>
      </div>
      <div id="explain-box" class="explain-box"></div>
      <button class="btn-pub" id="btn-pub" onclick="publishAnswer()">🎯 公布答案</button>
      <button class="btn-next" id="btn-next" onclick="nextTurn()">➡️ 下一組</button>
      <button class="btn-settle" onclick="showResult()">🏆 結算遊戲</button>
    </div>
  </div>
</div>

<!-- STUDENT -->
<div id="student-view">
  <div class="s-header">
    <div class="s-title">🎲 星際大富翁</div>
    <div class="my-badge" id="my-badge">🐻 第1組</div>
  </div>
  <div class="s-scores" id="s-scores"></div>
  <div class="s-board-wrap">
    <div class="iso-scene"><div id="s-board" class="iso-board"></div></div>
  </div>
  <div class="s-action" id="s-action">
    <div class="wait-msg"><div class="pulse"></div><span>等待遊戲開始...</span></div>
  </div>
</div>

<!-- RESULT -->
<div id="result-screen">
  <div class="confetti-wrap" id="confetti-wrap"></div>
  <div class="r-title">🏆 遊戲結算！</div>
  <div class="r-list" id="r-list"></div>
  <button class="btn-restart" onclick="location.reload()">🔄 再玩一次</button>
</div>
<div class="toast" id="toast"></div>

<script>
const TEAMS=[
  {id:1,name:'第1組',icon:'🐻',color:'#FF8A65'},
  {id:2,name:'第2組',icon:'🐼',color:'#81C784'},
  {id:3,name:'第3組',icon:'🦊',color:'#FFB74D'},
  {id:4,name:'第4組',icon:'🐸',color:'#4FC3F7'},
  {id:5,name:'第5組',icon:'🐧',color:'#CE93D8'},
];

const TOTAL=28;
const CTYPES=[
  'start','q','lucky','q','bad','q','lucky','q',
  'bad','q','lucky','special','q','bad',
  'q','lucky','q','bad','q','lucky',
  'q','bad','q','lucky','q','bad','q','lucky'
];
const CICONS={start:'🏁',q:'❓',lucky:'🍀',bad:'💀',special:'⭐'};

function getBoardLayout(){
  const CW=84,CH=84,cols=8,rows=6;
  const path=[];
  for(let c=0;c<cols;c++) path.push([c,0]);
  for(let r=1;r<rows-1;r++) path.push([cols-1,r]);
  for(let c=cols-1;c>=0;c--) path.push([c,rows-1]);
  for(let r=rows-2;r>=1;r--) path.push([0,r]);
  return path.slice(0,TOTAL).map(([c,r])=>({x:c*CW,y:r*CH}));
}

let myRole='',myTeamId=0,teamCount=4;
let gameState=null,boardPos=[];
let selectedAnswer=null;

window.addEventListener('message',e=>{
  if(!e.data) return;
  if(e.data.type==='PLATFORM_START'){
    const{role,teamId,teamCount:tc}=e.data;
    myRole=role||'student';
    if(typeof teamId==='number') myTeamId=teamId;
    else if(typeof teamId==='string'){const m=teamId.match(/\d+/);myTeamId=m?parseInt(m[0]):1;}
    else myTeamId=1;
    teamCount=parseInt(tc)||4;
    launch();
  }
  // 學生接收狀態
  if(e.data.type==='W8_STATE'&&myRole==='student'){
    gameState=e.data.state;
    render();
  }
  // 老師接收學生骰子
  if(e.data.type==='W8_ROLL'&&myRole==='teacher'){
    const{teamId,diceResult}=e.data;
    if(gameState&&parseInt(teamId)===gameState.currentTurn){
      updateState({phase:'rolled',diceResult});
      showToast(`🎲 ${TEAMS[parseInt(teamId)-1]?.icon} 擲出 ${diceResult.total} 步！`);
    }
  }
});

window.addEventListener('load',()=>{
  setTimeout(()=>{
    const p=new URLSearchParams(location.search);
    if(p.get('role')){
      myRole=p.get('role')||'student';
      const t=p.get('team')||'1';
      const m=String(t).match(/\d+/);
      myTeamId=m?parseInt(m[0]):1;
      teamCount=parseInt(p.get('teams')||'4');
      launch();
    } else if(!window.parent||window.parent===window){
      myRole='teacher';myTeamId=0;teamCount=4;launch();
    } else {
      document.querySelector('.sub').textContent='等待平台啟動...';
    }
  },600);
});

function launch(){
  document.getElementById('loading').style.opacity='0';
  setTimeout(()=>{
    document.getElementById('loading').style.display='none';
    boardPos=getBoardLayout();
    buildBoard();
    initState();
  },450);
}

function buildBoard(){
  ['board','s-board'].forEach(id=>{
    const el=document.getElementById(id);if(!el)return;
    el.innerHTML='';
    const isS=id==='s-board';
    const sc=isS?.66:1;
    const maxX=Math.max(...boardPos.map(p=>p.x));
    const maxY=Math.max(...boardPos.map(p=>p.y));
    el.style.width=((maxX+84)*sc)+'px';
    el.style.height=((maxY+84)*sc)+'px';

    boardPos.forEach((pos,i)=>{
      const type=CTYPES[i]||'q';
      const cell=document.createElement('div');
      cell.className=`cell type-${type}`;
      cell.id=(id==='board'?'cell-':'sc-')+i;
      cell.style.left=(pos.x*sc)+'px';
      cell.style.top=(pos.y*sc)+'px';
      if(isS){cell.style.width=cell.style.height=(76*sc)+'px';}
      cell.innerHTML=`
        <div class="cell-top">
          <span class="c-icon">${CICONS[type]||'❓'}</span>
          <span class="c-num">${i}</span>
          <div class="c-dots" id="${id==='board'?'dots-':'sdots-'}${i}"></div>
        </div>
        <div class="cell-s"></div>
        <div class="cell-e"></div>`;
      el.appendChild(cell);
    });
  });
}

function initState(){
  if(myRole==='teacher'){
    gameState=makeInit();
    render();
    broadcast();
  } else {
    gameState=null;
    render();
  }
}

function makeInit(){
  const teams={};
  for(let i=1;i<=teamCount;i++) teams[i]={id:i,position:0,score:0,extraDice:false,skipTurn:false};
  return{teams,currentTurn:1,phase:'waiting_roll',diceResult:null,event:null,question:null,selectedAnswer:null,teamCount};
}

function broadcast(){
  if(myRole==='teacher'){
    try{window.parent.postMessage({type:'W8_STATE',state:gameState},'*');}catch(e){}
  }
}

function updateState(patch){
  gameState={...gameState,...patch};
  render();broadcast();
}
function updateTeam(tid,patch){
  const t={...gameState.teams};
  t[tid]={...t[tid],...patch};
  updateState({teams:t});
}

function render(){
  const isT=myRole==='teacher';
  document.getElementById('teacher-view').style.display=isT?'grid':'none';
  document.getElementById('student-view').style.display=isT?'none':'flex';
  renderPieces();
  if(isT)renderTeacher();else renderStudent();
}

function renderPieces(){
  if(!gameState)return;
  ['board','s-board'].forEach(id=>{
    const el=document.getElementById(id);if(!el)return;
    const isS=id==='s-board';const sc=isS?.66:1;
    el.querySelectorAll('.piece').forEach(p=>p.remove());
    el.querySelectorAll('.c-dots').forEach(d=>d.innerHTML='');
    Object.values(gameState.teams||{}).forEach(team=>{
      const t=TEAMS[team.id-1];if(!t)return;
      const pos=team.position%TOTAL;
      const bp=boardPos[pos];if(!bp)return;
      const dotsEl=document.getElementById((id==='board'?'dots-':'sdots-')+pos);
      if(dotsEl){const dot=document.createElement('div');dot.className='team-dot';dot.style.background=t.color;dotsEl.appendChild(dot);}
      const piece=document.createElement('div');
      piece.className='piece';
      piece.style.left=(bp.x*sc+20*sc)+'px';
      piece.style.top=(bp.y*sc-16)+'px';
      piece.style.background=t.color;
      piece.style.animationDelay=(team.id*.22)+'s';
      piece.innerHTML=t.icon;
      if(team.skipTurn){const sb=document.createElement('div');sb.className='stop-badge';sb.textContent='停';piece.appendChild(sb);}
      el.appendChild(piece);
    });
    el.querySelectorAll('.cell').forEach(c=>c.classList.remove('active'));
    if(gameState.currentTurn){
      const team=gameState.teams[gameState.currentTurn];
      if(team){const cel=document.getElementById((id==='board'?'cell-':'sc-')+(team.position%TOTAL));if(cel)cel.classList.add('active');}
    }
  });
}

function renderTeacher(){
  const gs=gameState;
  const ct=TEAMS[gs.currentTurn-1];
  if(ct)document.getElementById('turn-chip').textContent=`${ct.icon} ${ct.name} 的回合`;
  const sc=document.getElementById('t-scores');sc.innerHTML='';
  Object.values(gs.teams).forEach(team=>{
    const t=TEAMS[team.id-1];
    const row=document.createElement('div');
    row.className='score-row'+(team.id===gs.currentTurn?' active':'');
    row.innerHTML=`<span class="sr-icon">${t.icon}</span>
      <span class="sr-name" style="color:${t.color}">${t.name}</span>
      ${team.extraDice?'<span class="sr-tag">🎲🎲</span>':''}
      ${team.skipTurn?'<span class="sr-tag" style="color:#ff5252">⏸</span>':''}
      <span class="sr-pts">${team.score}分</span>`;
    sc.appendChild(row);
  });
  renderEventPanel();
}

function renderEventPanel(){
  const gs=gameState;
  const eb=document.getElementById('event-box');
  const exb=document.getElementById('explain-box');
  const bpub=document.getElementById('btn-pub');
  const bnext=document.getElementById('btn-next');
  exb.style.display='none';bpub.style.display='none';bnext.style.display='none';
  const ph=gs.phase;

  if(ph==='waiting_roll'){
    eb.className='event-box';
    const ct=TEAMS[gs.currentTurn-1];
    eb.innerHTML=`<div class="wait-msg" style="justify-content:center;padding:.4rem"><div class="pulse"></div> 等待 ${ct?.icon||''} 擲骰...</div>`;
  } else if(ph==='rolled'){
    eb.className='event-box';
    const d=gs.diceResult;const f=['⚀','⚁','⚂','⚃','⚄','⚅'];
    eb.innerHTML=`<div style="text-align:center">
      <div style="font-size:.75rem;color:rgba(255,255,255,.4);margin-bottom:5px">骰子結果</div>
      <div class="dice-show"><div class="dice-face">${f[(d.d1||1)-1]}</div>${d.d2?`<div class="dice-face">${f[(d.d2||1)-1]}</div>`:''}</div>
      <div class="dice-total">共 ${d.total} 步</div></div>`;
    bnext.style.display='block';bnext.textContent='▶ 移動棋子';bnext.onclick=()=>movePiece();
  } else if(ph==='event'){
    renderEventCard();
  } else if(ph==='answering'){
    renderQuestionPanel();bpub.style.display='block';
  } else if(ph==='revealing'){
    renderRevealPanel();
    bnext.style.display='block';bnext.textContent='➡️ 下一組';bnext.onclick=()=>nextTurn();
  } else if(ph==='done'){
    eb.className='event-box';
    eb.innerHTML=`<div class="wait-msg" style="justify-content:center;padding:.4rem;color:rgba(255,255,255,.25)">回合結束</div>`;
    bnext.style.display='block';bnext.textContent='➡️ 下一組';bnext.onclick=()=>nextTurn();
  }
}

function renderEventCard(){
  const ev=gameState.event;
  const eb=document.getElementById('event-box');
  const bnext=document.getElementById('btn-next');
  if(!ev)return;
  eb.className='event-box '+(ev.type==='lucky'?'ev-lucky':ev.type==='bad'?'ev-bad':'');
  eb.innerHTML=`<div style="font-size:2rem;text-align:center;margin-bottom:5px">${ev.type==='lucky'?'🍀':'💀'}</div>
    <div style="text-align:center;font-weight:800;font-size:.98rem;color:#fff;margin-bottom:3px">${ev.title}</div>
    <div style="text-align:center;font-size:.82rem;color:rgba(255,255,255,.55)">${ev.desc}</div>`;
  bnext.style.display='block';bnext.textContent='➡️ 下一組';bnext.onclick=()=>nextTurn();
}

function renderQuestionPanel(){
  const q=gameState.question;
  const eb=document.getElementById('event-box');
  if(!q){eb.innerHTML=`<div class="ldots"><span></span><span></span><span></span><span style="margin-left:6px">AI 出題中...</span></div>`;return;}
  eb.className='event-box';
  const sa=gameState.selectedAnswer;
  eb.innerHTML=`<div class="q-text">${q.question}</div>
    <button class="opt-btn ${sa==='A'?'selected':''}" onclick="selectAnswer('A')">A．${q.optionA}</button>
    <button class="opt-btn ${sa==='B'?'selected':''}" onclick="selectAnswer('B')">B．${q.optionB}</button>`;
}

function renderRevealPanel(){
  const gs=gameState;const q=gs.question;const sa=gs.selectedAnswer;
  const eb=document.getElementById('event-box');const exb=document.getElementById('explain-box');
  if(!q)return;
  const correct=sa===q.answer;
  eb.className='event-box';
  eb.innerHTML=`<div class="q-text">${q.question}</div>
    <button class="opt-btn ${sa==='A'?(correct?'correct':'wrong'):q.answer==='A'?'correct':''}" disabled>A．${q.optionA}${q.answer==='A'?' ✅':''}</button>
    <button class="opt-btn ${sa==='B'?(correct?'correct':'wrong'):q.answer==='B'?'correct':''}" disabled>B．${q.optionB}${q.answer==='B'?' ✅':''}</button>
    <div style="text-align:center;font-weight:900;font-size:.95rem;margin-top:5px;color:${correct?'#69f0ae':'#ff5252'}">
      ${correct?`🎉 答對！+${gs.event?.specialQ?4:2}分`:'❌ 答錯了！'}</div>`;
  exb.style.display='block';exb.textContent='💡 '+(q.explanation||'');
}

function renderStudent(){
  const gs=gameState;
  const myT=TEAMS[myTeamId-1];
  if(myT)document.getElementById('my-badge').innerHTML=`${myT.icon} ${myT.name}`;
  const sr=document.getElementById('s-scores');sr.innerHTML='';
  if(!gs||!gs.teams){
    document.getElementById('s-action').innerHTML=`<div class="wait-msg"><div class="pulse"></div><span>等待遊戲開始...</span></div>`;
    return;
  }
  Object.values(gs.teams).forEach(team=>{
    const t=TEAMS[team.id-1];
    const chip=document.createElement('div');
    chip.className='score-chip'+(team.id===myTeamId?' mine':'');
    chip.innerHTML=`${t.icon} ${team.score}分`;
    sr.appendChild(chip);
  });
  const sa=document.getElementById('s-action');
  const isMyTurn=gs.currentTurn===myTeamId;
  const ct=TEAMS[gs.currentTurn-1];
  const myTD=gs.teams[myTeamId];
  sa.innerHTML='';

  if(gs.phase==='waiting_roll'&&isMyTurn){
    if(myTD?.skipTurn){sa.innerHTML=`<div style="font-size:1.1rem;font-weight:700;color:#ff5252">⏸ 這回合停止行動！</div>`;}
    else{
      sa.innerHTML=`<div style="color:rgba(255,255,255,.55);font-size:.9rem;margin-bottom:11px">輪到你們了！${myTD?.extraDice?'🎲🎲 兩顆骰子':''}</div>
        <button class="btn-roll" onclick="rollDice()">🎲 擲骰！</button>`;
    }
  } else if(gs.phase==='waiting_roll'){
    sa.innerHTML=`<div class="wait-msg"><div class="pulse"></div><span>${ct?.icon||''} ${ct?.name||''}的回合，請等待...</span></div>`;
  } else if(gs.phase==='rolled'||gs.phase==='event'){
    const d=gs.diceResult;
    if(d){const f=['⚀','⚁','⚂','⚃','⚄','⚅'];
      sa.innerHTML=`<div style="color:rgba(255,255,255,.55);font-size:.88rem;margin-bottom:7px">${isMyTurn?'你們':'他們'}擲出了</div>
        <div class="dice-show"><div class="dice-face">${f[(d.d1||1)-1]}</div>${d.d2?`<div class="dice-face">${f[(d.d2||1)-1]}</div>`:''}</div>
        <div class="dice-total">共 ${d.total} 步</div>`;}
  } else if(gs.phase==='answering'){
    const q=gs.question;
    if(!q){sa.innerHTML=`<div class="ldots"><span></span><span></span><span></span><span style="margin-left:6px">AI 出題中...</span></div>`;}
    else{sa.innerHTML=`
      <div style="font-weight:700;font-size:.92rem;color:#fff;margin-bottom:11px">${q.question}</div>
      <div style="display:flex;gap:9px;justify-content:center;flex-wrap:wrap">
        <div style="padding:9px 18px;background:rgba(30,136,229,.22);border:2px solid rgba(30,136,229,.45);border-radius:11px;font-weight:800;font-size:.95rem;color:#90CAF9">A．${q.optionA}</div>
        <div style="padding:9px 18px;background:rgba(229,57,53,.18);border:2px solid rgba(229,57,53,.4);border-radius:11px;font-weight:800;font-size:.95rem;color:#EF9A9A">B．${q.optionB}</div>
      </div>
      <div style="margin-top:9px;color:rgba(255,255,255,.3);font-size:.8rem">老師正在選擇答案...</div>`;}
  } else if(gs.phase==='revealing'){
    const q=gs.question;const sa2=gs.selectedAnswer;const correct=sa2===q?.answer;
    sa.innerHTML=`<div style="font-size:2.4rem;margin-bottom:5px">${correct?'🎉':'😢'}</div>
      <div style="font-weight:900;font-size:1.2rem;color:${correct?'#69f0ae':'#ff5252'}">${correct?'答對了！':'答錯了...'}</div>
      <div style="color:rgba(255,255,255,.45);margin-top:7px;font-size:.82rem">💡 ${q?.explanation||''}</div>`;
  } else {
    sa.innerHTML=`<div class="wait-msg"><div class="pulse"></div><span>等待繼續...</span></div>`;
  }
}

function rollDice(){
  if(!gameState||gameState.currentTurn!==myTeamId)return;
  const team=gameState.teams[myTeamId];
  if(!team||team.skipTurn)return;
  const d1=Math.ceil(Math.random()*6);
  let d2=null;if(team.extraDice)d2=Math.ceil(Math.random()*6);
  const total=d1+(d2||0);
  if(myRole==='student'){
    try{window.parent.postMessage({type:'W8_ROLL',teamId:myTeamId,diceResult:{d1,d2,total}},'*');}catch(e){}
  }
  updateState({phase:'rolled',diceResult:{d1,d2,total}});
  showToast(`🎲 ${TEAMS[myTeamId-1]?.icon} 擲出 ${total} 步！`);
}

function movePiece(){
  const gs=gameState;
  const team=gs.teams[gs.currentTurn];
  const steps=gs.diceResult?.total||1;
  const newPos=(team.position+steps)%TOTAL;
  updateTeam(gs.currentTurn,{position:newPos});
  setTimeout(()=>triggerEvent(CTYPES[newPos],newPos),650);
}

function triggerEvent(type){
  const tid=gameState.currentTurn;
  if(type==='q'){updateState({phase:'answering',event:null});fetchQ(false);}
  else if(type==='special'){updateState({phase:'answering',event:{specialQ:true}});fetchQ(true);}
  else if(type==='lucky')doLucky(tid);
  else if(type==='bad')doBad(tid);
  else if(type==='start'){
    showToast('🏁 經過起點！+1分');
    updateTeam(tid,{score:(gameState.teams[tid].score||0)+1});
    updateState({phase:'done',event:null});
  } else updateState({phase:'done',event:null});
}

const LUCKY=[
  {title:'幸運之星！',desc:'+3 分！',fx:(tid,gs)=>updateTeam(tid,{score:(gs.teams[tid].score||0)+3})},
  {title:'順風！',desc:'前進 2 格！',fx:(tid,gs)=>{updateTeam(tid,{position:(gs.teams[tid].position+2)%TOTAL});}},
  {title:'全組加分！',desc:'所有組各 +1 分！',fx:(tid,gs)=>{
    const t2={...gs.teams};Object.values(t2).forEach(t=>{t2[t.id]={...t2[t.id],score:(t2[t.id].score||0)+1};});updateState({teams:t2});}},
  {title:'🎲 獲得第二顆骰子！',desc:'之後每回合擲兩顆！',fx:(tid)=>updateTeam(tid,{extraDice:true})},
  {title:'神秘禮物！',desc:'+2 分！',fx:(tid,gs)=>updateTeam(tid,{score:(gs.teams[tid].score||0)+2})},
];
const BAD=[
  {title:'倒楣！',desc:'-1 分',fx:(tid,gs)=>updateTeam(tid,{score:Math.max(0,(gs.teams[tid].score||0)-1)})},
  {title:'滑倒！',desc:'退後 2 格',fx:(tid,gs)=>{updateTeam(tid,{position:((gs.teams[tid].position-2)+TOTAL)%TOTAL});}},
  {title:'⏸ 停一回合！',desc:'下回合跳過',fx:(tid)=>updateTeam(tid,{skipTurn:true})},
];

function doLucky(tid){
  const ev=LUCKY[Math.floor(Math.random()*LUCKY.length)];
  ev.fx(tid,gameState);
  updateState({phase:'event',event:{type:'lucky',title:ev.title,desc:ev.desc}});
  showToast(`🍀 ${ev.title}`);showPop('+','#69f0ae');
}
function doBad(tid){
  const ev=BAD[Math.floor(Math.random()*BAD.length)];
  ev.fx(tid,gameState);
  updateState({phase:'event',event:{type:'bad',title:ev.title,desc:ev.desc}});
  showToast(`💀 ${ev.title}`);showPop('-1','#ff5252');
}

async function fetchQ(isSpecial){
  const subs=['生活常識、自然科學','國語（成語、字義、造句）'];
  const sub=subs[Math.floor(Math.random()*subs.length)];
  const diff=isSpecial?'中難度，適合國小高年級':'簡單到中等，適合國小混齡';
  const prompt=`你是小學老師，出一題${sub}選擇題。難度：${diff}。JSON格式，不含其他文字：
{"question":"題目","optionA":"A選項","optionB":"B選項","answer":"A或B","explanation":"解釋1~2句"}`;
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':'',
        'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,
        messages:[{role:'user',content:prompt}]})
    });
    if(!resp.ok)throw new Error('api');
    const data=await resp.json();
    const text=data.content?.[0]?.text||'';
    const q=JSON.parse(text.replace(/```[\w]*|```/g,'').trim());
    updateState({question:q,phase:'answering'});
  }catch(e){
    const pool=[
      {question:'「一石二鳥」的意思是？',optionA:'做一件事達成兩個目的',optionB:'用石頭打兩隻鳥',answer:'A',explanation:'一石二鳥比喻做一件事情，同時達到兩個目的。'},
      {question:'地球上面積最大的海洋是？',optionA:'大西洋',optionB:'太平洋',answer:'B',explanation:'太平洋是地球上最大的海洋，約佔地球表面積三分之一。'},
      {question:'植物光合作用需要什麼？',optionA:'陽光和二氧化碳',optionB:'陽光和氧氣',answer:'A',explanation:'植物利用陽光、水和二氧化碳進行光合作用，並釋放氧氣。'},
      {question:'「半途而廢」的意思？',optionA:'做事到一半就放棄',optionB:'做事非常努力',answer:'A',explanation:'半途而廢形容事情做到一半就放棄，沒有堅持到底。'},
      {question:'台灣最高的山是？',optionA:'雪山',optionB:'玉山',answer:'B',explanation:'玉山海拔3952公尺，是台灣第一高峰。'},
      {question:'水在幾度時結冰？',optionA:'攝氏0度',optionB:'攝氏4度',answer:'A',explanation:'水在攝氏0度時結冰，100度時沸騰。'},
      {question:'「亡羊補牢」比喻？',optionA:'出問題後趕緊補救',optionB:'提早準備防患未然',answer:'A',explanation:'亡羊補牢比喻出問題後才補救，還來得及。'},
      {question:'蝙蝠如何在黑暗中辨向？',optionA:'超聲波回聲定位',optionB:'靠眼睛看',answer:'A',explanation:'蝙蝠發出超聲波，利用聲波反射判斷位置，稱為回聲定位。'},
      {question:'彩虹有幾種顏色？',optionA:'五種',optionB:'七種',answer:'B',explanation:'彩虹有紅橙黃綠藍靛紫七種顏色，是光線折射形成的。'},
      {question:'「囫圇吞棗」比喻？',optionA:'學習不加思考死記硬背',optionB:'讀書速度很快',answer:'A',explanation:'囫圇吞棗比喻學習時不求理解，全部硬記。'},
    ];
    updateState({question:pool[Math.floor(Math.random()*pool.length)],phase:'answering'});
  }
}

function selectAnswer(ans){
  selectedAnswer=ans;
  updateState({selectedAnswer:ans});
  renderEventPanel();
}

function publishAnswer(){
  const gs=gameState;
  if(!gs.selectedAnswer){showToast('請先選擇答案！');return;}
  const correct=gs.selectedAnswer===gs.question.answer;
  const bonus=gs.event?.specialQ?4:2;
  if(correct){
    updateTeam(gs.currentTurn,{score:(gs.teams[gs.currentTurn].score||0)+bonus});
    showPop('+'+bonus,'#69f0ae');
  }
  updateState({phase:'revealing'});
  showToast(correct?`🎉 答對！+${bonus}分`:'❌ 答錯了！');
}

function nextTurn(){
  const gs=gameState;
  const tc=parseInt(gs.teamCount)||teamCount;
  let next=(gs.currentTurn%tc)+1;
  let safe=0;
  while(safe<tc){
    if(gs.teams[next]?.skipTurn){
      updateTeam(next,{skipTurn:false});
      showToast(`⏸ ${TEAMS[next-1]?.icon} 停一回合，跳過！`);
      next=(next%tc)+1;safe++;
    } else break;
  }
  updateState({currentTurn:next,phase:'waiting_roll',diceResult:null,event:null,question:null,selectedAnswer:null});
}

function showResult(){
  const rs=document.getElementById('result-screen');rs.style.display='flex';
  const sorted=Object.values(gameState.teams).sort((a,b)=>b.score-a.score);
  const rl=document.getElementById('r-list');rl.innerHTML='';
  const medals=['🥇','🥈','🥉','4️⃣','5️⃣'];
  sorted.forEach((team,i)=>{
    const t=TEAMS[team.id-1];
    const item=document.createElement('div');item.className='r-item';
    item.style.animationDelay=(i*.12)+'s';
    item.innerHTML=`<span class="r-rank">${medals[i]}</span><span class="r-icon">${t.icon}</span>
      <span class="r-name">${t.name}</span><span class="r-score">${team.score}分</span>`;
    rl.appendChild(item);
  });
  const wrap=document.getElementById('confetti-wrap');
  const cols=['#FFD700','#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#CE93D8'];
  for(let i=0;i<70;i++){
    const p=document.createElement('div');p.className='confetti-bit';
    p.style.cssText=`left:${Math.random()*100}vw;background:${cols[Math.floor(Math.random()*cols.length)]};
      animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*2}s;
      width:${6+Math.random()*10}px;height:${6+Math.random()*10}px`;
    wrap.appendChild(p);
  }
}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
function showPop(text,color){
  const p=document.createElement('div');p.className='score-pop';p.textContent=text;p.style.color=color;
  p.style.left=(30+Math.random()*40)+'vw';p.style.top='40vh';
  document.body.appendChild(p);setTimeout(()=>p.remove(),1400);
}
</script>
