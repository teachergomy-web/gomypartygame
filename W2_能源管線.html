<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ 能源管線！</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:     #1A0A4A;
            --panel:  #2D1A6E;
            --yellow: #FFD600;
            --yellow2:#c89800;
            --cyan:   #00E5FF;
            --pink:   #FF40FF;
            --green:  #2ECC40;
            --red:    #FF3B3B;
            --outline:#1a1200;
        }
        * { box-sizing: border-box; touch-action: manipulation; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg);
            font-family: 'Fredoka One', 'Nunito', sans-serif;
            color: #fff; overflow: hidden; user-select: none;
        }

        /* ── 星星背景 ── */
        #stars { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
        .star  { position:absolute; border-radius:50%; background:#fff; animation:twinkle var(--d,2s) infinite alternate; }
        @keyframes twinkle { from{opacity:.15;transform:scale(.8)} to{opacity:.9;transform:scale(1.2)} }

        /* ── Overlay 基底 ── */
        .overlay {
            position:absolute; top:0; left:0; width:100%; height:100%;
            background:rgba(26,10,74,.92);
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            z-index:30; text-align:center;
        }

        /* ── 卡片框 ── */
        .mp-card {
            background: var(--panel);
            border: 5px solid var(--yellow);
            border-radius: 24px;
            padding: 32px 28px;
            width: 88%; max-width: 520px;
            box-shadow: 0 8px 0 var(--yellow2), 0 0 40px rgba(255,214,0,.25);
        }

        /* ── 標題 ── */
        .mp-title {
            font-family:'Fredoka One',sans-serif;
            font-size: clamp(28px,6vw,48px);
            color: var(--yellow);
            text-shadow: 3px 3px 0 #000, 0 0 20px rgba(255,214,0,.5);
            margin-bottom: 8px; line-height:1.1;
            animation: bounce 1.6s ease-in-out infinite alternate;
        }
        @keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-6px)} }

        .mp-sub {
            font-family:'Nunito',sans-serif; font-weight:700;
            font-size:clamp(11px,2vw,14px);
            color:rgba(255,255,255,.6); margin-bottom:24px;
        }

        /* ── 按鈕 ── */
        .mp-btn {
            display:block; width:100%; margin-bottom:14px;
            padding:16px 24px;
            font-family:'Fredoka One',sans-serif; font-size:clamp(16px,3vw,22px);
            color:#fff; cursor:pointer;
            border:4px solid #fff; border-radius:16px;
            box-shadow: 0 6px 0 rgba(0,0,0,.4);
            transition: transform .1s, box-shadow .1s;
            text-shadow: 2px 2px 0 rgba(0,0,0,.4);
        }
        .mp-btn:active { transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,.4); }
        .mp-btn-cyan  { background:linear-gradient(160deg,#00c8e0,#0080a0); border-color:var(--cyan); }
        .mp-btn-pink  { background:linear-gradient(160deg,#cc00cc,#880088); border-color:var(--pink); }
        .mp-btn-green { background:linear-gradient(160deg,#27ae60,#1a7a42); border-color:#4dff80; }
        .mp-btn-grey  { background:linear-gradient(160deg,#555,#333); border-color:#888; font-size:14px; padding:10px; }

        /* ── 規則文字 ── */
        .rule-text {
            font-family:'Nunito',sans-serif; font-weight:700;
            font-size:clamp(12px,2.2vw,15px);
            color:rgba(255,255,255,.85); line-height:2;
            text-align:left; margin-bottom:20px;
        }

        /* ── 遊戲 HUD ── */
        #game-ui { display:none; position:absolute; inset:0; }
        #ui-layer {
            position:absolute; top:0; left:0; width:100%;
            display:flex; justify-content:space-between; align-items:center;
            padding:10px 16px; box-sizing:border-box;
            background:rgba(26,10,74,.95);
            border-bottom:4px solid var(--yellow);
            pointer-events:none; z-index:10;
        }
        .hud-box { display:flex; flex-direction:column; gap:4px; }
        .hud-label { font-family:'Nunito',sans-serif; font-weight:900; font-size:10px; color:rgba(255,255,255,.5); text-transform:uppercase; letter-spacing:.05em; }
        .hud-val   { font-family:'Fredoka One',sans-serif; font-size:clamp(16px,3vw,22px); }
        .text-cyan  { color:var(--cyan);  text-shadow:0 0 8px var(--cyan); }
        .text-pink  { color:var(--pink);  text-shadow:0 0 8px var(--pink); }
        .text-gold  { color:var(--yellow);text-shadow:0 0 8px var(--yellow); }
        .text-green { color:var(--green); text-shadow:0 0 8px var(--green); }
        .text-red   { color:var(--red);   text-shadow:0 0 8px var(--red); }

        .back-btn {
            background:linear-gradient(160deg,#c0392b,#8e1a13);
            border:3px solid #fff; border-radius:12px;
            padding:8px 14px; font-family:'Fredoka One',sans-serif; font-size:14px;
            color:#fff; cursor:pointer; pointer-events:auto;
            box-shadow:0 4px 0 rgba(0,0,0,.4);
            transition:transform .1s;
        }
        .back-btn:active { transform:translateY(2px); }

        #canvas-container {
            position:absolute; top:72px; left:0; width:100%; height:calc(100% - 72px);
            display:flex; justify-content:center; align-items:center;
        }
        canvas { display:block; border-radius:12px; box-shadow:0 0 40px rgba(0,229,255,.15); }

        /* ── 過關畫面 ── */
        .clear-icon { font-size:64px; margin-bottom:12px; animation:popIn .4s cubic-bezier(.34,1.56,.64,1); }
        @keyframes popIn { from{transform:scale(0)} to{transform:scale(1)} }
        .clear-time-badge {
            display:inline-block;
            background:rgba(255,214,0,.15); border:3px solid var(--yellow);
            border-radius:12px; padding:8px 20px; margin:8px 0;
            font-family:'Fredoka One',sans-serif; font-size:28px; color:var(--yellow);
        }
        .clear-score-badge {
            display:inline-block;
            background:rgba(46,204,64,.15); border:3px solid var(--green);
            border-radius:12px; padding:8px 20px; margin:8px 0;
            font-family:'Fredoka One',sans-serif; font-size:32px; color:var(--green);
        }
        .next-hint {
            font-family:'Nunito',sans-serif; font-weight:700;
            font-size:13px; color:rgba(255,255,255,.4); margin-top:12px;
            animation:blink 1.2s ease-in-out infinite;
        }
        @keyframes blink { 0%,100%{opacity:.4} 50%{opacity:1} }

        /* ── 結算畫面 ── */
        .final-score-num {
            font-family:'Fredoka One',sans-serif;
            font-size:clamp(60px,12vw,90px);
            color:var(--yellow);
            text-shadow:4px 4px 0 #000, 0 0 40px rgba(255,214,0,.6);
            line-height:1;
        }
        .confetti-piece {
            position:absolute; width:10px; height:10px; pointer-events:none;
            animation:fall var(--fall,.5s) var(--delay,0s) ease-in forwards;
        }
        @keyframes fall { to{transform:translateY(100vh) rotate(360deg); opacity:0} }

        .hidden { display:none !important; }

        /* ── 關卡網格 ── */
        #level-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .level-btn {
            aspect-ratio: 1;
            border-radius: 12px;
            font-family: 'Fredoka One', sans-serif;
            font-size: clamp(16px, 4vw, 22px);
            border: 3px solid #fff;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,.4);
            transition: transform .1s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .level-btn:active { transform: translateY(4px); box-shadow: 0 0 0; }
        .lvl-single   { background: linear-gradient(160deg,#00c8e0,#0080a0); border-color: var(--cyan); }
        .lvl-mid      { background: linear-gradient(160deg,#f5a623,#c07000); border-color: #ffcc44; }
        .lvl-hard     { background: linear-gradient(160deg,#e74c3c,#a00000); border-color: #ff6644; }
        .lvl-double   { background: linear-gradient(160deg,#cc00cc,#880088); border-color: var(--pink); }
        .lvl-selected { box-shadow: 0 0 16px rgba(255,214,0,.9); border-color: #FFD600 !important; transform: scale(1.15); }
    </style>
</head>
<body>
<div id="stars"></div>

<div id="main-menu" class="overlay">
    <div class="mp-card" style="max-width:520px">
        <div class="mp-title" style="font-size:clamp(22px,5vw,36px);margin-bottom:4px">⚡ 能源管線</div>
        <div class="mp-sub" style="margin-bottom:16px">選擇關卡 (1–28)</div>
        <div id="level-grid" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:18px"></div>
        <button class="mp-btn mp-btn-green" id="menu-start-btn" style="margin:0;opacity:.4;cursor:not-allowed" disabled onclick="startSelectedLevel()">▶ 開始此關</button>
    </div>
</div>

<div id="rules-modal" class="overlay hidden">
    <div class="mp-card">
        <div id="rule-title" style="font-family:'Fredoka One',sans-serif;font-size:clamp(20px,4vw,28px);color:var(--yellow);text-shadow:2px 2px 0 #000;margin-bottom:16px">遊戲規則</div>
        <div id="rule-content" class="rule-text"></div>
        <button class="mp-btn mp-btn-green" onclick="startLevelSequence()">▶ 老師宣佈：同步開始！</button>
        <button class="mp-btn mp-btn-grey"  onclick="backToMenu()">← 取消，回主選單</button>
    </div>
</div>

<div id="game-ui">
    <div id="ui-layer">
        <div class="hud-box">
            <div class="hud-label">關卡</div>
            <div class="hud-val text-cyan" id="level-txt">1/28</div>
        </div>
        <div class="hud-box" style="align-items:center">
            <button class="back-btn" onclick="backToMenu()">🏠 主選單</button>
        </div>
        <div class="hud-box" style="align-items:flex-end">
            <div class="hud-label">狀態</div>
            <div class="hud-val text-red" id="status-txt">斷線中</div>
        </div>
    </div>
    <div id="canvas-container">
        <canvas id="gameCanvas"></canvas>
    </div>
    <div style="position:absolute;bottom:16px;left:50%;transform:translateX(-50%);pointer-events:none;display:flex;gap:24px;z-index:9">
        <div class="hud-box" style="align-items:center;background:rgba(26,10,74,.85);border:3px solid var(--yellow);border-radius:14px;padding:6px 18px">
            <div class="hud-label">總分</div>
            <div class="hud-val text-gold" id="score-txt">0</div>
        </div>
        <div class="hud-box" style="align-items:center;background:rgba(26,10,74,.85);border:3px solid rgba(255,255,255,.2);border-radius:14px;padding:6px 18px">
            <div class="hud-label">時間</div>
            <div class="hud-val text-gold" id="time-txt">0.0s</div>
        </div>
    </div>
</div>

<div id="level-clear" class="overlay hidden">
    <div class="mp-card" style="text-align:center">
        <div class="clear-icon">⚡</div>
        <div id="clear-title" style="font-family:'Fredoka One',sans-serif;font-size:clamp(22px,5vw,34px);color:var(--cyan);text-shadow:0 0 20px var(--cyan);margin-bottom:16px">連線成功！</div>
        <div class="clear-time-badge">⏱ <span id="clear-time">0.0</span> 秒</div><br>
        <div class="clear-score-badge">+<span id="clear-score">0</span> 分</div>
        <div class="next-hint">▶ 載入下一關中...</div>
    </div>
</div>

<div id="game-over" class="overlay hidden">
    <div class="mp-card" style="text-align:center">
        <div style="font-size:56px;margin-bottom:8px;animation:popIn .5s cubic-bezier(.34,1.56,.64,1)">👑</div>
        <div style="font-family:'Fredoka One',sans-serif;font-size:clamp(22px,4vw,30px);color:var(--yellow);text-shadow:2px 2px 0 #000;margin-bottom:4px">挑戰完成！</div>
        <div style="font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;color:rgba(255,255,255,.5);margin-bottom:20px">完美的團隊默契！</div>
        <div class="final-score-num" id="final-score">0</div>
        <div style="font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;color:rgba(255,255,255,.4);margin:8px 0 24px">最終總分</div>
        <button class="mp-btn mp-btn-cyan" onclick="backToMenu()">🏠 回主選單</button>
    </div>
</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let cols = 6, rows = 5;
        let tileSize = 60;
        let grid = [];
        
        let currentMode = 'SINGLE';
        let currentLevel = 0;
        let maxLevels = 28;
        let isLevelComplete = false;
        let gameStarted = false;
        
        let totalScore = 0;
        window.GROUP_ID = '';
        let startTime = 0;
        let timerInterval = null;
        let timeElapsed = 0;
        let levelTransitionTimeout1 = null;
        let levelTransitionTimeout2 = null;

        // ==========================================
        // 絕對同步的偽亂數產生器 (LCG)
        // ==========================================
        let currentSeed = 1;
        function seededRandom() {
            currentSeed = (currentSeed * 9301 + 49297) % 233280;
            return currentSeed / 233280;
        }

        // ==========================================
        // 類型與符號定義
        // ==========================================
        const TYPES = {
            'S': { paths: [[1]], type: 'source1' },
            'D': { paths: [[3]], type: 'dest1' },
            'A': { paths: [[1]], type: 'source2' },
            'B': { paths: [[3]], type: 'dest2' },
            'E': { paths: [[1]], type: 'source3' },
            'F': { paths: [[3]], type: 'dest3' },
            'I': { paths: [[0, 2]], type: 'pipe' },
            'L': { paths: [[0, 1]], type: 'pipe' },
            'T': { paths: [[0, 1, 3]], type: 'pipe' },
            'X': { paths: [[0, 2], [1, 3]], type: 'pipe' },
            ' ': { paths: [], type: 'empty' }
        };

        const SYMBOL_MAP = {
            'S': { type: 'S', rot: 0 }, 'D': { type: 'D', rot: 0 },
            'A': { type: 'A', rot: 0 }, 'B': { type: 'B', rot: 0 },
            'E': { type: 'E', rot: 0 }, 'F': { type: 'F', rot: 0 },
            
            // 讓起終點支援四個方向 (增加立體交錯感)
            's': { type: 'S', rot: 1 }, 'a': { type: 'A', rot: 1 }, // s/a 朝下出發
            'q': { type: 'S', rot: 3 }, 'w': { type: 'A', rot: 3 }, // q/w 朝上出發
            'd': { type: 'D', rot: 1 }, 'b': { type: 'B', rot: 1 }, // d/b 接收方朝上(來源需由下方往上進)
            'x': { type: 'D', rot: 3 }, 'y': { type: 'B', rot: 3 }, // x/y 接收方朝下(來源需由上方往下進)

            '│': { type: 'I', rot: 0 }, '─': { type: 'I', rot: 1 },
            '└': { type: 'L', rot: 0 }, '┌': { type: 'L', rot: 1 },
            '┐': { type: 'L', rot: 2 }, '┘': { type: 'L', rot: 3 },
            '┼': { type: 'X', rot: 0 },
            '┴': { type: 'T', rot: 2 },
            '┬': { type: 'T', rot: 0 },
            '├': { type: 'T', rot: 1 },
            '┤': { type: 'T', rot: 3 }
        };

        // ==========================================
        // 地圖庫 (11-22 關已大幅變更起終點方向與位置，並在關卡中貫穿上下左右)
        // ==========================================
        const mapsSingle = [
            // L1-L8: 6x5 基礎關卡
            ["******", "S┐*┌─D", "*└─┘**", "******", "******"], // L1
            ["S──┐**", "***│**", "*┌─┘**", "*└───D", "******"], // L2
            ["******", "S┐*┌┐*", "*└─┘│*", "**┌─┘*", "**└──D"], // L3
            ["S───┐*", "*┌┐*│*", "*│└─┘*", "*└───D", "******"], // L4
            ["*┌─┐**", "S┘*└┐*", "****│*", "**┌─┘*", "**└──D"], // L5
            ["S┐*┌─D", "*│*│**", "*└┐│**", "**└┘**", "******"], // L6
            ["S┐*┌┐*", "*└┐││*", "**└┘│*", "**┌─┘*", "**└──D"], // L7
            ["S──┐**", "***│**", "┌──┘**", "└───┐*", "****└D"], // L8
            // L9-L16: 10x6 交叉彎道關卡 (方向變化與打散)
            ["***┌───┐**", "**S┼─┐*d**", "***└─┘****", "**********", "**********", "**********"], // L9 
            ["*┌───┐****", "*│*┌─┼─D**", "*q*└─┘****", "**********", "**********", "**********"], // L10
            ["**s*******", "**└─┼─┐***", "****│*│***", "**┌─┼─┘***", "**d*******", "**********"], // L11
            ["**s*******", "**└─┐*****", "****│*****", "**┌─┼─┐***", "**d*└─┘***", "**********"], // L12
            ["**┌─┐*****", "**│*│*****", "**└─┼─D***", "****q*****", "**********", "**********"], // L13
            ["****┌───┐*", "**S─┼─┐*│*", "****│*│*d*", "****└─┘***", "**********", "**********"], // L14
            // L15-L22: 10x6 單管雙終點 1S+2D (方向與位置打散)
            ["**s*******", "**│*┌─D***", "**├─┼─┐***", "**│*│*│***", "**d*└─┘***", "**********"], // L15 (完美雙終點交錯)
            ["****s*****", "**┌─┼─┴─┐*", "**d*│*│*d*", "****└─┘***", "**********", "**********"], // L16 (底部T型分支)
            ["***s******", "**┌┬┐*****", "**│*│*****", "**d*d*****", "**********", "**********"], // L17
            ["**********", "**d***d***", "**│***│***", "**┌─┴─┐***", "****q*****", "**********"], // L18
            ["***s******", "**┌┬┐*****", "**│*└─D***", "**d*******", "**********", "**********"], // L19
            ["**S─┴─┐***", "****│*│***", "****d*d***", "**********", "**********", "**********"], // L20
            ["**┌─┴─┐***", "**│*│*│***", "**d*q*d***", "**********", "**********", "**********"], // L21
            ["**********", "**********", "****┌─┐***", "**x*│*│*x*", "**└─┼─┬─┘*", "****q*****"]  // L22 (頂部T型分支)
        ];

        // L23-L28: 雙管線 13x6 (全部改為 S->D, A->B，D/B皆在最右側且與起點不併排)
        const mapsMulti = [
            [
              "s***********y", 
              "└─┐*┌───┐***│",
              "A─┼─┘***└─┼─┘", 
              "**└─┐*****│**",
              "****└───┐*│**",
              "********└─D**" 
            ], // L23
            [
              "*a********┌─D", 
              "*│*┌──┐***│**",
              "S┼─┘**└─┼─┘**", 
              "*└─┐****│*┌─┐",
              "***└────┼─┘*│",
              "********└───b"  
            ], // L24
            [
              "s***a*****┌─D", 
              "└─┐*└─┐*┌─┼─┘",
              "**│***│*│*│**",
              "*┌┼───┼─┘*│**",
              "*││***└─┐*│**",
              "*└┘*****└─b**"  
            ], // L25
            [
              "A─┐*┌───────D", 
              "**│*└─┐*****│",
              "*┌┼───┼─────┘",
              "*││***│******",
              "┌┘│***└─────┐",
              "q*└─────────B"  
            ], // L26
            [
              "s************", 
              "└─┐*┌───┐*┌─┐",
              "**│*│***│*│*b", 
              "A─┼─┘***└─┼─┐", 
              "**│*******│*│",
              "**└───────┘*d"  
            ], // L27
            [
              "S─┐***a***┌─D", 
              "*┌┼───┼───┘**",
              "*││***│******",
              "*│└─┐*└─────┐",
              "*└──┘*******│",
              "************B"  
            ]  // L28
        ];

        function getRotatedPaths(type, rot) {
            return TYPES[type].paths.map(path => path.map(p => (p + rot) % 4));
        }

        // ==========================================
        // 首頁網格分頁與選關
        // ==========================================
        let currentPage = 0;
        const levelsPerPage = 20;

        let selectedLevelIndex = -1;

        function renderLevelGrid() {
            const grid = document.getElementById('level-grid');
            grid.innerHTML = '';
            for (let i = 0; i < maxLevels; i++) {
                const cls = i < 10 ? 'lvl-single' : i < 20 ? 'lvl-mid' : 'lvl-hard';
                let btn = document.createElement('button');
                btn.className = 'level-btn ' + cls + (i === selectedLevelIndex ? ' lvl-selected' : '');
                btn.innerText = i + 1;
                btn.onclick = () => {
                    selectedLevelIndex = i;
                    renderLevelGrid();
                    const startBtn = document.getElementById('menu-start-btn');
                    if (startBtn) { startBtn.disabled = false; startBtn.style.opacity = '1'; startBtn.style.cursor = 'pointer'; }
                };
                grid.appendChild(btn);
            }
        }

        function startSelectedLevel() {
            if (selectedLevelIndex < 0) return;
            selectLevel(selectedLevelIndex);
        }



        function selectLevel(lvlIndex) {
            currentLevel = lvlIndex;
            if (lvlIndex < 22) currentMode = 'SINGLE';
            else currentMode = 'DOUBLE';
            
            document.getElementById('main-menu').classList.add('hidden');
            
            const title = document.getElementById('rule-title');
            const content = document.getElementById('rule-content');
            
            if (currentMode === 'SINGLE') {
                title.innerText = `單管模式 (第 ${lvlIndex + 1} 關)`;
                title.className = "text-cyan";
                document.getElementById('ui-layer').style.borderBottomColor = "#00E5FF";
                content.innerHTML = `
                    <p>
                        ■ 點擊方塊可旋轉管線。<br>
                        ■ 請將 <span class="text-cyan">發電機 (S)</span> 連接至相對應的 <span class="text-cyan">接收器 (D)</span>。<br>
                        ■ 每一關都會自動打亂，請全組合作接通管線！
                    </p>`;
            } else {
                title.innerText = `雙管模式 (第 ${lvlIndex + 1} 關)`;
                title.className = "text-pink";
                document.getElementById('ui-layer').style.borderBottomColor = "#FF40FF";
                content.innerHTML = `
                    <p>
                        <span class="text-cyan">■ 青色發電機(S)</span> 需連至 <span class="text-cyan">青色接收(D)</span><br>
                        <span class="text-pink">■ 粉紅發電機(A)</span> 需連至 <span class="text-pink">粉紅接收(B)</span><br><br>
                        🔥 <b>不可短路混合！</b><br>
                        請善用 <span style="color:var(--yellow)">十字管(┼)</span> 讓兩條管線安全交叉。若不慎接通兩種能源，將觸發短路警報！
                    </p>`;
            }
            document.getElementById('rules-modal').classList.remove('hidden');
        }

        // ==========================================
        // 系統流程控制與中斷機制
        // ==========================================

        let countdownTimeout = null;
        function startCountdown(cb) {
            clearTimeout(countdownTimeout);
            const statusEl = document.getElementById('status-txt');
            let count = 3;
            function tick() {
                if (!gameStarted) return;
                if (count > 0) {
                    statusEl.innerText = count + '...';
                    statusEl.className = 'text-gold';
                    count--;
                    countdownTimeout = setTimeout(tick, 1000);
                } else {
                    statusEl.innerText = '開始！';
                    statusEl.className = 'text-green';
                    countdownTimeout = setTimeout(cb, 600);
                }
            }
            tick();
        }

        function backToMenu() {
            clearInterval(timerInterval);
            clearTimeout(levelTransitionTimeout1);
            clearTimeout(levelTransitionTimeout2);
            clearTimeout(countdownTimeout);
            gameStarted = false;
            
            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('rules-modal').classList.add('hidden');
            document.getElementById('level-clear').classList.add('hidden');
            document.getElementById('game-over').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
        }

        function startLevelSequence() {
            document.getElementById('rules-modal').classList.add('hidden');
            document.getElementById('game-ui').style.display = 'block';
            totalScore = 0;
            gameStarted = true;
            loadLevel(currentLevel);
        }

        // ==========================================
        // 載入關卡與【強制全面錯位演算法】
        // ==========================================
        function loadLevel(levelIndex) {
            if (!gameStarted) return; 
            isLevelComplete = false;
            
            if (levelIndex < 22) currentMode = 'SINGLE';
            else currentMode = 'DOUBLE';
            
            document.getElementById('level-txt').innerText = `L${levelIndex + 1}/${maxLevels}`;
            document.getElementById('level-txt').className = currentMode === 'SINGLE' ? 'text-cyan' : 'text-pink';
            document.getElementById('level-clear').classList.add('hidden');
            document.getElementById('status-txt').innerText = '準備中...';
            document.getElementById('status-txt').className = 'text-gold';

            // 動態設定網格大小
            if (currentMode === 'SINGLE') {
                cols = levelIndex < 8 ? 6 : 10;
                rows = levelIndex < 8 ? 5 : 6;
            } else {
                cols = 13; rows = 6;
            }

            // 根據關卡設定專屬種子
            currentSeed = 1000 + levelIndex;

            const mapData = (currentMode === 'SINGLE') ? mapsSingle[levelIndex] : mapsMulti[levelIndex - 22];
            grid = [];

            for (let y = 0; y < rows; y++) {
                let row = [];
                for (let x = 0; x < cols; x++) {
                    let char = mapData[y].padEnd(cols, '*')[x];
                    let cell = { pathPowers: [0, 0] }; 
                    
                    if (char === '*') {
                        const randomTypes = ['I', 'L', 'T', 'L', 'X']; 
                        cell.type = randomTypes[Math.floor(seededRandom() * randomTypes.length)];
                        cell.rotation = Math.floor(seededRandom() * 4);
                    } else {
                        cell.type = SYMBOL_MAP[char].type;
                        let correctRot = SYMBOL_MAP[char].rot || 0;

                        if (['S','D','A','B','E','F'].includes(cell.type)) {
                            cell.rotation = correctRot; // 讓 S/D 支援多方向接口，不再寫死為 0
                        } else if (cell.type === 'I' || cell.type === 'X') {
                            cell.rotation = (correctRot + 1) % 4; 
                        } else {
                            let offset = Math.floor(seededRandom() * 3) + 1;
                            cell.rotation = (correctRot + offset) % 4;
                        }
                    }
                    row.push(cell);
                }
                grid.push(row);
            }

            let attempts = 0;
            while (checkPower(true)) {
                for (let y = 0; y < rows; y++) {
                    for (let x = 0; x < cols; x++) {
                        if (!['S','D','A','B','E','F'].includes(grid[y][x].type)) {
                            grid[y][x].rotation = Math.floor(seededRandom() * 4);
                        }
                    }
                }
                attempts++;
                if(attempts > 50) break;
            }

            resize();
            draw();
            startCountdown(() => {
                if (!gameStarted) return;
                document.getElementById('status-txt').innerText = '斷線中';
                document.getElementById('status-txt').className = 'text-red';
                checkPower(false);
                startTimer();
            });
        }

        function resize() {
            if(!gameStarted && document.getElementById('game-ui').style.display === 'none') return;
            const container = document.getElementById('canvas-container');
            const maxW = container.clientWidth - 20;
            const maxH = container.clientHeight - 20;
            tileSize = Math.min(Math.floor(maxW / cols), Math.floor(maxH / rows));
            canvas.width = cols * tileSize;
            canvas.height = rows * tileSize;
            draw();
        }
        window.addEventListener('resize', resize);

        // ==========================================
        // 計時與計分
        // ==========================================
        function startTimer() {
            startTime = Date.now();
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeElapsed = (Date.now() - startTime) / 1000;
                document.getElementById('time-txt').innerText = timeElapsed.toFixed(1) + 's';
            }, 100);
        }

        function levelComplete() {
            isLevelComplete = true;
            clearInterval(timerInterval);
            
            document.getElementById('status-txt').innerText = '連線成功';
            document.getElementById('status-txt').className = 'text-green';
            document.getElementById('clear-title').innerText = (currentMode === 'SINGLE') ? '單系統連線成功！' : '雙重系統連線成功！';
            document.getElementById('clear-title').className = (currentMode === 'SINGLE') ? 'text-cyan' : 'text-pink';

            // 每關 40~100 分，用時越少越高分
            let levelScore = Math.max(40, Math.round(100 - timeElapsed * 1.0));
            totalScore += levelScore;
            
            document.getElementById('score-txt').innerText = totalScore;
            window.parent.postMessage({ type: 'W2_SCORE', score: totalScore, group: window.GROUP_ID }, '*');
            document.getElementById('clear-time').innerText = timeElapsed.toFixed(1);
            document.getElementById('clear-score').innerText = levelScore;

            levelTransitionTimeout1 = setTimeout(() => {
                if (!gameStarted) return; 
                if (currentLevel < maxLevels - 1) {
                    document.getElementById('level-clear').classList.remove('hidden');
                    levelTransitionTimeout2 = setTimeout(() => {
                        if (!gameStarted) return;
                        currentLevel++;
                        loadLevel(currentLevel);
                    }, 2500);
                } else {
                    document.getElementById('final-score').innerText = totalScore;
                    document.getElementById('game-over').classList.remove('hidden');
                    window.parent.postMessage({ type: 'W2_GAMEOVER', score: totalScore, group: window.GROUP_ID }, '*');
                }
            }, 800);
        }

        // ==========================================
        // 演算法與控制
        // ==========================================
        function tracePower(startX, startY, powerFlag) {
            let stack = [{x: startX, y: startY, inPort: null}];
            while(stack.length > 0) {
                let curr = stack.pop();
                let cell = grid[curr.y][curr.x];
                let rPaths = getRotatedPaths(cell.type, cell.rotation);
                
                for (let i = 0; i < rPaths.length; i++) {
                    let path = rPaths[i];
                    if (curr.inPort === null || path.includes(curr.inPort)) {
                        if ((cell.pathPowers[i] & powerFlag) === powerFlag) continue;
                        cell.pathPowers[i] |= powerFlag;
                        
                        for (let outPort of path) {
                            if (outPort !== curr.inPort) {
                                const dirs = [ {dx: 0, dy: -1, in: 2}, {dx: 1, dy: 0, in: 3}, {dx: 0, dy: 1, in: 0}, {dx: -1, dy: 0, in: 1} ];
                                let d = dirs[outPort];
                                let nx = curr.x + d.dx, ny = curr.y + d.dy;
                                
                                if (nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
                                    let nCell = grid[ny][nx];
                                    if (nCell.type !== ' ') {
                                        let nPaths = getRotatedPaths(nCell.type, nCell.rotation);
                                        if (nPaths.some(p => p.includes(d.in))) {
                                            stack.push({x: nx, y: ny, inPort: d.in});
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }

        function checkPower(isSilent = false) {
            let sPos = null, aPos = null, bPos = null, ePos = null, fPos = null;
            let dPosList = [];
            
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    grid[y][x].pathPowers = [0, 0];
                    if (grid[y][x].type === 'S') sPos = {x, y};
                    if (grid[y][x].type === 'D') dPosList.push({x, y});
                    if (grid[y][x].type === 'A') aPos = {x, y};
                    if (grid[y][x].type === 'B') bPos = {x, y};
                    if (grid[y][x].type === 'E') ePos = {x, y};
                    if (grid[y][x].type === 'F') fPos = {x, y};
                }
            }

            if (sPos) tracePower(sPos.x, sPos.y, 1); 
            if (aPos) tracePower(aPos.x, aPos.y, 2); 
            if (ePos) tracePower(ePos.x, ePos.y, 4); 

            let hasShortCircuit = false;
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    for (let pwr of grid[y][x].pathPowers) {
                        // 若能量混雜 (非單純的 1, 2, 或 4)，視為短路
                        if (pwr > 0 && pwr !== 1 && pwr !== 2 && pwr !== 4) hasShortCircuit = true; 
                    }
                }
            }

            let isWin = false;
            if (currentMode === 'SINGLE') {
                if (dPosList.length > 0 && dPosList.every(d => grid[d.y][d.x].pathPowers[0] === 1)) isWin = true;
            } else if (currentMode === 'DOUBLE') {
                if (dPosList.length > 0 && bPos) {
                    if (dPosList.every(d => grid[d.y][d.x].pathPowers[0] === 1) && 
                        grid[bPos.y][bPos.x].pathPowers[0] === 2 && 
                        !hasShortCircuit) {
                        isWin = true;
                    }
                }
            }

            if (!isSilent) {
                if (hasShortCircuit) {
                    document.getElementById('status-txt').innerText = '短路警告！';
                    document.getElementById('status-txt').className = 'text-red';
                } else {
                    document.getElementById('status-txt').innerText = '斷線中';
                    document.getElementById('status-txt').className = 'text-gold';
                }
                
                draw();
                if (isWin && !isLevelComplete) levelComplete();
            }
            return isWin;
        }

        function handleTap(px, py) {
            if (isLevelComplete || !gameStarted) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let cx = (px - rect.left) * scaleX;
            let cy = (py - rect.top) * scaleY;

            let gridX = Math.floor(cx / tileSize);
            let gridY = Math.floor(cy / tileSize);

            if (gridX >= 0 && gridX < cols && gridY >= 0 && gridY < rows) {
                let cell = grid[gridY][gridX];
                if (!['S','D','A','B','E','F'].includes(cell.type)) {
                    cell.rotation = (cell.rotation + 1) % 4;
                    checkPower(false);
                }
            }
        }

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); for (let i = 0; i < e.changedTouches.length; i++) handleTap(e.changedTouches[i].clientX, e.changedTouches[i].clientY); }, {passive: false});
        canvas.addEventListener('mousedown', (e) => handleTap(e.clientX, e.clientY));

        // ==========================================
        // 渲染繪圖
        // ==========================================
        function drawStraight(isHoriz, pwr, cx, pipeWidth) {
            let cColor = '#2D1A6E', gColor = 'transparent', gBlur = 0;
            if (pwr === 1) { cColor = '#00E5FF'; gColor = '#00E5FF'; gBlur = 18; }
            else if (pwr === 2) { cColor = '#FF40FF'; gColor = '#FF40FF'; gBlur = 18; }
            else if (pwr === 4) { cColor = '#2ECC40'; gColor = '#2ECC40'; gBlur = 18; }
            else if (pwr !== 0) { cColor = '#ffffff'; gColor = '#FF3B3B'; gBlur = 28; }
            
            ctx.fillStyle = cColor; ctx.shadowColor = gColor; ctx.shadowBlur = gBlur;
            if (isHoriz) ctx.fillRect(-tileSize/2, -pipeWidth/2, tileSize, pipeWidth);
            else ctx.fillRect(-pipeWidth/2, -tileSize/2, pipeWidth, tileSize);
        }

        function draw() {
            ctx.fillStyle = '#1A0A4A';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const cx = tileSize / 2;
            const pipeWidth = tileSize * 0.25;

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    let cell = grid[y][x];
                    let px = x * tileSize;
                    let py = y * tileSize;

                    ctx.strokeStyle = 'rgba(45,26,110,0.6)'; ctx.lineWidth = 1; ctx.strokeRect(px, py, tileSize, tileSize);
                    if (cell.type === ' ') continue;

                    ctx.save();
                    ctx.translate(px + cx, py + cx);
                    ctx.rotate(cell.rotation * Math.PI / 2);

                    let pwr = cell.pathPowers[0]; 

                    if (cell.type === 'X') {
                        // 【修正】：十字管 (X) 在未受旋轉干擾的局部坐標系中，
                        // paths[0] 永遠是垂直 [0, 2]，paths[1] 永遠是水平 [1, 3]。
                        // 所以我們直接以相對坐標繪製，讓顏色完全貼合正確的流動方向。
                        if (cell.pathPowers[0] > cell.pathPowers[1]) {
                            drawStraight(true, cell.pathPowers[1], cx, pipeWidth);  // 水平管線 (鋪在下層)
                            drawStraight(false, cell.pathPowers[0], cx, pipeWidth); // 垂直管線 (畫在上層)
                        } else {
                            drawStraight(false, cell.pathPowers[0], cx, pipeWidth); // 垂直管線 (鋪在下層)
                            drawStraight(true, cell.pathPowers[1], cx, pipeWidth);  // 水平管線 (畫在上層)
                        }
                    } else {
                        let baseColor = '#2D1A6E', glowColor = 'transparent', glowBlur = 0;
                        if (['S','D'].includes(cell.type)) baseColor = '#00E5FF';
                        if (['A','B'].includes(cell.type)) baseColor = '#FF40FF';
                        if (['E','F'].includes(cell.type)) baseColor = '#2ECC40';

                        if (pwr === 0) { 
                            if(['S','D','A','B','E','F'].includes(cell.type)) { glowColor = baseColor; glowBlur = 10; } 
                        } 
                        else if (pwr === 1) { baseColor = '#00E5FF'; glowColor = '#00E5FF'; glowBlur = 18; } 
                        else if (pwr === 2) { baseColor = '#FF40FF'; glowColor = '#FF40FF'; glowBlur = 18; } 
                        else if (pwr === 4) { baseColor = '#2ECC40'; glowColor = '#2ECC40'; glowBlur = 18; } 
                        else { baseColor = '#ffffff'; glowColor = '#FF3B3B'; glowBlur = 25; }

                        ctx.fillStyle = baseColor; ctx.shadowColor = glowColor; ctx.shadowBlur = glowBlur;

                        if (['S','A','E'].includes(cell.type)) {
                            ctx.beginPath(); ctx.arc(0, 0, pipeWidth, 0, Math.PI*2); ctx.fill(); ctx.fillRect(0, -pipeWidth/2, cx, pipeWidth);
                            ctx.save();
                            ctx.rotate(-cell.rotation * Math.PI / 2); // 抵銷旋轉以保持字母正向
                            ctx.fillStyle = '#000'; ctx.font = `bold ${pipeWidth}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; 
                            let letter = cell.type === 'S' ? 'S' : (cell.type === 'A' ? 'A' : 'E');
                            ctx.fillText(letter, 0, 0);
                            ctx.restore();
                        } 
                        else if (['D','B','F'].includes(cell.type)) {
                            ctx.beginPath(); ctx.arc(0, 0, pipeWidth, 0, Math.PI*2); ctx.fill(); ctx.fillRect(-cx, -pipeWidth/2, cx, pipeWidth);
                            ctx.save();
                            ctx.rotate(-cell.rotation * Math.PI / 2); // 抵銷旋轉以保持字母正向
                            ctx.fillStyle = '#fff'; ctx.font = `bold ${pipeWidth}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; 
                            let letter = cell.type === 'D' ? 'D' : (cell.type === 'B' ? 'B' : 'F');
                            ctx.fillText(letter, 0, 0);
                            ctx.restore();
                        }
                        else if (cell.type === 'I') { ctx.fillRect(-pipeWidth/2, -cx, pipeWidth, tileSize); }
                        else if (cell.type === 'L') {
                            ctx.beginPath(); ctx.arc(cx, -cx, cx + pipeWidth/2, Math.PI/2, Math.PI, false); ctx.lineTo(cx - pipeWidth/2, -cx); ctx.arc(cx, -cx, cx - pipeWidth/2, Math.PI, Math.PI/2, true); ctx.closePath(); ctx.fill();
                            ctx.fillRect(-pipeWidth/2, -cx, pipeWidth, pipeWidth/2); ctx.fillRect(cx - pipeWidth/2, -pipeWidth/2, pipeWidth/2, pipeWidth);
                        }
                        else if (cell.type === 'T') { ctx.fillRect(-tileSize/2, -pipeWidth/2, tileSize, pipeWidth); ctx.fillRect(-pipeWidth/2, -tileSize/2, pipeWidth, tileSize/2 + pipeWidth/2); }
                    }
                    ctx.restore();
                }
            }
        }
        
        // ── 星星背景 ──
        (function(){
            const stars = document.getElementById('stars');
            for(let i=0;i<60;i++){
                const s=document.createElement('div'); s.className='star';
                const size=(Math.random()*2.5+1)+'px';
                s.style.cssText=`width:${size};height:${size};top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*3+1.5).toFixed(1)}s;opacity:${Math.random()*.6+.2}`;
                stars.appendChild(s);
            }
        })();

        // 初始化選單網格
        renderLevelGrid();

        // ── PLATFORM BRIDGE ──
        window.addEventListener('message', (e) => {
            if (!e.data || !e.data.type) return;
            switch(e.data.type) {
                case 'PLATFORM_START':
                    if (e.data.group) window.GROUP_ID = e.data.group;
                    break;
                case 'PLATFORM_PAUSE':
                    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
                    if (!document.getElementById('pause-overlay')) {
                        const ov = document.createElement('div');
                        ov.id = 'pause-overlay';
                        ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:999;display:flex;align-items:center;justify-content:center;font-family:Fredoka One,sans-serif;font-size:3rem;color:#FFD600;text-shadow:3px 3px 0 #000';
                        ov.textContent = '⏸ 暫停中';
                        document.body.appendChild(ov);
                    }
                    break;
                case 'PLATFORM_RESUME':
                    const ov = document.getElementById('pause-overlay');
                    if (ov) ov.remove();
                    if (gameStarted && !isLevelComplete) startTimer();
                    break;
                case 'PLATFORM_RESET':
                    backToMenu();
                    break;
            }
        });

        // ── autostart ──
        (function(){
            const params = new URLSearchParams(window.location.search);
            const autoMode = params.get('autostart') || params.get('mode');
            const autoLevel = parseInt(params.get('level') || '1') - 1; // 0-indexed
            const group = params.get('group');
            if (group) window.GROUP_ID = group;
            if (autoMode) {
                document.getElementById('main-menu').classList.add('hidden');
                currentMode = (autoMode === 'DOUBLE') ? 'DOUBLE' : 'SINGLE';
                maxLevels = currentMode === 'SINGLE' ? 30 : 10;
                cols = currentMode === 'SINGLE' ? 6 : 8;
                rows = currentMode === 'SINGLE' ? 5 : 7;
                document.getElementById('ui-layer').style.borderBottomColor = currentMode === 'SINGLE' ? 'var(--cyan)' : 'var(--pink)';
                document.getElementById('game-ui').style.display = 'block';
                totalScore = 0;
                gameStarted = true;
                loadLevel(Math.max(0, Math.min(autoLevel, maxLevels - 1)));
                // 平台模式：隱藏所有「回主選單」按鈕
                const hudBtn = document.getElementById('hud-menu-btn');
                const rulesBtn = document.getElementById('rules-cancel-btn');
                const goMenuBtn = document.getElementById('gameover-menu-btn');
                const goMsgEl = document.getElementById('gameover-platform-msg');
                if (hudBtn) hudBtn.style.display = 'none';
                if (rulesBtn) rulesBtn.style.display = 'none';
                if (goMenuBtn) goMenuBtn.style.display = 'none';
                if (goMsgEl) goMsgEl.style.display = 'block';
            }
        })();
        window.parent.postMessage({ type: 'W2_READY' }, '*');

    </script>
