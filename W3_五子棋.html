<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>⚔️ 五子棋對戰</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1A0A4A;--panel:#2D1A6E;--yellow:#FFD600;--yellow2:#c89800;
  --green:#2ECC40;--red:#FF3B3B;--blue:#2D8FFF;--white:#f0f6fc;
}
*{box-sizing:border-box;touch-action:manipulation;user-select:none;-webkit-tap-highlight-color:transparent;}
body,html{margin:0;padding:0;width:100%;height:100%;background:var(--bg);font-family:'Fredoka One','Nunito',sans-serif;color:var(--white);overflow:hidden;}

/* Stars */
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,2s) infinite alternate;}
@keyframes twinkle{from{opacity:.1;transform:scale(.7)}to{opacity:.8;transform:scale(1.2)}}

/* HUD */
#hud{position:absolute;top:0;left:0;width:100%;background:rgba(26,10,74,.97);border-bottom:3px solid var(--yellow);padding:10px 14px;display:flex;align-items:center;gap:10px;z-index:20;box-sizing:border-box;flex-shrink:0;}
.hud-label{font-family:'Nunito',sans-serif;font-weight:900;font-size:9px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.06em;}
.hud-val{font-family:'Fredoka One',sans-serif;font-size:17px;color:var(--yellow);line-height:1.1;}
.role-badge{padding:4px 12px;border-radius:20px;font-family:'Nunito',sans-serif;font-weight:900;font-size:11px;border:2px solid;flex-shrink:0;}
.role-teacher{background:rgba(45,143,255,.2);border-color:var(--blue);color:var(--blue);}
.role-black{background:rgba(255,255,255,.15);border-color:#aaa;color:#fff;}
.role-white{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.4);color:rgba(255,255,255,.8);}
.role-spectator{background:rgba(46,204,64,.1);border-color:var(--green);color:var(--green);}

/* Main layout */
#main{position:absolute;top:64px;left:0;right:0;bottom:0;display:flex;flex-direction:column;overflow:hidden;}

/* Scoreboard */
#scoreboard-wrap{padding:10px 12px 0;flex-shrink:0;}
.score-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.score-chip{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.1);border-radius:10px;padding:5px 10px;transition:all .2s;}
.score-chip.fighting{border-color:var(--yellow);background:rgba(255,214,0,.12);}
.score-chip-name{font-family:'Nunito',sans-serif;font-weight:900;font-size:11px;}
.score-chip-wins{font-family:'Fredoka One',sans-serif;font-size:16px;color:var(--yellow);}

/* Centre area */
#centre{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 12px;gap:10px;overflow:hidden;min-height:0;}

/* VS panel */
.vs-wrap{display:flex;align-items:center;gap:8px;width:100%;max-width:420px;}
.player-panel{flex:1;display:flex;flex-direction:column;align-items:center;background:rgba(255,255,255,.06);border:3px solid rgba(255,255,255,.1);border-radius:16px;padding:10px 8px;transition:all .3s;gap:4px;}
.player-panel.ready{border-color:var(--green);box-shadow:0 0 14px rgba(46,204,64,.3);}
.player-panel.active-turn{border-color:var(--yellow);box-shadow:0 0 18px rgba(255,214,0,.35);}
.stone{width:40px;height:40px;border-radius:50%;flex-shrink:0;}
.stone.black{background:radial-gradient(circle at 35% 35%,#555,#000);border:2px solid rgba(255,255,255,.25);box-shadow:0 3px 10px rgba(0,0,0,.6);}
.stone.white{background:radial-gradient(circle at 35% 35%,#fff,#ccc);border:2px solid rgba(0,0,0,.15);box-shadow:0 3px 10px rgba(0,0,0,.4);}
.player-name{font-family:'Nunito',sans-serif;font-weight:900;font-size:13px;text-align:center;}
.player-tag{font-size:9px;color:rgba(255,255,255,.4);font-family:'Nunito',sans-serif;font-weight:700;}
.vs-text{font-family:'Fredoka One',sans-serif;font-size:18px;color:rgba(255,255,255,.2);flex-shrink:0;}

/* Board */
#board-outer{width:min(100%,calc(100vh - 220px));aspect-ratio:1;background:#dcb35c;padding:5px;border-radius:10px;border:4px solid #8b4513;box-shadow:0 6px 28px rgba(0,0,0,.85);flex-shrink:0;}
#board{width:100%;height:100%;display:grid;}
.cell{position:relative;display:flex;align-items:center;justify-content:center;}
.cell.can-move{cursor:pointer;}
.cell.can-move:active{background:rgba(0,0,0,.18);}
.cell::before{content:'';position:absolute;top:50%;left:0;width:100%;height:1px;background:rgba(0,0,0,.4);pointer-events:none;}
.cell::after{content:'';position:absolute;left:50%;top:0;width:1px;height:100%;background:rgba(0,0,0,.4);pointer-events:none;}
.piece{position:absolute;width:88%;height:88%;border-radius:50%;z-index:2;animation:pop .18s cubic-bezier(.34,1.56,.64,1);}
.piece.black{background:radial-gradient(circle at 35% 35%,#555,#000);box-shadow:2px 3px 8px rgba(0,0,0,.7);}
.piece.white{background:radial-gradient(circle at 35% 35%,#fff,#ccc);box-shadow:2px 3px 6px rgba(0,0,0,.4);}
.piece.last{outline:2px solid var(--red);outline-offset:1px;}
@keyframes pop{from{transform:scale(.15);opacity:0}to{transform:scale(1);opacity:1}}

/* Roll animation */
.roll-box{flex:1;aspect-ratio:1;max-width:110px;display:flex;align-items:center;justify-content:center;border-radius:14px;border:3px solid;font-family:'Fredoka One',sans-serif;font-size:clamp(13px,4vw,20px);animation:rBounce .55s ease-in-out infinite alternate;}
.roll-box.b{background:linear-gradient(160deg,#333,#000);border-color:#666;color:#fff;}
.roll-box.w{background:linear-gradient(160deg,#fff,#ccc);border-color:#aaa;color:#000;}
@keyframes rBounce{from{transform:scale(.93)}to{transform:scale(1.07)}}

/* Idle */
.idle-icon{font-size:52px;margin-bottom:10px;}

/* Buttons */
.mp-btn{display:block;width:100%;padding:13px 18px;font-family:'Fredoka One',sans-serif;font-size:clamp(14px,3vw,19px);color:#fff;cursor:pointer;border:3px solid #fff;border-radius:14px;box-shadow:0 5px 0 rgba(0,0,0,.4);transition:transform .1s,box-shadow .1s;margin-bottom:10px;}
.mp-btn:last-child{margin-bottom:0;}
.mp-btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.4);}
.mp-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.btn-green{background:linear-gradient(160deg,#27ae60,#1a7a42);border-color:#4dff80;}
.btn-blue{background:linear-gradient(160deg,#1a6fc4,#0d4a8a);border-color:var(--blue);}
.btn-red{background:linear-gradient(160deg,#c0392b,#8e1a13);border-color:#ff6644;}
.btn-grey{background:linear-gradient(160deg,#555,#333);border-color:#888;font-size:13px;padding:10px;}

/* Bottom bar */
#bottom{position:absolute;bottom:0;left:0;width:100%;background:rgba(26,10,74,.97);border-top:2px solid rgba(255,214,0,.2);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;z-index:20;box-sizing:border-box;}
.turn-badge{font-family:'Nunito',sans-serif;font-weight:900;font-size:12px;padding:6px 16px;border-radius:20px;border:2px solid;}
.turn-badge.your-turn{background:rgba(46,204,64,.2);border-color:var(--green);color:var(--green);animation:pulse 1.2s ease-in-out infinite;}
.turn-badge.wait{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.12);color:rgba(255,255,255,.4);}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}

/* Pause */
#pause-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
#pause-overlay.show{display:flex;}

/* Toast */
#toast-w3{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(20px);background:#1A0A4A;border:3px solid var(--yellow);border-radius:12px;padding:10px 22px;font-family:'Nunito',sans-serif;font-weight:900;color:var(--yellow);opacity:0;transition:.25s cubic-bezier(.34,1.56,.64,1);pointer-events:none;z-index:500;white-space:nowrap;}
#toast-w3.show{opacity:1;transform:translateX(-50%) translateY(0);}

.hidden{display:none!important;}
</style>
</head>
<body>
<div id="stars"></div>

<!-- HUD -->
<div id="hud">
  <div style="flex:1;min-width:0">
    <div class="hud-label">五子棋對戰</div>
    <div class="hud-val" id="hud-title">等待老師安排對戰</div>
  </div>
  <div id="role-badge" class="role-badge role-spectator">觀眾</div>
</div>

<!-- Main -->
<div id="main">
  <!-- 積分榜 -->
  <div id="scoreboard-wrap">
    <div class="score-row" id="scoreboard"></div>
  </div>

  <!-- 中央區域 -->
  <div id="centre">

    <!-- 等待 -->
    <div id="s-idle" style="text-align:center;opacity:.45;">
      <div class="idle-icon">⚔️</div>
      <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:12px;color:rgba(255,255,255,.4);letter-spacing:.12em">等待老師安排對戰...</div>
    </div>

    <!-- 抽籤 -->
    <div id="s-rolling" class="hidden" style="width:100%;max-width:380px;text-align:center;">
      <div style="font-family:'Fredoka One',sans-serif;font-size:16px;color:#00E5FF;margin-bottom:16px;animation:pulse 1s infinite">⚡ 系統配對中...</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:12px;">
        <div class="roll-box b" id="roll-b">???</div>
        <div style="font-family:'Fredoka One',sans-serif;font-size:20px;color:rgba(255,255,255,.2)">VS</div>
        <div class="roll-box w" id="roll-w">???</div>
      </div>
    </div>

    <!-- 準備 -->
    <div id="s-ready" class="hidden" style="width:100%;max-width:400px;">
      <div style="font-family:'Fredoka One',sans-serif;font-size:14px;color:var(--yellow);text-align:center;background:rgba(255,214,0,.1);border:2px solid rgba(255,214,0,.3);border-radius:20px;padding:5px 14px;margin-bottom:12px">選手準備階段</div>
      <div class="vs-wrap">
        <div class="player-panel" id="panel-black">
          <div class="stone black"></div>
          <div class="player-name" id="name-black">???</div>
          <div class="player-tag">BLACK 先手</div>
          <div id="area-black" style="width:100%;margin-top:6px;min-height:30px;display:flex;align-items:center;justify-content:center;"></div>
        </div>
        <div class="vs-text">VS</div>
        <div class="player-panel" id="panel-white">
          <div class="stone white"></div>
          <div class="player-name" id="name-white">???</div>
          <div class="player-tag">WHITE 後手</div>
          <div id="area-white" style="width:100%;margin-top:6px;min-height:30px;display:flex;align-items:center;justify-content:center;"></div>
        </div>
      </div>
      <div id="area-teacher-start" class="hidden" style="width:100%;margin-top:10px;"></div>
    </div>

    <!-- 棋盤 -->
    <div id="s-board" class="hidden" style="width:100%;display:flex;flex-direction:column;align-items:center;gap:8px;min-height:0;overflow:hidden;">
      <!-- 對陣標題 -->
      <div style="display:flex;align-items:center;gap:10px;width:100%;max-width:360px;">
        <div class="player-panel" id="play-panel-black" style="flex-direction:row;padding:6px 10px;gap:8px;">
          <div class="stone black" style="width:28px;height:28px;"></div>
          <div>
            <div class="player-name" id="play-name-black" style="font-size:12px"></div>
            <div class="player-tag">先手</div>
          </div>
        </div>
        <div class="vs-text" style="font-size:14px">VS</div>
        <div class="player-panel" id="play-panel-white" style="flex-direction:row;padding:6px 10px;gap:8px;">
          <div class="stone white" style="width:28px;height:28px;"></div>
          <div>
            <div class="player-name" id="play-name-white" style="font-size:12px"></div>
            <div class="player-tag">後手</div>
          </div>
        </div>
      </div>
      <!-- 棋盤本體 -->
      <div id="board-outer">
        <div id="board"></div>
      </div>
    </div>

    <!-- 老師控制列 -->
    <div id="teacher-ctrl" class="hidden" style="width:100%;max-width:360px;">
      <button class="mp-btn btn-blue" id="btn-schedule" onclick="scheduleMatch()">🎲 隨機抽籤排賽</button>

    </div>

  </div>
</div>

<!-- Bottom bar -->
<div id="bottom">
  <div id="turn-badge" class="turn-badge wait">等待對戰開始</div>
  <div id="winner-badge" class="hidden" style="font-family:'Fredoka One',sans-serif;font-size:15px;color:var(--yellow)"></div>
</div>

<!-- Pause -->
<div id="pause-overlay">
  <div style="font-size:56px">⏸</div>
  <div style="font-family:'Fredoka One',sans-serif;font-size:1.8rem;color:var(--yellow)">暫停中</div>
</div>

<div id="toast-w3"></div>

<script>
// ═══════════════════════════════════════
// 常數
// ═══════════════════════════════════════
const GRID = 15;
const DEFAULT_TEAMS = ['第1組','第2組','第3組','第4組','第5組'];

// ═══════════════════════════════════════
// 狀態
// ═══════════════════════════════════════
let myGroup = '';
let myRole  = 'spectator'; // teacher|black|white|spectator
let rollInterval = null;
let audioCtx = null;

// 共享狀態（透過 Firebase 同步）
let state = {
    matchStatus : 'idle',   // idle|rolling|ready|playing|finished
    black       : '',
    white       : '',
    blackReady  : false,
    whiteReady  : false,
    cells       : Array(GRID*GRID).fill(0),
    turn        : 'black',
    lastMove    : -1,
    winner      : null,     // 'black'|'white'|null
    scores      : {},       // {'第1組':{wins:0,matches:0}, ...}
    activePlayers: [],      // 目前加入的組別（從 PLATFORM_START 取得）
    lastBlack   : '',       // 上一場黑方
    lastWhite   : '',       // 上一場白方
};

// ═══════════════════════════════════════
// 音效
// ═══════════════════════════════════════
function initAudio(){
    try{
        if(!audioCtx){const AC=window.AudioContext||window.webkitAudioContext;if(AC)audioCtx=new AC();}
        if(audioCtx?.state==='suspended')audioCtx.resume();
    }catch(e){}
}
function playSound(type){
    initAudio();if(!audioCtx)return;
    try{
        const t=audioCtx.currentTime,osc=audioCtx.createOscillator(),g=audioCtx.createGain();
        osc.connect(g);g.connect(audioCtx.destination);
        if(type==='stone'){osc.type='sine';osc.frequency.setValueAtTime(600,t);osc.frequency.exponentialRampToValueAtTime(100,t+.1);g.gain.setValueAtTime(1,t);g.gain.exponentialRampToValueAtTime(.01,t+.1);osc.start(t);osc.stop(t+.1);}
        else if(type==='roll'){osc.type='triangle';osc.frequency.setValueAtTime(800,t);osc.frequency.exponentialRampToValueAtTime(200,t+.05);g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.01,t+.05);osc.start(t);osc.stop(t+.05);}
        else if(type==='win'){osc.type='square';[440,554,659,880].forEach((f,i)=>osc.frequency.setValueAtTime(f,t+i*.1));g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.2,t+.05);g.gain.setValueAtTime(.2,t+.3);g.gain.exponentialRampToValueAtTime(.01,t+.8);osc.start(t);osc.stop(t+.8);}
    }catch(e){}
}

// ═══════════════════════════════════════
// Toast
// ═══════════════════════════════════════
let toastTimer=null;
function showToast(msg){
    const el=document.getElementById('toast-w3');
    el.textContent=msg;el.classList.add('show');
    clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
}

// ═══════════════════════════════════════
// 初始化棋盤 DOM
// ═══════════════════════════════════════
function buildBoard(){
    const board=document.getElementById('board');
    board.style.gridTemplateColumns=`repeat(${GRID},minmax(0,1fr))`;
    board.innerHTML='';
    for(let i=0;i<GRID*GRID;i++){
        const cell=document.createElement('div');
        cell.className='cell';cell.dataset.idx=i;
        cell.addEventListener('click',()=>handleCellClick(i));
        board.appendChild(cell);
    }
}

// ═══════════════════════════════════════
// 操作（老師）
// ═══════════════════════════════════════
function scheduleMatch(){
    if(state.matchStatus==='rolling')return;
    initAudio();

    // 用實際加入的組別，至少需要2組
    const pool = state.activePlayers.length >= 2
        ? [...state.activePlayers]
        : Object.keys(state.scores);
    if(pool.length < 2){ showToast('⚠️ 至少需要2組才能對戰'); return; }

    // 確保積分表有這些組別
    pool.forEach(g=>{ if(!state.scores[g]) state.scores[g]={wins:0,matches:0}; });

    // 排除上一場兩組（避免連續對戰），但如果只有2組就不排除
    const lastTwo = [state.lastBlack, state.lastWhite].filter(Boolean);
    let candidates = pool.length > 2
        ? pool.filter(g => !lastTwo.includes(g))
        : pool;

    // 如果排除後不夠2組，改只排除場次最多的那一組
    if(candidates.length < 2){
        const maxMatches = Math.max(...pool.map(g=>state.scores[g].matches||0));
        const mostPlayed = pool.filter(g=>(state.scores[g].matches||0)===maxMatches);
        candidates = pool.length > 2
            ? pool.filter(g=>!mostPlayed.includes(g)||candidates.length===0)
            : pool;
        if(candidates.length < 2) candidates = pool; // 最後保底
    }

    // 場次最少的兩組優先，同場次隨機
    const sorted=[...candidates].sort((a,b)=>{
        const d=(state.scores[a].matches||0)-(state.scores[b].matches||0);
        return d!==0?d:Math.random()-.5;
    });
    const black=sorted[0], white=sorted[1];

    state.scores[black].matches=(state.scores[black].matches||0)+1;
    state.scores[white].matches=(state.scores[white].matches||0)+1;

    // 先進入 rolling
    state.matchStatus='rolling';
    state.black='???';state.white='???';
    state.blackReady=false;state.whiteReady=false;
    broadcast();

    setTimeout(()=>{
        state.matchStatus='ready';
        state.black=black;state.white=white;
        state.lastBlack=black;state.lastWhite=white;
        state.cells=Array(GRID*GRID).fill(0);
        state.turn='black';state.lastMove=-1;state.winner=null;
        broadcast();
        playSound('win');
    },2500);
}

function startMatch(){
    if(!state.blackReady||!state.whiteReady)return;
    state.matchStatus='playing';
    broadcast();
}

function resetMatch(){
    state.matchStatus='idle';
    state.black='';state.white='';
    state.blackReady=false;state.whiteReady=false;
    state.cells=Array(GRID*GRID).fill(0);
    state.turn='black';state.lastMove=-1;state.winner=null;
    broadcast();
}

// ═══════════════════════════════════════
// 操作（學生）
// ═══════════════════════════════════════
function handleReady(color){
    initAudio();
    if(color==='black')state.blackReady=true;
    else state.whiteReady=true;
    broadcast();
}

function handleCellClick(idx){
    initAudio();
    if(state.matchStatus!=='playing'||state.cells[idx]!==0||state.winner)return;
    const isBlack=state.turn==='black';
    if(myRole==='teacher')return;   // 老師只觀賽，不落子
    if(myRole==='spectator')return;
    if(myRole==='black'&&!isBlack)return;
    if(myRole==='white'&&isBlack)return;

    const piece=isBlack?1:2;
    state.cells[idx]=piece;
    state.lastMove=idx;
    state.turn=isBlack?'white':'black';

    if(checkWin(state.cells,idx,piece)){
        state.winner=isBlack?'black':'white';
        const winGroup=isBlack?state.black:state.white;
        if(!state.scores[winGroup])state.scores[winGroup]={wins:0,matches:0};
        state.scores[winGroup].wins++;
        state.matchStatus='finished';
        playSound('win');
        showToast(`🏆 ${winGroup} 獲勝！`);
    }else{
        playSound('stone');
    }
    broadcast();
}

function checkWin(cells,idx,p){
    const r=Math.floor(idx/GRID),c=idx%GRID;
    for(const[dr,dc]of[[1,0],[0,1],[1,1],[1,-1]]){
        let cnt=1;
        for(const[tr,tc]of[[dr,dc],[-dr,-dc]]){
            let nr=r+tr,nc=c+tc;
            while(nr>=0&&nr<GRID&&nc>=0&&nc<GRID&&cells[nr*GRID+nc]===p){cnt++;nr+=tr;nc+=tc;}
        }
        if(cnt>=5)return true;
    }
    return false;
}

// ═══════════════════════════════════════
// 廣播 → parent (index.html)
// ═══════════════════════════════════════
function broadcast(){
    window.parent.postMessage({type:'W3_STATE',data:JSON.parse(JSON.stringify(state)),group:myGroup},'*');
    render();
}

// ═══════════════════════════════════════
// 套用外部狀態
// ═══════════════════════════════════════
function applyState(newState){
    const prevStatus=state.matchStatus;
    state=Object.assign({},state,newState);
    // 角色重新判定
    if(myRole!=='teacher'){
        if(myGroup&&state.black&&state.black===myGroup)myRole='black';
        else if(myGroup&&state.white&&state.white===myGroup)myRole='white';
        else myRole='spectator';
    }
    // 勝利音效（只在狀態剛變成 finished 時播）
    if(prevStatus!=='finished'&&state.matchStatus==='finished')playSound('win');
    render();
}

// ═══════════════════════════════════════
// 渲染
// ═══════════════════════════════════════
function render(){
    renderHUD();
    renderScoreboard();
    renderCentre();
    renderBoard();
    renderBottom();
}

function renderHUD(){
    const badge=document.getElementById('role-badge');
    const titles={teacher:'🎓 老師',black:'⚫ 黑方',white:'⚪ 白方',spectator:'👁 觀眾'};
    const classes={teacher:'role-teacher',black:'role-black',white:'role-white',spectator:'role-spectator'};
    badge.textContent=titles[myRole]||'觀眾';
    badge.className='role-badge '+(classes[myRole]||'role-spectator');

    const hudTitle=document.getElementById('hud-title');
    if(state.matchStatus==='playing'||state.matchStatus==='finished')
        hudTitle.textContent=`${state.black} ⚔️ ${state.white}`;
    else hudTitle.textContent='等待老師安排對戰';
}

function renderScoreboard(){
    const el=document.getElementById('scoreboard');
    // 只顯示實際參加的組別
    const activeSet = state.activePlayers.length > 0
        ? state.activePlayers
        : Object.keys(state.scores);
    const sorted = activeSet
        .filter(id => state.scores[id]) // 過濾沒有分數記錄的
        .sort((a,b) => (state.scores[b].wins||0) - (state.scores[a].wins||0));
    el.innerHTML=sorted.map(id=>{
        const d=state.scores[id]||{wins:0,matches:0};
        const isFighting=(state.black===id||state.white===id);
        return `<div class="score-chip ${isFighting?'fighting':''}">
            <span class="score-chip-name">${id}</span>
            <span class="score-chip-wins">${d.wins||0}</span>
            <span style="font-size:9px;color:rgba(255,255,255,.3);font-family:'Nunito',sans-serif;font-weight:700">${d.matches||0}場</span>
        </div>`;
    }).join('');
}

function renderCentre(){
    const s=state.matchStatus;
    document.getElementById('s-idle').classList.toggle('hidden',s!=='idle');
    document.getElementById('s-rolling').classList.toggle('hidden',s!=='rolling');
    document.getElementById('s-ready').classList.toggle('hidden',s!=='ready');
    const showBoard=s==='playing'||s==='finished';
    document.getElementById('s-board').classList.toggle('hidden',!showBoard);
    // 老師端：playing/finished 時隱藏積分和控制區，全螢幕棋盤
    document.getElementById('scoreboard-wrap').classList.toggle('hidden', showBoard && myRole==='teacher');

    // 老師控制（遊戲進行中只顯示重置，不顯示抽籤）
    const tc=document.getElementById('teacher-ctrl');
    if(myRole==='teacher'){
        const isPlaying=(s==='playing'||s==='finished');
        tc.classList.remove('hidden');
        document.getElementById('btn-schedule').style.display = isPlaying ? 'none' : '';
        document.getElementById('btn-schedule').disabled=(s==='rolling');
    }else tc.classList.add('hidden');

    // 抽籤動畫
    if(s==='rolling'){
        if(!rollInterval){
            rollInterval=setInterval(()=>{
                const teams=Object.keys(state.scores);
                document.getElementById('roll-b').textContent=teams[Math.floor(Math.random()*teams.length)];
                document.getElementById('roll-w').textContent=teams[Math.floor(Math.random()*teams.length)];
                playSound('roll');
            },120);
        }
    }else{clearInterval(rollInterval);rollInterval=null;}

    // 準備畫面
    if(s==='ready'){
        document.getElementById('name-black').textContent=state.black;
        document.getElementById('name-white').textContent=state.white;
        document.getElementById('panel-black').classList.toggle('ready',state.blackReady);
        document.getElementById('panel-white').classList.toggle('ready',state.whiteReady);

        const mkArea=(el,ready,color)=>{
            const groupForColor = color==='black' ? state.black : state.white;
            const isMyGroup = myGroup && myGroup === groupForColor;
            if(ready){
                el.innerHTML=`<span style="color:var(--green);font-family:'Nunito',sans-serif;font-weight:900;font-size:12px">✅ 已準備</span>`;
            }else if(isMyGroup){
                el.innerHTML=`<button class="mp-btn btn-green" style="padding:7px;font-size:12px;margin:0;animation:pulse 1.2s infinite" onclick="handleReady('${color}')">點此準備！</button>`;
            }else if(myRole==='teacher'){
                el.innerHTML=`<span style="color:rgba(255,255,255,.3);font-size:11px;font-family:'Nunito',sans-serif;font-weight:700">等待確認...</span>`;
            }else{
                el.innerHTML=`<span style="color:rgba(255,255,255,.3);font-size:11px;font-family:'Nunito',sans-serif;font-weight:700;animation:pulse 1s infinite">👁 觀賽</span>`;
            }
        };
        mkArea(document.getElementById('area-black'),state.blackReady,'black');
        mkArea(document.getElementById('area-white'),state.whiteReady,'white');

        const tsa=document.getElementById('area-teacher-start');
        if(myRole==='teacher'){
            tsa.classList.remove('hidden');
            const canStart=state.blackReady&&state.whiteReady;
            tsa.innerHTML=`<button class="mp-btn ${canStart?'btn-blue':'btn-grey'}" style="margin:0" ${canStart?'':'disabled'} onclick="startMatch()">${canStart?'⚔️ 雙方就位，開始！':'等待雙方按下準備...'}</button>`;
        }else tsa.classList.add('hidden');
    }

    // 對戰標題
    if(showBoard){
        document.getElementById('play-name-black').textContent=state.black;
        document.getElementById('play-name-white').textContent=state.white;
        document.getElementById('play-panel-black').classList.toggle('active-turn',state.turn==='black'&&!state.winner);
        document.getElementById('play-panel-white').classList.toggle('active-turn',state.turn==='white'&&!state.winner);
    }
}

function renderBoard(){
    const s=state.matchStatus;
    if(s!=='playing'&&s!=='finished')return;
    const cells=document.querySelectorAll('#board .cell');
    cells.forEach((cell,i)=>{
        const val=state.cells[i];
        const canMove=!state.winner&&val===0&&s==='playing'&&(
            (myRole==='black'&&state.turn==='black')||
            (myRole==='white'&&state.turn==='white')
        ); // 老師和觀眾不能落子
        cell.className='cell'+(canMove?' can-move':'');
        cell.innerHTML=val===0?'':`<div class="piece ${val===1?'black':'white'}${state.lastMove===i?' last':''}"></div>`;
    });
}

function renderBottom(){
    const tb=document.getElementById('turn-badge');
    const wb=document.getElementById('winner-badge');
    if(state.winner){
        const wGroup=state.winner==='black'?state.black:state.white;
        tb.className='turn-badge wait';tb.textContent='比賽結束';
        wb.classList.remove('hidden');wb.textContent=`🏆 ${wGroup} 獲勝！`;
        return;
    }
    wb.classList.add('hidden');
    // finished 無 winner（平局）
    if(state.matchStatus==='finished'){
        tb.className='turn-badge wait';tb.textContent='比賽結束';return;
    }
    if(state.matchStatus!=='playing'){
        tb.className='turn-badge wait';
        tb.textContent=state.matchStatus==='idle'?'等待對戰開始':
                       state.matchStatus==='rolling'?'配對中...':
                       state.matchStatus==='ready'?'等待雙方準備':'等待對戰開始';
        return;
    }
    const myTurn=(myRole==='black'&&state.turn==='black')||(myRole==='white'&&state.turn==='white');
    const turnGroup=state.turn==='black'?state.black:state.white;
    const dot=state.turn==='black'?'⚫':'⚪';
    if(myTurn){
        tb.className='turn-badge your-turn';
        tb.textContent=`${dot} 你的回合！請點擊棋盤`;
    }else{
        tb.className='turn-badge wait';
        tb.textContent=`等待 ${turnGroup} 落子...`;
    }
}

// ═══════════════════════════════════════
// Platform Bridge
// ═══════════════════════════════════════
window.addEventListener('message',(e)=>{
    if(!e.data||!e.data.type)return;
    switch(e.data.type){
        case 'PLATFORM_START':
            if(e.data.group){myGroup=e.data.group;window.GROUP_ID=e.data.group;}
            if(e.data.isTeacher)myRole='teacher';
            // 從平台取得實際加入的玩家列表
            if(e.data.players && e.data.players.length > 0){
                state.activePlayers = e.data.players.map(p=>p.group);
                // 初始化積分（只初始化有玩家的組別）
                state.activePlayers.forEach(g=>{if(!state.scores[g])state.scores[g]={wins:0,matches:0};});
            }
            if(e.data.state)applyState(e.data.state);
            else render();
            break;
        case 'W3_STATE':
            // 來自 Firebase 的最新狀態
            if(e.data.data)applyState(e.data.data);
            break;
        case 'PLATFORM_PAUSE':
            document.getElementById('pause-overlay').classList.add('show');
            break;
        case 'PLATFORM_RESUME':
            document.getElementById('pause-overlay').classList.remove('show');
            break;
        case 'PLATFORM_RESET':
            resetMatch();
            break;
    }
});

// ═══════════════════════════════════════
// Auto-start
// ═══════════════════════════════════════
(function(){
    const params=new URLSearchParams(window.location.search);
    const group=params.get('group')||'';
    const isTeacher=params.get('teacher')==='1';
    if(group){myGroup=group;window.GROUP_ID=group;}
    if(isTeacher)myRole='teacher';

    // 積分等 PLATFORM_START 傳入實際玩家後才初始化
    // 直接開啟時保持空，等 PLATFORM_START 填入

    buildBoard();
    render();
    window.parent.postMessage({type:'W3_READY',group:myGroup},'*');
})();

// Stars
(function(){
    const s=document.getElementById('stars');
    for(let i=0;i<40;i++){
        const el=document.createElement('div');el.className='star';
        const sz=(Math.random()*2+.7)+'px';
        el.style.cssText=`width:${sz};height:${sz};top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*3+1.5).toFixed(1)}s;opacity:${Math.random()*.5+.1}`;
        s.appendChild(el);
    }
})();
</script>
