<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>⚔️ 五子棋對戰</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#1A0A4A;--panel:#2D1A6E;--yellow:#FFD600;--yellow2:#c89800;--green:#2ECC40;--red:#FF3B3B;--blue:#2D8FFF;--white:#f0f6fc;}
*{box-sizing:border-box;touch-action:manipulation;user-select:none;-webkit-tap-highlight-color:transparent;}
body,html{margin:0;padding:0;width:100%;height:100%;background:var(--bg);font-family:'Fredoka One','Nunito',sans-serif;color:var(--white);overflow:hidden;}
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,2s) infinite alternate;}
@keyframes twinkle{from{opacity:.1;transform:scale(.7)}to{opacity:.8;transform:scale(1.2)}}

/* HUD */
#hud{position:absolute;top:0;left:0;width:100%;background:rgba(26,10,74,.97);border-bottom:3px solid var(--yellow);padding:8px 14px;display:flex;align-items:center;gap:10px;z-index:20;box-sizing:border-box;}
.hud-label{font-family:'Nunito',sans-serif;font-weight:900;font-size:9px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.06em;}
.hud-val{font-family:'Fredoka One',sans-serif;font-size:16px;color:var(--yellow);line-height:1.1;}
.role-badge{padding:3px 10px;border-radius:20px;font-family:'Nunito',sans-serif;font-weight:900;font-size:11px;border:2px solid;flex-shrink:0;}
.role-teacher{background:rgba(45,143,255,.2);border-color:var(--blue);color:var(--blue);}
.role-spectator{background:rgba(46,204,64,.1);border-color:var(--green);color:var(--green);}
.role-player{background:rgba(255,214,0,.15);border-color:var(--yellow);color:var(--yellow);}

/* Score bar */
#score-bar{position:absolute;top:56px;left:0;right:0;background:rgba(26,10,74,.9);border-bottom:1px solid rgba(255,214,0,.15);padding:6px 12px;display:flex;gap:6px;flex-wrap:wrap;justify-content:center;z-index:15;}
.sc{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);border-radius:10px;padding:4px 10px;transition:all .2s;}
.sc.fighting{border-color:var(--yellow);background:rgba(255,214,0,.1);}
.sc-name{font-family:'Nunito',sans-serif;font-weight:900;font-size:11px;}
.sc-wins{font-family:'Fredoka One',sans-serif;font-size:16px;color:var(--yellow);}
.sc-info{font-size:9px;color:rgba(255,255,255,.3);font-family:'Nunito',sans-serif;font-weight:700;}

/* 卡片與按鈕通用 */
.match-card{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);border-radius:16px;padding:12px 16px;}
.match-label{font-family:'Nunito',sans-serif;font-weight:900;font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.1em;margin-bottom:8px;}
.stone-sm{width:22px;height:22px;border-radius:50%;flex-shrink:0;}
.stone-sm.black{background:radial-gradient(circle at 35% 35%,#555,#000);border:1.5px solid rgba(255,255,255,.2);}
.stone-sm.white{background:radial-gradient(circle at 35% 35%,#fff,#ccc);border:1.5px solid rgba(0,0,0,.15);}
@keyframes countPulse{from{transform:scale(.9);opacity:.7}to{transform:scale(1.1);opacity:1}}

/* ── 遊戲畫面（單棋盤）── */
#game-view{position:absolute;top:100px;left:0;right:0;bottom:60px;display:none;flex-direction:column;align-items:center;gap:6px;padding:6px 10px;overflow:hidden;}
.play-header{width:100%;max-width:420px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.ph2{flex:1;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.1);border-radius:12px;padding:5px 9px;transition:all .3s;}
.ph2.active{border-color:var(--yellow);box-shadow:0 0 14px rgba(255,214,0,.3);}
.ph2.winner-side{border-color:var(--green);background:rgba(46,204,64,.12);}
#solo-board-wrap{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;width:100%;}
#solo-board-outer{background:#dcb35c;padding:5px;border-radius:10px;border:4px solid #8b4513;box-shadow:0 6px 28px rgba(0,0,0,.85);width:min(calc(100vw - 32px),calc(100vh - 220px));height:min(calc(100vw - 32px),calc(100vh - 220px));}
#solo-board{display:grid;width:100%;height:100%;}
.cell{position:relative;display:flex;align-items:center;justify-content:center;}
.cell::before{content:'';position:absolute;top:50%;left:0;width:100%;height:1px;background:rgba(0,0,0,.4);pointer-events:none;}
.cell::after{content:'';position:absolute;left:50%;top:0;width:1px;height:100%;background:rgba(0,0,0,.4);pointer-events:none;}
.cell.can-move{cursor:pointer;}
.cell.can-move:active{background:rgba(0,0,0,.18);}
.piece{position:absolute;width:88%;height:88%;border-radius:50%;z-index:2;animation:pop .18s cubic-bezier(.34,1.56,.64,1);}
.piece.black{background:radial-gradient(circle at 35% 35%,#555,#000);box-shadow:2px 3px 8px rgba(0,0,0,.7);}
.piece.white{background:radial-gradient(circle at 35% 35%,#fff,#ccc);box-shadow:2px 3px 6px rgba(0,0,0,.4);}
.piece.last{outline:2px solid var(--red);outline-offset:1px;}
@keyframes pop{from{transform:scale(.15);opacity:0}to{transform:scale(1);opacity:1}}

/* ── Winner overlay on solo board ── */
#solo-winner{position:absolute;inset:0;background:rgba(13,17,23,.88);z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;}
#solo-winner.show{display:flex;}
.wo-big{font-size:64px;animation:pop .5s cubic-bezier(.34,1.56,.64,1);}
.wo-group{font-family:'Fredoka One',sans-serif;font-size:clamp(26px,7vw,44px);color:var(--yellow);text-shadow:0 0 24px rgba(255,214,0,.6);}
.wo-sub2{font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;color:rgba(255,255,255,.6);}
.wo-hint2{font-family:'Nunito',sans-serif;font-weight:700;font-size:11px;color:rgba(255,255,255,.3);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

/* Bottom bar */
#bottom{position:absolute;bottom:0;left:0;width:100%;background:rgba(26,10,74,.97);border-top:2px solid rgba(255,214,0,.2);padding:8px 16px;display:flex;align-items:center;justify-content:center;gap:10px;z-index:20;}
.turn-badge{font-family:'Nunito',sans-serif;font-weight:900;font-size:12px;padding:6px 16px;border-radius:20px;border:2px solid;}
.tb-wait{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.12);color:rgba(255,255,255,.4);}
.tb-your{background:rgba(46,204,64,.2);border-color:var(--green);color:var(--green);animation:pulse 1.2s infinite;}

/* Teacher broadcast columns */
.tv-col{flex:1;display:flex;flex-direction:column;min-width:0;padding:6px;}
.tv-board-outer{background:#dcb35c;padding:4px;border-radius:8px;border:3px solid #8b4513;box-shadow:0 4px 16px rgba(0,0,0,.7);}

/* ── 倒數全螢幕 Overlay ── */
#countdown-overlay{display:none;position:fixed;inset:0;background:rgba(10,5,40,.88);z-index:200;flex-direction:column;align-items:center;justify-content:center;gap:16px;pointer-events:none;}
#countdown-overlay.show{display:flex;}
.cd-match-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(14px,3vw,20px);color:rgba(255,255,255,.6);letter-spacing:.08em;}
.cd-number{font-family:'Fredoka One',sans-serif;font-size:clamp(100px,22vw,180px);color:#00E5FF;line-height:1;text-shadow:0 0 60px rgba(0,229,255,.8);}
@keyframes cdBounce{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.cd-vs{font-family:'Fredoka One',sans-serif;font-size:clamp(18px,4vw,28px);color:rgba(255,255,255,.5);}

/* Pause overlay */
#pause-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
#pause-overlay.show{display:flex;}
#toast-w3{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(20px);background:#1A0A4A;border:3px solid var(--yellow);border-radius:12px;padding:10px 22px;font-family:'Nunito',sans-serif;font-weight:900;color:var(--yellow);opacity:0;transition:.25s cubic-bezier(.34,1.56,.64,1);pointer-events:none;z-index:500;white-space:nowrap;}
#toast-w3.show{opacity:1;transform:translateX(-50%) translateY(0);}
.hidden{display:none!important;}
</style>
</head>
<body>
<div id="stars"></div>

<!-- HUD -->
<div id="hud">
  <div style="flex:1;min-width:0">
    <div class="hud-label">五子棋對戰</div>
    <div class="hud-val" id="hud-title">等待老師開始</div>
  </div>
  <div id="role-badge" class="role-badge role-spectator">觀眾</div>
</div>

<!-- Score bar -->
<div id="score-bar"></div>

<!-- ══ 學生大廳畫面 ══ -->
<div id="lobby-view" style="position:absolute;top:100px;left:0;right:0;bottom:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:12px 16px;overflow-y:auto;z-index:10;background:var(--bg);">

  <!-- 學生狀態提示 -->

    </div>
    <div id="incoming-invites"></div>

</div>

<!-- ══ 遊戲畫面（參賽組 playing 時顯示自己的棋盤） ══ -->
<div id="game-view">
  <!-- 棋盤區（左黑右白直書標題）-->
  <div id="solo-board-wrap" style="position:relative;flex:1;display:flex;align-items:center;justify-content:center;min-height:0;width:100%;padding:4px 44px;">
    <!-- 左側黑方直書 -->
    <div id="side-black" style="position:absolute;left:0;top:0;bottom:0;width:40px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;">
      <div class="stone-sm black" style="flex-shrink:0;"></div>
      <div id="side-name-black" style="writing-mode:vertical-rl;font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(11px,3vw,16px);color:rgba(255,255,255,.85);letter-spacing:.1em;"></div>
      <div style="writing-mode:vertical-rl;font-size:9px;color:rgba(255,255,255,.3);font-family:'Nunito',sans-serif;font-weight:700;">先手</div>
    </div>
    <!-- 棋盤 -->
    <div id="solo-board-outer" style="position:relative">
      <div id="solo-board"></div>
      <!-- 倒數遮罩（棋盤中央）-->
      <div id="solo-countdown" style="display:none;position:absolute;inset:0;background:rgba(10,5,40,.85);z-index:60;flex-direction:column;align-items:center;justify-content:center;gap:8px;border-radius:6px;">
        <div id="solo-cd-num" style="font-family:'Fredoka One',sans-serif;font-size:min(35vw,35vh);color:#00E5FF;line-height:1;text-shadow:0 0 50px rgba(0,229,255,.9);"></div>
        <div id="solo-cd-vs" style="font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(11px,2.5vw,16px);color:rgba(255,255,255,.55);"></div>
      </div>
      <!-- 勝利遮罩 -->
      <div id="solo-winner" onclick="dismissSoloWinner()">
        <div class="wo-big">🏆</div>
        <div class="wo-group" id="solo-winner-name"></div>
        <div class="wo-sub2" id="solo-winner-sub"></div>
        <div class="wo-hint2">點擊繼續</div>
      </div>
    </div>
    <!-- 右側白方直書 -->
    <div id="side-white" style="position:absolute;right:0;top:0;bottom:0;width:40px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;">
      <div class="stone-sm white" style="flex-shrink:0;"></div>
      <div id="side-name-white" style="writing-mode:vertical-rl;font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(11px,3vw,16px);color:rgba(255,255,255,.85);letter-spacing:.1em;"></div>
      <div style="writing-mode:vertical-rl;font-size:9px;color:rgba(255,255,255,.3);font-family:'Nunito',sans-serif;font-weight:700;">後手</div>
    </div>
  </div>
</div>

<!-- ══ 老師雙棋盤轉播（左右兩欄）══ -->
<div id="teacher-view" style="position:absolute;top:100px;left:0;right:0;bottom:60px;display:none;flex-direction:column;overflow:hidden;z-index:10;background:var(--bg);">

  <!-- 頂部模式切換列 -->
  <div style="display:flex; justify-content:center; align-items:center; gap:15px; padding:10px; background:rgba(0,0,0,0.3); border-bottom:2px solid rgba(255,214,0,0.3); flex-shrink:0;">
    <button id="btn-mode-designated" onclick="setMatchMode('designated')" style="padding:8px 20px; border-radius:8px; font-family:'Nunito',sans-serif; font-weight:900; cursor:pointer; border:2px solid transparent; transition:all 0.2s;">🎯 指定模式</button>
    <button id="btn-mode-free" onclick="setMatchMode('free')" style="padding:8px 20px; border-radius:8px; font-family:'Nunito',sans-serif; font-weight:900; cursor:pointer; border:2px solid transparent; transition:all 0.2s;">🤝 自由對戰</button>
    <div style="width:2px; height:24px; background:rgba(255,255,255,0.2); margin:0 5px;"></div>
    <button id="btn-w3-pause" onclick="toggleW3Pause()" style="padding:8px 20px; border-radius:8px; font-family:'Nunito',sans-serif; font-weight:900; cursor:pointer; border:2px solid transparent; transition:all 0.2s; background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.5);">⏸ 暫停遊戲</button>
  </div>

  <div style="flex:1; display:flex; flex-direction:row; min-height:0;">
    <!-- 場0 左欄 -->
    <div id="tv-col-0" style="flex:1;display:flex;flex-direction:column;padding:8px;gap:6px;min-width:0;">
      <!-- 上方黑子 -->
      <div style="display:flex;align-items:center;justify-content:center;gap:8px;flex-shrink:0;">
        <div class="stone-sm black"></div>
        <div id="tv-black-wrap-0"></div>
      </div>
      <!-- 棋盤 -->
      <div style="flex:1;display:flex;align-items:center;justify-content:center;min-height:0;min-width:0;">
        <div id="tv-board-outer-0" class="tv-board-outer" style="position:relative;">
          <div id="tv-board-0" style="display:grid;width:100%;height:100%;"></div>
          <div id="tv-overlay-0" style="position:absolute;inset:0;background:rgba(0,0,0,0.7);z-index:10;border-radius:4px;display:none;flex-direction:column;align-items:center;justify-content:center;padding:10px;text-align:center;">
            <div id="tv-overlay-content-0"></div>
          </div>
        </div>
      </div>
      <!-- 下方白子 -->
      <div style="display:flex;align-items:center;justify-content:center;gap:8px;flex-shrink:0;">
        <div class="stone-sm white"></div>
        <div id="tv-white-wrap-0"></div>
      </div>
    </div>

    <!-- 分隔線 -->
    <div id="tv-divider" style="width:1px;background:rgba(255,255,255,.1);flex-shrink:0;margin:8px 0;"></div>

    <!-- 場1 右欄 -->
    <div id="tv-col-1" style="flex:1;display:flex;flex-direction:column;padding:8px;gap:6px;min-width:0;">
      <!-- 上方黑子 -->
      <div style="display:flex;align-items:center;justify-content:center;gap:8px;flex-shrink:0;">
        <div class="stone-sm black"></div>
        <div id="tv-black-wrap-1"></div>
      </div>
      <!-- 棋盤 -->
      <div style="flex:1;display:flex;align-items:center;justify-content:center;min-height:0;min-width:0;">
        <div id="tv-board-outer-1" class="tv-board-outer" style="position:relative;">
          <div id="tv-board-1" style="display:grid;width:100%;height:100%;"></div>
          <div id="tv-overlay-1" style="position:absolute;inset:0;background:rgba(0,0,0,0.7);z-index:10;border-radius:4px;display:none;flex-direction:column;align-items:center;justify-content:center;padding:10px;text-align:center;">
            <div id="tv-overlay-content-1"></div>
          </div>
        </div>
      </div>
      <!-- 下方白子 -->
      <div style="display:flex;align-items:center;justify-content:center;gap:8px;flex-shrink:0;">
        <div class="stone-sm white"></div>
        <div id="tv-white-wrap-1"></div>
      </div>
    </div>

</div>

<!-- Bottom bar -->
<div id="bottom">
  <div id="turn-indicator" class="turn-badge tb-wait">等待對戰開始</div>
</div>

<!-- 倒數全螢幕 Overlay -->
<div id="countdown-overlay">
  <div class="cd-match-title" id="cd-match-title"></div>
  <div class="cd-number" id="cd-number">3</div>
  <div class="cd-vs" id="cd-vs"></div>
</div>

<!-- Pause overlay -->
<div id="pause-overlay">
  <div style="font-size:56px">⏸</div>
  <div style="font-family:'Fredoka One',sans-serif;font-size:1.8rem;color:var(--yellow)">遊戲暫停</div>
</div>
<div id="toast-w3"></div>

<script>
const GRID = 15;

// ══════════════════════════════════════
// 狀態
// ══════════════════════════════════════
// 每個 match: {status:'idle'|'rolling'|'countdown'|'playing'|'finished', black, white, cells, turn, lastMove, winner, countdown}
function newMatch(){
    return {status:'idle',black:'',white:'',cells:Array(GRID*GRID).fill(0),turn:'black',lastMove:-1,winner:null,countdown:0};
}
let state = {
    matches: [newMatch(), newMatch()],
    scores: {},          // {組名:{wins,matches}}
    activePlayers: [],   // 實際加入的組別
    started: false,      // 是否已啟動
    invites: [],         // 對戰邀請
    matchMode: 'designated', // 老師模式 (designated | free)
    paused: false        // 遊戲暫停狀態
};

let myGroup = '';
let myRole  = 'spectator'; // teacher|player|spectator
window.GROUP_ID = '';

// --- 狀態判斷與邀請邏輯 ---
function isGroupIdle(g) {
    return !state.matches.some(m =>
        (m.black === g || m.white === g) &&
        (m.status === 'rolling' || m.status === 'countdown' || m.status === 'playing')
    );
}

function getFreeMatchIndex() {
    return state.matches.findIndex(m => m.status === 'idle' || m.status === 'finished');
}

function sendInvite(target) {
    if (state.paused) return; // 暫停時禁止操作
    if (!state.invites) state.invites = [];
    if (state.invites.some(i => i.from === myGroup && i.to === target)) return;
    state.invites.push({ from: myGroup, to: target });
    broadcast();
    showToast(`已向 ${target} 發送邀請！`);
}

function acceptInvite(from) {
    if (state.paused) return; // 暫停時禁止操作
    if (!isGroupIdle(myGroup)) {
        showToast('⚠️ 你們已經在對戰中了！');
        return;
    }
    const mi = getFreeMatchIndex();
    if (mi < 0) {
        showToast('⚠️ 目前沒有空閒的對戰桌！');
        return;
    }
    if (!isGroupIdle(from)) {
        showToast(`⚠️ ${from} 已經在其他對戰中！`);
        state.invites = state.invites.filter(i => !(i.from === from && i.to === myGroup));
        broadcast();
        return;
    }
    
    // 清理與這兩組相關的邀請
    state.invites = state.invites.filter(i => 
        i.from !== from && i.to !== from && 
        i.from !== myGroup && i.to !== myGroup
    );
    
    state.matches[mi] = newMatch();
    broadcast();
    startRolling(mi, from, myGroup); 
}

function rejectInvite(from) {
    if (state.paused) return; // 暫停時禁止操作
    state.invites = state.invites.filter(i => !(i.from === from && i.to === myGroup));
    broadcast();
}

function toggleW3Pause() {
    if (myRole !== 'teacher') return;
    state.paused = !state.paused;
    broadcast();
    if (state.paused) showToast('⏸ 已暫停學生畫面');
    else showToast('▶ 已恢復對戰');
}
// ------------------------------

let clearTimers = [null, null]; // 老師端 10秒自動清空計時器
let countdownTimers = [null, null];
let audioCtx = null;

// ══════════════════════════════════════
// Audio
// ══════════════════════════════════════
function initAudio(){try{if(!audioCtx){const AC=window.AudioContext||window.webkitAudioContext;if(AC)audioCtx=new AC();}if(audioCtx?.state==='suspended')audioCtx.resume();}catch(e){}}
function playSound(type){
    initAudio();if(!audioCtx)return;
    try{const t=audioCtx.currentTime,osc=audioCtx.createOscillator(),g=audioCtx.createGain();osc.connect(g);g.connect(audioCtx.destination);
    if(type==='stone'){osc.type='sine';osc.frequency.setValueAtTime(600,t);osc.frequency.exponentialRampToValueAtTime(100,t+.1);g.gain.setValueAtTime(1,t);g.gain.exponentialRampToValueAtTime(.01,t+.1);osc.start(t);osc.stop(t+.1);}
    else if(type==='roll'){osc.type='triangle';osc.frequency.setValueAtTime(800,t);osc.frequency.exponentialRampToValueAtTime(200,t+.05);g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.01,t+.05);osc.start(t);osc.stop(t+.05);}
    else if(type==='win'){osc.type='square';[440,554,659,880].forEach((f,i)=>osc.frequency.setValueAtTime(f,t+i*.1));g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.18,t+.05);g.gain.setValueAtTime(.18,t+.3);g.gain.exponentialRampToValueAtTime(.01,t+.8);osc.start(t);osc.stop(t+.8);}
    else if(type==='beep'){osc.type='sine';osc.frequency.setValueAtTime(880,t);g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.01,t+.12);osc.start(t);osc.stop(t+.12);}
    }catch(e){}}

let _myMi = -1; // 我參與的 match index

function buildTeacherBoards(){
    [0,1].forEach(mi=>{
        const b=document.getElementById('tv-board-'+mi);
        if(!b)return;
        if(b.children.length===GRID*GRID)return; // 已建立
        b.style.gridTemplateColumns=`repeat(${GRID},minmax(0,1fr))`;
        b.innerHTML='';
        for(let i=0;i<GRID*GRID;i++){
            const cell=document.createElement('div');
            cell.className='cell';
            b.appendChild(cell);
        }
    });
}

function resizeTeacherBoards(){
    const view=document.getElementById('teacher-view');
    if(!view||view.style.display==='none')return;
    // 扣除頂部模式切換列與上下黑白子選單區域的高度，預留 180px 保證選單不被擠出畫面
    const availableHeight = view.clientHeight - 180; 
    [0,1].forEach(mi=>{
        const outer=document.getElementById('tv-board-outer-'+mi);
        if(!outer)return;
        const w=view.clientWidth-40;
        const sz=Math.min(w/2, availableHeight);
        if(sz>40){outer.style.width=sz+'px';outer.style.height=sz+'px';}
    });
}

function buildBoards(){
    // 建立唯一的 solo 棋盤
    const b=document.getElementById('solo-board');
    b.style.gridTemplateColumns=`repeat(${GRID},minmax(0,1fr))`;
    b.innerHTML='';
    for(let i=0;i<GRID*GRID;i++){
        const cell=document.createElement('div');
        cell.className='cell';cell.dataset.idx=i;
        cell.addEventListener('click',()=>handleCellClick(_myMi,i));
        b.appendChild(cell);
    }
    resizeSoloBoard();
}

function resizeSoloBoard(){
    const wrap=document.getElementById('solo-board-wrap');
    const outer=document.getElementById('solo-board-outer');
    if(!wrap||!outer)return;
    const sz=Math.min(wrap.clientWidth-16, wrap.clientHeight-16);
    if(sz>60){outer.style.width=sz+'px';outer.style.height=sz+'px';}
}
window.addEventListener('resize',resizeSoloBoard);

// 模式切換與控制
// ══════════════════════════════════════
function setMatchMode(mode) {
    state.matchMode = mode;
    if (mode === 'designated') {
        state.invites = []; // 切換回指定模式時，清空學生間的邀請
    } else if (mode === 'free') {
        state.started = true; // 強制標記遊戲已啟動，讓學生能立刻互相邀請
    }
    broadcast();
}

function tvManualStart(mi) {
    initAudio();
    const b = document.getElementById('tv-sel-b-'+mi)?.value;
    const w = document.getElementById('tv-sel-w-'+mi)?.value;
    if (!b || !w) { showToast('⚠️ 請選擇黑白雙方組別'); return; }
    if (b === w) { showToast('⚠️ 黑白雙方不能是同一組'); return; }
    
    // 檢查是否被另一場佔用
    const otherMi = mi === 0 ? 1 : 0;
    const om = state.matches[otherMi];
    if (om.status !== 'idle' && om.status !== 'finished') {
        if (om.black === b || om.white === b || om.black === w || om.white === w) {
            showToast('⚠️ 有組別正在另一場對戰中！'); return;
        }
    }

    // 清理這兩組相關的所有邀請
    if (!state.invites) state.invites = [];
    state.invites = state.invites.filter(i => 
        i.from !== b && i.to !== b && 
        i.from !== w && i.to !== w
    );

    // 強制清除 auto-clear timer
    clearInterval(clearTimers[mi]);

    state.started = true;
    state.matches[mi] = newMatch(); // 清空舊的對戰狀態
    broadcast();
    
    startRolling(mi, b, w);
}

function startRolling(mi, blackFinal, whiteFinal){
    const m=state.matches[mi];
    m.status='rolling';m.black=blackFinal;m.white=whiteFinal;
    m.cells=Array(GRID*GRID).fill(0);m.turn='black';m.lastMove=-1;m.winner=null;
    m.countdown=0;

    state.scores[blackFinal]=state.scores[blackFinal]||{wins:0,matches:0};
    state.scores[whiteFinal]=state.scores[whiteFinal]||{wins:0,matches:0};
    state.scores[blackFinal].matches++;
    state.scores[whiteFinal].matches++;

    broadcast(); 

    // 只有觸發者負責跑 timeout
    setTimeout(()=>{
        const m2=state.matches[mi];
        if(m2.status!=='rolling')return; 
        
        // 跳過準備階段，直接進入倒數
        m2.status='countdown';
        m2.countdown=3;
        broadcast();
        runCountdown(mi);
    }, 2000); // 2秒閃爍配對動畫後進入倒數
}

function runCountdown(mi){
    clearInterval(countdownTimers[mi]);
    countdownTimers[mi] = null;
    // 只有觸發者負責倒數，其他人透過 applyState 收到更新
    countdownTimers[mi]=setInterval(()=>{
        if (state.paused) return; // 暫停時不倒數
        const m=state.matches[mi];
        if(m.status!=='countdown'){
            clearInterval(countdownTimers[mi]);
            countdownTimers[mi]=null;
            hideCountdownOverlay();
            return;
        }
        m.countdown--;
        playSound('beep');
        if(m.countdown<=0){
            clearInterval(countdownTimers[mi]);
            countdownTimers[mi]=null;
            m.status='playing';m.countdown=0;
            hideCountdownOverlay();
        }
        broadcast();
    },1000);
}

// applyState 收到 countdown 狀態時，如果本機沒在跑 timer 就啟動
function ensureCountdown(mi){
    const m=state.matches[mi];
    if(m.status!=='countdown')return;
    if(countdownTimers[mi])return; // 已在跑
    // 這個裝置不是觸發者，只做本機倒數顯示（不廣播）
    countdownTimers[mi]=setInterval(()=>{
        if (state.paused) return; // 暫停時不倒數
        const m2=state.matches[mi];
        if(m2.status!=='countdown'){
            clearInterval(countdownTimers[mi]);
            countdownTimers[mi]=null;
            hideCountdownOverlay();
        }
        // 不 broadcast！只更新本機顯示
        renderAll();
    },1000);
}

function showCountdownOverlay(mi){
    const m=state.matches[mi];
    const ov=document.getElementById('countdown-overlay');
    if(!ov)return;
    document.getElementById('cd-match-title').textContent=`第${mi===0?'一':'二'}場`;
    document.getElementById('cd-vs').textContent=`${m.black} ⚔️ ${m.white}`;
    const numEl=document.getElementById('cd-number');
    numEl.textContent=m.countdown;
    // 重新觸發動畫
    numEl.style.animation='none';
    numEl.offsetHeight; // reflow
    numEl.style.animation='cdBounce .35s cubic-bezier(.34,1.56,.64,1)';
    ov.classList.add('show');
}
function hideCountdownOverlay(){
    document.getElementById('countdown-overlay')?.classList.remove('show');
}

// ══════════════════════════════════════
// 落子
// ══════════════════════════════════════
function handleCellClick(mi,idx){
    if (state.paused) return; // 暫停時禁止落子
    initAudio();
    const m=state.matches[mi];
    if(m.status!=='playing'||m.cells[idx]!==0||m.winner)return;
    if(myRole==='teacher')return;
    if(myRole==='spectator')return;
    // 判斷是否是這場的對戰者且輪到自己
    const isBlack=m.turn==='black';
    if(myGroup!==m.black&&myGroup!==m.white)return; // 不在這場
    if(myGroup===m.black&&!isBlack)return;
    if(myGroup===m.white&&isBlack)return;

    const piece=isBlack?1:2;
    m.cells[idx]=piece;m.lastMove=idx;m.turn=isBlack?'white':'black';

    if(checkWin(m.cells,idx,piece)){
        m.winner=isBlack?'black':'white';
        const wG=isBlack?m.black:m.white;
        state.scores[wG]=state.scores[wG]||{wins:0,matches:0};
        state.scores[wG].wins++;
        m.status='finished';
        playSound('win');
        showToast(`🏆 ${wG} 獲勝！`);
        broadcast();
    }else{
        playSound('stone');
    }
    broadcast();
}

function checkWin(cells,idx,p){
    const r=Math.floor(idx/GRID),c=idx%GRID;
    for(const[dr,dc]of[[1,0],[0,1],[1,1],[1,-1]]){
        let cnt=1;
        for(const[tr,tc]of[[dr,dc],[-dr,-dc]]){
            let nr=r+tr,nc=c+tc;
            while(nr>=0&&nr<GRID&&nc>=0&&nc<GRID&&cells[nr*GRID+nc]===p){cnt++;nr+=tr;nc+=tc;}
        }
        if(cnt>=5)return true;
    }
    return false;
}

// ══════════════════════════════════════
// 廣播
// ══════════════════════════════════════
function broadcast(){
    const data=JSON.parse(JSON.stringify(state));
    window.parent.postMessage({type:'W3_STATE',data,group:myGroup},'*');
    renderAll();
}

function applyState(newState){
    const prev=state.matches.map(m=>({status:m.status,countdown:m.countdown}));
    state=Object.assign({},state,newState);
    if (!state.invites) state.invites = [];
    if (!state.matchMode) state.matchMode = 'designated';
    if (state.paused === undefined) state.paused = false;
    updateMyRole();

    // 同步暫停遮罩 (僅限學生端顯示遮罩)
    const pauseOverlay = document.getElementById('pause-overlay');
    if (pauseOverlay) {
        if (state.paused && myRole !== 'teacher') {
            pauseOverlay.classList.add('show');
        } else {
            pauseOverlay.classList.remove('show');
        }
    }

    state.matches.forEach((m,mi)=>{
        const p=prev[mi];
        
        // 老師端：當比賽結束時，啟動 10 秒自動清空計時器（每秒更新一次顯示）
        if (myRole === 'teacher') {
            if (m.status === 'finished' && (!p || p.status !== 'finished')) {
                clearInterval(clearTimers[mi]);
                let timeLeft = 10;
                let _clearPausedAt = 0; // 記錄暫停時刻，恢復後補回
                clearTimers[mi] = setInterval(() => {
                    if (state.paused) {
                        // 暫停中：記錄時刻（只記一次）
                        if (!_clearPausedAt) _clearPausedAt = Date.now();
                        return;
                    }
                    // 從暫停恢復：補回已暫停的秒數（避免恢復後立刻清空）
                    if (_clearPausedAt) {
                        const pausedSecs = Math.floor((Date.now() - _clearPausedAt) / 1000);
                        timeLeft = Math.min(10, timeLeft + pausedSecs);
                        _clearPausedAt = 0;
                    }
                    timeLeft--;
                    // 即時更新倒數文字
                    const txtEl = document.getElementById(`auto-clear-text-${mi}`);
                    if (txtEl) txtEl.textContent = `(${timeLeft}秒後自動清空棋盤)`;
                    
                    if (timeLeft <= 0) {
                        clearInterval(clearTimers[mi]);
                        if (state.matches[mi].status === 'finished') {
                            state.matches[mi] = newMatch();
                            broadcast();
                        }
                    }
                }, 1000);
            } else if (m.status !== 'finished') {
                clearInterval(clearTimers[mi]);
            }
        }

        if(m.status==='countdown'){
            // 收到倒數狀態：確保本機有 timer（不廣播版本）
            ensureCountdown(mi);
        } else if(p && p.status==='countdown' && m.status!=='countdown'){
            // 倒數結束或被中斷：清除本機 timer
            clearInterval(countdownTimers[mi]);
            countdownTimers[mi]=null;
            hideCountdownOverlay();
        }
    });

    renderAll();
}

function updateMyRole(){
    if(myRole==='teacher')return;
    const inAny=state.matches.some(m=>(m.black===myGroup||m.white===myGroup)&&m.status!=='idle');
    myRole=inAny?'player':'spectator';
}

function showView(name){
    // 確保只顯示一個畫面
    ['lobby-view','teacher-view','game-view'].forEach(id=>{
        const el=document.getElementById(id);
        if(el) el.style.display=(id===name)?'flex':'none';
    });
}

function renderAll(){
    renderHUD();
    renderScoreboard();
    
    // 決定顯示哪個畫面
    if(myRole==='teacher'){
        if(!state.started) state.started = true; // 老師端強制進入遊戲狀態
        showView('teacher-view');
    } else if(myRole==='player' && isMyMatchPlaying()){
        showView('game-view');
    } else {
        showView('lobby-view');
    }
    
    renderTeacherView();
    renderGameView();
    renderBottom();
    renderInvites();
}

function renderInvites() {
    const panel = document.getElementById('invite-panel');
    if (!panel) return;
    
    // 只有學生且不在比賽中，且老師設定為「自由對戰」才顯示邀請面板
    if (myRole === 'teacher' || !state.started || !isGroupIdle(myGroup) || state.matchMode !== 'free') {
        panel.style.display = 'none';
        return;
    }
    panel.style.display = 'flex';
    if (!state.invites) state.invites = [];
    
    // 渲染可邀請的組別
    const idleGroups = state.activePlayers.filter(g => g !== myGroup && isGroupIdle(g));
    const list = document.getElementById('invite-list');
    if (idleGroups.length === 0) {
        list.innerHTML = `<div style="color:rgba(255,255,255,0.4); font-size:12px; text-align:center; padding: 10px 0;">目前沒有空閒的組別可邀請</div>`;
    } else {
        list.innerHTML = idleGroups.map(g => {
            const alreadySent = state.invites.some(i => i.from === myGroup && i.to === g);
            return `<div style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.05); padding:8px 12px; border-radius:8px;">
                <span style="font-family:'Nunito',sans-serif; font-weight:900; font-size:14px;">${g}</span>
                ${alreadySent 
                    ? `<span style="font-size:12px; color:var(--yellow); font-family:'Nunito',sans-serif; font-weight:900;">已發送 ⏳</span>`
                    : `<button onclick="sendInvite('${g}')" style="background:var(--blue); color:#fff; border:none; padding:6px 16px; border-radius:6px; font-weight:900; font-family:'Nunito',sans-serif; cursor:pointer; box-shadow:0 3px 0 rgba(0,0,0,.3);">⚔️ 邀請</button>`
                }
            </div>`;
        }).join('');
    }
    
    // 渲染收到的邀請
    const incoming = state.invites.filter(i => i.to === myGroup && isGroupIdle(i.from));
    const incContainer = document.getElementById('incoming-invites');
    if (incoming.length === 0) {
        incContainer.innerHTML = '';
    } else {
        incContainer.innerHTML = incoming.map(i => `
            <div class="match-card" style="border-color:var(--yellow); background:rgba(255,214,0,0.1); margin-top:12px;">
                <div class="match-label" style="color:var(--yellow); font-size:12px;">📥 收到對戰邀請</div>
                <div style="font-family:'Nunito',sans-serif; font-weight:900; font-size:16px; margin-bottom:12px; text-align:center;">${i.from} 想要挑戰你們！</div>
                <div style="display:flex; gap:12px;">
                    <button onclick="acceptInvite('${i.from}')" style="flex:1; background:var(--green); color:#fff; border:none; padding:10px; border-radius:10px; font-weight:900; cursor:pointer; box-shadow:0 4px 0 rgba(0,0,0,.3);">✅ 接受</button>
                    <button onclick="rejectInvite('${i.from}')" style="flex:1; background:var(--red); color:#fff; border:none; padding:10px; border-radius:10px; font-weight:900; cursor:pointer; box-shadow:0 4px 0 rgba(0,0,0,.3);">❌ 拒絕</button>
                </div>
            </div>
        `).join('');
    }
}

function renderHUD(){
    const badge=document.getElementById('role-badge');
    if(myRole==='teacher'){badge.textContent='🎓 老師';badge.className='role-badge role-teacher';}
    else if(myRole==='player'){badge.textContent='⚔️ '+myGroup;badge.className='role-badge role-player';}
    else{badge.textContent='👁 觀眾';badge.className='role-badge role-spectator';}
    
    const statusText = document.getElementById('student-status-text');
    if(statusText) {
        if(state.matchMode === 'free') {
            statusText.textContent = "🤝 開放自由約戰中";
        } else {
            statusText.textContent = "⏳ 等待老師配對中...";
        }
    }

    const playing=state.matches.filter(m=>m.status==='playing'||m.status==='countdown');
    document.getElementById('hud-title').textContent=
        !state.started?'等待老師開始':
        playing.length===0?'準備階段':
        playing.length===1?`${playing[0].black} VS ${playing[0].white}`:
        '兩場同時進行中';
}

function renderScoreboard(){
    const el=document.getElementById('score-bar');
    const active=state.activePlayers.length>0?state.activePlayers:Object.keys(state.scores);
    const fighting=new Set(state.matches.flatMap(m=>[m.black,m.white]).filter(Boolean));
    // 按組別名稱數字排序（第1組 < 第2組...），同勝場再按場次
    const sorted=[...active].filter(id=>state.scores[id]).sort((a,b)=>{
        const numA=parseInt(a.replace(/\D/g,''))||99;
        const numB=parseInt(b.replace(/\D/g,''))||99;
        return numA-numB;
    });
    el.innerHTML=sorted.map(id=>{
        const d=state.scores[id]||{wins:0,matches:0};
        return `<div class="sc ${fighting.has(id)?'fighting':''}">
            <span class="sc-name">${id}</span>
            <span class="sc-wins">${d.wins||0}</span>
            <span class="sc-info">${d.matches||0}場</span>
        </div>`;
    }).join('');
}

function renderTeacherView(){
    if(myRole!=='teacher')return;

    // 更新頂部模式切換按鈕與暫停按鈕外觀
    const btnDes = document.getElementById('btn-mode-designated');
    const btnFree = document.getElementById('btn-mode-free');
    const btnPause = document.getElementById('btn-w3-pause');

    if (btnDes) {
        btnDes.style.background = state.matchMode === 'designated' ? 'var(--blue)' : 'rgba(255,255,255,0.1)';
        btnDes.style.color = state.matchMode === 'designated' ? '#fff' : 'rgba(255,255,255,0.5)';
        btnDes.style.borderColor = state.matchMode === 'designated' ? '#4ab8ff' : 'transparent';
    }
    if (btnFree) {
        btnFree.style.background = state.matchMode === 'free' ? 'var(--green)' : 'rgba(255,255,255,0.1)';
        btnFree.style.color = state.matchMode === 'free' ? '#fff' : 'rgba(255,255,255,0.5)';
        btnFree.style.borderColor = state.matchMode === 'free' ? '#4dff80' : 'transparent';
    }
    if (btnPause) {
        if (state.paused) {
            btnPause.textContent = '▶ 恢復遊戲';
            btnPause.style.background = 'var(--yellow)';
            btnPause.style.color = '#000';
            btnPause.style.borderColor = 'var(--yellow)';
        } else {
            btnPause.textContent = '⏸ 暫停遊戲';
            btnPause.style.background = 'rgba(255,255,255,0.1)';
            btnPause.style.color = 'rgba(255,255,255,0.5)';
            btnPause.style.borderColor = 'transparent';
        }
    }

    buildTeacherBoards();

    // 只有2組或場1是 idle → 隱藏場1欄 (但老師端調度介面通常全開較好，這裡維持全開)
    const showTwo = state.activePlayers.length >= 3 || state.matches[1].status !== 'idle';
    const col1 = document.getElementById('tv-col-1');
    const div  = document.getElementById('tv-divider');
    if(col1) col1.style.display = showTwo ? 'flex' : 'none';
    if(div)  div.style.display  = showTwo ? '' : 'none';

    [0,1].forEach(mi=>{
        if(mi===1&&!showTwo)return;
        const m=state.matches[mi];const s=m.status;
        
        const wrapB = document.getElementById('tv-black-wrap-'+mi);
        const wrapW = document.getElementById('tv-white-wrap-'+mi);
        const overlay = document.getElementById('tv-overlay-'+mi);
        const ovContent = document.getElementById('tv-overlay-content-'+mi);

        if (s === 'idle' || s === 'finished') {
            if (state.matchMode === 'designated') {
                const optsB = `<option value="">選擇先手(黑)</option>` + state.activePlayers.map(p => `<option value="${p}" ${p===m.black?'selected':''}>${p}</option>`).join('');
                const optsW = `<option value="">選擇後手(白)</option>` + state.activePlayers.map(p => `<option value="${p}" ${p===m.white?'selected':''}>${p}</option>`).join('');
                if(wrapB) wrapB.innerHTML = `<select id="tv-sel-b-${mi}" style="padding:4px 8px; font-family:'Nunito',sans-serif; font-size:13px; font-weight:900; border-radius:6px; outline:none; border:2px solid #555;">${optsB}</select>`;
                if(wrapW) wrapW.innerHTML = `<select id="tv-sel-w-${mi}" style="padding:4px 8px; font-family:'Nunito',sans-serif; font-size:13px; font-weight:900; border-radius:6px; outline:none; border:2px solid #ccc;">${optsW}</select>`;

                overlay.style.display = 'flex';
                if (s === 'finished') {
                    const wG = m.winner==='black'?m.black:m.white;
                    ovContent.innerHTML = `
                        <div style="color:var(--green); font-size:24px; font-weight:900; margin-bottom:8px; text-shadow:0 2px 4px rgba(0,0,0,0.8);">🏆 ${wG} 獲勝</div>
                        <div id="auto-clear-text-${mi}" style="font-size:12px; color:#ddd; margin-bottom:16px;">(10秒後自動清空棋盤)</div>
                        <button onclick="tvManualStart(${mi})" style="padding:10px 20px; font-size:14px; background:var(--blue); color:#fff; border:2px solid #4ab8ff; border-radius:8px; font-weight:900; cursor:pointer; box-shadow:0 4px 0 rgba(0,0,0,0.5);">⚔️ 略過並強制開始</button>`;
                } else {
                    ovContent.innerHTML = `<button onclick="tvManualStart(${mi})" style="padding:12px 28px; font-size:18px; background:linear-gradient(160deg,#1a6fc4,#0d4a8a); color:#fff; border:3px solid #2D8FFF; border-radius:12px; font-weight:900; cursor:pointer; box-shadow:0 4px 0 rgba(0,0,0,0.5); transition:transform 0.1s;">⚔️ 開始對戰</button>`;
                }
            } else {
                if(wrapB) wrapB.innerHTML = `<span style="font-family:'Nunito',sans-serif;font-weight:900;font-size:14px;color:rgba(255,255,255,0.5);">— 等待學生約戰 —</span>`;
                if(wrapW) wrapW.innerHTML = `<span style="font-family:'Nunito',sans-serif;font-weight:900;font-size:14px;color:rgba(255,255,255,0.5);">— 等待學生約戰 —</span>`;
                
                overlay.style.display = 'flex';
                if (s === 'finished') {
                    const wG = m.winner==='black'?m.black:m.white;
                    ovContent.innerHTML = `<div style="color:var(--green); font-size:24px; font-weight:900; text-shadow:0 2px 4px rgba(0,0,0,0.8);">🏆 ${wG} 獲勝</div><div id="auto-clear-text-${mi}" style="font-size:12px; color:#ddd; margin-top:10px;">(10秒後自動清空棋盤)</div>`;
                } else {
                    ovContent.innerHTML = `<div style="color:var(--yellow); font-size:20px; font-weight:900; text-shadow:0 2px 4px rgba(0,0,0,0.8);">🤝 開放自由約戰中</div><div style="color:rgba(255,255,255,0.6); font-size:12px; margin-top:8px;">請學生在裝置上發送邀請</div>`;
                }
            }
        } else {
            // playing, countdown, rolling
            if(wrapB) wrapB.innerHTML = `<span style="font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;color:#fff;">${m.black||'???'}</span>`;
            if(wrapW) wrapW.innerHTML = `<span style="font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;color:#fff;">${m.white||'???'}</span>`;
            
            if (s === 'playing') {
                overlay.style.display = 'none';
            } else {
                overlay.style.display = 'flex';
                if (s === 'rolling') ovContent.innerHTML = `<div style="color:var(--yellow); font-weight:900; font-size:24px; text-shadow:0 2px 4px rgba(0,0,0,0.8);">⚡ 配對中...</div>`;
                else if (s === 'countdown') ovContent.innerHTML = `<div style="color:#00E5FF; font-weight:900; font-size:64px; text-shadow:0 4px 12px rgba(0,0,0,0.8);">${m.countdown}</div>`;
            }
        }

        // 渲染棋盤棋子
        if(s==='idle'||s==='rolling') {
            // 清空棋盤 DOM
            const cells=document.querySelectorAll('#tv-board-'+mi+' .cell');
            cells.forEach(cell => { cell.innerHTML = ''; });
            return;
        }
        const cells=document.querySelectorAll('#tv-board-'+mi+' .cell');
        if(!cells.length)return;
        cells.forEach((cell,i)=>{
            const val=m.cells[i];
            cell.className='cell';
            cell.innerHTML=val===0?'':`<div class="piece ${val===1?'black':'white'}${m.lastMove===i?' last':''}"></div>`;
        });
    });
    resizeTeacherBoards();
}

function isMyMatchPlaying(){
    if(myRole === 'spectator') return false; 
    return state.matches.some(m=>(m.black===myGroup||m.white===myGroup)&&
        (m.status==='rolling'||m.status==='countdown'||m.status==='playing'||m.status==='finished'));
}

function renderGameView(){
    if(!(myRole==='player'&&isMyMatchPlaying()))return;
    const mi=state.matches.findIndex(m=>m.black===myGroup||m.white===myGroup);
    if(mi<0)return;
    _myMi=mi;const m=state.matches[mi];

    // 更新側邊直書名稱
    const snB=document.getElementById('side-name-black');
    const snW=document.getElementById('side-name-white');
    if(snB)snB.textContent=m.black;
    if(snW)snW.textContent=m.white;

    // 倒數/配對中 overlay
    const scd=document.getElementById('solo-countdown');
    if(scd){
        if(m.status==='rolling'){
            scd.style.display='flex';
            const numEl=document.getElementById('solo-cd-num');
            const vsEl=document.getElementById('solo-cd-vs');
            if(numEl){ numEl.textContent='⚡'; numEl.style.animation='none'; }
            if(vsEl) vsEl.textContent=`配對中...`;
        } else if(m.status==='countdown'){
            scd.style.display='flex';
            const numEl=document.getElementById('solo-cd-num');
            const vsEl=document.getElementById('solo-cd-vs');
            if(numEl){ numEl.textContent=m.countdown; numEl.style.animation='none'; numEl.offsetHeight; numEl.style.animation='cdBounce .35s cubic-bezier(.34,1.56,.64,1)'; }
            if(vsEl) vsEl.textContent=`${m.black} ⚔️ ${m.white}`;
        }else{
            scd.style.display='none';
        }
    }

    // 棋盤 — 老師端不可點擊，學生端才加 can-move
    resizeSoloBoard();
    const cells=document.querySelectorAll('#solo-board .cell');
    cells.forEach((cell,i)=>{
        const val=m.cells[i];
        const myTurn=(myGroup===m.black&&m.turn==='black')||(myGroup===m.white&&m.turn==='white');
        // 老師視角：cell 永不加 can-move，避免誤觸視覺反饋
        const canMove=myRole==='player'&&m.status==='playing'&&!m.winner&&val===0&&myTurn;
        cell.className='cell'+(canMove?' can-move':'');
        cell.innerHTML=val===0?'':`<div class="piece ${val===1?'black':'white'}${m.lastMove===i?' last':''}"></div>`;
    });

    // 勝利 overlay
    const wo=document.getElementById('solo-winner');
    if(m.winner&&m.status==='finished'){
        document.getElementById('solo-winner-name').textContent=m.winner==='black'?m.black:m.white;
        document.getElementById('solo-winner-sub').textContent=(m.winner==='black'?'⚫':'⚪')+' 獲勝！';
        wo.classList.add('show');
    }else wo.classList.remove('show');
}

function renderBottom(){
    const ind=document.getElementById('turn-indicator');if(!ind)return;

    if(myRole!=='player'){
        ind.className='turn-badge tb-wait';ind.textContent=state.started?'觀賽中':'等待老師配對';
        return;
    }
    const mi=state.matches.findIndex(m=>m.black===myGroup||m.white===myGroup);
    if(mi<0){
        ind.className='turn-badge tb-wait';ind.textContent='等待配對';
        return;
    }
    const m=state.matches[mi];

    // 底部小標籤
    if(m.status==='rolling'){ind.className='turn-badge tb-your';ind.textContent='⚡ 配對中...';}
    else if(m.status==='countdown'){ind.className='turn-badge tb-your';ind.textContent=`⚡ ${m.countdown} 秒後開始`;}
    else if(m.status==='playing'){const myTurn=(myGroup===m.black&&m.turn==='black')||(myGroup===m.white&&m.turn==='white');ind.className='turn-badge '+(myTurn?'tb-your':'tb-wait');ind.textContent=myTurn?'⚔️ 你的回合！':'等待對方...';}
    else if(m.status==='finished'){ind.className='turn-badge tb-wait';ind.textContent='比賽結束';}
    else{ind.className='turn-badge tb-wait';ind.textContent='等待配對';}
}

function dismissSoloWinner(){document.getElementById('solo-winner').classList.remove('show');}

// ══════════════════════════════════════
// Platform Bridge
// ══════════════════════════════════════
window.addEventListener('message',(e)=>{
    if(!e.data||!e.data.type)return;
    switch(e.data.type){
        case 'PLATFORM_START':
            if(e.data.group){myGroup=e.data.group;window.GROUP_ID=e.data.group;}
            if(e.data.isTeacher)myRole='teacher';
            if(e.data.players&&e.data.players.length>0){
                state.activePlayers=e.data.players.map(p=>p.group);
                state.activePlayers.forEach(g=>{if(!state.scores[g])state.scores[g]={wins:0,matches:0};});
            }
            // 套用既有 state 或重新渲染
            if(e.data.state){
                applyState(e.data.state);
            } else {
                updateMyRole();
                renderAll();
            }
            break;
        case 'W3_STATE':
            if(e.data.data)applyState(e.data.data);
            break;
        case 'PLATFORM_PAUSE':
            state.paused = true;
            document.getElementById('pause-overlay').classList.add('show');
            break;
        case 'PLATFORM_RESUME':
            state.paused = false;
            document.getElementById('pause-overlay').classList.remove('show');
            break;
    }
});

// 防止螢幕自動關閉
let wakeLock = null;
async function requestWakeLock() {
    try {
        wakeLock = await navigator.wakeLock.request('screen');
    } catch (e) {}
}
document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestWakeLock();
});
requestWakeLock();

// Auto-start
(function(){
    // 隱藏外層 index.html 的抽籤列
    try {
        if (window.parent && window.parent.document) {
            const drawBar = window.parent.document.getElementById('tc-w3-draw-bar');
            if (drawBar) drawBar.style.display = 'none';
            if (window.parent.tcW3UpdateDrawBtn) { window.parent.tcW3UpdateDrawBtn = function(){}; }
        }
    } catch(e) {}

    const params=new URLSearchParams(window.location.search);
    const group=params.get('group')||'';
    const isTeacher=params.get('teacher')==='1';
    if(group){myGroup=group;window.GROUP_ID=group;}
    if(isTeacher){myRole='teacher';}
    // activePlayers 由 PLATFORM_START 傳入
    // 如果是老師且直接開啟（非 iframe），給預設組別讓按鈕可用
    if(isTeacher && state.activePlayers.length===0 && !window.parent.postMessage){
        state.activePlayers=['第1組','第2組'];
        state.activePlayers.forEach(g=>{state.scores[g]={wins:0,matches:0};});
    }
    buildBoards();
    renderAll();
    window.parent.postMessage({type:'W3_READY',group:myGroup},'*');
})();
