<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W8 環遊大富翁</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --font: 'Noto Sans TC', 'Nunito', sans-serif;
  --orange: #FF8C00; --orange2: #E65100;
  --green: #00e676; --green2: #00c853;
  --red: #ff1744; --red2: #d50000;
  --purple: #d500f9;
  --yellow: #ffd600;
  --blue: #00e5ff;
  --sand: #FFE082;
  --bg-dark: #050505;
  --panel-bg: rgba(15, 15, 18, 0.92);

  --outline: #4a3b32;
  
  /* 粉彩色系 */
  --p-purple: #c5a3ff;
  --p-yellow: #ffdf70;
  --p-green:  #81ecec;
  --p-red:    #ff9ff3;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body, button, input, select, textarea { font-family: var(--font); }
body { 
  background: var(--bg-dark); 
  min-height: 100vh; 
  overflow: hidden;
  color: #fff;
}

/* 星空背景特效 */
.stars { 
  position: fixed; inset: 0; pointer-events: none; z-index: 0; 
  background: url('data:image/svg+xml;utf8,<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="1.5" fill="white" opacity="0.3"/><circle cx="150" cy="80" r="2" fill="white" opacity="0.6"/><circle cx="80" cy="150" r="1" fill="white" opacity="0.2"/></svg>') repeat; 
}

/* LOADING */
#loading {
  position: fixed; inset: 0; background: #000;
  display: flex; flex-direction: column; align-items: center; justify-content: center; 
  z-index: 9999; transition: opacity 0.5s;
}
.logo { font-size: 3.5rem; color: #fff; font-weight: 900; margin-bottom: 0.5rem; text-shadow: 0 0 20px var(--blue); }
.sub { color: rgba(255,255,255,0.7); margin-bottom: 1.5rem; }
.spinner { width: 42px; height: 42px; border: 4px solid rgba(255,255,255,0.2); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ══════════════════════════════
   TEACHER VIEW (全螢幕棋盤 + 摺疊側邊欄)
   ══════════════════════════════ */
#teacher-view { display: none; width: 100vw; height: 100vh; position: relative; overflow: hidden; }

.t-header {
  position: absolute; top: 12px; left: 12px; right: 12px; z-index: 40;
  background: rgba(20, 20, 25, 0.8); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px; display: flex; align-items: center; gap: 12px; padding: 10px 16px; 
  backdrop-filter: blur(10px);
}
.t-title { font-size: 1.2rem; font-weight: 900; color: #fff; text-shadow: 0 0 10px var(--blue); }
.turn-chip {
  background: rgba(255, 214, 0, 0.2); color: var(--yellow); font-weight: 900; font-size: 0.95rem;
  padding: 6px 16px; border-radius: 50px; margin-left: auto; display: flex; align-items: center; gap: 6px;
  border: 1px solid rgba(255, 214, 0, 0.5); box-shadow: 0 0 10px rgba(255, 214, 0, 0.2);
}

.board-container {
  position: absolute; inset: 0; z-index: 10;
  display: flex; align-items: center; justify-content: center;
}

/* 摺疊側邊欄 */
.sidebar {
  position: absolute; right: 0; top: 70px; bottom: 12px; width: 320px;
  background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.1);
  border-right: none; border-radius: 16px 0 0 16px;
  transform: translateX(0); transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 500; display: flex; flex-direction: column;
  backdrop-filter: blur(15px); box-shadow: -5px 0 30px rgba(0,0,0,0.8);
}
.sidebar.collapsed { transform: translateX(100%); }

.toggle-btn {
  position: absolute; left: -42px; top: 20px; width: 42px; height: 90px;
  background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.1);
  border-right: none; border-radius: 12px 0 0 12px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; color: white; font-weight: 900; font-size: 0.9rem; gap: 5px;
  backdrop-filter: blur(15px); box-shadow: -5px 0 10px rgba(0,0,0,0.5);
  writing-mode: vertical-lr; letter-spacing: 2px;
}
.toggle-icon { transform: rotate(90deg); font-size: 1.2rem; }

.sidebar-content { padding: 16px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 12px; }
.sidebar-content::-webkit-scrollbar { width: 4px; }
.sidebar-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

.panel {
  background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px; padding: 12px;
}
.panel-title {
  font-size: 0.75rem; font-weight: 900; color: rgba(255,255,255,0.5);
  letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px;
}

.score-row { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 10px; margin-bottom: 4px; transition: background 0.2s; }
.score-row.active { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); }
.sr-icon { font-size: 1.4rem; } .sr-name { flex: 1; color: #fff; font-weight: 700; font-size: 0.85rem; }
.sr-pts { font-weight: 900; font-size: 1.1rem; color: var(--yellow); }
.sr-tag { font-size: 0.65rem; font-weight: 700; color: var(--orange); background: rgba(255,140,0,0.2); padding: 2px 6px; border-radius: 6px; }

.event-box {
  background: rgba(0,0,0,0.5); border-radius: 12px; padding: 14px; min-height: 120px;
  margin-bottom: 8px; color: #fff; font-size: 0.9rem; line-height: 1.6; border: 1px solid rgba(255,255,255,0.1);
}
.q-text { font-weight: 900; font-size: 0.95rem; margin-bottom: 10px; color: #fff; }
.opt-btn {
  display: block; width: 100%; padding: 10px 12px; margin-bottom: 6px; border-radius: 10px;
  border: 2px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: #fff;
  cursor: pointer; font-family: var(--font); font-size: 0.85rem; font-weight: 900; text-align: left; transition: all 0.2s;
}
.opt-btn:hover { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.1); }
.opt-btn.selected { border-color: var(--yellow); background: rgba(255, 214, 0, 0.15); box-shadow: 0 0 10px rgba(255,214,0,0.3); }
.opt-btn.correct { border-color: var(--green); background: rgba(0, 230, 118, 0.15); color: var(--green); }
.opt-btn.wrong { border-color: var(--red); background: rgba(255, 23, 68, 0.15); color: var(--red); }

.explain-box {
  background: rgba(255, 214, 0, 0.1); border-left: 3px solid var(--yellow);
  border-radius: 0 8px 8px 0; padding: 10px; font-size: 0.8rem; color: rgba(255,255,255,0.8);
  display: none; margin-bottom: 8px;
}

.btn-pub, .btn-next, .btn-settle {
  width: 100%; padding: 12px; border: none; border-radius: 12px;
  font-family: var(--font); font-weight: 900; font-size: 0.95rem; cursor: pointer;
  transition: all 0.2s; margin-bottom: 6px;
}
.btn-pub { background: linear-gradient(135deg, #d500f9, #aa00ff); color: #fff; display: none; box-shadow: 0 4px 15px rgba(213,0,249,0.3); }
.btn-next { background: linear-gradient(135deg, #00e676, #00c853); color: #000; display: none; box-shadow: 0 4px 15px rgba(0,230,118,0.3); }
.btn-settle { background: linear-gradient(135deg, #FF8C00, #E65100); color: #fff; box-shadow: 0 4px 15px rgba(255,140,0,0.3); }
.btn-pub:active, .btn-next:active, .btn-settle:active { transform: scale(0.96); }

.ldots { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 1rem; color: rgba(255,255,255,0.5); }
.ldots span { width: 8px; height: 8px; background: var(--blue); border-radius: 50%; animation: db 0.7s ease-in-out infinite; }
.ldots span:nth-child(2) { animation-delay: 0.15s; } .ldots span:nth-child(3) { animation-delay: 0.3s; }
@keyframes db { 0%, 100% { transform: translateY(0); box-shadow: 0 0 0 rgba(0,229,255,0); } 50% { transform: translateY(-6px); box-shadow: 0 0 10px rgba(0,229,255,0.8); } }

/* ══════════════════════════════
   STUDENT VIEW
   ══════════════════════════════ */
#student-view { display: none; flex-direction: column; min-height: 100vh; padding: 10px; gap: 10px; position: relative; z-index: 10; }
.s-header {
  background: rgba(20, 20, 25, 0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px;
  padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; backdrop-filter: blur(10px);
}
.s-title { font-size: 1.1rem; font-weight: 900; color: #fff; text-shadow: 0 0 10px var(--blue); }
.my-badge {
  background: rgba(255, 214, 0, 0.2); color: var(--yellow); font-weight: 900; font-size: 0.85rem;
  padding: 5px 14px; border-radius: 50px; display: flex; align-items: center; gap: 6px; border: 1px solid rgba(255, 214, 0, 0.5);
}
.s-scores { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
.score-chip {
  display: flex; align-items: center; gap: 4px; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 50px;
  font-weight: 900; font-size: 0.85rem; color: rgba(255,255,255,0.7);
}
.score-chip.mine { background: rgba(0, 229, 255, 0.15); border-color: var(--blue); color: var(--blue); box-shadow: 0 0 10px rgba(0,229,255,0.2); }
.s-board-wrap {
  flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative;
}
.s-action {
  background: rgba(20, 20, 25, 0.8); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px; padding: 20px; text-align: center; backdrop-filter: blur(10px);
  min-height: 130px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200;
}
.wait-msg { color: rgba(255,255,255,0.6); font-size: 0.95rem; display: flex; align-items: center; gap: 8px; font-weight: 700; }
.pulse { width: 10px; height: 10px; background: var(--blue); border-radius: 50%; animation: pulse 1.2s ease-in-out infinite; box-shadow: 0 0 8px var(--blue); }
@keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.6); } }

.btn-roll {
  padding: 16px 48px; background: linear-gradient(135deg, var(--blue), #0091ea);
  color: #000; border: none; border-radius: 20px; font-family: var(--font); font-size: 1.8rem; font-weight: 900;
  cursor: pointer; box-shadow: 0 8px 25px rgba(0,229,255,0.4); animation: bounce 2s ease-in-out infinite;
}
@keyframes bounce { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-8px) scale(1.02); } }
.btn-roll:active { transform: scale(0.92) !important; animation: none; box-shadow: 0 2px 10px rgba(0,229,255,0.4); }

.dice-show { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 8px 0; }
.dice-face {
  width: 70px; height: 70px; background: #fff; border-radius: 16px; color: #000;
  box-shadow: inset 0 -4px 0 rgba(0,0,0,0.1), 0 5px 15px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
  font-size: 2.8rem; animation: diceIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes diceIn { from { transform: scale(0.2) rotate(-60deg); opacity: 0; } to { transform: scale(1) rotate(0); opacity: 1; } }
.dice-total { font-weight: 900; font-size: 1.4rem; color: var(--yellow); margin-top: 5px; text-shadow: 0 0 10px rgba(255,214,0,0.4); }

/* ══════════════════════════════
   ISO BOARD (等距視角 + 完美無死角 3D 立體)
   ══════════════════════════════ */
.iso-scene { 
  perspective: 2000px; display: flex; align-items: center; justify-content: center; 
  width: 100%; height: 100%; overflow: hidden;
}
.iso-board { 
  position: relative; transform-style: preserve-3d; 
  /* 等距視角: X軸傾斜 55 度, Z軸旋轉 -45 度 */
  transform: scale(1) rotateX(55deg) rotateZ(-45deg); 
  transition: transform 0.3s;
}

/* 中央區域底板 */
.board-center {
  position: absolute; left: 120px; top: 120px; width: 480px; height: 480px;
  background: rgba(20, 20, 25, 0.95); border: 2px solid #111;
  transform: translateZ(5px); /* 微微浮起但低於邊緣格子 */
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  box-shadow: inset 0 0 50px rgba(0,0,0,0.8); border-radius: 16px;
}
.center-logo { font-size: 4.5rem; font-weight: 900; color: var(--yellow); text-shadow: 0 5px 15px rgba(0,0,0,0.5); margin-bottom: 10px; }
.center-sub { font-size: 1.6rem; color: var(--blue); font-weight: 900; letter-spacing: 0.6em; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }

/* 基本格子顏色主題 */
.cell.type-q { --c-color: var(--p-yellow); }
.cell.type-lucky { --c-color: var(--p-green); }
.cell.type-bad { --c-color: var(--p-red); }
.cell.type-special { --c-color: var(--p-purple); }
.cell.type-start { --c-color: #ffffff; }

/* 3D 實體格子結構 */
.cell { position: absolute; transform-style: preserve-3d; cursor: default; }

/* 頂面：矩形純色填滿，角落全白 */
.cell-top { 
  position: absolute; inset: 0; border: 3px solid var(--outline);
  transform: translateZ(20px);
  background: var(--c-color); 
  overflow: hidden;
}

.cell.corner .cell-top {
  background: #ffffff;
}

/* 格子內的旋轉內容區 */
.cell-content {
  width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: transparent;
}

.cell .c-icon { 
  font-size: 2rem; 
  line-height: 1; 
  filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2)); 
}
.cell.corner .c-icon {
  font-size: 3.5rem; /* 角落圖示放大 */
}
.cell .c-num {
  font-size: 1.1rem;
  font-weight: 900;
  color: #111;
  margin-top: 4px;
}

/* 針對 Start 格子的特殊排版 */
.cell.type-start .cell-content {
  justify-content: center;
  padding-bottom: 4px;
}
.cell.type-start .c-num {
  font-size: 1.3rem;
  letter-spacing: 1px;
  color: var(--red);
  margin-top: 0;
}
.cell.type-start .start-bonus {
  font-size: 0.9rem;
  font-weight: 900;
  color: #fff;
  background: var(--red);
  padding: 2px 10px;
  border-radius: 10px;
  margin-top: 4px;
}

/* 方塊的厚度面 (四個面全包以防破圖空心) */
.cell-s, .cell-n {
  position: absolute; left: -3px; width: calc(100% + 6px); height: 20px;
  background: #f0f0f0; border: 3px solid var(--outline);
}
.cell-e, .cell-w {
  position: absolute; top: -3px; width: 20px; height: calc(100% + 6px);
  background: #e0e0e0; border: 3px solid var(--outline);
}

.cell-s { top: 100%; transform-origin: top; transform: translateZ(20px) rotateX(-90deg); border-top: none; }
.cell-n { top: 0; transform-origin: top; transform: translateZ(20px) rotateX(-90deg); border-bottom: none; }
.cell-e { left: 100%; transform-origin: left; transform: translateZ(20px) rotateY(90deg); border-left: none; }
.cell-w { left: 0; transform-origin: left; transform: translateZ(20px) rotateY(90deg); border-right: none; }

.cell.active .cell-top { animation: cellGlow 0.8s ease-in-out infinite alternate; }
@keyframes cellGlow {
  from { filter: brightness(1); box-shadow: inset 0 0 0px rgba(255,255,255,0.5), 0 0 10px rgba(255,255,255,0.5); }
  to   { filter: brightness(1.15); box-shadow: inset 0 0 15px rgba(255,255,255,0.8), 0 0 25px rgba(255,255,255,0.8); }
}

/* 直立 3D 棋子 */
.piece { 
  position: absolute; width: 0; height: 0; transform-style: preserve-3d; z-index: 100;
  transition: left 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), top 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.piece-shadow {
  position: absolute; width: 34px; height: 34px; background: rgba(0,0,0,0.8);
  border-radius: 50%; transform: translate(-50%, -50%) translateZ(21px); filter: blur(3px);
  animation: shadowPulse 2s infinite ease-in-out;
}
@keyframes shadowPulse {
  0%, 100% { transform: translate(-50%, -50%) translateZ(21px) scale(1); opacity: 0.8; }
  50% { transform: translate(-50%, -50%) translateZ(21px) scale(0.6); opacity: 0.4; }
}

.piece-sprite {
  position: absolute; font-size: 2.8rem;
  /* 抵消棋盤的旋轉，讓棋子永遠正對畫面，並往上提升站在格子上 */
  transform-origin: bottom center;
  animation: floatPiece 2s infinite ease-in-out;
  filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
}
/* 懸浮跳動動畫：在 Z=20px 表面上方浮動 */
@keyframes floatPiece { 
  0%, 100% { transform: translate(-50%, -100%) translateZ(20px) rotateZ(45deg) rotateX(-55deg); } 
  50% { transform: translate(-50%, -100%) translateZ(35px) rotateZ(45deg) rotateX(-55deg); } 
}

.stop-badge {
  position: absolute; top: -10px; right: -20px; background: var(--red); color: #fff;
  font-size: 0.7rem; font-weight: 900; padding: 2px 6px; border-radius: 8px;
  border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.5);
}

/* ══════════════════════════════
   TOAST & EFFECTS
   ══════════════════════════════ */
.toast {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px);
  background: rgba(10, 10, 15, 0.95); color: #fff; padding: 10px 24px; border-radius: 50px;
  font-weight: 900; font-size: 0.95rem; z-index: 9000; opacity: 0; transition: all 0.3s;
  pointer-events: none; backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 10px 30px rgba(0,0,0,0.8);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.score-pop { position: fixed; font-weight: 900; font-size: 2.5rem; pointer-events: none; z-index: 9999; animation: sup 1.5s forwards; text-shadow: 0 4px 10px rgba(0,0,0,0.8); }
@keyframes sup { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-80px) scale(1.4); } }

/* RESULT SCREEN */
#result-screen {
  display: none; position: fixed; inset: 0; background: rgba(5,5,5,0.95);
  z-index: 8000; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(20px);
}
.r-title { font-size: 2.8rem; font-weight: 900; color: var(--yellow); text-shadow: 0 0 30px rgba(255,214,0,0.6); margin-bottom: 2rem; animation: tp 0.6s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes tp { from { transform: scale(0.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.r-list { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 420px; }
.r-item {
  display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.05);
  border-radius: 16px; padding: 14px 20px; backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1); animation: rs 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes rs { from { transform: translateX(-50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.r-rank { font-size: 1.8rem; width: 40px; } .r-icon { font-size: 2rem; }
.r-name { flex: 1; color: #fff; font-weight: 900; font-size: 1.1rem; } .r-score { font-size: 1.6rem; font-weight: 900; color: var(--blue); }
.confetti-wrap { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
.confetti-bit { position: absolute; border-radius: 4px; animation: cf linear forwards; }
@keyframes cf { 0% { transform: translateY(-20px) rotate(0); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
.btn-restart {
  margin-top: 2rem; padding: 14px 40px; background: var(--blue); color: #000; border: none;
  border-radius: 50px; font-family: var(--font); font-weight: 900; font-size: 1.1rem;
  cursor: pointer; transition: transform 0.2s; box-shadow: 0 4px 20px rgba(0,229,255,0.4);
}
.btn-restart:hover { transform: scale(1.05); }

.ev-lucky { background: rgba(0, 230, 118, 0.1) !important; border: 1px solid rgba(0, 230, 118, 0.3) !important; }
.ev-bad { background: rgba(255, 23, 68, 0.1) !important; border: 1px solid rgba(255, 23, 68, 0.3) !important; }
</style>
</head>
<body>

<div class="stars"></div>

<div id="loading">
  <div class="logo">✈️ 環遊大富翁</div>
  <div class="sub">建立世界軌道中...</div>
  <div class="spinner"></div>
</div>

<!-- TEACHER VIEW -->
<div id="teacher-view">
  <div class="t-header">
    <div class="t-title">✈️ 環遊大富翁</div>
    <div class="turn-chip" id="turn-chip">🐻 第1組 的回合</div>
  </div>
  
  <div class="board-container">
    <div class="iso-scene"><div id="board" class="iso-board"></div></div>
  </div>
  
  <!-- 摺疊側邊欄 -->
  <div class="sidebar" id="t-sidebar">
    <div class="toggle-btn" onclick="toggleSidebar()">
      <span class="toggle-icon" id="toggle-icon">▼</span>
      控制面板
    </div>
    <div class="sidebar-content">
      <div class="panel">
        <div class="panel-title">🏆 各組分數</div>
        <div id="t-scores"></div>
      </div>
      <div class="panel" style="flex:1; display:flex; flex-direction:column;">
        <div class="panel-title">📋 事件面板</div>
        <div id="event-box" class="event-box">
          <div class="wait-msg" style="justify-content:center;padding:1rem"><div class="pulse"></div> 等待擲骰...</div>
        </div>
        <div id="explain-box" class="explain-box"></div>
        <button class="btn-pub" id="btn-pub" onclick="publishAnswer()">🎯 公布答案</button>
        <button class="btn-next" id="btn-next" onclick="nextTurn()">➡️ 下一組</button>
        <!-- 結算按鈕僅在獨立測試時顯示，嵌入平台時隱藏以免衝突 -->
        <button class="btn-settle" id="btn-settle" onclick="showResult()">🏆 內部結算</button>
      </div>
    </div>
  </div>
</div>

<!-- STUDENT VIEW -->
<div id="student-view">
  <div class="s-header">
    <div class="s-title">✈️ 環遊大富翁</div>
    <div class="my-badge" id="my-badge">🐻 第1組</div>
  </div>
  <div class="s-scores" id="s-scores"></div>
  <div class="s-board-wrap">
    <div class="iso-scene"><div id="s-board" class="iso-board"></div></div>
  </div>
  <div class="s-action" id="s-action">
    <div class="wait-msg"><div class="pulse"></div><span>等待遊戲狀態同步...</span></div>
  </div>
</div>

<!-- RESULT SCREEN -->
<div id="result-screen">
  <div class="confetti-wrap" id="confetti-wrap"></div>
  <div class="r-title">🏆 遊戲結算！</div>
  <div class="r-list" id="r-list"></div>
  <button class="btn-restart" onclick="location.reload()">🔄 再玩一次</button>
</div>
<div class="toast" id="toast"></div>

<script>
// 動態組別系統：將會自動抓取主平台 index.html 內學生選好的符號(頭像)
let TEAMS = [
  {id: 1, name: '第1組', icon: '🐻', color: '#FF8A65'},
  {id: 2, name: '第2組', icon: '🐼', color: '#81C784'},
  {id: 3, name: '第3組', icon: '🦊', color: '#FFB74D'},
  {id: 4, name: '第4組', icon: '🐸', color: '#4FC3F7'},
  {id: 5, name: '第5組', icon: '🐧', color: '#CE93D8'},
];

// 自動向主平台同步頭像與隊伍資料
function syncTeamsFromParent() {
  try {
    if (window.parent && window.parent.state && window.parent.state.players) {
      const parentPlayers = window.parent.state.players;
      if (parentPlayers.length > 0) {
        const colors = ['#FF8A65', '#81C784', '#FFB74D', '#4FC3F7', '#CE93D8', '#FFD54F', '#4DB6AC', '#7986CB'];
        const newTeams = [];
        parentPlayers.forEach((p, i) => {
          const gId = parseInt(String(p.group).replace(/\D/g, '')) || (i + 1);
          if (!newTeams.find(t => t.id === gId)) {
            newTeams.push({
              id: gId,
              name: p.name || `第${gId}組`,
              icon: p.symbol || p.avatar || '🐻',
              color: colors[newTeams.length % colors.length]
            });
          }
        });
        if (newTeams.length > 0) {
          TEAMS = newTeams;
          teamCount = TEAMS.length;
        }
      }
    }
  } catch(e) {}
}

const TOTAL = 28;
const C = 120; // 角落格子大小
const M = 80;  // 邊緣格子短邊大小
const BOARD_SIZE = 720; 

const CTYPES = [
  'start','q','lucky','q','bad','q','lucky',
  'special','q','bad','q','lucky','q','bad',
  'special','q','lucky','q','bad','q','lucky',
  'special','q','bad','q','lucky','q','bad'
];
const CICONS = { q:'❓', lucky:'🍀', bad:'💀', special:'⭐' };

function getBoardLayout() {
  const path = [];
  // 左下開始格，向右前進
  path.push({x: 0, y: C + 6*M, type: 'corner', angle: 90}); 
  for(let i=5; i>=0; i--) path.push({x: 0, y: C + i*M, type: 'left', angle: 90}); 
  path.push({x: 0, y: 0, type: 'corner', angle: -45}); 
  for(let i=0; i<6; i++) path.push({x: C + i*M, y: 0, type: 'top', angle: 180}); 
  path.push({x: C + 6*M, y: 0, type: 'corner', angle: 45}); 
  for(let i=0; i<6; i++) path.push({x: C + 6*M, y: C + i*M, type: 'right', angle: -90}); 
  path.push({x: C + 6*M, y: C + 6*M, type: 'corner', angle: -45}); 
  for(let i=5; i>=0; i--) path.push({x: C + i*M, y: C + 6*M, type: 'bottom', angle: 0}); 
  return path;
}

let myRole = '', myTeamId = 1, teamCount = 4;
let gameState = null, boardPos = [];
let selectedAnswer = null;

// 取得主平台資料庫捷徑 (如果有的話)
let parentDb = null;
try {
  if (window.parent && window.parent.firebase) {
    parentDb = window.parent.firebase.firestore();
  } else if (window.parent && window.parent.db) {
    parentDb = window.parent.db;
  }
} catch(e) {}

// ====== 強力跨裝置自動同步機制 ======
let _lastStateStr = '';
let _lastActionTs = 0;

function attachSync() {
  // 嘗試使用 Firebase 即時監聽
  try {
    const roomId = window.parent && window.parent.state ? window.parent.state.roomId : null;
    if (parentDb && roomId) {
      parentDb.collection('rooms').doc(roomId).onSnapshot(doc => {
        const data = doc.data();
        if (data && data.w8State && myRole === 'student') {
          const stateStr = JSON.stringify(data.w8State);
          if (stateStr !== _lastStateStr) {
            _lastStateStr = stateStr;
            gameState = data.w8State;
            syncTeamsFromParent();
            render();
          }
        }
        if (data && data.w8Action && myRole === 'teacher') {
          processAction(data.w8Action);
        }
      });
      return; 
    }
  } catch(e) { console.log('Firebase 監聽失敗', e); }

  // 備用機制：每秒輪詢讀取主平台的最新狀態
  setInterval(() => {
    try {
      if (!window.parent || !window.parent.state) return;
      if (myRole === 'student' && window.parent.state.w8State) {
        const stateStr = JSON.stringify(window.parent.state.w8State);
        if (stateStr !== _lastStateStr) {
          _lastStateStr = stateStr;
          gameState = window.parent.state.w8State;
          syncTeamsFromParent();
          render();
        }
      }
      if (myRole === 'teacher' && window.parent.state.w8Action) {
        processAction(window.parent.state.w8Action);
      }
    } catch(e) {}
  }, 1000);
}

function processAction(action) {
  if (!gameState) return;
  if (parseInt(action.teamId) === gameState.currentTurn && action.ts !== _lastActionTs) {
    _lastActionTs = action.ts;
    updateState({ phase: 'rolled', diceResult: action.diceResult });
    const team = TEAMS.find(t => t.id === parseInt(action.teamId));
    showToast(`🎲 ${team?.icon || ''} 擲出 ${action.diceResult.total} 步！`);
  }
}

// 舊版 postMessage 與 storage 同步（用於同電腦單機測試）
window.addEventListener('message', e => {
  if (!e.data) return;
  if (e.data.type === 'PLATFORM_START') {
    const { role, teamId, teamCount: tc } = e.data;
    myRole = role || 'student';
    let parsedId = parseInt(String(teamId).replace(/\D/g, ''));
    myTeamId = isNaN(parsedId) || parsedId === 0 ? 1 : parsedId;
    launch();
  }
  if (e.data.type === 'W8_STATE' && myRole === 'student') {
    gameState = e.data.state; syncTeamsFromParent(); render();
  }
  if (e.data.type === 'W8_ROLL' && myRole === 'teacher') {
    processAction(e.data);
  }
});
window.addEventListener('storage', e => {
  if (e.key === 'W8_STATE' && myRole === 'student') { gameState = JSON.parse(e.newValue); syncTeamsFromParent(); render(); }
  if (e.key === 'W8_ROLL' && myRole === 'teacher') { processAction(JSON.parse(e.newValue)); }
});

window.addEventListener('load', () => {
  if (window.parent !== window) {
    const btnSettle = document.getElementById('btn-settle');
    if (btnSettle) btnSettle.style.display = 'none';
  }
  
  setTimeout(() => {
    const p = new URLSearchParams(location.search);
    if (p.get('role')) {
      myRole = p.get('role') || 'student';
      myTeamId = parseInt(String(p.get('team')).replace(/\D/g, '')) || 1;
      launch();
    } else if (!window.parent || window.parent === window) {
      myRole = 'teacher'; launch();
    }
  }, 500);
});

function launch() {
  document.getElementById('loading').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('loading').style.display = 'none';
    syncTeamsFromParent();
    boardPos = getBoardLayout();
    buildBoard();
    if (myRole === 'teacher') {
      gameState = makeInit();
      render(); broadcast();
    }
    resizeBoard();
    attachSync(); // 啟動自動同步引擎
  }, 500);
}

function buildBoard() {
  ['board', 's-board'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '';
    
    el.style.width = BOARD_SIZE + 'px';
    el.style.height = BOARD_SIZE + 'px';

    const center = document.createElement('div');
    center.className = 'board-center';
    center.innerHTML = `
      <div style="transform: rotateZ(45deg); display: flex; flex-direction: column; align-items: center;">
        <div class="center-logo">✈️ 環遊大富翁</div>
        <div class="center-sub">WORLD TOUR</div>
      </div>
    `;
    el.appendChild(center);

    boardPos.forEach((bp, i) => {
      const type = CTYPES[i] || 'q';
      const cell = document.createElement('div');
      cell.className = `cell type-${type} ${bp.type}`;
      cell.id = (id === 'board' ? 'cell-' : 'sc-') + i;
      
      const cellW = bp.type === 'top' || bp.type === 'bottom' ? M : C;
      const cellH = bp.type === 'left' || bp.type === 'right' ? M : C;

      cell.style.width = cellW + 'px';
      cell.style.height = cellH + 'px';
      cell.style.left = bp.x + 'px';
      cell.style.top = bp.y + 'px';

      // 巨型箭頭及開始標籤
      const contentHtml = i === 0 
        ? `<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0px; height:100%;">
             <span class="c-num" style="font-size:1.3rem; color:var(--red); margin:0;">START</span>
             <svg width="42" height="42" viewBox="0 0 24 24" fill="var(--red)" stroke="#b81010" stroke-width="1.5" style="filter: drop-shadow(0 3px 3px rgba(0,0,0,0.3)); margin: 2px 0;">
               <path d="M2 12 L10 4 L10 9 L22 9 L22 15 L10 15 L10 20 Z" stroke-linejoin="round"/>
             </svg>
             <span class="start-bonus" style="font-size:0.9rem; padding: 2px 10px;">+1</span>
           </div>`
        : `<span class="c-icon">${CICONS[type] || '❓'}</span>`;

      cell.innerHTML = `
        <div class="cell-top">
          <div class="cell-content" style="transform: rotate(${bp.angle}deg);">
            ${contentHtml}
          </div>
        </div>
        <div class="cell-s"></div>
        <div class="cell-n"></div>
        <div class="cell-e"></div>
        <div class="cell-w"></div>`;
      el.appendChild(cell);
    });
  });
}

function makeInit() {
  syncTeamsFromParent();
  const teams = {};
  TEAMS.forEach(t => {
    teams[t.id] = { id: t.id, position: 0, score: 0, extraDice: false, skipTurn: false };
  });
  const firstTurnId = TEAMS.length > 0 ? TEAMS[0].id : 1;
  return { teams, currentTurn: firstTurnId, phase: 'waiting_roll', diceResult: null, event: null, question: null, selectedAnswer: null, teamCount: TEAMS.length };
}

function broadcast() {
  if (myRole !== 'teacher') return;
  try { window.parent.postMessage({ type: 'W8_STATE', state: gameState }, '*'); } catch (e) {}
  try { localStorage.setItem('W8_STATE', JSON.stringify(gameState)); } catch (e) {}
  
  try {
    const roomId = window.parent && window.parent.state ? window.parent.state.roomId : null;
    if (parentDb && roomId) {
      parentDb.collection('rooms').doc(roomId).update({ w8State: gameState });
    } else if (window.parent && window.parent.state && typeof window.parent.saveRooms === 'function') {
      window.parent.state.w8State = gameState;
      window.parent.saveRooms(); // 終極同步備援
    }
  } catch(e) {}
}

function updateState(patch) {
  gameState = { ...gameState, ...patch };
  render(); broadcast();
}
function updateTeam(tid, patch) {
  const t = { ...gameState.teams };
  t[tid] = { ...t[tid], ...patch };
  updateState({ teams: t });
}

function render() {
  const isT = myRole === 'teacher';
  document.getElementById('teacher-view').style.display = isT ? 'block' : 'none';
  document.getElementById('student-view').style.display = isT ? 'none' : 'flex';
  renderPieces();
  if (isT) renderTeacher(); else renderStudent();
}

function renderPieces() {
  if (!gameState) return;
  const cellCounts = {};
  Object.values(gameState.teams || {}).forEach(team => {
    const pos = team.position % TOTAL;
    cellCounts[pos] = (cellCounts[pos] || 0) + 1;
  });

  ['board', 's-board'].forEach(id => {
    const el = document.getElementById(id); if (!el) return;
    el.querySelectorAll('.piece').forEach(p => p.remove());
    
    const cellIndices = {};
    Object.values(gameState.teams || {}).forEach(team => {
      const t = TEAMS.find(x => x.id === team.id); if (!t) return;
      const pos = team.position % TOTAL;
      const bp = boardPos[pos]; if (!bp) return;
      
      const totalOnCell = cellCounts[pos];
      const idx = cellIndices[pos] || 0;
      cellIndices[pos] = idx + 1;

      const cellW = bp.type === 'top' || bp.type === 'bottom' ? M : C;
      const cellH = bp.type === 'left' || bp.type === 'right' ? M : C;
      
      let centerX = bp.x + cellW / 2;
      let centerY = bp.y + cellH / 2;

      let ox = 0, oy = 0;
      if (totalOnCell > 1) {
        const angle = (idx / totalOnCell) * Math.PI * 2;
        const radius = 22;
        ox = Math.cos(angle) * radius;
        oy = Math.sin(angle) * radius;
      }

      const piece = document.createElement('div');
      piece.className = 'piece';
      piece.style.left = (centerX + ox) + 'px';
      piece.style.top = (centerY + oy) + 'px';
      
      let badgeHtml = team.skipTurn ? `<div class="stop-badge">停</div>` : '';
      piece.innerHTML = `
        <div class="piece-shadow"></div>
        <div class="piece-sprite">${t.icon}${badgeHtml}</div>
      `;
      el.appendChild(piece);
    });

    el.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
    if (gameState.currentTurn) {
      const team = gameState.teams[gameState.currentTurn];
      if (team) {
        const cel = document.getElementById((id === 'board' ? 'cell-' : 'sc-') + (team.position % TOTAL));
        if (cel) cel.classList.add('active');
      }
    }
  });
}

function renderTeacher() {
  const gs = gameState;
  const ct = TEAMS.find(t => t.id === gs.currentTurn);
  if (ct) document.getElementById('turn-chip').textContent = `${ct.icon} ${ct.name} 的回合`;
  
  const sc = document.getElementById('t-scores'); sc.innerHTML = '';
  Object.values(gs.teams).forEach(team => {
    const t = TEAMS.find(x => x.id === team.id);
    if (!t) return;
    const row = document.createElement('div');
    row.className = 'score-row' + (team.id === gs.currentTurn ? ' active' : '');
    row.innerHTML = `<span class="sr-icon">${t.icon}</span>
      <span class="sr-name" style="color:${t.color}">${t.name}</span>
      ${team.extraDice ? '<span class="sr-tag">🎲🎲</span>' : ''}
      ${team.skipTurn ? '<span class="sr-tag" style="color:var(--red)">⏸</span>' : ''}
      <span class="sr-pts">${team.score}分</span>`;
    sc.appendChild(row);
  });
  renderEventPanel();
}

function renderEventPanel() {
  const gs = gameState;
  const eb = document.getElementById('event-box');
  const exb = document.getElementById('explain-box');
  const bpub = document.getElementById('btn-pub');
  const bnext = document.getElementById('btn-next');
  exb.style.display = 'none'; bpub.style.display = 'none'; bnext.style.display = 'none';
  const ph = gs.phase;

  if (ph === 'waiting_roll') {
    eb.className = 'event-box';
    const ct = TEAMS.find(t => t.id === gs.currentTurn);
    eb.innerHTML = `<div class="wait-msg" style="justify-content:center;padding:1rem"><div class="pulse"></div> 等待 ${ct?.icon || ''} 擲骰...</div>`;
  } else if (ph === 'rolled') {
    eb.className = 'event-box';
    const d = gs.diceResult; const f = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
    eb.innerHTML = `<div style="text-align:center">
      <div style="font-size:0.8rem;color:rgba(255,255,255,0.5);margin-bottom:8px">骰子結果</div>
      <div class="dice-show"><div class="dice-face">${f[(d.d1 || 1) - 1]}</div>${d.d2 ? `<div class="dice-face">${f[(d.d2 || 1) - 1]}</div>` : ''}</div>
      <div class="dice-total">共 ${d.total} 步</div></div>`;
    bnext.style.display = 'block'; bnext.textContent = '▶ 移動棋子'; bnext.onclick = () => movePiece();
  } else if (ph === 'event') {
    renderEventCard();
  } else if (ph === 'answering') {
    renderQuestionPanel(); bpub.style.display = 'block';
  } else if (ph === 'revealing') {
    renderRevealPanel();
    bnext.style.display = 'block'; bnext.textContent = '➡️ 下一組'; bnext.onclick = () => nextTurn();
  } else if (ph === 'done') {
    eb.className = 'event-box';
    eb.innerHTML = `<div class="wait-msg" style="justify-content:center;padding:1rem;color:rgba(255,255,255,0.3)">回合結束</div>`;
    bnext.style.display = 'block'; bnext.textContent = '➡️ 下一組'; bnext.onclick = () => nextTurn();
  }
}

function renderEventCard() {
  const ev = gameState.event;
  const eb = document.getElementById('event-box');
  const bnext = document.getElementById('btn-next');
  if (!ev) return;
  eb.className = 'event-box ' + (ev.type === 'lucky' ? 'ev-lucky' : ev.type === 'bad' ? 'ev-bad' : '');
  eb.innerHTML = `<div style="font-size:2.5rem;text-align:center;margin-bottom:8px">${ev.type === 'lucky' ? '🍀' : '💀'}</div>
    <div style="text-align:center;font-weight:900;font-size:1.1rem;color:#fff;margin-bottom:6px">${ev.title}</div>
    <div style="text-align:center;font-size:0.9rem;color:rgba(255,255,255,0.7)">${ev.desc}</div>`;
  bnext.style.display = 'block'; bnext.textContent = '➡️ 下一組'; bnext.onclick = () => nextTurn();
}

function renderQuestionPanel() {
  const q = gameState.question;
  const eb = document.getElementById('event-box');
  if (!q) { eb.innerHTML = `<div class="ldots"><span></span><span></span><span></span><span style="margin-left:8px">AI 出題中...</span></div>`; return; }
  eb.className = 'event-box';
  const sa = gameState.selectedAnswer;
  eb.innerHTML = `<div class="q-text">${q.question}</div>
    <button class="opt-btn ${sa === 'A' ? 'selected' : ''}" onclick="selectAnswer('A')">A．${q.optionA}</button>
    <button class="opt-btn ${sa === 'B' ? 'selected' : ''}" onclick="selectAnswer('B')">B．${q.optionB}</button>`;
}

function renderRevealPanel() {
  const gs = gameState; const q = gs.question; const sa = gs.selectedAnswer;
  const eb = document.getElementById('event-box'); const exb = document.getElementById('explain-box');
  if (!q) return;
  const correct = sa === q.answer;
  eb.className = 'event-box';
  eb.innerHTML = `<div class="q-text">${q.question}</div>
    <button class="opt-btn ${sa === 'A' ? (correct ? 'correct' : 'wrong') : q.answer === 'A' ? 'correct' : ''}" disabled>A．${q.optionA}${q.answer === 'A' ? ' ✅' : ''}</button>
    <button class="opt-btn ${sa === 'B' ? (correct ? 'correct' : 'wrong') : q.answer === 'B' ? 'correct' : ''}" disabled>B．${q.optionB}${q.answer === 'B' ? ' ✅' : ''}</button>
    <div style="text-align:center;font-weight:900;font-size:1.1rem;margin-top:10px;color:${correct ? 'var(--green)' : 'var(--red)'}">
      ${correct ? `🎉 答對！+${gs.event?.specialQ ? 4 : 2}分` : '❌ 答錯了！'}</div>`;
  exb.style.display = 'block'; exb.textContent = '💡 ' + (q.explanation || '');
}

function toggleSidebar() {
  const sb = document.getElementById('t-sidebar');
  const icon = document.getElementById('toggle-icon');
  sb.classList.toggle('collapsed');
  icon.style.transform = sb.classList.contains('collapsed') ? 'rotate(-90deg)' : 'rotate(90deg)';
}

function renderStudent() {
  const gs = gameState;
  const myT = TEAMS.find(t => t.id === myTeamId);
  if (myT) document.getElementById('my-badge').innerHTML = `${myT.icon} ${myT.name}`;
  const sr = document.getElementById('s-scores'); sr.innerHTML = '';
  
  if (!gs || !gs.teams) {
    document.getElementById('s-action').innerHTML = `<div class="wait-msg"><div class="pulse"></div><span>等待遊戲狀態同步...</span></div>`;
    return;
  }
  Object.values(gs.teams).forEach(team => {
    const t = TEAMS.find(x => x.id === team.id);
    if(!t) return;
    const chip = document.createElement('div');
    chip.className = 'score-chip' + (team.id === myTeamId ? ' mine' : '');
    chip.innerHTML = `${t.icon} ${team.score}分`;
    sr.appendChild(chip);
  });
  
  const sa = document.getElementById('s-action');
  const isMyTurn = gs.currentTurn === myTeamId;
  const ct = TEAMS.find(t => t.id === gs.currentTurn);
  const myTD = gs.teams[myTeamId];
  sa.innerHTML = '';

  if (gs.phase === 'waiting_roll' && isMyTurn) {
    if (myTD?.skipTurn) { sa.innerHTML = `<div style="font-size:1.2rem;font-weight:900;color:var(--red)">⏸ 這回合停止行動！</div>`; }
    else {
      sa.innerHTML = `<div style="color:rgba(255,255,255,0.7);font-size:1rem;margin-bottom:15px;font-weight:900;">輪到你們了！${myTD?.extraDice ? '<span style="color:var(--yellow)">🎲🎲 兩顆骰子</span>' : ''}</div>
        <button class="btn-roll" onclick="rollDice()">🎲 擲骰！</button>`;
    }
  } else if (gs.phase === 'waiting_roll') {
    sa.innerHTML = `<div class="wait-msg"><div class="pulse"></div><span>${ct?.icon || ''} ${ct?.name || ''}的回合，請等待...</span></div>`;
  } else if (gs.phase === 'rolled' || gs.phase === 'event') {
    const d = gs.diceResult;
    if (d) {
      const f = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
      sa.innerHTML = `<div style="color:rgba(255,255,255,0.7);font-size:0.95rem;margin-bottom:10px;font-weight:900;">${isMyTurn ? '你們' : '他們'}擲出了</div>
        <div class="dice-show"><div class="dice-face">${f[(d.d1 || 1) - 1]}</div>${d.d2 ? `<div class="dice-face">${f[(d.d2 || 1) - 1]}</div>` : ''}</div>
        <div class="dice-total">共 ${d.total} 步</div>`;
    }
  } else if (gs.phase === 'answering') {
    const q = gs.question;
    if (!q) { sa.innerHTML = `<div class="ldots"><span></span><span></span><span></span><span style="margin-left:10px">AI 出題中...</span></div>`; }
    else {
      sa.innerHTML = `
      <div style="font-weight:900;font-size:1.1rem;color:#fff;margin-bottom:15px">${q.question}</div>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <div style="padding:12px 24px;background:rgba(0,229,255,0.15);border:2px solid rgba(0,229,255,0.4);border-radius:12px;font-weight:900;font-size:1.05rem;color:var(--blue)">A．${q.optionA}</div>
        <div style="padding:12px 24px;background:rgba(255,23,68,0.15);border:2px solid rgba(255,23,68,0.4);border-radius:12px;font-weight:900;font-size:1.05rem;color:var(--red)">B．${q.optionB}</div>
      </div>
      <div style="margin-top:15px;color:rgba(255,255,255,0.4);font-size:0.85rem;font-weight:700;">老師正在選擇答案...</div>`;
    }
  } else if (gs.phase === 'revealing') {
    const q = gs.question; const sa2 = gs.selectedAnswer; const correct = sa2 === q?.answer;
    sa.innerHTML = `<div style="font-size:3rem;margin-bottom:10px">${correct ? '🎉' : '😢'}</div>
      <div style="font-weight:900;font-size:1.4rem;color:${correct ? 'var(--green)' : 'var(--red)'}">${correct ? '答對了！' : '答錯了...'}</div>
      <div style="color:rgba(255,255,255,0.6);margin-top:10px;font-size:0.9rem;font-weight:700;">💡 ${q?.explanation || ''}</div>`;
  } else {
    sa.innerHTML = `<div class="wait-msg"><div class="pulse"></div><span>等待繼續...</span></div>`;
  }
}

function rollDice() {
  if (!gameState || gameState.currentTurn !== myTeamId) return;
  const team = gameState.teams[myTeamId];
  if (!team || team.skipTurn) return;
  const d1 = Math.ceil(Math.random() * 6);
  let d2 = null; if (team.extraDice) d2 = Math.ceil(Math.random() * 6);
  const total = d1 + (d2 || 0);
  
  const action = { teamId: myTeamId, diceResult: { d1, d2, total }, ts: Date.now() };

  if (myRole === 'student') {
    try { window.parent.postMessage({ type: 'W8_ROLL', ...action }, '*'); } catch (e) {}
    try { localStorage.setItem('W8_ROLL', JSON.stringify(action)); } catch(e) {}
    try {
      const roomId = window.parent && window.parent.state ? window.parent.state.roomId : null;
      if (parentDb && roomId) {
        parentDb.collection('rooms').doc(roomId).update({ w8Action: action });
      } else if (window.parent && window.parent.state && typeof window.parent.saveRooms === 'function') {
        window.parent.state.w8Action = action;
        window.parent.saveRooms();
      }
    } catch(e) {}
    
    const sa = document.getElementById('s-action');
    if (sa) sa.innerHTML = `<div class="wait-msg"><div class="pulse"></div><span>骰子已擲出，請看老師畫面...</span></div>`;
  } else {
    processAction(action);
  }
}

function movePiece() {
  const gs = gameState;
  const team = gs.teams[gs.currentTurn];
  const steps = gs.diceResult?.total || 1;
  const newPos = (team.position + steps) % TOTAL;
  updateTeam(gs.currentTurn, { position: newPos });
  setTimeout(() => triggerEvent(CTYPES[newPos], newPos), 700);
}

function triggerEvent(type) {
  const tid = gameState.currentTurn;
  if (type === 'start') {
    showToast('🏁 經過起點！+1分');
    updateTeam(tid, { score: (gameState.teams[tid].score || 0) + 1 });
    updateState({ phase: 'done', event: null });
  }
  else if (type === 'q') { updateState({ phase: 'answering', event: null }); fetchQ(false); }
  else if (type === 'special') { updateState({ phase: 'answering', event: { specialQ: true } }); fetchQ(true); }
  else if (type === 'lucky') doLucky(tid);
  else if (type === 'bad') doBad(tid);
  else updateState({ phase: 'done', event: null });
}

const LUCKY = [
  { title: '幸運之星！', desc: '+3 分！', fx: (tid, gs) => updateTeam(tid, { score: (gs.teams[tid].score || 0) + 3 }) },
  { title: '順風！', desc: '前進 2 格！', fx: (tid, gs) => { updateTeam(tid, { position: (gs.teams[tid].position + 2) % TOTAL }); } },
  { title: '全組加分！', desc: '所有組各 +1 分！', fx: (tid, gs) => {
    const t2 = { ...gs.teams }; Object.values(t2).forEach(t => { t2[t.id] = { ...t2[t.id], score: (t2[t.id].score || 0) + 1 }; }); updateState({ teams: t2 }); } },
  { title: '🎲 獲得第二顆骰子！', desc: '之後每回合擲兩顆！', fx: (tid) => updateTeam(tid, { extraDice: true }) },
  { title: '神秘禮物！', desc: '+2 分！', fx: (tid, gs) => updateTeam(tid, { score: (gs.teams[tid].score || 0) + 2 }) },
];
const BAD = [
  { title: '倒楣！', desc: '-1 分', fx: (tid, gs) => updateTeam(tid, { score: Math.max(0, (gs.teams[tid].score || 0) - 1) }) },
  { title: '滑倒！', desc: '退後 2 格', fx: (tid, gs) => { updateTeam(tid, { position: ((gs.teams[tid].position - 2) + TOTAL) % TOTAL }); } },
  { title: '⏸ 停一回合！', desc: '下回合跳過', fx: (tid) => updateTeam(tid, { skipTurn: true }) },
];

function doLucky(tid) {
  const ev = LUCKY[Math.floor(Math.random() * LUCKY.length)];
  ev.fx(tid, gameState);
  updateState({ phase: 'event', event: { type: 'lucky', title: ev.title, desc: ev.desc } });
  showToast(`🍀 ${ev.title}`); showPop('+', 'var(--green)');
}
function doBad(tid) {
  const ev = BAD[Math.floor(Math.random() * BAD.length)];
  ev.fx(tid, gameState);
  updateState({ phase: 'event', event: { type: 'bad', title: ev.title, desc: ev.desc } });
  showToast(`💀 ${ev.title}`); showPop('-1', 'var(--red)');
}

async function fetchQ(isSpecial) {
  const subs = ['生活常識、自然科學', '國語（成語、字義、造句）'];
  const sub = subs[Math.floor(Math.random() * subs.length)];
  const diff = isSpecial ? '中難度，適合國小高年級' : '簡單到中等，適合國小混齡';
  const prompt = `你是小學老師，出一題${sub}選擇題。難度：${diff}。JSON格式，不含其他文字：\n{"question":"題目","optionA":"A選項","optionB":"B選項","answer":"A或B","explanation":"解釋1~2句"}`;
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': '', 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-3-5-sonnet-20241022', max_tokens: 400, messages: [{ role: 'user', content: prompt }] })
    });
    if (!resp.ok) throw new Error('api');
    const data = await resp.json();
    const text = data.content?.[0]?.text || '';
    const q = JSON.parse(text.replace(/```[\w]*|```/g, '').trim());
    updateState({ question: q, phase: 'answering' });
  } catch (e) {
    const pool = [
      { question: '「一石二鳥」的意思是？', optionA: '做一件事達成兩個目的', optionB: '用石頭打兩隻鳥', answer: 'A', explanation: '一石二鳥比喻做一件事情，同時達到兩個目的。' },
      { question: '地球上面積最大的海洋是？', optionA: '大西洋', optionB: '太平洋', answer: 'B', explanation: '太平洋是地球上最大的海洋，約佔地球表面積三分之一。' },
      { question: '植物光合作用需要什麼？', optionA: '陽光和二氧化碳', optionB: '陽光和氧氣', answer: 'A', explanation: '植物利用陽光、水和二氧化碳進行光合作用，並釋放氧氣。' },
      { question: '「半途而廢」的意思？', optionA: '做事到一半就放棄', optionB: '做事非常努力', answer: 'A', explanation: '半途而廢形容事情做到一半就放棄，沒有堅持到底。' },
      { question: '台灣最高的山是？', optionA: '雪山', optionB: '玉山', answer: 'B', explanation: '玉山海拔3952公尺，是台灣第一高峰。' }
    ];
    updateState({ question: pool[Math.floor(Math.random() * pool.length)], phase: 'answering' });
  }
}

function selectAnswer(ans) {
  selectedAnswer = ans;
  updateState({ selectedAnswer: ans });
  renderEventPanel();
}

function publishAnswer() {
  const gs = gameState;
  if (!gs.selectedAnswer) { showToast('請先選擇答案！'); return; }
  const correct = gs.selectedAnswer === gs.question.answer;
  const bonus = gs.event?.specialQ ? 4 : 2;
  if (correct) {
    updateTeam(gs.currentTurn, { score: (gs.teams[gs.currentTurn].score || 0) + bonus });
    showPop('+' + bonus, 'var(--green)');
  }
  updateState({ phase: 'revealing' });
  showToast(correct ? `🎉 答對！+${bonus}分` : '❌ 答錯了！');
}

function nextTurn() {
  const gs = gameState;
  const currentIdx = TEAMS.findIndex(t => t.id === gs.currentTurn);
  let nextIdx = (currentIdx + 1) % TEAMS.length;
  let safe = 0;
  
  while (safe < TEAMS.length) {
    let nextId = TEAMS[nextIdx].id;
    if (gs.teams[nextId]?.skipTurn) {
      updateTeam(nextId, { skipTurn: false });
      showToast(`⏸ ${TEAMS[nextIdx].icon} 停一回合，跳過！`);
      nextIdx = (nextIdx + 1) % TEAMS.length;
      safe++;
    } else {
      break;
    }
  }
  const finalNextId = TEAMS[nextIdx].id;
  updateState({ currentTurn: finalNextId, phase: 'waiting_roll', diceResult: null, event: null, question: null, selectedAnswer: null });
}

function showResult() {
  const rs = document.getElementById('result-screen'); rs.style.display = 'flex';
  const sorted = Object.values(gameState.teams).sort((a, b) => b.score - a.score);
  const rl = document.getElementById('r-list'); rl.innerHTML = '';
  const medals = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣'];
  sorted.forEach((team, i) => {
    const t = TEAMS.find(x => x.id === team.id);
    const item = document.createElement('div'); item.className = 'r-item';
    item.style.animationDelay = (i * 0.12) + 's';
    item.innerHTML = `<span class="r-rank">${medals[i]}</span><span class="r-icon">${t.icon}</span>
      <span class="r-name">${t.name}</span><span class="r-score">${team.score}分</span>`;
    rl.appendChild(item);
  });
  const wrap = document.getElementById('confetti-wrap');
  const cols = ['#FFD700', '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#CE93D8'];
  for (let i = 0; i < 70; i++) {
    const p = document.createElement('div'); p.className = 'confetti-bit';
    p.style.cssText = `left:${Math.random() * 100}vw; background:${cols[Math.floor(Math.random() * cols.length)]};
      animation-duration:${2 + Math.random() * 3}s; animation-delay:${Math.random() * 2}s;
      width:${6 + Math.random() * 10}px; height:${6 + Math.random() * 10}px`;
    wrap.appendChild(p);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function showPop(text, color) {
  const p = document.createElement('div'); p.className = 'score-pop'; p.textContent = text; p.style.color = color;
  p.style.left = (30 + Math.random() * 40) + 'vw'; p.style.top = '40vh';
  document.body.appendChild(p); setTimeout(() => p.remove(), 1400);
}
</script>
