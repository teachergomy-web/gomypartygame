<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>W8 環遊大富翁</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root {
  --font: 'Noto Sans TC', 'Nunito', sans-serif;
  --orange: #FF8C00; --orange2: #E65100;
  --green: #00e676; --green2: #00c853;
  --red: #ff1744; --red2: #d50000;
  --purple: #d500f9;
  --yellow: #ffd600;
  --blue: #00e5ff;
  --sand: #FFE082;
  --bg-dark: #050505;
  --panel-bg: rgba(15, 15, 18, 0.92);

  --outline: #4a3b32;
  
  /* 粉彩色系 */
  --p-purple: #c5a3ff;
  --p-yellow: #ffdf70;
  --p-green:  #81ecec;
  --p-red:    #ff9ff3;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body, button, input, select, textarea { font-family: var(--font); }
body { 
  background: var(--bg-dark); 
  width: 100%; height: 100vh; height: 100dvh;
  overflow: hidden;
  color: #fff;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  -webkit-text-size-adjust: 100%;
  touch-action: manipulation;
}

/* 星空背景特效 */
.stars { 
  position: fixed; inset: 0; pointer-events: none; z-index: 0; 
  background: url('data:image/svg+xml;utf8,<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="1.5" fill="white" opacity="0.3"/><circle cx="150" cy="80" r="2" fill="white" opacity="0.6"/><circle cx="80" cy="150" r="1" fill="white" opacity="0.2"/></svg>') repeat; 
}

/* LOADING */
#loading {
  position: fixed; inset: 0; background: #000;
  display: flex; flex-direction: column; align-items: center; justify-content: center; 
  z-index: 9999; transition: opacity 0.5s;
}
.logo { font-size: 3.5rem; color: #fff; font-weight: 900; margin-bottom: 0.5rem; text-shadow: 0 0 20px var(--blue); }
.sub { color: rgba(255,255,255,0.7); margin-bottom: 1.5rem; }
.spinner { width: 42px; height: 42px; border: 4px solid rgba(255,255,255,0.2); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* 全局暫停遮罩 */
#pause-overlay {
  position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.85);
  display: none; flex-direction: column; align-items: center; justify-content: center;
}

/* ══════════════════════════════
   TEACHER VIEW (全螢幕棋盤 + 頂部分數板)
   ══════════════════════════════ */
#teacher-view { 
  display: none; 
  width: 100%; height: 100vh; height: 100dvh; 
  position: fixed; inset: 0;
  overflow: hidden; 
}

/* 極簡化頂部面板 */
.t-header {
  position: absolute; top: 12px; left: 12px; right: 12px; z-index: 40;
  background: rgba(20, 20, 25, 0.85); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px; display: flex; align-items: center; justify-content: center; 
  padding: 10px 16px; 
  -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.5); 
}

.t-horizontal-scores {
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; width: 100%;
}
.score-row {
  display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.5);
  padding: 6px 14px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1);
  transition: all 0.3s; margin-bottom: 0;
}
.score-row.active {
  background: rgba(255,214,0,0.15); border-color: var(--yellow); box-shadow: 0 0 12px rgba(255,214,0,0.4);
}
.sc-icon { font-size: 1.2rem; }
.sc-name { color: #fff; font-weight: 700; font-size: 0.9rem; }
.sc-pts { font-weight: 900; font-size: 1.1rem; color: var(--green); margin-left: 4px; }

.board-container {
  position: absolute; inset: 0; z-index: 10;
  display: flex; align-items: center; justify-content: center;
  touch-action: none; 
}

/* ══════════════════════════════
   STUDENT VIEW - 全螢幕地圖模式
   ══════════════════════════════ */
#student-view { 
  display: none; flex-direction: column; 
  width: 100vw; height: 100vh; height: 100dvh;
  position: fixed; inset: 0;
  z-index: 10; overflow: hidden;
}
/* 分數條 */
.s-scores { 
  position: absolute; top: 0; left: 0; right: 0; z-index: 300;
  display: flex; gap: 8px; align-items: center;
  padding: max(6px, env(safe-area-inset-top, 6px)) 14px 6px;
  background: rgba(5,5,8,0.88); 
  -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  height: calc(40px + env(safe-area-inset-top, 0px));
}
.my-badge {
  background: rgba(0, 229, 255, 0.2); color: var(--blue); font-weight: 900; font-size: 0.85rem;
  padding: 4px 12px; border-radius: 50px; display: flex; align-items: center; gap: 6px;
  border: 1px solid rgba(0,229,255,0.4); white-space: nowrap;
}
.my-score {
  font-weight: 900; font-size: 0.95rem; color: var(--green);
  padding: 4px 12px; border-radius: 50px;
  background: rgba(0,230,118,0.12); border: 1px solid rgba(0,230,118,0.3);
  white-space: nowrap;
}
.turn-indicator {
  margin-left: auto; font-size: 0.75rem; font-weight: 700; color: rgba(255,255,255,0.5); white-space: nowrap;
}

/* 地圖容器 */
.s-map {
  position: absolute; 
  top: calc(40px + env(safe-area-inset-top, 0px)); 
  left: 0; right: 0; bottom: 0;
  overflow: hidden; touch-action: none; background: transparent;
}

/* 等待時透明阻擋層 */
.wait-blocker {
  position: fixed; top: calc(40px + env(safe-area-inset-top, 0px));
  left: 0; right: 0; bottom: 0; z-index: 400;
  pointer-events: auto; background: transparent; cursor: not-allowed;
}

/* ══════════════════════════════
   右下角懸浮 HUD 視窗 (僅供學生端顯示提示)
   ══════════════════════════════ */
.s-hud {
  position: fixed; right: 14px; bottom: calc(14px + env(safe-area-inset-bottom, 0px));
  z-index: 1000; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; pointer-events: none;
}

.s-hud-card {
  background: rgba(8, 8, 18, 0.92); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px; padding: 10px 16px; max-width: 250px; min-width: 130px;
  text-align: center; font-size: 0.82rem; font-weight: 700; color: rgba(255,255,255,0.85);
  line-height: 1.5; -webkit-backdrop-filter: blur(16px); backdrop-filter: blur(16px);
  box-shadow: 0 6px 24px rgba(0,0,0,0.6); pointer-events: auto;
}

/* ══════════════════════════════
   統一全螢幕中央大遮罩 (Center Event Overlay)
   ══════════════════════════════ */
.center-overlay {
  position: fixed; inset: 0; z-index: 9000; 
  pointer-events: none; 
  background: transparent; 
  display: none; flex-direction: column; align-items: center; justify-content: center;
}
.co-box {
  pointer-events: auto; /* 內容可以點擊 */
  background: rgba(20,20,30,0.95); border: 3px solid var(--yellow);
  border-radius: 24px; padding: 30px 40px; text-align: center;
  box-shadow: 0 10px 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,214,0,0.2);
  transform: scale(0.8); animation: coPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  width: 90%; max-width: 500px; display: flex; flex-direction: column; align-items: center;
  transition: all 0.3s ease;
}
@keyframes coPop { to { transform: scale(1); } }
.co-icon { font-size: 5.5rem; margin-bottom: 10px; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5)); animation: bounce 2s infinite; }
.co-title { font-size: 2.2rem; font-weight: 900; color: #fff; margin-bottom: 8px; text-shadow: 0 4px 10px rgba(0,0,0,0.8); }
.co-desc { font-size: 1.1rem; font-weight: 700; color: var(--yellow); margin-bottom: 10px; }

/* 遮罩內的選項與按鈕 */
.co-opt-btn {
  display: block; width: 100%; padding: 14px 20px; margin-bottom: 12px; border-radius: 12px;
  border: 2px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: #fff;
  cursor: pointer; font-family: var(--font); font-size: 1.1rem; font-weight: 900; text-align: left; transition: all 0.2s;
}
.co-opt-btn:hover:not(:disabled) { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.1); }
.co-opt-btn.selected { border-color: var(--yellow) !important; background: rgba(255, 214, 0, 0.2) !important; box-shadow: 0 0 15px rgba(255,214,0,0.4) !important; opacity: 1 !important; }
.co-opt-btn.correct { border-color: var(--green) !important; background: rgba(0, 230, 118, 0.2) !important; color: var(--green) !important; opacity: 1 !important; }
.co-opt-btn.wrong { border-color: var(--red) !important; background: rgba(255, 23, 68, 0.2) !important; color: var(--red) !important; opacity: 1 !important; }
.co-opt-btn:disabled { cursor: not-allowed; }

.btn-pub, .btn-next {
  width: 100%; padding: 14px; border: none; border-radius: 12px; margin-top: 10px;
  font-family: var(--font); font-weight: 900; font-size: 1.1rem; cursor: pointer; transition: all 0.2s;
}
.btn-pub { background: linear-gradient(135deg, #d500f9, #aa00ff); color: #fff; box-shadow: 0 4px 15px rgba(213,0,249,0.3); }
.btn-pub:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; background: #555; }
.btn-next { background: linear-gradient(135deg, #00e676, #00c853); color: #000; box-shadow: 0 4px 15px rgba(0,230,118,0.3); }
.btn-pub:not(:disabled):active, .btn-next:active { transform: scale(0.96); }

/* ══════════════════════════════
   3D 骰子動畫系統（Three.js）
   ══════════════════════════════ */
#dice3d-overlay {
  position: fixed; inset: 0; z-index: 8000; pointer-events: none;
  display: none; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.65);
  -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
}
#dice3d-overlay.show { display: flex; }
#dice3d-canvas-wrap {
  display: flex; gap: 32px; align-items: flex-end;
}
#dice3d-canvas-wrap canvas {
  border-radius: 20px;
  filter: drop-shadow(0 12px 32px rgba(0,0,0,0.9));
}
.dt-total-badge {
  background: rgba(0,0,0,0.85); border: 2px solid var(--yellow);
  border-radius: 50px; padding: 12px 36px;
  color: var(--yellow); font-weight: 900; font-size: 1.5rem; letter-spacing: 2px;
  box-shadow: 0 4px 20px rgba(255,214,0,0.35);
  animation: badgeIn 0.3s ease-out both;
}
@keyframes badgeIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ══════════════════════════════
   ISO BOARD (高倍率 3D 攝影機系統)
   ══════════════════════════════ */
.iso-scene { 
  perspective: 2000px; display: flex; align-items: center; justify-content: center; 
  width: 100%; height: 100%; overflow: visible;
}
.iso-board { 
  position: relative; transform-style: preserve-3d; 
  transition: transform 0.4s ease-out; 
}

/* 中央區域底板 */
.board-center {
  position: absolute; left: 120px; top: 120px; width: 480px; height: 480px;
  background: rgba(20, 20, 25, 0.95); border: 2px solid #111;
  transform: translateZ(5px);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  box-shadow: inset 0 0 50px rgba(0,0,0,0.8); border-radius: 16px;
}

/* 基本格子顏色主題 */
.cell.type-q { --c-color: var(--p-yellow); }
.cell.type-lucky { --c-color: var(--p-green); }
.cell.type-bad { --c-color: var(--p-red); }
.cell.type-special { --c-color: var(--p-purple); }
.cell.type-start { --c-color: #ffffff; }

.cell { position: absolute; transform-style: preserve-3d; cursor: default; }

.cell-top { 
  position: absolute; inset: 0; border: 3px solid var(--outline);
  transform: translateZ(20px); background: var(--c-color); overflow: hidden;
}
.cell.corner .cell-top { background: #ffffff; }

.cell-content { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: transparent; }
.cell .c-icon { font-size: 2rem; line-height: 1; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2)); }
.cell.corner .c-icon { font-size: 3.5rem; }
.cell .c-num { font-size: 1.1rem; font-weight: 900; color: #111; margin-top: 4px; }

.cell.type-start .cell-content { justify-content: center; padding-bottom: 4px; }
.cell.type-start .c-num { font-size: 1.3rem; letter-spacing: 1px; color: var(--red); margin-top: 0; }
.cell.type-start .start-bonus { font-size: 0.9rem; font-weight: 900; color: #fff; background: var(--red); padding: 2px 10px; border-radius: 10px; margin-top: 4px; }

.cell-s, .cell-n { position: absolute; left: -3px; width: calc(100% + 6px); height: 20px; background: #f0f0f0; border: 3px solid var(--outline); }
.cell-e, .cell-w { position: absolute; top: -3px; width: 20px; height: calc(100% + 6px); background: #e0e0e0; border: 3px solid var(--outline); }

.cell-s { top: 100%; transform-origin: top; transform: translateZ(20px) rotateX(-90deg); border-top: none; }
.cell-n { top: 0; transform-origin: top; transform: translateZ(20px) rotateX(-90deg); border-bottom: none; }
.cell-e { left: 100%; transform-origin: left; transform: translateZ(20px) rotateY(90deg); border-left: none; }
.cell-w { left: 0; transform-origin: left; transform: translateZ(20px) rotateY(90deg); border-right: none; }
.cell.corner .cell-s { background: #bbb; }
.cell.corner .cell-n { background: #aaa; }
.cell.corner .cell-e { background: #b8b8b8; }
.cell.corner .cell-w { background: #c8c8c8; }

.cell.active .cell-top { animation: cellGlow 0.8s ease-in-out infinite alternate; }
@keyframes cellGlow {
  from { filter: brightness(1); box-shadow: inset 0 0 0px rgba(255,255,255,0.5), 0 0 10px rgba(255,255,255,0.5); }
  to   { filter: brightness(1.15); box-shadow: inset 0 0 15px rgba(255,255,255,0.8), 0 0 25px rgba(255,255,255,0.8); }
}

/* 直立 3D 棋子 */
.piece { 
  position: absolute; width: 0; height: 0; transform-style: preserve-3d; z-index: 100;
  transition: left 0.4s ease-out, top 0.4s ease-out;
}
.piece-shadow {
  position: absolute; width: 34px; height: 34px; background: rgba(0,0,0,0.8);
  border-radius: 50%; transform: translate(-50%, -50%) translateZ(21px); filter: blur(3px);
  animation: shadowPulse 2s infinite ease-in-out;
}
@keyframes shadowPulse {
  0%, 100% { transform: translate(-50%, -50%) translateZ(21px) scale(1); opacity: 0.8; }
  50% { transform: translate(-50%, -50%) translateZ(21px) scale(0.6); opacity: 0.4; }
}

.piece-sprite {
  position: absolute; font-size: 2.8rem;
  transform-origin: bottom center;
  animation: floatPiece 2s infinite ease-in-out;
  filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
}
@keyframes floatPiece { 
  0%, 100% { transform: translate(-50%, -100%) translateZ(20px) rotateZ(45deg) rotateX(-55deg); } 
  50% { transform: translate(-50%, -100%) translateZ(35px) rotateZ(45deg) rotateX(-55deg); } 
}

.stop-badge {
  position: absolute; top: -10px; right: -20px; background: var(--red); color: #fff;
  font-size: 0.7rem; font-weight: 900; padding: 2px 6px; border-radius: 8px;
  border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.5);
}

.wait-msg { color: rgba(255,255,255,0.6); font-size: 0.95rem; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 700; width: 100%; text-align: center; }
.pulse { width: 10px; height: 10px; background: var(--blue); border-radius: 50%; animation: pulse 1.2s ease-in-out infinite; box-shadow: 0 0 8px var(--blue); flex-shrink: 0; }
@keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.6); } }

.toast {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px);
  background: rgba(10, 10, 15, 0.95); color: #fff; padding: 10px 24px; border-radius: 50px;
  font-weight: 900; font-size: 0.95rem; z-index: 9000; opacity: 0; transition: all 0.3s;
  pointer-events: none; backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 10px 30px rgba(0,0,0,0.8);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="stars"></div>

<div id="loading">
  <div class="logo">✈️ 環遊大富翁</div>
  <div class="sub">建立世界軌道中...</div>
  <div class="spinner"></div>
</div>

<!-- 老師暫停遮罩 -->
<div id="pause-overlay">
  <div style="font-size:5rem; margin-bottom:20px;">⏸</div>
  <div style="color:var(--yellow); font-size:2.5rem; font-weight:900;">遊戲暫停中</div>
</div>

<!-- TEACHER VIEW -->
<div id="teacher-view">
  <div class="t-header" id="t-header">
    <div class="t-horizontal-scores" id="t-scores"></div>
  </div>
  
  <div class="board-container" id="t-map-container">
    <div id="t-camera-rig" style="position: absolute; inset: 0; transition: transform 0.4s ease-out;">
        <div class="iso-scene"><div id="board" class="iso-board"></div></div>
    </div>
  </div>
</div>

<!-- STUDENT VIEW -->
<div id="student-view">
  <!-- 頂部分數條 -->
  <div class="s-scores" id="s-scores">
    <div class="my-badge" id="my-badge">🐻 第1組</div>
    <div class="my-score" id="my-score">$ 0</div>
    <div class="turn-indicator" id="turn-indicator"></div>
  </div>
  <!-- 全螢幕地圖 -->
  <div class="s-map" id="s-map">
    <div id="s-camera-rig" style="position: absolute; inset: 0; transition: transform 0.4s ease-out;">
        <div class="iso-scene"><div id="s-board" class="iso-board"></div></div>
    </div>
  </div>
  <!-- 右下角 HUD 懸浮視窗 -->
  <div class="s-hud" id="s-hud">
    <div class="s-hud-card" id="s-hud-card">⏳ 等待遊戲狀態同步...</div>
  </div>
</div>

<!-- 3D 骰子 canvas 遮罩 -->
<div id="dice3d-overlay">
  <div id="dice3d-canvas-wrap"></div>
</div>

<!-- 置中事件揭曉大遮罩 (全螢幕通用) -->
<div id="center-event-overlay" class="center-overlay">
  <div class="co-box" id="co-box">
    <!-- 內容將透過 JS 動態填入 -->
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
let _gameStartTime = Date.now();
window._isMoving = false; // 動畫防干擾鎖定
let _lastCamPos = -1;
let _lastCamTurn = -1;

// 動態組別系統
let TEAMS = [
  {id: 1, name: '第1組', icon: '🐻', color: '#FF8A65'},
  {id: 2, name: '第2組', icon: '🐼', color: '#81C784'},
  {id: 3, name: '第3組', icon: '🦊', color: '#FFB74D'},
  {id: 4, name: '第4組', icon: '🐸', color: '#4FC3F7'},
  {id: 5, name: '第5組', icon: '🐧', color: '#CE93D8'},
];

function syncTeamsFromParent() {
  try {
    if (window.parent && window.parent.state && window.parent.state.players) {
      const parentPlayers = window.parent.state.players;
      if (parentPlayers.length > 0) {
        const colors = ['#FF8A65', '#81C784', '#FFB74D', '#4FC3F7', '#CE93D8', '#FFD54F', '#4DB6AC', '#7986CB'];
        const newTeams = [];
        parentPlayers.forEach((p, i) => {
          const gId = parseInt(String(p.group).replace(/\D/g, '')) || (i + 1);
          if (!newTeams.find(t => t.id === gId)) {
            newTeams.push({ id: gId, name: p.name || `第${gId}組`, icon: p.symbol || p.avatar || '🐻', color: colors[newTeams.length % colors.length] });
          }
        });
        if (newTeams.length > 0) { TEAMS = newTeams; teamCount = TEAMS.length; return; }
      }
    }
  } catch(e) {}
  try {
    const p = new URLSearchParams(location.search);
    const playersRaw = p.get('players');
    if (playersRaw) {
      const colors = ['#FF8A65', '#81C784', '#FFB74D', '#4FC3F7', '#CE93D8', '#FFD54F', '#4DB6AC', '#7986CB'];
      const parsed = JSON.parse(decodeURIComponent(playersRaw));
      const newTeams = [];
      parsed.forEach((pl, i) => {
        const gId = parseInt(String(pl.group).replace(/\D/g, '')) || (i + 1);
        if (!newTeams.find(t => t.id === gId)) {

function getBoardLayout() {
  const path = [];
  path.push({x: 0, y: C + 6*M, type: 'corner', angle: 90}); 
  for(let i=5; i>=0; i--) path.push({x: 0, y: C + i*M, type: 'left', angle: 90}); 
  path.push({x: 0, y: 0, type: 'corner', angle: -45}); 
  for(let i=0; i<6; i++) path.push({x: C + i*M, y: 0, type: 'top', angle: 180}); 
  path.push({x: C + 6*M, y: 0, type: 'corner', angle: 45}); 
  for(let i=0; i<6; i++) path.push({x: C + 6*M, y: C + i*M, type: 'right', angle: -90}); 
  path.push({x: C + 6*M, y: C + 6*M, type: 'corner', angle: -45}); 
  for(let i=5; i>=0; i--) path.push({x: C + i*M, y: C + 6*M, type: 'bottom', angle: 0}); 
  return path;
}

function updateCameraTarget(posIndex) {
  if (myRole === 'teacher') return; 
  if (!boardPos || boardPos.length === 0) return;
  const bp = boardPos[posIndex];
  if (!bp) return;

  const cellW = (bp.type === 'top' || bp.type === 'bottom') ? M : C;
  const cellH = (bp.type === 'left' || bp.type === 'right') ? M : C;
  const pieceLocalX = bp.x + cellW / 2;
  const pieceLocalY = bp.y + cellH / 2;

  const rx = pieceLocalX - BOARD_SIZE / 2;
  const ry = pieceLocalY - BOARD_SIZE / 2;
  const angleZ = -45 * Math.PI / 180;
  const x1 = rx * Math.cos(angleZ) - ry * Math.sin(angleZ);
  const y1 = rx * Math.sin(angleZ) + ry * Math.cos(angleZ);

  const angleX = 55 * Math.PI / 180;
  const sx = x1;
  const sy = y1 * Math.cos(angleX);

  _cameraOffsetX = -sx;
  _cameraOffsetY = -sy;
}

function applyTransform() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  
  if (myRole === 'teacher') {
    const VW_TARGET = BOARD_SIZE * 1.414 + 120;
    const VH_TARGET = BOARD_SIZE * 1.22 + 120;
    const scale = Math.min(vw / VW_TARGET, vh / VH_TARGET); 
    const tx = _panOffsetX * scale;
    const ty = _panOffsetY * scale;
    
    const tRig = document.getElementById('t-camera-rig');
    if (tRig) tRig.style.transform = `translate(${tx}px, ${ty}px)`;
    const tBoard = document.getElementById('board');
    if (tBoard) tBoard.style.transform = `scale(${scale}) rotateX(55deg) rotateZ(-45deg)`;
  } else {
    // 學生端稍微拉遠到 800 倍率，視野更舒適，且能跟隨棋子移動
    const scale = Math.max(vw, vh) / 800; 
    const tx = (_cameraOffsetX + _panOffsetX) * scale;
    const ty = (_cameraOffsetY + _panOffsetY) * scale;
    
    const sRig = document.getElementById('s-camera-rig');
    if (sRig) sRig.style.transform = `translate(${tx}px, ${ty}px)`;
    const sBoard = document.getElementById('s-board');
    if (sBoard) sBoard.style.transform = `scale(${scale}) rotateX(55deg) rotateZ(-45deg)`;
  }
}

window.addEventListener('resize', applyTransform);

function setupDrag(elementId) {
  const el = document.getElementById(elementId);
  if (!el) return;
  let isDragging = false;
  let startX = 0, startY = 0;
  
  el.addEventListener('mousedown', e => {
      isDragging = true; startX = e.clientX; startY = e.clientY;
      setTransition(false);
  });
  window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      let scale = myRole === 'teacher' ? Math.min(window.innerWidth / (BOARD_SIZE * 1.414 + 120), window.innerHeight / (BOARD_SIZE * 1.22 + 120)) : Math.max(window.innerWidth, window.innerHeight) / 800;
      _panOffsetX += (e.clientX - startX) / scale;
      _panOffsetY += (e.clientY - startY) / scale;
      startX = e.clientX; startY = e.clientY;
      applyTransform();
  });
  window.addEventListener('mouseup', () => { isDragging = false; setTransition(true); });

  el.addEventListener('touchstart', e => {
      if(e.touches.length === 1) {
          isDragging = true; startX = e.touches[0].clientX; startY = e.touches[0].clientY;
          setTransition(false);
      }
  }, {passive:true});
  window.addEventListener('touchmove', e => {
      if(!isDragging || e.touches.length !== 1) return;
      let scale = myRole === 'teacher' ? Math.min(window.innerWidth / (BOARD_SIZE * 1.414 + 120), window.innerHeight / (BOARD_SIZE * 1.22 + 120)) : Math.max(window.innerWidth, window.innerHeight) / 800;
      _panOffsetX += (e.touches[0].clientX - startX) / scale;
      _panOffsetY += (e.touches[0].clientY - startY) / scale;
      startX = e.touches[0].clientX; startY = e.touches[0].clientY;
      applyTransform();
  }, {passive:false});
  window.addEventListener('touchend', () => { isDragging = false; setTransition(true); });
}

function setTransition(enabled) {
  const val = enabled ? 'transform 0.4s ease-out' : 'none';
  const tRig = document.getElementById('t-camera-rig');
  const sRig = document.getElementById('s-camera-rig');
  if (tRig) tRig.style.transition = val;
  if (sRig) sRig.style.transition = val;
}

              const rooms = window.parent.getRooms();

              if (rooms && rc && rooms[rc] && rooms[rc].w8Action) {

function processAction(action) {
  if (!gameState) return;
  if (action.gameId && gameState.gameId && action.gameId !== gameState.gameId) return;
  if (action.ts < _gameStartTime) return;
  if (action.ts === _lastActionTs) return;
  _lastActionTs = action.ts;

  if (action.type === 'W8_ANSWER' || action.actionType === 'W8_ANSWER') {
    if (gameState && gameState.phase === 'answering') {
      updateState({ selectedAnswer: action.answer });
      const team = TEAMS.find(t => t.id == action.teamId);
      showToast(`✅ ${team?.name || '學生'} 已選擇答案！`);
    }
    return;
  }

  if (action.type === 'W8_ROLL' || action.type === 'W8_MOVE_ROLL') {
    if (action.actionType === 'W8_ANSWER') return; 

    if (Number(action.teamId) !== Number(gameState.currentTurn) &&
        String(action.teamId) !== String(gameState.currentTurn)) {
      return;
    }
    const d = action.diceResult;
    showDiceAnim(d.d1, d.d2, d.total);
    updateState({ phase: 'rolled', diceResult: d });
    
    if (myRole === 'teacher') {
      const savedDice = { ...d };
      setTimeout(() => {
        if (gameState) {
          gameState.phase = 'rolled';
          gameState.diceResult = savedDice;
          movePiece();
        }
      }, 3000);
    }
  }
}

});

window.addEventListener('storage', e => {
  if (e.key === 'W8_STATE' && myRole === 'student') { 
      if (window._isMoving) return;
      gameState = JSON.parse(e.newValue); syncTeamsFromParent(); render(); 
  }
  if (e.key === 'W8_ROLL' && myRole === 'teacher') { processAction(JSON.parse(e.newValue)); }
});

window.addEventListener('load', () => {
  setTimeout(() => {
    const p = new URLSearchParams(location.search);
    if (p.get('role')) {
      myRole = p.get('role') || 'student';
      myTeamId = parseInt(String(p.get('team')).replace(/\D/g, '')) || 1;
      syncMyTeamId();
      launch();
    } else if (!window.parent || window.parent === window) {
      myRole = 'teacher'; launch();
    } else {
      myRole = 'student';
      syncMyTeamId();
      document.getElementById('loading').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
        syncTeamsFromParent();
        if (!boardPos || boardPos.length === 0) boardPos = getBoardLayout();
        buildBoard();
        document.getElementById('student-view').style.display = 'flex';
        try {
          const raw = localStorage.getItem('W8_STATE');
          if (raw) { gameState = JSON.parse(raw); syncTeamsFromState(); render(); }
        } catch(e) { }
        attachSync();
        setupDrag('s-map');
        _launched = true;
      }, 500);
    }
  }, 500);
});

function launch() {
  _launched = true;
  document.getElementById('loading').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('loading').style.display = 'none';
    syncTeamsFromParent();
    boardPos = getBoardLayout();
    buildBoard();
    if (myRole === 'teacher') {
      document.getElementById('teacher-view').style.display = 'block';
      document.getElementById('student-view').style.display = 'none';
      try { localStorage.removeItem('W8_ROLL'); localStorage.removeItem('W8_STATE'); } catch(e) {}
      gameState = makeInit();
      render(); broadcast();
      setupDrag('t-map-container');
    } else {
      document.getElementById('teacher-view').style.display = 'none';
      document.getElementById('student-view').style.display = 'flex';
      updateBadge();
      setupDrag('s-map');
      const tryLoadState = () => {
        try {
          const raw = localStorage.getItem('W8_STATE');
          if (raw) {
            gameState = JSON.parse(raw);
            syncTeamsFromState();
            render();
            return true;
          }
        } catch(e) {}
        return false;
      };
      if (!tryLoadState()) {
        let retries = 0;
        const retryTimer = setInterval(() => {
          retries++;
          if (tryLoadState() || retries > 50) clearInterval(retryTimer);
        }, 200);
      }
    }
    
    setTimeout(() => {
      updateCameraTarget(0);
      _panOffsetX = 0; _panOffsetY = 0;
      applyTransform();
    }, 100);

    attachSync();
  }, 500);
}

function buildBoard() {
  ['board', 's-board'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '';
    
    el.style.width = BOARD_SIZE + 'px';
    el.style.height = BOARD_SIZE + 'px';

    const center = document.createElement('div');
    center.className = 'board-center';
    center.innerHTML = `
      <div style="transform: rotateZ(45deg); display: flex; flex-direction: column; align-items: center;">
        <div class="center-logo">✈️ 環遊大富翁</div>
        <div class="center-sub">WORLD TOUR</div>
      </div>
    `;
    el.appendChild(center);

    boardPos.forEach((bp, i) => {
      const type = CTYPES[i] || 'q';
      const cell = document.createElement('div');
      const isStart = i === 0;
      cell.className = `cell type-${type} ${isStart ? 'corner' : bp.type}`;

      const cellW = (bp.type === 'top' || bp.type === 'bottom') ? M : C;
      const cellH = (bp.type === 'left' || bp.type === 'right') ? M : C;
      const finalW = isStart ? C : cellW;
      const finalH = isStart ? C : cellH;

      cell.style.width = finalW + 'px';
      cell.style.height = finalH + 'px';
      cell.id = (id === 'board' ? 'cell-' : 'sc-') + i;
      cell.style.left = bp.x + 'px';
      cell.style.top = bp.y + 'px';

      const contentAngle = isStart ? 0 : bp.angle;

      const contentHtml = i === 0 
        ? `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;height:100%;padding:5px;">
             <svg width="36" height="36" viewBox="0 0 24 24" fill="var(--red)" style="filter:drop-shadow(0 2px 3px rgba(0,0,0,0.35));">
               <path d="M12 2 L20 13 L15.5 13 L15.5 22 L8.5 22 L8.5 13 L4 13 Z"/>
             </svg>
             <span style="font-size:0.9rem;font-weight:900;color:var(--red);letter-spacing:1px;line-height:1.1;">START</span>
             <span style="font-size:0.7rem;font-weight:900;color:#fff;background:var(--red);padding:1px 7px;border-radius:5px;line-height:1.5;">+$500</span>
           </div>`
        : `<span class="c-icon">${CICONS[type] || '❓'}</span>`;

      cell.innerHTML = `
        <div class="cell-top">
          <div class="cell-content" style="transform: rotate(${contentAngle}deg);">
            ${contentHtml}
          </div>
        </div>
        <div class="cell-s"></div>
        <div class="cell-n"></div>
        <div class="cell-e"></div>
        <div class="cell-w"></div>`;
      el.appendChild(cell);
    });
  });
}

function makeInit() {
  syncTeamsFromParent();

  const urlP = new URLSearchParams(location.search);
  const urlTeamCount = parseInt(urlP.get('teams')) || 0;
  if (urlTeamCount > TEAMS.length) {
    const colors = ['#FF8A65','#81C784','#FFB74D','#4FC3F7','#CE93D8','#FFD54F','#4DB6AC','#7986CB'];
    const icons = ['🐻','🐼','🦊','🐸','🐧','🦁','🐯','🐨'];
    while (TEAMS.length < urlTeamCount) {
      const n = TEAMS.length + 1;
      TEAMS.push({ id: n, name: `第${n}組`, icon: icons[(n-1) % icons.length], color: colors[(n-1) % colors.length] });
    }
    teamCount = TEAMS.length;
  }

  const teams = {};
  TEAMS.forEach(t => {
    teams[t.id] = { id: t.id, position: 0, score: 3000, extraDice: false, skipTurn: false };
  });

  const playOrder = [...TEAMS].sort((a, b) => a.id - b.id).map(t => t.id);
  
  _gameStartTime = Date.now();

  return { 
    gameId: Date.now().toString(36) + Math.random().toString(36).substring(2),
    teams, 
    playOrder,
    currentTurn: playOrder[0], 
    phase: 'intro', 
    diceResult: null, 
    event: null, 
    question: null, 
    selectedAnswer: null, 
    teamCount: TEAMS.length 
  };
}

window.startGame = function() {
    if (myRole !== 'teacher') return;
    updateState({ phase: 'waiting_roll' });
}

function broadcast() {
  if (myRole !== 'teacher') return;
  const stateStr = JSON.stringify(gameState);
  try { window.parent.postMessage({ type: 'W8_STATE', state: gameState }, '*'); } catch (e) {}
  try {
    localStorage.setItem('W8_STATE', stateStr);
    window.dispatchEvent(new StorageEvent('storage', { key: 'W8_STATE', newValue: stateStr }));
  } catch (e) {}
  
  try {
    const roomId = window.parent?.state?.roomId;
    if (parentDb && roomId) {
      parentDb.collection('rooms').doc(roomId).update({ w8State: gameState });
    } else if (window.parent && window.parent.getRooms && window.parent.saveRooms) {
      const rooms = window.parent.getRooms();
      const rc = window.parent.state.roomCode;
      if (rooms && rc && rooms[rc]) {
          rooms[rc].w8State = gameState;
          window.parent.saveRooms(rooms);
      }
    }
  } catch(e) {}
}

function syncPlatformScore() {
  try {
      if (window.parent && window.parent.state && window.parent.state.players) {
          let updated = false;
          window.parent.state.players.forEach(p => {
              const groupId = parseInt(String(p.group).replace(/\D/g, '')) || 0;
              const t = Object.values(gameState.teams).find(team => 
                  parseInt(team.id) === groupId || (TEAMS.find(x=>x.id==team.id)?.name === p.name)
              );
              if (t) {
                  p.score = Number(t.score) || 0;
                  updated = true;
              }
          });
          if (updated) {
              if (typeof window.parent.tcRenderScores === 'function') window.parent.tcRenderScores();
              if (window.parent.saveRooms && window.parent.getRooms) {
                  window.parent.saveRooms(window.parent.getRooms());
              }
          }
      }
  } catch(e) {}
}

function updateState(patch) {
  gameState = { ...gameState, ...patch };
  render(); broadcast();
}
function updateTeam(tid, patch) {
  const t = { ...gameState.teams };
  const tidStr = String(tid);
  const base = t[tidStr] || t[tid] || {};
  const updated = { ...base, ...patch };
  t[tidStr] = updated;
  t[tid] = updated;
  updateState({ teams: t });
  
  if (patch.score !== undefined && myRole === 'teacher') {
      syncPlatformScore();
  }
}

function render() {
  const isT = myRole === 'teacher';
  document.getElementById('teacher-view').style.display = isT ? 'block' : 'none';
  document.getElementById('student-view').style.display = isT ? 'none' : 'flex';
  if (!gameState) return;
  syncTeamsFromState();
  renderPieces();

  if (gameState.phase === 'intro') {
      updateCameraTarget(0);
      _panOffsetX = 0; _panOffsetY = 0;
      applyTransform();
  } else if (!isT) {
      const curTeam = gameState.teams[gameState.currentTurn] || gameState.teams[String(gameState.currentTurn)];
      if (curTeam) {
          if (curTeam.position !== _lastCamPos || gameState.currentTurn !== _lastCamTurn) {
              updateCameraTarget(curTeam.position % TOTAL);

              applyTransform();
              _lastCamPos = curTeam.position;
              _lastCamTurn = gameState.currentTurn;

  const overlay = document.getElementById('center-event-overlay');
  const coBox = document.getElementById('co-box');
  
  const isMyTurn = Number(gameState.currentTurn) === Number(myTeamId) || String(gameState.currentTurn) === String(myTeamId) || gameState.currentTurn == myTeamId;
  
  const showCenterPhaseTeacher = ['intro', 'land_reveal', 'event', 'answering', 'revealing', 'done'].includes(gameState.phase);
  const showCenterPhaseStudent = ['intro', 'waiting_roll', 'land_reveal', 'event', 'answering', 'revealing', 'done'].includes(gameState.phase);
  
  let showCenter = false;
  if (isT) {
      showCenter = showCenterPhaseTeacher;
  } else {
      if (gameState.phase === 'intro') {
          showCenter = true;
      } else if (isMyTurn) {
          showCenter = showCenterPhaseStudent;
      } else {
          showCenter = false;
      }
  }
  
  if (showCenter) {
      overlay.style.display = 'flex';
      let html = '';

      if (gameState.phase === 'waiting_roll' || gameState.phase === 'rolled') {
          coBox.style.padding = '15px 30px';
          coBox.style.background = 'rgba(20,20,30,0.75)';
      } else {
          coBox.style.padding = '30px 40px';
          coBox.style.background = 'rgba(20,20,30,0.95)';
      }

      if (gameState.phase === 'intro') {
          html = `<div class="co-title" style="font-size:2.5rem; color:var(--yellow); margin-bottom:16px;">🚀 環遊大富翁</div>
                  <div class="co-desc" style="color:#fff; font-size:1.1rem; line-height:1.6; text-align:left; margin-bottom:24px;">
                      1. 各組輪流擲骰子前進。<br>
                      2. 停留格子將觸發 <b>機會、命運、或問答挑戰</b>。<br>
                      3. 答對題目可獲得資金，善用運氣與智慧累積最高財富！
                  </div>`;
          if (isT) html += `<button class="btn-pub" style="display:block; font-size:1.3rem; padding:16px;" onclick="startGame()">🎲 遊戲開始</button>`;
          else html += `<div class="wait-msg"><div class="pulse"></div> 等待老師開始遊戲...</div>`;
      }
      else if (gameState.phase === 'waiting_roll') {
          const myTD = gameState.teams[myTeamId] || gameState.teams[String(myTeamId)];
          if (myTD?.skipTurn) {
              html = `<div class="co-title" style="color:var(--red);">⏸ 這回合停止行動！</div>`;
          } else {
              html = `<div class="co-title">✨ 輪到你們了！</div>
                      <button class="btn-pub" style="display:block; font-size:1.5rem; padding:16px; margin-top:20px;" onclick="rollDice()">🎲 擲骰！</button>`;
          }
      }
      else if (gameState.phase === 'land_reveal') {
          const lt = gameState.landType;
          let i = '❓', t = '機會命運', d = '抽題中...';
          if (lt === 'start') { i = '🏁'; t = '到達起點'; d = '獲得獎勵！'; }
          else if (lt === 'special') { i = '⭐'; t = '特殊事件'; d = '命運的齒輪轉動...'; }
          else if (lt === 'lucky') { i = '💰'; t = '幸運事件'; d = '好運降臨！'; }
          else if (lt === 'bad') { i = '💸'; t = '突發狀況'; d = '糟糕了...'; }
          else if (lt === 'q') { i = '❓'; t = '機會問答'; d = '準備挑戰！'; }
          html = `<div class="co-icon">${i}</div><div class="co-title">${t}</div><div class="co-desc" style="margin-bottom:0;">${d}</div>`;
      }

          if(ev.type === 'lucky') { evIcon = '💰'; evColor = 'var(--green)'; }
          else if(ev.type === 'bad') { evIcon = '💸'; evColor = 'var(--red)'; }
          else if(ev.type === 'special') { evIcon = '⭐'; evColor = 'var(--purple)'; }

                  <div class="co-title" style="color:${evColor}">${ev.title}</div>
                  <div class="co-desc" style="margin-bottom:20px; color:#fff; font-size:1.1rem;">${ev.desc}</div>`;
          if (isT) html += `<button class="btn-next" style="display:block;" onclick="nextTurn()">➡️ 下一組</button>`;
          else html += `<div class="co-desc" style="font-size:0.9rem;">等待老師繼續...</div>`;
      }

          const q = gameState.question;

                  else html += `<button class="btn-pub" style="display:block; opacity:0.5; cursor:not-allowed;" disabled>等待學生作答...</button>`;

                      html += `<div class="co-desc" style="font-size:0.9rem; margin-bottom:12px;">💬 討論後點選答案！</div>

                      html += `<button class="co-opt-btn ${sa==='A'?'selected':''}" disabled style="opacity:1;">A．${q.optionA}</button>

      else if (gameState.phase === 'revealing') {

          const correct = sa === q.answer;
          
          if (isT) {

              html += `<button class="co-opt-btn ${sa==='A'?(correct?'correct':'wrong'):(q.answer==='A'?'correct':'')}" disabled style="opacity:1;">A．${q.optionA}${q.answer==='A'?' ✅':''}</button>

          if (isT) html += `<button class="btn-next" style="display:block;" onclick="nextTurn()">➡️ 下一組</button>`;

  if (isT) renderTeacher(); else renderStudent();

function renderPieces() {
  if (!gameState) return;
  if (!boardPos || boardPos.length === 0) return;

  const seenIds = new Set();
  const uniqueTeams = Object.values(gameState.teams || {}).filter(team => {
    const key = String(team.id);
    if (seenIds.has(key)) return false;
    seenIds.add(key);
    return true;
  });

  const cellCounts = {};
  uniqueTeams.forEach(team => {
    const pos = Number(team.position || 0) % TOTAL;
    cellCounts[pos] = (cellCounts[pos] || 0) + 1;
  });

  const boardIds = myRole === 'teacher' ? ['board'] : ['s-board'];
  boardIds.forEach(id => {
    const el = document.getElementById(id); if (!el) return;
    el.querySelectorAll('.piece').forEach(p => p.remove());

    const cellIndices = {};
    uniqueTeams.forEach(team => {
      const icons0 = ['🐻','🐼','🦊','🐸','🐧','🦁','🐯','🐨'];
      const t = TEAMS.find(x => x.id == team.id) || { icon: icons0[(Number(team.id)-1)%8]||'🎮', name: `第${team.id}組` };
      const pos = Number(team.position || 0) % TOTAL;
      const bp = boardPos[pos]; if (!bp) return;

      const totalOnCell = cellCounts[pos];
      const idx = cellIndices[pos] || 0;
      cellIndices[pos] = idx + 1;

      const cellW = bp.type === 'top' || bp.type === 'bottom' ? M : C;
      const cellH = bp.type === 'left' || bp.type === 'right' ? M : C;

      let centerX = bp.x + cellW / 2;
      let centerY = bp.y + cellH / 2;

      let ox = 0, oy = 0;
      if (totalOnCell > 1) {
        const angle = (idx / totalOnCell) * Math.PI * 2;
        const radius = 20;
        ox = Math.cos(angle) * radius;
        oy = Math.sin(angle) * radius;
      }

      const piece = document.createElement('div');
      piece.className = 'piece';
      piece.style.left = (centerX + ox) + 'px';
      piece.style.top  = (centerY + oy) + 'px';

      let badgeHtml = team.skipTurn ? `<div class="stop-badge">停</div>` : '';
      piece.innerHTML = `
        <div class="piece-shadow"></div>
        <div class="piece-sprite">${t.icon}${badgeHtml}</div>
      `;
      el.appendChild(piece);
    });

    el.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
    if (gameState.currentTurn && gameState.phase !== 'intro') {
      const cur = uniqueTeams.find(t => t.id == gameState.currentTurn);
      if (cur) {
        const cel = document.getElementById((id === 'board' ? 'cell-' : 'sc-') + (Number(cur.position||0) % TOTAL));
        if (cel) cel.classList.add('active');
      }
    }
  });
}

function renderTeacher() {
  const gs = gameState;
  const sc = document.getElementById('t-scores'); sc.innerHTML = '';
  const orderArray = gs.playOrder && gs.playOrder.length > 0 ? gs.playOrder : TEAMS.map(t=>t.id);
  
  orderArray.forEach((tid, idx) => {
    const team = gs.teams[tid];
    if (!team) return;
    const t = TEAMS.find(x => x.id === team.id);
    if (!t) return;
    const row = document.createElement('div');
    row.className = 'score-row' + ((team.id === gs.currentTurn && gs.phase !== 'intro') ? ' active' : '');
    
    row.innerHTML = `
      <span class="sc-icon">${t.icon}</span>
      <span class="sc-name" style="color:${t.color}">${t.name}</span>
      <span class="sc-pts">$${Number(team.score) || 0}</span>`;
    sc.appendChild(row);
  });
}

function setHud(cardHtml) {
  const card = document.getElementById('s-hud-card');
  if (card) card.innerHTML = cardHtml;
}

function renderStudent() {
  const gs = gameState;
  const myT = TEAMS.find(t => t.id == myTeamId);
  const badge = document.getElementById('my-badge');
  if (badge) badge.innerHTML = myT ? `${myT.icon} ${myT.name}` : `🐻 第${myTeamId}組`;

  const myTD = gs?.teams?.[myTeamId] || gs?.teams?.[String(myTeamId)];
  const scoreEl = document.getElementById('my-score');
  if (scoreEl) scoreEl.innerHTML = `$<span style="margin-left: 2px;">${Number(myTD?.score) || 0}</span>`;

  if (!gs || !gs.teams) {
    setHud('⏳ 等待遊戲狀態同步...');
    return;
  }

  const curTurn = gs.currentTurn;
  const isMyTurn = Number(curTurn) === Number(myTeamId) || String(curTurn) === String(myTeamId) || curTurn == myTeamId;
  const ct = TEAMS.find(t => t.id == gs.currentTurn);

  const turnEl = document.getElementById('turn-indicator');
  if (turnEl) {
    if (gs.phase === 'intro') {
       turnEl.textContent = '👀 等待開始';
       turnEl.style.color = 'rgba(255,255,255,0.45)';
    } else {
       turnEl.textContent = isMyTurn ? '⭐ 你的回合' : `${ct?.icon||''} ${ct?.name||''} 的回合`;
       turnEl.style.color = isMyTurn ? 'var(--yellow)' : 'rgba(255,255,255,0.45)';
    }
  }

  const blocker = document.getElementById('s-wait-blocker');
  if (blocker) blocker.style.display = !isMyTurn ? 'block' : 'none';

  const hud = document.getElementById('s-hud');
  if (hud) hud.style.zIndex = '1000';

  if (!isMyTurn) {
    setHud(`<div style="font-size:0.82rem;color:rgba(255,255,255,0.7);">👀 觀看 ${ct?.icon||''} ${ct?.name||''}</div>`);
  } else {
    const card = document.getElementById('s-hud-card');
    if (card) card.innerHTML = '';
    if (card) card.style.display = 'none'; 
  }

  if (!isMyTurn && gs.phase !== 'intro') {
    const card = document.getElementById('s-hud-card');
    if (card) card.style.display = 'block';
  }
}

// Three.js 3D 骰子系統
// ══════════════════════════════

function createDiceScene(canvas, finalVal) {
  if (!window.THREE) return null;
  const W = 200, H = 200;
  canvas.width = W; canvas.height = H;

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(W, H);
  renderer.setClearColor(0x000000, 0);
  renderer.shadowMap.enabled = true;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
  camera.position.set(4, 4, 4);
  camera.lookAt(0, 0, 0);

  const amb = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(amb);
  const dir = new THREE.DirectionalLight(0xffffff, 1.2);
  dir.position.set(5, 10, 5);
  dir.castShadow = true;
  scene.add(dir);
  const fill = new THREE.DirectionalLight(0x8888ff, 0.3);
  fill.position.set(-5, 2, -3);
  scene.add(fill);

  const geo = new THREE.BoxGeometry(2, 2, 2);
  
  function makeFaceTex(num) {
    const c = document.createElement('canvas');
    c.width = c.height = 256;
    const ctx = c.getContext('2d');
    const r = ctx.createRadialGradient(128,100,10,128,128,180);
    r.addColorStop(0, '#ffffff');
    r.addColorStop(1, '#e8e8e8');
    ctx.fillStyle = r;
    const rad = 32;
    ctx.beginPath();
    ctx.moveTo(rad, 0);
    ctx.lineTo(256-rad, 0);
    ctx.arcTo(256,0,256,rad,rad);
    ctx.lineTo(256,256-rad);
    ctx.arcTo(256,256,256-rad,256,rad);
    ctx.lineTo(rad,256);
    ctx.arcTo(0,256,0,256-rad,rad);
    ctx.lineTo(0,rad);
    ctx.arcTo(0,0,rad,0,rad);
    ctx.closePath();
    ctx.fill();
    
    ctx.fillStyle = '#1a1a2e';
    const dots = {
      1: [[128,128]],
      2: [[72,72],[184,184]],
      3: [[72,72],[128,128],[184,184]],
      4: [[72,72],[184,72],[72,184],[184,184]],
      5: [[72,72],[184,72],[128,128],[72,184],[184,184]],
      6: [[72,72],[184,72],[72,128],[184,128],[72,184],[184,184]],
    };
    (dots[num]||dots[1]).forEach(([dx,dy]) => {
      ctx.beginPath(); ctx.arc(dx, dy, 22, 0, Math.PI*2); ctx.fill();
    });
    return new THREE.CanvasTexture(c);
  }

  const otherVals = [1,2,3,4,5,6].filter(v => v !== finalVal);
  const bottomVal = 7 - finalVal;
  const sideVals = [1,2,3,4,5,6].filter(v => v !== finalVal && v !== bottomVal);
  sideVals.sort(() => Math.random() - 0.5);

  const faceMats = [
    new THREE.MeshPhongMaterial({ map: makeFaceTex(sideVals[0] || 3) }), 
    new THREE.MeshPhongMaterial({ map: makeFaceTex(sideVals[1] || 4) }), 
    new THREE.MeshPhongMaterial({ map: makeFaceTex(finalVal) }),         
    new THREE.MeshPhongMaterial({ map: makeFaceTex(bottomVal) }),        
    new THREE.MeshPhongMaterial({ map: makeFaceTex(sideVals[2] || 2) }), 
    new THREE.MeshPhongMaterial({ map: makeFaceTex(sideVals[3] || 5) }), 
  ];
  faceMats.forEach(m => { m.shininess = 80; });

  const dice = new THREE.Mesh(geo, faceMats);
  dice.castShadow = true;
  scene.add(dice);

  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(20,20),
    new THREE.MeshStandardMaterial({ color:0x111111, transparent:true, opacity:0.3 })
  );
  floor.rotation.x = -Math.PI/2;
  floor.position.y = -1.5;
  floor.receiveShadow = true;
  scene.add(floor);

  const state = {
    phase: 'throw',
    t: 0,
    vy: 28,
    y: -0.5,
    spinX: (Math.random() - 0.5) * 40,
    spinY: (Math.random() - 0.5) * 40,
    spinZ: (Math.random() - 0.5) * 40,
    bounceCount: 0,
    done: false,
    renderer, scene, camera, dice
  };
  return state;
}

function animateDice(state, elapsed) {
  if (!state || state.done) return;
  const dt = Math.min(elapsed, 0.05);
  const { dice } = state;
  const gravity = 80;

  if (state.phase === 'throw') {
    state.vy -= gravity * dt;
    state.y += state.vy * dt;
    dice.position.y = state.y;
    
    dice.rotation.x += state.spinX * dt;
    dice.rotation.y += state.spinY * dt;
    dice.rotation.z += state.spinZ * dt;

    if (state.y <= -0.5) {
      state.y = -0.5;
      state.bounceCount++;
      
      state.vy = Math.abs(state.vy) * 0.55; 
      state.spinX *= 0.7; 
      state.spinY *= 0.7; 
      state.spinZ *= 0.7;

      if (state.vy < 3.5 || state.bounceCount > 4) {
        state.phase = 'settle';
        state.t = 0;
      }
    }
  } else if (state.phase === 'settle') {
    state.t += dt * 4; 
    const p = Math.min(state.t, 1);
    const ease = 1 - Math.pow(1 - p, 3); 
    const TX = 0, TY = 0, TZ = 0; 

    if (!state.rotStart) {
      const norm = (a) => {
        let v = a % (Math.PI * 2);
        if (v > Math.PI) v -= Math.PI * 2;
        if (v < -Math.PI) v += Math.PI * 2;
        return v;
      };
      state.rotStart = {
        x: norm(dice.rotation.x),
        y: norm(dice.rotation.y),
        z: norm(dice.rotation.z)
      };
    }

    dice.rotation.x = state.rotStart.x + (TX - state.rotStart.x) * ease;
    dice.rotation.y = state.rotStart.y + (TY - state.rotStart.y) * ease;
    dice.rotation.z = state.rotStart.z + (TZ - state.rotStart.z) * ease;
    dice.position.y = -0.5;

    if (p >= 1) {
      dice.rotation.x = TX; dice.rotation.y = TY; dice.rotation.z = TZ;
      state.done = true;
    }
  }
  state.renderer.render(state.scene, state.camera);
}

function showDiceAnim(d1, d2, total) {
  const overlay = document.getElementById('dice3d-overlay');
  const wrap = document.getElementById('dice3d-canvas-wrap');
  if (!overlay || !wrap) return;

  overlay.classList.add('show');
  wrap.innerHTML = '';
  
  const oldBadge = overlay.querySelector('.dt-total-badge');
  if (oldBadge) oldBadge.remove();

  const animStates = [];
  if (d1) {
    const c1 = document.createElement('canvas');
    wrap.appendChild(c1);
    const st = createDiceScene(c1, d1);
    if (st) animStates.push(st);
  }
  if (d2) {
    const c2 = document.createElement('canvas');
    wrap.appendChild(c2);
    const st = createDiceScene(c2, d2);
    if (st) animStates.push(st);
  }

  if (animStates.length === 0) {
    overlay.classList.remove('show');
    return;
  }

  let startTime = performance.now();
  let rafId;
  function loop(now) {
    const elapsed = (now - startTime) / 1000;
    startTime = now;
    let allDone = true;
    animStates.forEach(st => {
      animateDice(st, elapsed);
      if (!st.done) allDone = false;
    });

    if (!allDone) {
      rafId = requestAnimationFrame(loop);
    } else {
      const badge = document.createElement('div');
      badge.className = 'dt-total-badge';
      badge.textContent = `共 ${total} 步`;
      badge.style.marginTop = '24px';
      overlay.appendChild(badge);

      setTimeout(() => {
        overlay.classList.remove('show');
        badge.remove();
        wrap.innerHTML = '';
      }, 1500);
    }
  }
  rafId = requestAnimationFrame(loop);
}

// 遊戲操作邏輯
// ══════════════════════════════

function rollDice() {
  if (!gameState) return;
  const curTurn = gameState.currentTurn;
  const isMyTurn = Number(curTurn) === Number(myTeamId) || String(curTurn) === String(myTeamId) || curTurn == myTeamId;
  if (!isMyTurn || gameState.phase !== 'waiting_roll') return;

  const team = gameState.teams[myTeamId] || gameState.teams[String(myTeamId)];
  if (!team || team.skipTurn) return;
  
  gameState.phase = 'rolled'; 
  
  const d1 = Math.ceil(Math.random() * 6);
  const d2 = team.extraDice ? Math.ceil(Math.random() * 6) : null;
  const total = d1 + (d2 || 0);
  
  const action = { type: 'W8_ROLL', teamId: myTeamId, gameId: gameState.gameId, diceResult: { d1, d2, total }, ts: Date.now() };

  if (myRole === 'student') {
    sendActionToPlatform(action);
    processAction(action);
  } else {
    processAction(action);
  }
}

function movePiece() {
  const gs = gameState;
  const tid = gs.currentTurn;
  const tidStr = String(tid);
  const team = gs.teams[tidStr] || gs.teams[tid];
  if (!team) return;
  
  const steps = gs.diceResult?.total || 1;
  const startPos = Number(team.position || 0);
  const finalPos = (startPos + steps) % TOTAL;

  window._isMoving = true;
  let step = 0;
  
  function moveStep() {
    step++;
    const curPos = (startPos + step) % TOTAL;
    const _t = gameState.teams[tidStr] || gameState.teams[tid];
    if (_t) { _t.position = curPos; gameState.teams[tidStr] = _t; gameState.teams[tid] = _t; }
    
    if (myRole !== 'teacher') {
        updateCameraTarget(curPos);
        _panOffsetX = 0; _panOffsetY = 0; 
        applyTransform();
    }

    broadcast();
    renderPieces();
    
    if (curPos === 0) {
        showToast('🏁 經過起點！+$500');
        showPop('+$500', 'var(--green)');
        if (_t) _t.score = (Number(_t.score) || 0) + 500;
        
        if (myRole === 'teacher') {
            updateTeam(tid, { score: _t.score });
        } else {
            render(); 
        }
        
        if (step < steps) {
            setTimeout(moveStep, 800); 
        } else {
            setTimeout(() => {
                window._isMoving = false;
                if (myRole === 'teacher') triggerEvent(CTYPES[finalPos], finalPos);
            }, 800);
        }
        return;
    }

    if (step < steps) {
      setTimeout(moveStep, 400); 
    } else {
      setTimeout(() => {
        window._isMoving = false;
        if (myRole === 'teacher') {
          triggerEvent(CTYPES[finalPos], finalPos);
        }
      }, 600);
    }
  }
  moveStep();
}

function triggerEvent(type, finalPos) {
  const tid = gameState.currentTurn;
  
  updateState({ phase: 'land_reveal', landType: type, landPos: finalPos });
  
  if (myRole === 'teacher') {
    setTimeout(() => {
      if (gameState.phase !== 'land_reveal') return;
      
      const tidStr = String(tid);
      const _curTeam = gameState.teams[tidStr] || gameState.teams[tid] || {};
      
      if (type === 'start') {
        updateState({ phase: 'done', event: null });
      }
      else if (type === 'q') { updateState({ phase: 'answering', event: null, selectedAnswer: null }); fetchQ(false); }
      else if (type === 'special') { doSpecial(tid); }
      else if (type === 'lucky') doLucky(tid);
      else if (type === 'bad') doBad(tid);
      else updateState({ phase: 'done', event: null });
    }, 2500); 
  }
}

const LUCKY = [
  { title: '幸運之星！', desc: '+3 分！', fx: (tid, gs) => updateTeam(tid, { score: (Number(gs.teams[tid].score) || 0) + 3 }) },
  { title: '順風！', desc: '前進 2 格！', fx: (tid, gs) => { updateTeam(tid, { position: (Number(gs.teams[tid].position) + 2) % TOTAL }); } },
  { title: '全組加分！', desc: '所有組各 +1 分！', fx: (tid, gs) => {
    const t2 = { ...gs.teams }; Object.values(t2).forEach(t => { t2[t.id] = { ...t2[t.id], score: (Number(t2[t.id].score) || 0) + 1 }; }); updateState({ teams: t2 }); } },
  { title: '🎲 獲得第二顆骰子！', desc: '之後每回合擲兩顆！', fx: (tid) => updateTeam(tid, { extraDice: true }) },
  { title: '神秘禮物！', desc: '+2 分！', fx: (tid, gs) => updateTeam(tid, { score: (Number(gs.teams[tid].score) || 0) + 2 }) },
];
const BAD = [
  { title: '倒楣！', desc: '-1 分', fx: (tid, gs) => updateTeam(tid, { score: Math.max(0, (Number(gs.teams[tid].score) || 0) - 1) }) },
  { title: '滑倒！', desc: '退後 2 格', fx: (tid, gs) => { updateTeam(tid, { position: ((Number(gs.teams[tid].position) - 2) + TOTAL) % TOTAL }); } },
  { title: '⏸ 停一回合！', desc: '下回合跳過', fx: (tid) => updateTeam(tid, { skipTurn: true }) },
];

function doLucky(tid) {
  const ev = LUCKY[Math.floor(Math.random() * LUCKY.length)];
  ev.fx(tid, gameState);
  updateState({ phase: 'event', event: { type: 'lucky', title: ev.title, desc: ev.desc } });
  showToast(`🍀 ${ev.title}`); showPop('+', 'var(--green)');
}
function doBad(tid) {
  const ev = BAD[Math.floor(Math.random() * BAD.length)];
  ev.fx(tid, gameState);
  updateState({ phase: 'event', event: { type: 'bad', title: ev.title, desc: ev.desc } });
  showToast(`💀 ${ev.title}`); showPop('-1', 'var(--red)');
}

let cachedQuestions = null;

async function fetchQ(isSpecial) {
  try {
    if (!cachedQuestions) {
      const sheetId = '1omKsEFVvIBbBVcWxdr8H13TRJlgCmkAL_aM9VNmuMYM';
      const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;
      const res = await fetch(url);
      const text = await res.text();
      const jsonStr = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
      const data = JSON.parse(jsonStr);
      
      cachedQuestions = [];
      data.table.rows.forEach(row => {
        if (row.c && row.c.length > 1 && row.c[1] && row.c[1].v) {
          const qText = String(row.c[1].v).trim();
          if (qText !== '題目' && qText !== 'Question') {
            cachedQuestions.push({
              question: qText,
              optionA: (row.c.length > 2 && row.c[2]) ? String(row.c[2].v) : '',
              optionB: (row.c.length > 3 && row.c[3]) ? String(row.c[3].v) : '',
              answer: (row.c.length > 4 && row.c[4]) ? String(row.c[4].v).trim().toUpperCase() : 'A',
              explanation: (row.c.length > 5 && row.c[5]) ? String(row.c[5].v) : ''
            });
          }
        }
      });
    }
    
    if (cachedQuestions && cachedQuestions.length > 0) {
      const q = cachedQuestions[Math.floor(Math.random() * cachedQuestions.length)];
      updateState({ question: q, phase: 'answering', selectedAnswer: null });
      return;
    }
  } catch (e) {
    console.error("讀取 Google 試算表失敗，使用備用題庫", e);
  }
  
  const pool = [
    { question: '「一石二鳥」的意思是？', optionA: '做一件事達成兩個目的', optionB: '用石頭打兩隻鳥', answer: 'A', explanation: '一石二鳥比喻做一件事情，同時達到兩個目的。' },
    { question: '地球上面積最大的海洋是？', optionA: '大西洋', optionB: '太平洋', answer: 'B', explanation: '太平洋是地球上最大的海洋，約佔地球表面積三分之一。' },
    { question: '植物光合作用需要什麼？', optionA: '陽光和二氧化碳', optionB: '陽光和氧氣', answer: 'A', explanation: '植物利用陽光、水和二氧化碳進行光合作用，並釋放氧氣。' },
    { question: '「半途而廢」的意思？', optionA: '做事到一半就放棄', optionB: '做事非常努力', answer: 'A', explanation: '半途而廢形容事情做到一半就放棄，沒有堅持到底。' },
    { question: '台灣最高的山是？', optionA: '雪山', optionB: '玉山', answer: 'B', explanation: '玉山海拔3952公尺，是台灣第一高峰。' }
  ];
  updateState({ question: pool[Math.floor(Math.random() * pool.length)], phase: 'answering', selectedAnswer: null });
}

function publishAnswer() {
  const gs = gameState;
  if (!gs.selectedAnswer) { showToast('請等待學生選擇答案！'); return; }
  const correct = gs.selectedAnswer === gs.question.answer;
  const bonus = 500; 
  if (correct) {
    const curTeam = gs.teams[gs.currentTurn];
    updateTeam(gs.currentTurn, { score: (Number(curTeam.score) || 0) + bonus });
    showPop('+$' + bonus, 'var(--green)');
  }
  updateState({ phase: 'revealing' });
  showToast(correct ? `🎉 答對！+$${bonus}` : '❌ 答錯了！');
}

function nextTurn() {
  const gs = gameState;
  const orderArray = gs.playOrder && gs.playOrder.length > 0 ? gs.playOrder : TEAMS.map(t=>t.id);
  
  const currentIdx = orderArray.findIndex(id => Number(id) === Number(gs.currentTurn));
  let nextIdx = (currentIdx + 1) % orderArray.length;
  let safe = 0;
  
  while (safe < orderArray.length) {
    let nextId = orderArray[nextIdx];
    if (gs.teams[nextId]?.skipTurn) {
      updateTeam(nextId, { skipTurn: false });
      const icon = TEAMS.find(t=>t.id==nextId)?.icon || '';
      showToast(`⏸ ${icon} 停一回合，跳過！`);
      nextIdx = (nextIdx + 1) % orderArray.length;
      safe++;
    } else {
      break;
    }
  }
  const finalNextId = orderArray[nextIdx];
  updateState({ currentTurn: finalNextId, phase: 'waiting_roll', diceResult: null, event: null, question: null, selectedAnswer: null });
}

function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function showPop(text, color) {
  const p = document.createElement('div'); p.className = 'score-pop'; p.textContent = text; p.style.color = color;
  p.style.left = (30 + Math.random() * 40) + 'vw'; p.style.top = '40vh';
  document.body.appendChild(p); setTimeout(() => p.remove(), 1400);
}
