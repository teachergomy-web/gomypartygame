<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>W8 環遊大富翁</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root {
  --font: 'Noto Sans TC', 'Nunito', sans-serif;
  --orange: #FF8C00; --orange2: #E65100;
  --green: #00e676; --green2: #00c853;
  --red: #ff1744; --red2: #d50000;
  --purple: #d500f9;
  --yellow: #ffd600;
  --blue: #00e5ff;
  --sand: #FFE082;
  --bg-dark: #050505;
  --panel-bg: rgba(15, 15, 18, 0.92);

  --outline: #4a3b32;
  
  /* 粉彩色系 */
  --p-purple: #c5a3ff;
  --p-yellow: #ffdf70;
  --p-green:  #81ecec;
  --p-red:    #ff9ff3;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body, button, input, select, textarea { font-family: var(--font); }
body { 
  background: var(--bg-dark); 
  width: 100%; height: 100vh; height: 100dvh;
  overflow: hidden;
  color: #fff;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  -webkit-text-size-adjust: 100%;
  touch-action: manipulation;
}

/* 星空背景特效 */
.stars { 
  position: fixed; inset: 0; pointer-events: none; z-index: 0; 
  background: url('data:image/svg+xml;utf8,<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="1.5" fill="white" opacity="0.3"/><circle cx="150" cy="80" r="2" fill="white" opacity="0.6"/><circle cx="80" cy="150" r="1" fill="white" opacity="0.2"/></svg>') repeat; 
}

/* LOADING */
#loading {
  position: fixed; inset: 0; background: #000;
  display: flex; flex-direction: column; align-items: center; justify-content: center; 
  z-index: 9999; transition: opacity 0.5s;
}
.logo { font-size: 3.5rem; color: #fff; font-weight: 900; margin-bottom: 0.5rem; text-shadow: 0 0 20px var(--blue); }
.sub { color: rgba(255,255,255,0.7); margin-bottom: 1.5rem; }
.spinner { width: 42px; height: 42px; border: 4px solid rgba(255,255,255,0.2); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ══════════════════════════════
   TEACHER VIEW (全螢幕棋盤 + 摺疊側邊欄)
   ══════════════════════════════ */
#teacher-view { 
  display: none; 
  width: 100%; height: 100vh; height: 100dvh; 
  position: fixed; inset: 0;
  overflow: hidden; 
}

.board-container {
  position: absolute; inset: 0; z-index: 10;
  display: flex; align-items: center; justify-content: center;
}

/* 事件面板：自適應寬度，手機上縮小 */
.event-float {
  position: absolute; top: 12px; left: 12px; z-index: 400;
  width: min(300px, calc(100vw - 320px));
  min-width: 200px;
  background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 16px; 
  -webkit-backdrop-filter: blur(15px);
  backdrop-filter: blur(15px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.7);
  display: flex; flex-direction: column; overflow: hidden;
}

/* 摺疊側邊欄 */
.sidebar {
  position: absolute; right: 0; top: 12px; bottom: 12px; 
  width: clamp(200px, 22vw, 260px);
  background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.1);
  border-right: none; border-radius: 16px 0 0 16px;
  transform: translateX(0); transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 500; display: flex; flex-direction: column;
  -webkit-backdrop-filter: blur(15px);
  backdrop-filter: blur(15px); box-shadow: -5px 0 30px rgba(0,0,0,0.8);
}
.sidebar.collapsed { transform: translateX(100%); }

.toggle-btn {
  position: absolute; left: -42px; top: 20px; width: 42px; height: 90px;
  background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.1);
  border-right: none; border-radius: 12px 0 0 12px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; color: white; font-weight: 900; font-size: 0.9rem; gap: 5px;
  backdrop-filter: blur(15px); box-shadow: -5px 0 10px rgba(0,0,0,0.5);
  writing-mode: vertical-lr; letter-spacing: 2px;
}
.toggle-icon { transform: rotate(90deg); font-size: 1.2rem; }

.sidebar-content { padding: 16px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 12px; }
.sidebar-content::-webkit-scrollbar { width: 4px; }
.sidebar-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

.panel {
  background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px; padding: 12px;
}
.panel-title {
  font-size: 0.75rem; font-weight: 900; color: rgba(255,255,255,0.5);
  letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px;
}

.score-row { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 10px; margin-bottom: 4px; transition: background 0.2s; }
.score-row.active { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); }
.sr-order { opacity: 0.5; font-size: 0.75rem; font-weight: 900; min-width: 14px; }
.sr-icon { font-size: 1.4rem; } .sr-name { flex: 1; color: #fff; font-weight: 700; font-size: 0.85rem; }
.sr-pts { font-weight: 900; font-size: 1.1rem; color: var(--yellow); }
.sr-tag { font-size: 0.65rem; font-weight: 700; color: var(--orange); background: rgba(255,140,0,0.2); padding: 2px 6px; border-radius: 6px; }

.event-box {
  background: rgba(0,0,0,0.5); border-radius: 12px; padding: 12px; min-height: 80px;
  margin-bottom: 0px; color: #fff; font-size: 0.88rem; line-height: 1.6; border: 1px solid rgba(255,255,255,0.1);
}
.q-text { font-weight: 900; font-size: 0.95rem; margin-bottom: 10px; color: #fff; }
.opt-btn {
  display: block; width: 100%; padding: 10px 12px; margin-bottom: 6px; border-radius: 10px;
  border: 2px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: #fff;
  cursor: pointer; font-family: var(--font); font-size: 0.85rem; font-weight: 900; text-align: left; transition: all 0.2s;
}
.opt-btn:hover { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.1); }
.opt-btn.selected { border-color: var(--yellow); background: rgba(255, 214, 0, 0.15); box-shadow: 0 0 10px rgba(255,214,0,0.3); }
.opt-btn.correct { border-color: var(--green); background: rgba(0, 230, 118, 0.15); color: var(--green); }
.opt-btn.wrong { border-color: var(--red); background: rgba(255, 23, 68, 0.15); color: var(--red); }

.explain-box {
  background: rgba(255, 214, 0, 0.1); border-left: 3px solid var(--yellow);
  border-radius: 0 8px 8px 0; padding: 10px; font-size: 0.8rem; color: rgba(255,255,255,0.8);
  display: none; margin-bottom: 8px;
}

.btn-pub, .btn-next, .btn-settle {
  width: 100%; padding: 12px; border: none; border-radius: 12px;
  font-family: var(--font); font-weight: 900; font-size: 0.95rem; cursor: pointer;
  transition: all 0.2s; margin-bottom: 6px;
}
.btn-pub { background: linear-gradient(135deg, #d500f9, #aa00ff); color: #fff; display: none; box-shadow: 0 4px 15px rgba(213,0,249,0.3); }
.btn-next { background: linear-gradient(135deg, #00e676, #00c853); color: #000; display: none; box-shadow: 0 4px 15px rgba(0,230,118,0.3); }
.btn-settle { background: linear-gradient(135deg, #FF8C00, #E65100); color: #fff; box-shadow: 0 4px 15px rgba(255,140,0,0.3); }
.btn-pub:active, .btn-next:active, .btn-settle:active { transform: scale(0.96); }

.ldots { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 1rem; color: rgba(255,255,255,0.5); }
.ldots span { width: 8px; height: 8px; background: var(--blue); border-radius: 50%; animation: db 0.7s ease-in-out infinite; }
.ldots span:nth-child(2) { animation-delay: 0.15s; } .ldots span:nth-child(3) { animation-delay: 0.3s; }
@keyframes db { 0%, 100% { transform: translateY(0); box-shadow: 0 0 0 rgba(0,229,255,0); } 50% { transform: translateY(-6px); box-shadow: 0 0 10px rgba(0,229,255,0.8); } }

/* ══════════════════════════════
   STUDENT VIEW - 全螢幕地圖模式
   ══════════════════════════════ */
#student-view { 
  display: none; flex-direction: column; 
  width: 100vw; height: 100vh; height: 100dvh;
  position: fixed; inset: 0;
  z-index: 10; overflow: hidden;
}
/* 分數條：只顯示自己組 */
.s-scores { 
  position: absolute; top: 0; left: 0; right: 0; z-index: 300;
  display: flex; gap: 8px; align-items: center;
  padding: max(6px, env(safe-area-inset-top, 6px)) 14px 6px;
  background: rgba(5,5,8,0.88); 
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  height: calc(40px + env(safe-area-inset-top, 0px));
}
.my-badge {
  background: rgba(0, 229, 255, 0.2); color: var(--blue); font-weight: 900; font-size: 0.85rem;
  padding: 4px 12px; border-radius: 50px; display: flex; align-items: center; gap: 6px;
  border: 1px solid rgba(0,229,255,0.4); white-space: nowrap;
}
.my-score {
  font-weight: 900; font-size: 0.9rem; color: var(--yellow);
  padding: 4px 12px; border-radius: 50px;
  background: rgba(255,214,0,0.12); border: 1px solid rgba(255,214,0,0.3);
  white-space: nowrap;
}
.turn-indicator {
  margin-left: auto;
  font-size: 0.75rem; font-weight: 700; color: rgba(255,255,255,0.5);
  white-space: nowrap;
}

/* 地圖容器：頂部留分數條，底部到底 */
.s-map {
  position: absolute; 
  top: calc(40px + env(safe-area-inset-top, 0px)); 
  left: 0; right: 0; bottom: 0;
  overflow: hidden; touch-action: none; background: transparent;
  pointer-events: none;
}
.s-map-inner { 
  position: absolute; left: 0; top: 0; 
  transition: transform 0.3s ease-out; 
}
.s-map .iso-scene {
  position: absolute; perspective: 2000px; overflow: visible;
}

/* 等待時：透明阻擋層（棋盤仍可見，但無法操作） */
.wait-blocker {
  position: fixed;
  top: calc(40px + env(safe-area-inset-top, 0px));
  left: 0; right: 0; bottom: 0;
  z-index: 400;
  pointer-events: auto; /* 吸收所有點擊 */
  background: transparent;
  cursor: not-allowed;
}

/* ══════════════════════════════
   右下角懸浮 HUD 視窗
   ══════════════════════════════ */
.s-hud {
  position: fixed;
  right: 14px;
  bottom: calc(14px + env(safe-area-inset-bottom, 0px));
  z-index: 1000;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
  pointer-events: auto;
  isolation: isolate;
}

/* HUD 狀態卡片（非輪到自己時的小提示） */
.s-hud-card {
  background: rgba(8, 8, 18, 0.92);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px;
  padding: 10px 16px;
  max-width: 220px;
  min-width: 130px;
  text-align: center;
  font-size: 0.82rem;
  font-weight: 700;
  color: rgba(255,255,255,0.85);
  line-height: 1.5;
  -webkit-backdrop-filter: blur(16px);
  backdrop-filter: blur(16px);
  box-shadow: 0 6px 24px rgba(0,0,0,0.6);
}

/* 擲骰面板：骰子圖示 + GO 按鈕橫排（比照大富翁截圖） */
.s-hud-roll-panel {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(8, 8, 18, 0.92);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 50px;
  padding: 8px 10px 8px 16px;
  -webkit-backdrop-filter: blur(16px);
  backdrop-filter: blur(16px);
  box-shadow: 0 6px 24px rgba(0,0,0,0.7);
}

/* 骰子顯示區 */
.s-hud-dice-area {
  display: flex;
  gap: 6px;
  align-items: center;
}
.s-hud-die {
  width: 42px; height: 42px;
  background: #fff;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem;
  box-shadow: 0 3px 8px rgba(0,0,0,0.5), inset 0 -3px 0 rgba(0,0,0,0.15);
  animation: dieFloat 2s ease-in-out infinite;
}
.s-hud-die:nth-child(2) { animation-delay: 0.4s; }
@keyframes dieFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

/* GO 按鈕 */
.s-hud-go-btn {
  width: 70px; height: 70px; border-radius: 50%; border: none;
  background: radial-gradient(circle at 35% 30%, #ff5252, #c62828);
  box-shadow: 0 6px 0 #7f0000, 0 10px 20px rgba(0,0,0,0.5), inset 0 3px 5px rgba(255,150,150,0.4);
  color: #fff; font-family: var(--font); font-weight: 900; font-size: 1.5rem;
  letter-spacing: 1px;
  cursor: pointer; outline: none;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.08s, box-shadow 0.08s;
  -webkit-transform: translateZ(0); transform: translateZ(0);
  text-shadow: 0 2px 4px rgba(0,0,0,0.4);
}
.s-hud-go-btn:active {
  transform: translateY(5px) translateZ(0);
  box-shadow: 0 1px 0 #7f0000, 0 3px 8px rgba(0,0,0,0.4), inset 0 3px 5px rgba(255,150,150,0.4);
}

/* ══════════════════════════════
   3D 骰子動畫系統（Three.js）
   ══════════════════════════════ */
#dice3d-overlay {
  position: fixed; inset: 0; z-index: 800; pointer-events: none;
  display: none; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.65);
  -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
}
#dice3d-overlay.show { display: flex; }
#dice3d-canvas-wrap {
  display: flex; gap: 32px; align-items: flex-end;
  margin-bottom: 16px;
}
#dice3d-canvas-wrap canvas {
  border-radius: 20px;
  filter: drop-shadow(0 12px 32px rgba(0,0,0,0.9));
}
/* 結果顯示 */
.dt-result {
  position: fixed; inset: 0; z-index: 801; pointer-events: none;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  animation: dtResultIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes dtResultIn {
  from { transform: scale(0.4); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}
.dt-result-dice-row { display: flex; gap: 16px; align-items: center; }
.dt-result-face {
  width: 90px; height: 90px;
  background: linear-gradient(135deg, #fff, #f0f0f0);
  border: 3px solid #bbb; border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: 3.6rem;
  box-shadow: 0 6px 0 #999, 0 12px 24px rgba(0,0,0,0.5);
}
.dt-total-badge {
  background: rgba(0,0,0,0.85); border: 2px solid var(--yellow);
  border-radius: 50px; padding: 12px 36px;
  color: var(--yellow); font-weight: 900; font-size: 1.5rem; letter-spacing: 2px;
  box-shadow: 0 4px 20px rgba(255,214,0,0.35);
}

.wait-msg { color: rgba(255,255,255,0.6); font-size: 0.95rem; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 700; width: 100%; text-align: center; }
.pulse { width: 10px; height: 10px; background: var(--blue); border-radius: 50%; animation: pulse 1.2s ease-in-out infinite; box-shadow: 0 0 8px var(--blue); flex-shrink: 0; }
@keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.6); } }

/* ══════════════════════════════
   ISO BOARD (等距視角 + 完美無死角 3D 立體)
   ══════════════════════════════ */
.iso-scene { 
  perspective: 2000px; display: flex; align-items: center; justify-content: center; 
  width: 100%; height: 100%; overflow: hidden;
}
.iso-board { 
  position: relative; transform-style: preserve-3d; 
  /* transform 由 resizeBoard() 動態設定 */
  transition: transform 0.3s;
}

/* 中央區域底板 */
.board-center {
  position: absolute; left: 120px; top: 120px; width: 480px; height: 480px;
  background: rgba(20, 20, 25, 0.95); border: 2px solid #111;
  transform: translateZ(5px); /* 微微浮起但低於邊緣格子 */
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  box-shadow: inset 0 0 50px rgba(0,0,0,0.8); border-radius: 16px;
}
.center-logo { font-size: 4.5rem; font-weight: 900; color: var(--yellow); text-shadow: 0 5px 15px rgba(0,0,0,0.5); margin-bottom: 10px; }
.center-sub { font-size: 1.6rem; color: var(--blue); font-weight: 900; letter-spacing: 0.6em; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }

/* 基本格子顏色主題 */
.cell.type-q { --c-color: var(--p-yellow); }
.cell.type-lucky { --c-color: var(--p-green); }
.cell.type-bad { --c-color: var(--p-red); }
.cell.type-special { --c-color: var(--p-purple); }
.cell.type-start { --c-color: #ffffff; }

/* 3D 實體格子結構 */
.cell { position: absolute; transform-style: preserve-3d; cursor: default; }

/* 頂面：矩形純色填滿，角落全白 */
.cell-top { 
  position: absolute; inset: 0; border: 3px solid var(--outline);
  transform: translateZ(20px);
  background: var(--c-color); 
  overflow: hidden;
}

.cell.corner .cell-top {
  background: #ffffff;
}

/* 格子內的旋轉內容區 */
.cell-content {
  width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: transparent;
}

.cell .c-icon { 
  font-size: 2rem; 
  line-height: 1; 
  filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2)); 
}
.cell.corner .c-icon {
  font-size: 3.5rem; /* 角落圖示放大 */
}
.cell .c-num {
  font-size: 1.1rem;
  font-weight: 900;
  color: #111;
  margin-top: 4px;
}

/* 針對 Start 格子的特殊排版 */
.cell.type-start .cell-content {
  justify-content: center;
  padding-bottom: 4px;
}
.cell.type-start .c-num {
  font-size: 1.3rem;
  letter-spacing: 1px;
  color: var(--red);
  margin-top: 0;
}
.cell.type-start .start-bonus {
  font-size: 0.9rem;
  font-weight: 900;
  color: #fff;
  background: var(--red);
  padding: 2px 10px;
  border-radius: 10px;
  margin-top: 4px;
}

/* 方塊的厚度面 - 從頂面(Z=20)向下延伸到底面(Z=0) */
/* 高度=20px 剛好等於 translateZ(20px) 的厚度 */
.cell-s {
  position: absolute;
  left: 0; bottom: 0; width: 100%; height: 20px;
  background: #b0b0b0;
  border: 1px solid var(--outline);
  transform-origin: bottom center;
  transform: translateZ(20px) rotateX(90deg);
}
.cell-n {
  position: absolute;
  left: 0; top: 0; width: 100%; height: 20px;
  background: #999;
  border: 1px solid var(--outline);
  transform-origin: top center;
  transform: translateZ(20px) rotateX(-90deg);
}
.cell-e {
  position: absolute;
  right: 0; top: 0; width: 20px; height: 100%;
  background: #aaa;
  border: 1px solid var(--outline);
  transform-origin: right center;
  transform: translateZ(20px) rotateY(-90deg);
}
.cell-w {
  position: absolute;
  left: 0; top: 0; width: 20px; height: 100%;
  background: #c0c0c0;
  border: 1px solid var(--outline);
  transform-origin: left center;
  transform: translateZ(20px) rotateY(90deg);
}
.cell.corner .cell-s { background: #bbb; }
.cell.corner .cell-n { background: #aaa; }
.cell.corner .cell-e { background: #b8b8b8; }
.cell.corner .cell-w { background: #c8c8c8; }

.cell.active .cell-top { animation: cellGlow 0.8s ease-in-out infinite alternate; }
@keyframes cellGlow {
  from { filter: brightness(1); box-shadow: inset 0 0 0px rgba(255,255,255,0.5), 0 0 10px rgba(255,255,255,0.5); }
  to   { filter: brightness(1.15); box-shadow: inset 0 0 15px rgba(255,255,255,0.8), 0 0 25px rgba(255,255,255,0.8); }
}

/* 直立 3D 棋子 */
.piece { 
  position: absolute; width: 0; height: 0; transform-style: preserve-3d; z-index: 100;
  transition: left 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), top 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.piece-shadow {
  position: absolute; width: 34px; height: 34px; background: rgba(0,0,0,0.8);
  border-radius: 50%; transform: translate(-50%, -50%) translateZ(21px); filter: blur(3px);
  animation: shadowPulse 2s infinite ease-in-out;
}
@keyframes shadowPulse {
  0%, 100% { transform: translate(-50%, -50%) translateZ(21px) scale(1); opacity: 0.8; }
  50% { transform: translate(-50%, -50%) translateZ(21px) scale(0.6); opacity: 0.4; }
}

.piece-sprite {
  position: absolute; font-size: 2.8rem;
  /* 抵消棋盤的旋轉，讓棋子永遠正對畫面，並往上提升站在格子上 */
  transform-origin: bottom center;
  animation: floatPiece 2s infinite ease-in-out;
  filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
}
/* 懸浮跳動動畫：在 Z=20px 表面上方浮動 */
@keyframes floatPiece { 
  0%, 100% { transform: translate(-50%, -100%) translateZ(20px) rotateZ(45deg) rotateX(-55deg); } 
  50% { transform: translate(-50%, -100%) translateZ(35px) rotateZ(45deg) rotateX(-55deg); } 
}

.stop-badge {
  position: absolute; top: -10px; right: -20px; background: var(--red); color: #fff;
  font-size: 0.7rem; font-weight: 900; padding: 2px 6px; border-radius: 8px;
  border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.5);
}

/* ══════════════════════════════
   TOAST & EFFECTS
   ══════════════════════════════ */
.toast {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px);
  background: rgba(10, 10, 15, 0.95); color: #fff; padding: 10px 24px; border-radius: 50px;
  font-weight: 900; font-size: 0.95rem; z-index: 9000; opacity: 0; transition: all 0.3s;
  pointer-events: none; backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 10px 30px rgba(0,0,0,0.8);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.score-pop { position: fixed; font-weight: 900; font-size: 2.5rem; pointer-events: none; z-index: 9999; animation: sup 1.5s forwards; text-shadow: 0 4px 10px rgba(0,0,0,0.8); }
@keyframes sup { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-80px) scale(1.4); } }

/* RESULT SCREEN */
#result-screen {
  display: none; position: fixed; inset: 0; background: rgba(5,5,5,0.95);
  z-index: 8000; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(20px);
}
.r-title { font-size: 2.8rem; font-weight: 900; color: var(--yellow); text-shadow: 0 0 30px rgba(255,214,0,0.6); margin-bottom: 2rem; animation: tp 0.6s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes tp { from { transform: scale(0.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.r-list { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 420px; }
.r-item {
  display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.05);
  border-radius: 16px; padding: 14px 20px; backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1); animation: rs 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes rs { from { transform: translateX(-50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.r-rank { font-size: 1.8rem; width: 40px; } .r-icon { font-size: 2rem; }
.r-name { flex: 1; color: #fff; font-weight: 900; font-size: 1.1rem; } .r-score { font-size: 1.6rem; font-weight: 900; color: var(--blue); }
.confetti-wrap { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
.confetti-bit { position: absolute; border-radius: 4px; animation: cf linear forwards; }
@keyframes cf { 0% { transform: translateY(-20px) rotate(0); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
.btn-restart {
  margin-top: 2rem; padding: 14px 40px; background: var(--blue); color: #000; border: none;
  border-radius: 50px; font-family: var(--font); font-weight: 900; font-size: 1.1rem;
  cursor: pointer; transition: transform 0.2s; box-shadow: 0 4px 20px rgba(0,229,255,0.4);
}
.btn-restart:hover { transform: scale(1.05); }

/* ══════════════════════════════
   EVENT PANEL - 左上角浮動
   ══════════════════════════════ */
.event-float {
  position: absolute; top: 12px; left: 12px; z-index: 400;
  width: 300px;
  background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 16px; backdrop-filter: blur(15px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.7);
  display: flex; flex-direction: column; overflow: hidden;
}
.event-float-header {
  background: rgba(255,255,255,0.06); padding: 10px 14px;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.event-float-title { font-size: 0.8rem; font-weight: 900; color: rgba(255,255,255,0.5); letter-spacing: 0.1em; text-transform: uppercase; }
.turn-chip-inline {
  margin-left: auto; background: rgba(255, 214, 0, 0.2); color: var(--yellow); font-weight: 900; font-size: 0.8rem;
  padding: 4px 12px; border-radius: 50px; border: 1px solid rgba(255, 214, 0, 0.5);
}
.event-float-body { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.ev-lucky { background: rgba(0, 230, 118, 0.1) !important; border: 1px solid rgba(0, 230, 118, 0.3) !important; }
.ev-bad { background: rgba(255, 23, 68, 0.1) !important; border: 1px solid rgba(255, 23, 68, 0.3) !important; }
</style>
</head>
<body>

<div class="stars"></div>

<div id="loading">
  <div class="logo">✈️ 環遊大富翁</div>
  <div class="sub">建立世界軌道中...</div>
  <div class="spinner"></div>
</div>

<!-- TEACHER VIEW -->
<div id="teacher-view">
  <!-- 左上角事件面板 -->
  <div class="event-float" id="event-float">
    <div class="event-float-header">
      <span class="event-float-title">📋 事件面板</span>

    <div class="event-float-body">

  <!-- 摺疊側邊欄 -->

<!-- STUDENT VIEW -->
<div id="student-view">
  <!-- 頂部分數條：只顯示自己組別 + 分數 -->
  <div class="s-scores" id="s-scores">
    <div class="my-badge" id="my-badge">🐻 第1組</div>
    <div class="my-score" id="my-score">0 分</div>
    <div class="turn-indicator" id="turn-indicator"></div>
  </div>
  <!-- 全螢幕地圖 -->
  <div class="s-map" id="s-map">
    <div class="s-map-inner" id="s-map-inner">
      <div class="iso-scene" id="s-iso-scene"><div id="s-board" class="iso-board"></div></div>
    </div>
  </div>
  <!-- 等待時透明阻擋層（不可見但攔截點擊） -->
  <div class="wait-blocker" id="s-wait-blocker" style="display:none;"></div>
  <!-- 右下角 HUD 懸浮視窗 -->
  <div class="s-hud" id="s-hud">
    <div class="s-hud-card" id="s-hud-card">⏳ 等待遊戲狀態同步...</div>
  </div>
</div>

<!-- RESULT SCREEN -->
<div id="result-screen">
  <div class="confetti-wrap" id="confetti-wrap"></div>
  <div class="r-title">🏆 遊戲結算！</div>
  <div class="r-list" id="r-list"></div>
  <button class="btn-restart" onclick="location.reload()">🔄 再玩一次</button>
</div>
<!-- 3D 骰子 canvas 遮罩 -->
<div id="dice3d-overlay">
  <div id="dice3d-canvas-wrap"></div>
</div>
<div class="toast" id="toast"></div>

<script>
// 動態組別系統
let TEAMS = [
  {id: 1, name: '第1組', icon: '🐻', color: '#FF8A65'},
  {id: 2, name: '第2組', icon: '🐼', color: '#81C784'},
  {id: 3, name: '第3組', icon: '🦊', color: '#FFB74D'},
  {id: 4, name: '第4組', icon: '🐸', color: '#4FC3F7'},
  {id: 5, name: '第5組', icon: '🐧', color: '#CE93D8'},
];

// 自動向主平台同步頭像與隊伍資料
function syncTeamsFromParent() {
  try {
    if (window.parent && window.parent.state && window.parent.state.players) {
      const parentPlayers = window.parent.state.players;
      if (parentPlayers.length > 0) {
        const colors = ['#FF8A65', '#81C784', '#FFB74D', '#4FC3F7', '#CE93D8', '#FFD54F', '#4DB6AC', '#7986CB'];
        const newTeams = [];
        parentPlayers.forEach((p, i) => {
          const gId = parseInt(String(p.group).replace(/\D/g, '')) || (i + 1);
          if (!newTeams.find(t => t.id === gId)) {
            newTeams.push({ id: gId, name: p.name || `第${gId}組`, icon: p.symbol || p.avatar || '🐻', color: colors[newTeams.length % colors.length] });
          }
        });
        if (newTeams.length > 0) { TEAMS = newTeams; teamCount = TEAMS.length; return; }
      }
    }
  } catch(e) {}
  try {
    const p = new URLSearchParams(location.search);
    const playersRaw = p.get('players');
    if (playersRaw) {
      const colors = ['#FF8A65', '#81C784', '#FFB74D', '#4FC3F7', '#CE93D8', '#FFD54F', '#4DB6AC', '#7986CB'];
      const parsed = JSON.parse(decodeURIComponent(playersRaw));
      const newTeams = [];
      parsed.forEach((pl, i) => {
        const gId = parseInt(String(pl.group).replace(/\D/g, '')) || (i + 1);
        if (!newTeams.find(t => t.id === gId)) {
          newTeams.push({ id: gId, name: pl.name || `第${gId}組`, icon: pl.symbol || '🐻', color: colors[newTeams.length % colors.length] });
        }
      });
      if (newTeams.length > 0) { TEAMS = newTeams; teamCount = TEAMS.length; }
    }
  } catch(e) {}
}

// 補全 TEAMS
function syncTeamsFromState() {
  if (!gameState || !gameState.teams) return;
  const colors = ['#FF8A65','#81C784','#FFB74D','#4FC3F7','#CE93D8','#FFD54F','#4DB6AC','#7986CB'];
  let changed = false;
  Object.values(gameState.teams).forEach((team, i) => {
    if (!TEAMS.find(t => t.id == team.id)) {
      TEAMS.push({ id: team.id, name: `第${team.id}組`, icon: '🐻', color: colors[i % colors.length] });
      changed = true;
    }
  });
  if (changed) teamCount = TEAMS.length;
}

// 從 URL 讀取組別（最可靠，不用 localStorage 避免舊資料干擾）
function syncMyTeamId() {
  try {
    const p = new URLSearchParams(location.search);
    const teamParam = p.get('team');
    if (teamParam) {
      const parsed = parseInt(String(teamParam).replace(/\D/g, ''));
      if (!isNaN(parsed) && parsed > 0) { myTeamId = parsed; return; }
    }
  } catch(e) {}
  // 無 URL 參數時保持現有值（由 PLATFORM_START 設定）
}

const TOTAL = 28;
const C = 120; // 角落格子大小
const M = 80;  // 邊緣格子短邊大小
const BOARD_SIZE = 720; 

const CTYPES = [
  'start','q','lucky','q','bad','q','lucky',
  'special','q','bad','q','lucky','q','bad',
  'special','q','lucky','q','bad','q','lucky',
  'special','q','bad','q','lucky','q','bad'
];
const CICONS = { q:'❓', lucky:'🍀', bad:'💀', special:'⭐' };

function getBoardLayout() {
  const path = [];
  path.push({x: 0, y: C + 6*M, type: 'corner', angle: 90}); 
  for(let i=5; i>=0; i--) path.push({x: 0, y: C + i*M, type: 'left', angle: 90}); 
  path.push({x: 0, y: 0, type: 'corner', angle: -45}); 
  for(let i=0; i<6; i++) path.push({x: C + i*M, y: 0, type: 'top', angle: 180}); 
  path.push({x: C + 6*M, y: 0, type: 'corner', angle: 45}); 
  for(let i=0; i<6; i++) path.push({x: C + 6*M, y: C + i*M, type: 'right', angle: -90}); 
  path.push({x: C + 6*M, y: C + 6*M, type: 'corner', angle: -45}); 
  for(let i=5; i>=0; i--) path.push({x: C + i*M, y: C + 6*M, type: 'bottom', angle: 0}); 
  return path;
}

let myRole = '', myTeamId = 1, teamCount = 4;
let gameState = null, boardPos = [];
let selectedAnswer = null;

let parentDb = null;
try {
  if (window.parent && window.parent.firebase) { parentDb = window.parent.firebase.firestore(); }
  else if (window.parent && window.parent.db) { parentDb = window.parent.db; }
} catch(e) {}

// ====== 強力跨裝置自動同步機制 ======
let _lastStateStr = '';
let _lastActionTs = 0;

function attachSync() {
  syncMyTeamId();

  // localStorage 輪詢（同電腦/同瀏覽器備援）
  const applyState = (raw) => {
    if (!raw || raw === _lastStateStr) return;
    try {
      const parsed = JSON.parse(raw);
      if (!parsed?.teams) return;
      _lastStateStr = raw;
      gameState = parsed;
      if (!boardPos?.length) boardPos = getBoardLayout();
      if (!document.getElementById('sc-0')) buildBoard();
      syncTeamsFromParent(); syncTeamsFromState();
      render(); centerOnMyPiece();
    } catch(e) {}
  };

  const pollNow = () => {
    if (myRole === 'student') applyState(localStorage.getItem('W8_STATE'));
    if (myRole === 'teacher') {
      try {
        const raw = localStorage.getItem('W8_ROLL');
        if (raw) {
          const action = JSON.parse(raw);
          if (action.ts && action.ts !== _lastActionTs) {
            console.log('[W8] pollNow teacher: W8_ROLL found, ts=', action.ts, 'type=', action.type);
            processAction(action);
          }
        }
      } catch(e) {}
    }
  };
  pollNow();
  setInterval(pollNow, 400);
}

function processAction(action) {
  if (!gameState) { console.warn('[W8] processAction: no gameState'); return; }
  if (action.ts === _lastActionTs) { console.log('[W8] processAction: duplicate ts, skip'); return; }
  _lastActionTs = action.ts;

  console.log('[W8] processAction:', action.type, 'myRole=', myRole, 'currentTurn=', gameState.currentTurn, 'teamId=', action.teamId);

  if (action.type === 'W8_MOVE_ROLL') {
    if (Number(action.teamId) !== Number(gameState.currentTurn) &&
        String(action.teamId) !== String(gameState.currentTurn)) {
      console.warn('[W8] processAction: teamId mismatch', action.teamId, '!=', gameState.currentTurn);
      return;
    }
    const d = action.diceResult;
    showDiceAnim(d.d1, d.d2, d.total);
    updateState({ phase: 'rolled', diceResult: d });
    const team = TEAMS.find(t => t.id == action.teamId);
    showToast(`🎲 ${team?.icon || ''} 擲出 ${d.total} 步！`);
    console.log('[W8] processAction: scheduling movePiece in 2200ms, myRole=', myRole);
    // 骰子動畫結束後移動棋子（老師端執行）
    if (myRole === 'teacher') {
      setTimeout(() => {
        console.log('[W8] movePiece trigger, phase=', gameState?.phase);
        if (gameState.phase === 'rolled') movePiece();
      }, 2200);
    }
  }
}

let _launched = false;

function applyPlayers(players) {
  if (!players || players.length === 0) return false;
  const colors = ['#FF8A65','#81C784','#FFB74D','#4FC3F7','#CE93D8','#FFD54F','#4DB6AC','#7986CB'];
  const newTeams = [];
  players.forEach((p, i) => {
    const gId = parseInt(String(p.group || '').replace(/\D/g, '')) || (i + 1);
    if (!newTeams.find(t => t.id === gId)) {
      newTeams.push({ id: gId, name: p.name || `第${gId}組`, icon: p.symbol || p.avatar || '🐻', color: colors[newTeams.length % colors.length] });
    }
  });
  if (newTeams.length > 0) { TEAMS = newTeams; teamCount = TEAMS.length; return true; }
  return false;
}

function updateBadge() {
  const myT = TEAMS.find(t => t.id == myTeamId);
  const badge = document.getElementById('my-badge');
  if (badge) badge.innerHTML = myT ? `${myT.icon} ${myT.name}` : `🐻 第${myTeamId}組`;
}

window.addEventListener('message', e => {
  if (!e.data) return;
  if (e.data.type === 'PLATFORM_START') {
    const { role, teamId, players } = e.data;
    myRole = role || 'student';
    let parsedId = parseInt(String(teamId || '').replace(/\D/g, ''));
    myTeamId = isNaN(parsedId) || parsedId === 0 ? 1 : parsedId;
    syncMyTeamId();

    if (!applyPlayers(players)) syncTeamsFromParent();
    updateBadge();

    if (!_launched) {
      launch();
    } else {
      if (myRole === 'teacher') {
        document.getElementById('teacher-view').style.display = 'block';
        document.getElementById('student-view').style.display = 'none';
        if (!gameState) { gameState = makeInit(); broadcast(); }
        render();
      } else {
        document.getElementById('teacher-view').style.display = 'none';
        document.getElementById('student-view').style.display = 'flex';
        render(); centerOnMyPiece();
      }
    }
  }
  if (e.data.type === 'W8_STATE' && myRole === 'student') {
    const incoming = e.data.state;
    if (!incoming?.teams) return;
    const str = JSON.stringify(incoming);
    if (str === _lastStateStr) return;
    _lastStateStr = str;
    gameState = incoming;
    if (!boardPos?.length) boardPos = getBoardLayout();
    if (!document.getElementById('sc-0')) buildBoard();
    syncTeamsFromParent(); syncTeamsFromState();
    render(); centerOnMyPiece();
  }
  if ((e.data.type === 'W8_ROLL' || e.data.type === 'W8_MOVE_ROLL') && myRole === 'teacher') {
    processAction(e.data);
  }
});
window.addEventListener('storage', e => {
  if (e.key === 'W8_STATE' && myRole === 'student') { gameState = JSON.parse(e.newValue); syncTeamsFromParent(); render(); }
  if (e.key === 'W8_ROLL' && myRole === 'teacher') { processAction(JSON.parse(e.newValue)); }
});

window.addEventListener('load', () => {
  if (window.parent !== window) {
    const btnSettle = document.getElementById('btn-settle');
    if (btnSettle) btnSettle.style.display = 'none';
  }
  
  setTimeout(() => {
    const p = new URLSearchParams(location.search);
    if (p.get('role')) {
      myRole = p.get('role') || 'student';
      myTeamId = parseInt(String(p.get('team')).replace(/\D/g, '')) || 1;
      syncMyTeamId();
      launch();
    } else if (!window.parent || window.parent === window) {
      myRole = 'teacher'; launch();
    } else {
      myRole = 'student';
      syncMyTeamId();
      document.getElementById('loading').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
        syncTeamsFromParent();
        if (!boardPos || boardPos.length === 0) boardPos = getBoardLayout();
        buildBoard();
        document.getElementById('student-view').style.display = 'flex';
        initStudentMap();
        resizeStudentBoard();
        resizeBoard();
        // 嘗試立即讀取 state
        try {
          const raw = localStorage.getItem('W8_STATE');
          if (raw) { gameState = JSON.parse(raw); syncTeamsFromState(); render(); centerOnMyPiece(); }
          else setHud('⏳ 等待遊戲開始...');
        } catch(e) { setHud('⏳ 等待遊戲開始...'); }
        attachSync();
        _launched = true;
      }, 500);
    }
  }, 500);
});

function launch() {
  _launched = true;
  document.getElementById('loading').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('loading').style.display = 'none';
    syncTeamsFromParent();
    boardPos = getBoardLayout();
    buildBoard();
    if (myRole === 'teacher') {
      document.getElementById('teacher-view').style.display = 'block';
      document.getElementById('student-view').style.display = 'none';
      gameState = makeInit();
      render(); broadcast();
    } else {
      document.getElementById('teacher-view').style.display = 'none';
      document.getElementById('student-view').style.display = 'flex';
      updateBadge();
      // 確保棋盤建好
      if (!boardPos || boardPos.length === 0) boardPos = getBoardLayout();
      buildBoard();
      initStudentMap();
      resizeStudentBoard();
      // 讀快取 state
      const tryLoadState = () => {
        try {
          const raw = localStorage.getItem('W8_STATE');
          if (raw) {
            gameState = JSON.parse(raw);
            syncTeamsFromState();
            render();
            centerOnMyPiece();
            return true;
          }
        } catch(e) {}
        return false;
      };
      if (!tryLoadState()) {
        setHud('⏳ 等待遊戲開始...');
        // 每200ms重試，最多10秒
        let retries = 0;
        const retryTimer = setInterval(() => {
          retries++;
          if (tryLoadState() || retries > 50) clearInterval(retryTimer);
        }, 200);
      }
    }
    resizeBoard();
    attachSync();
  }, 500);
}

function buildBoard() {
  ['board', 's-board'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '';
    
    el.style.width = BOARD_SIZE + 'px';
    el.style.height = BOARD_SIZE + 'px';

    const center = document.createElement('div');
    center.className = 'board-center';
    center.innerHTML = `
      <div style="transform: rotateZ(45deg); display: flex; flex-direction: column; align-items: center;">
        <div class="center-logo">✈️ 環遊大富翁</div>
        <div class="center-sub">WORLD TOUR</div>
      </div>
    `;
    el.appendChild(center);

    boardPos.forEach((bp, i) => {
      const type = CTYPES[i] || 'q';
      const cell = document.createElement('div');
      const isStart = i === 0;
      cell.className = `cell type-${type} ${isStart ? 'corner' : bp.type}`;

      const cellW = (bp.type === 'top' || bp.type === 'bottom') ? M : C;
      const cellH = (bp.type === 'left' || bp.type === 'right') ? M : C;
      const finalW = isStart ? C : cellW;
      const finalH = isStart ? C : cellH;

      cell.style.width = finalW + 'px';
      cell.style.height = finalH + 'px';
      cell.id = (id === 'board' ? 'cell-' : 'sc-') + i;
      cell.style.left = bp.x + 'px';
      cell.style.top = bp.y + 'px';

      const contentAngle = isStart ? 0 : bp.angle;

      const contentHtml = i === 0 
        ? `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;height:100%;padding:5px;">
             <svg width="36" height="36" viewBox="0 0 24 24" fill="var(--red)" style="filter:drop-shadow(0 2px 3px rgba(0,0,0,0.35));">
               <path d="M12 2 L20 13 L15.5 13 L15.5 22 L8.5 22 L8.5 13 L4 13 Z"/>
             </svg>
             <span style="font-size:0.9rem;font-weight:900;color:var(--red);letter-spacing:1px;line-height:1.1;">START</span>

           </div>`
        : `<span class="c-icon">${CICONS[type] || '❓'}</span>`;

      cell.innerHTML = `
        <div class="cell-top">
          <div class="cell-content" style="transform: rotate(${contentAngle}deg);">
            ${contentHtml}

        </div>
        <div class="cell-s"></div>
        <div class="cell-n"></div>
        <div class="cell-e"></div>
        <div class="cell-w"></div>`;
      el.appendChild(cell);

}

function makeInit() {
  syncTeamsFromParent();

  const urlP = new URLSearchParams(location.search);
  const urlTeamCount = parseInt(urlP.get('teams')) || 0;
  if (urlTeamCount > TEAMS.length) {
    const colors = ['#FF8A65','#81C784','#FFB74D','#4FC3F7','#CE93D8','#FFD54F','#4DB6AC','#7986CB'];
    const icons = ['🐻','🐼','🦊','🐸','🐧','🦁','🐯','🐨'];
    while (TEAMS.length < urlTeamCount) {
      const n = TEAMS.length + 1;
      TEAMS.push({ id: n, name: `第${n}組`, icon: icons[(n-1) % icons.length], color: colors[(n-1) % colors.length] });
    }
    teamCount = TEAMS.length;
  }

  const teams = {};
  TEAMS.forEach(t => {
    teams[t.id] = { id: t.id, position: 0, score: 0, extraDice: false, skipTurn: false };
  });

  // 依組別號碼由小到大決定順序（第1組先）
  const playOrder = [...TEAMS].sort((a, b) => a.id - b.id).map(t => t.id);
  
  return { 
    teams, 
    playOrder,
    currentTurn: playOrder[0], 
    phase: 'waiting_roll', 
    diceResult: null, 
    event: null, 
    question: null, 
    selectedAnswer: null, 
    teamCount: TEAMS.length 
  };
}

function broadcast() {
  if (myRole !== 'teacher') return;
  const stateStr = JSON.stringify(gameState);
  // postMessage 給同頁面學生 iframe
  try { window.parent.postMessage({ type: 'W8_STATE', state: gameState }, '*'); } catch (e) {}
  // localStorage（同電腦備援）
  try {
    localStorage.setItem('W8_STATE', stateStr);
    window.dispatchEvent(new StorageEvent('storage', { key: 'W8_STATE', newValue: stateStr }));
  } catch (e) {}
}

function updateState(patch) {
  gameState = { ...gameState, ...patch };
  render(); broadcast();
}
function updateTeam(tid, patch) {
  const t = { ...gameState.teams };
  const tidStr = String(tid);
  const base = t[tidStr] || t[tid] || {};
  const updated = { ...base, ...patch };
  t[tidStr] = updated;
  t[tid] = updated; // 同時寫數字key確保相容
  updateState({ teams: t });
}

function renderPieces() {
  if (!gameState) return;
  if (!boardPos || boardPos.length === 0) return;

  // 去重：同一 id 只保留一個 team 物件（避免數字/字串 key 重複）
  const seenIds = new Set();
  const uniqueTeams = Object.values(gameState.teams || {}).filter(team => {
    const key = String(team.id);
    if (seenIds.has(key)) return false;
    seenIds.add(key);
    return true;
  });

  const cellCounts = {};
  uniqueTeams.forEach(team => {
    const pos = Number(team.position || 0) % TOTAL;
    cellCounts[pos] = (cellCounts[pos] || 0) + 1;
  });

  const boardIds = myRole === 'teacher' ? ['board'] : ['s-board'];
  boardIds.forEach(id => {
    const el = document.getElementById(id); if (!el) return;
    el.querySelectorAll('.piece').forEach(p => p.remove());

    const cellIndices = {};
    uniqueTeams.forEach(team => {
      const icons0 = ['🐻','🐼','🦊','🐸','🐧','🦁','🐯','🐨'];
      const t = TEAMS.find(x => x.id == team.id) || { icon: icons0[(Number(team.id)-1)%8]||'🎮', name: `第${team.id}組` };
      const pos = Number(team.position || 0) % TOTAL;
      const bp = boardPos[pos]; if (!bp) return;

      const totalOnCell = cellCounts[pos];
      const idx = cellIndices[pos] || 0;
      cellIndices[pos] = idx + 1;

      const cellW = bp.type === 'top' || bp.type === 'bottom' ? M : C;
      const cellH = bp.type === 'left' || bp.type === 'right' ? M : C;

      let centerX = bp.x + cellW / 2;
      let centerY = bp.y + cellH / 2;

      let ox = 0, oy = 0;
      if (totalOnCell > 1) {
        const angle = (idx / totalOnCell) * Math.PI * 2;
        const radius = 20;
        ox = Math.cos(angle) * radius;
        oy = Math.sin(angle) * radius;
      }

      const piece = document.createElement('div');
      piece.className = 'piece';
      piece.style.left = (centerX + ox) + 'px';
      piece.style.top  = (centerY + oy) + 'px';

      let badgeHtml = team.skipTurn ? `<div class="stop-badge">停</div>` : '';
      piece.innerHTML = `
        <div class="piece-shadow"></div>
        <div class="piece-sprite">${t.icon}${badgeHtml}</div>
      `;
      el.appendChild(piece);
    });

    el.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
    if (gameState.currentTurn) {
      const cur = uniqueTeams.find(t => t.id == gameState.currentTurn);
      if (cur) {
        const cel = document.getElementById((id === 'board' ? 'cell-' : 'sc-') + (Number(cur.position||0) % TOTAL));
        if (cel) cel.classList.add('active');
      }
    }
  });
}

function resizeBoard() {
  const VW = BOARD_SIZE * 1.414;
  const VH = BOARD_SIZE * 1.22;
  const vw = window.visualViewport ? window.visualViewport.width : window.innerWidth;
  const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;

  if (myRole === 'teacher') {
    const sidebar = document.getElementById('t-sidebar');
    const sidebarW = (sidebar && !sidebar.classList.contains('collapsed')) ? Math.min(260, vw * 0.22) : 42;
    const eventW = Math.min(300, Math.max(180, vw - sidebarW - 80));
    const availW = Math.max(150, vw - eventW - 20 - sidebarW - 16);
    const availH = vh - 16;
    const scale = Math.min(availW / VW, availH / VH);
    const board = document.getElementById('board');
    if (board) board.style.transform = `scale(${scale}) rotateX(55deg) rotateZ(-45deg)`;
  } else {
    // 學生端：棋盤填滿畫面寬度
    const topH = 40;
    // 等距視角視覺寬 ≈ BOARD_SIZE * √2，用畫面寬作為基準
    const availW = vw;          // 不扣邊距，讓棋盤填滿
    const availH = vh - topH - 10;
    const scaleW = availW / VW;
    const scaleH = availH / VH;
    const scale = Math.min(scaleW, scaleH);

    const sboard = document.getElementById('s-board');
    if (sboard) sboard.style.transform = `scale(${scale}) rotateX(55deg) rotateZ(-45deg)`;

    // iso-scene 幾何中心對齊 (0,0)
    const scene = document.getElementById('s-iso-scene');
    if (scene) {
      const half = (BOARD_SIZE / 2) * scale;
      scene.style.left = (-half) + 'px';
      scene.style.top  = (-half) + 'px';
      scene.style.width  = (BOARD_SIZE * scale) + 'px';
      scene.style.height = (BOARD_SIZE * scale) + 'px';
    }

    // map-inner 置中：等距旋轉後視覺中心在畫面中央
    // rotateZ(-45deg) 讓棋盤菱形左右對稱，X 方向不需補正
    // rotateX(55deg) 讓棋盤垂直壓縮，Y 方向稍微上移
    const map = document.getElementById('s-map');
    if (map) {
      const rect = map.getBoundingClientRect();
      _mapX = rect.width / 2;
      // 視覺高度 = VH * scale，對齊到 map 上半部
      const visH = VH * scale;
      _mapY = (rect.height - visH) / 2 + visH / 2;
      if (_mapY < 0) _mapY = rect.height / 2;
      applyMapTransform();
    }
  }
}

let _mapX = 0, _mapY = 0;

function initStudentMap() {
  const map = document.getElementById('s-map');
  if (!map || map._dragInit) return;
  map._dragInit = true;

  const VW = BOARD_SIZE * 1.414;
  const VH = BOARD_SIZE * 1.22;
  const vw = window.innerWidth;
  const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  const topH = 40;
  const sScale = Math.min(vw / VW, (vh - topH - 10) / VH);

  const sboard = document.getElementById('s-board');
  if (sboard) sboard.style.transform = `scale(${sScale}) rotateX(55deg) rotateZ(-45deg)`;

  const scene = document.getElementById('s-iso-scene');
  if (scene) {
    const half = (BOARD_SIZE / 2) * sScale;
    scene.style.left   = (-half) + 'px';
    scene.style.top    = (-half) + 'px';
    scene.style.width  = (BOARD_SIZE * sScale) + 'px';
    scene.style.height = (BOARD_SIZE * sScale) + 'px';
  }

  const mapRect = map.getBoundingClientRect();
  _mapX = mapRect.width / 2;
  const visH = VH * sScale;
  _mapY = (mapRect.height - visH) / 2 + visH / 2;
  if (_mapY < 0) _mapY = mapRect.height / 2;
  applyMapTransform();

  // 拖動 mouse
  let _drag = false, _sx = 0, _sy = 0, _bx = 0, _by = 0;
  map.addEventListener('mousedown', e => { _drag=true; _sx=e.clientX; _sy=e.clientY; _bx=_mapX; _by=_mapY; });
  window.addEventListener('mousemove', e => { if(!_drag) return; _mapX=_bx+(e.clientX-_sx); _mapY=_by+(e.clientY-_sy); applyMapTransform(); });
  window.addEventListener('mouseup', () => { _drag=false; });
  // 拖動 touch
  map.addEventListener('touchstart', e => { if(e.touches.length!==1) return; _drag=true; _sx=e.touches[0].clientX; _sy=e.touches[0].clientY; _bx=_mapX; _by=_mapY; }, {passive:true});
  map.addEventListener('touchmove', e => { if(!_drag||e.touches.length!==1) return; e.preventDefault(); _mapX=_bx+(e.touches[0].clientX-_sx); _mapY=_by+(e.touches[0].clientY-_sy); applyMapTransform(); }, {passive:false});
  map.addEventListener('touchend', () => { _drag=false; });
}

function applyMapTransform() {
  const inner = document.getElementById('s-map-inner');
  if (inner) inner.style.transform = `translate(${_mapX}px, ${_mapY}px)`;
}

function centerOnMyPiece() {
  if (!gameState || !boardPos.length) return;
  const myTeam = gameState.teams?.[myTeamId] || gameState.teams?.[String(myTeamId)];
  if (!myTeam) return;
  const pos = myTeam.position % TOTAL;
  const bp = boardPos[pos];
  if (!bp) return;

  const cellW = (bp.type === 'top' || bp.type === 'bottom') ? M : C;
  const cellH = (bp.type === 'left' || bp.type === 'right') ? M : C;
  const pieceLocalX = bp.x + cellW / 2;
  const pieceLocalY = bp.y + cellH / 2;

  const sboard = document.getElementById('s-board');
  if (!sboard) return;
  const scaleMatch = sboard.style.transform.match(/scale\(([^)]+)\)/);
  const sScale = scaleMatch ? parseFloat(scaleMatch[1]) : 1;

  const relX = (pieceLocalX - BOARD_SIZE / 2) * sScale;
  const relY = (pieceLocalY - BOARD_SIZE / 2) * sScale;

  const angle = -45 * Math.PI / 180;
  const cos45 = Math.cos(angle), sin45 = Math.sin(angle);
  const screenX = relX * cos45 - relY * sin45;
  const screenY = (relX * sin45 + relY * cos45) * Math.sin(55 * Math.PI / 180);

  const vvw = window.visualViewport ? window.visualViewport.width : window.innerWidth;
  const vvh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  const headerH = 40;
  const mapH = vvh - headerH;
  const cx = vvw / 2;
  const cy = headerH + mapH / 2;

  _mapX = cx - screenX;
  _mapY = cy - screenY;
  applyMapTransform();
}

function renderStudent() {
  const gs = gameState;

  // 頂部：自己組別 + 分數
  const myT = TEAMS.find(t => t.id == myTeamId);
  const badge = document.getElementById('my-badge');
  if (badge) badge.innerHTML = myT ? `${myT.icon} ${myT.name}` : `🐻 第${myTeamId}組`;

  const myTD = gs?.teams?.[myTeamId] || gs?.teams?.[String(myTeamId)];
  const scoreEl = document.getElementById('my-score');
  if (scoreEl) scoreEl.textContent = `${myTD?.score ?? 0} 分`;

  if (!gs || !gs.teams) {
    setHud('⏳ 等待遊戲狀態同步...');
    return;
  }

  const curTurn = gs.currentTurn;
  const isMyTurn = Number(curTurn) === Number(myTeamId) || String(curTurn) === String(myTeamId) || curTurn == myTeamId;
  const ct = TEAMS.find(t => t.id == gs.currentTurn);

  // 右上角顯示當前回合是誰
  const turnEl = document.getElementById('turn-indicator');
  if (turnEl) {
    turnEl.textContent = isMyTurn ? '⭐ 你的回合' : `${ct?.icon||''} ${ct?.name||''} 的回合`;
    turnEl.style.color = isMyTurn ? 'var(--yellow)' : 'rgba(255,255,255,0.45)';
  }

  // 等待時：透明阻擋層（棋盤仍可見）
  const blocker = document.getElementById('s-wait-blocker');
  if (blocker) blocker.style.display = !isMyTurn ? 'block' : 'none';

  // HUD z-index 在 blocker 之上（讓 HUD 仍可見）
  const hud = document.getElementById('s-hud');
  if (hud) hud.style.zIndex = '1000';

  // ── HUD 內容依 phase 決定 ──
  removeHudRoll();

  if (!isMyTurn) {
    setHud(`<div style="font-size:0.82rem;color:rgba(255,255,255,0.7);">👀 ${ct?.icon||''} ${ct?.name||''}<br>的回合</div>`);

  } else if (gs.phase === 'waiting_roll') {
    if (myTD?.skipTurn) {
      setHud(`<div style="color:var(--red);font-weight:900;font-size:1rem;">⏸ 這回合<br>停止行動！</div>`);
    } else {
      setHud(`<div style="color:var(--yellow);font-weight:900;font-size:0.9rem;">✨ 輪到你們了！</div>`);
      setHudRoll(myTD?.extraDice);
    }

  } else if (gs.phase === 'rolled' || gs.phase === 'event') {
    const d = gs.diceResult;
    if (d) {
      const f = ['⚀','⚁','⚂','⚃','⚄','⚅'];
      setHud(`<div style="font-size:0.78rem;color:rgba(255,255,255,0.6);margin-bottom:4px;">你們擲出了</div>
        <div style="font-size:1.8rem;line-height:1;">${f[(d.d1||1)-1]}${d.d2?f[(d.d2||1)-1]:''}</div>
        <div style="color:var(--yellow);font-weight:900;margin-top:4px;">共 ${d.total} 步</div>`);
    }

  } else if (gs.phase === 'answering') {
    const q = gs.question;
    if (!q) {
      setHud(`<div class="ldots"><span></span><span></span><span></span><span style="margin-left:8px;font-size:0.82rem;">AI 出題中...</span></div>`);
    } else {
      setHud(`<div style="font-size:0.8rem;color:var(--yellow);font-weight:900;margin-bottom:6px;">💬 討論後告訴老師答案！</div>
        <div style="font-size:0.78rem;color:#fff;margin-bottom:6px;">${q.question}</div>
        <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;">
          <div style="padding:4px 10px;background:rgba(0,229,255,0.15);border:1px solid rgba(0,229,255,0.4);border-radius:8px;font-size:0.78rem;color:var(--blue);font-weight:900;">A．${q.optionA}</div>
          <div style="padding:4px 10px;background:rgba(255,23,68,0.15);border:1px solid rgba(255,23,68,0.4);border-radius:8px;font-size:0.78rem;color:var(--red);font-weight:900;">B．${q.optionB}</div>
        </div>`);
    }

  } else if (gs.phase === 'revealing') {
    const q = gs.question; const correct = gs.selectedAnswer === q?.answer;
    setHud(`<div style="font-size:1.8rem;">${correct ? '🎉' : '😢'}</div>
      <div style="font-weight:900;color:${correct ? 'var(--green)' : 'var(--red)'};">${correct ? '答對了！' : '答錯了...'}</div>
      <div style="font-size:0.72rem;color:rgba(255,255,255,0.6);margin-top:4px;">${q?.explanation||''}</div>`);

  } else {
    setHud(`<div class="wait-msg"><div class="pulse"></div><span>等待繼續...</span></div>`);
  }

  centerOnMyPiece();
}

const DICE_EMOJI = ['⚀','⚁','⚂','⚃','⚄','⚅'];

// ══════════════════════════════
// Three.js 3D 骰子系統
// ══════════════════════════════

// 骰子各面旋轉：靜止時讓 finalVal 朝上（+y 面）
// 策略：直接把 finalVal 貼在 +y 面，靜止旋轉全為 0
const DICE_FACE_ROT = {
  1: { x: 0, y: 0 },
  2: { x: 0, y: 0 },
  3: { x: 0, y: 0 },
  4: { x: 0, y: 0 },
  5: { x: 0, y: 0 },
  6: { x: 0, y: 0 },
};

function createDiceScene(canvas, finalVal) {
  if (!window.THREE) return null;
  const W = 200, H = 200;
  canvas.width = W; canvas.height = H;

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(W, H);
  renderer.setClearColor(0x000000, 0);
  renderer.shadowMap.enabled = true;

  const scene = new THREE.Scene();
  // 相機：強俯視角（從上方45度斜看）
  const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
  camera.position.set(0, 5, 3.5);
  camera.lookAt(0, 0, 0);

  // 燈光
  const amb = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(amb);
  const dir = new THREE.DirectionalLight(0xffffff, 1.2);
  dir.position.set(5, 10, 5);
  dir.castShadow = true;
  scene.add(dir);
  const fill = new THREE.DirectionalLight(0x8888ff, 0.3);
  fill.position.set(-5, 2, -3);
  scene.add(fill);

  // 骰子幾何（圓角用 BoxGeometry + 稍微縮小）
  const geo = new THREE.BoxGeometry(2, 2, 2);
  
  // 為每個面建立帶骰點的 canvas 貼圖
  function makeFaceTex(num) {
    const c = document.createElement('canvas');
    c.width = c.height = 256;
    const ctx = c.getContext('2d');
    // 背景
    const r = ctx.createRadialGradient(128,100,10,128,128,180);
    r.addColorStop(0, '#ffffff');
    r.addColorStop(1, '#e8e8e8');
    ctx.fillStyle = r;
    // 圓角矩形
    const rad = 32;
    ctx.beginPath();
    ctx.moveTo(rad, 0);
    ctx.lineTo(256-rad, 0);
    ctx.arcTo(256,0,256,rad,rad);
    ctx.lineTo(256,256-rad);
    ctx.arcTo(256,256,256-rad,256,rad);
    ctx.lineTo(rad,256);
    ctx.arcTo(0,256,0,256-rad,rad);
    ctx.lineTo(0,rad);
    ctx.arcTo(0,0,rad,0,rad);
    ctx.closePath();
    ctx.fill();
    // 點
    ctx.fillStyle = '#1a1a2e';
    const dots = {
      1: [[128,128]],
      2: [[72,72],[184,184]],
      3: [[72,72],[128,128],[184,184]],
      4: [[72,72],[184,72],[72,184],[184,184]],
      5: [[72,72],[184,72],[128,128],[72,184],[184,184]],
      6: [[72,72],[184,72],[72,128],[184,128],[72,184],[184,184]],
    };
    (dots[num]||dots[1]).forEach(([dx,dy]) => {
      ctx.beginPath();
      ctx.arc(dx, dy, 22, 0, Math.PI*2);
      ctx.fill();
    });
    return new THREE.CanvasTexture(c);
  }

  // BoxGeometry 面順序: 0=+x(右), 1=-x(左), 2=+y(上), 3=-y(下), 4=+z(前), 5=-z(後)
  // 直接把 finalVal 貼在上面（index 2），其餘面填其他點數
  const otherVals = [1,2,3,4,5,6].filter(v => v !== finalVal);
  // 對面相加=7：下面貼 7-finalVal
  const bottomVal = 7 - finalVal;
  const sideVals = [1,2,3,4,5,6].filter(v => v !== finalVal && v !== bottomVal);
  // 隨機打亂側面
  sideVals.sort(() => Math.random() - 0.5);

  const faceMats = [
    new THREE.MeshPhongMaterial({ map: makeFaceTex(sideVals[0] || 3) }), // +x 右
    new THREE.MeshPhongMaterial({ map: makeFaceTex(sideVals[1] || 4) }), // -x 左
    new THREE.MeshPhongMaterial({ map: makeFaceTex(finalVal) }),          // +y 上（目標點數）
    new THREE.MeshPhongMaterial({ map: makeFaceTex(bottomVal) }),         // -y 下（對面）
    new THREE.MeshPhongMaterial({ map: makeFaceTex(sideVals[2] || 2) }), // +z 前
    new THREE.MeshPhongMaterial({ map: makeFaceTex(sideVals[3] || 5) }), // -z 後
  ];
  faceMats.forEach(m => { m.shininess = 80; });

  const dice = new THREE.Mesh(geo, faceMats);
  dice.castShadow = true;
  scene.add(dice);

  // 地板（接影子）
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(20,20),
    new THREE.MeshStandardMaterial({ color:0x111111, transparent:true, opacity:0.3 })
  );
  floor.rotation.x = -Math.PI/2;
  floor.position.y = -1.5;
  floor.receiveShadow = true;
  scene.add(floor);

  // 目標旋轉（讓 finalVal 面朝正前方）
  const target = DICE_FACE_ROT[finalVal] || DICE_FACE_ROT[1];

  // 動畫狀態
  const state = {
    phase: 'fall',   // fall → bounce1 → bounce2 → settle
    t: 0,
    vy: 8,           // 初速度（向下）
    y: 6,            // 起始高度
    spinX: (Math.random()-0.5) * 20,
    spinY: (Math.random()-0.5) * 20,
    spinZ: (Math.random()-0.5) * 15,
    done: false,
    renderer, scene, camera, dice
  };
  return state;
}

function animateDice(state, elapsed) {
  if (!state || state.done) return;
  const dt = Math.min(elapsed, 0.05);
  const { dice } = state;

  if (state.phase === 'fall') {
    state.vy += dt * 18;
    state.y -= state.vy * dt;
    dice.position.y = state.y;
    dice.rotation.x += state.spinX * dt;
    dice.rotation.y += state.spinY * dt;
    dice.rotation.z += state.spinZ * dt;
    if (state.y <= -0.8) {
      state.phase = 'bounce1';
      state.y = -0.8;
      state.vy = -state.vy * 0.45;
      state.spinX *= 0.3; state.spinY *= 0.3; state.spinZ *= 0.2;
    }
  } else if (state.phase === 'bounce1') {
    state.vy += dt * 18;
    state.y -= state.vy * dt;
    dice.position.y = state.y;
    dice.rotation.x += state.spinX * dt;
    dice.rotation.y += state.spinY * dt;
    if (state.y <= -0.8) {
      state.phase = 'bounce2';
      state.y = -0.8;
      state.vy = -state.vy * 0.3;
      state.spinX *= 0.15; state.spinY *= 0.15;
    }
  } else if (state.phase === 'bounce2') {
    state.vy += dt * 18;
    state.y -= state.vy * dt;
    dice.position.y = state.y;
    dice.rotation.x += state.spinX * dt;
    dice.rotation.y += state.spinY * dt;
    if (state.y <= -0.8) {
      state.phase = 'settle';
      state.y = -0.8;
      state.t = 0;
    }
  } else if (state.phase === 'settle') {
    state.t += dt * 4;
    // 讓旋轉速度衰減到0，骰子自然停下
    // 上面那面已經是 finalVal，不需要額外旋轉
    state.spinX *= Math.max(0, 1 - dt * 8);
    state.spinY *= Math.max(0, 1 - dt * 8);
    state.spinZ *= Math.max(0, 1 - dt * 8);
    dice.rotation.x += state.spinX * dt;
    dice.rotation.y += state.spinY * dt;
    dice.rotation.z += state.spinZ * dt;
    // 確保最終 X/Z 旋轉回到讓上面朝上的角度（整數倍 PI/2）
    const snapX = Math.round(dice.rotation.x / (Math.PI/2)) * (Math.PI/2);
    const snapZ = Math.round(dice.rotation.z / (Math.PI/2)) * (Math.PI/2);
    dice.rotation.x += (snapX - dice.rotation.x) * dt * 5;
    dice.rotation.z += (snapZ - dice.rotation.z) * dt * 5;
    dice.position.y = -0.8;
    if (state.t > 1.0) {
      dice.rotation.x = snapX;
      dice.rotation.z = snapZ;
      state.done = true;
    }
  }
  state.renderer.render(state.scene, state.camera);
}

// 主動畫函式
function showDiceAnim(d1, d2, total) {
  document.querySelectorAll('.dt-result').forEach(el => el.remove());

  if (!window.THREE) {
    const EMOJI = ['⚀','⚁','⚂','⚃','⚄','⚅'];
    const r = document.createElement('div');
    r.className = 'dt-result';
    r.innerHTML = `<div class="dt-result-dice-row">
      <div class="dt-result-face">${EMOJI[(d1||1)-1]}</div>
      ${d2?`<div style="color:#fff;font-size:1.6rem;font-weight:900;">+</div><div class="dt-result-face">${EMOJI[(d2||1)-1]}</div>`:''}
    </div><div class="dt-total-badge">🎲 ${total} 步</div>`;
    document.body.appendChild(r);
    setTimeout(() => { r.style.transition='opacity 0.4s'; r.style.opacity='0'; setTimeout(()=>r.remove(),400); }, 2500);
    return;
  }

  const overlay = document.getElementById('dice3d-overlay');
  const wrap = document.getElementById('dice3d-canvas-wrap');
  wrap.innerHTML = '';
  overlay.classList.add('show');

  // 建立骰子 canvas
  const diceData = [];
  [d1, d2].filter(Boolean).forEach((val) => {
    const canvas = document.createElement('canvas');
    wrap.appendChild(canvas);
    const state = createDiceScene(canvas, val);
    if (state) {
      diceData.push(state);
    }
  });

  // 步數標籤（一開始隱藏）
  const totalLabel = document.createElement('div');
  totalLabel.style.cssText = `
    position:absolute; bottom: 24px; left:50%; transform:translateX(-50%);
    color:var(--yellow); font-weight:900; font-size:1.6rem; letter-spacing:2px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    opacity:0; transition: opacity 0.4s;
    white-space: nowrap;
  `;
  totalLabel.textContent = `${total} 步`;
  overlay.appendChild(totalLabel);

  let last = performance.now();
  function loop(now) {
    const dt = (now - last) / 1000;
    last = now;
    diceData.forEach(s => animateDice(s, dt));
    const allDone = diceData.every(s => s.done);
    if (!allDone) {
      requestAnimationFrame(loop);
    } else {
      // 全靜止：顯示步數
      totalLabel.style.opacity = '1';
      // 2.2秒後整體淡出
      setTimeout(() => {
        overlay.style.transition = 'opacity 0.4s';
        overlay.style.opacity = '0';
        setTimeout(() => {
          overlay.classList.remove('show');
          overlay.style.opacity = '';
          overlay.style.transition = '';
          overlay.removeChild(totalLabel);
          wrap.innerHTML = '';
          diceData.forEach(s => { try { s.renderer.dispose(); } catch(e){} });
        }, 400);
      }, 2200);
    }
  }
  requestAnimationFrame(loop);
}



// 擲骰（正式移動）：骰子 1-6
function rollDice() {
  if (!gameState) return;
  const isMyTurn = Number(gameState.currentTurn) === Number(myTeamId) || gameState.currentTurn == myTeamId;
  if (!isMyTurn || gameState.phase !== 'waiting_roll') {
    console.warn('[W8] rollDice blocked: isMyTurn=', isMyTurn, 'phase=', gameState?.phase);
    return;
  }
  const team = gameState.teams[myTeamId] || gameState.teams[String(myTeamId)];
  if (!team || team.skipTurn) return;
  const d1 = Math.ceil(Math.random() * 6);
  const d2 = team.extraDice ? Math.ceil(Math.random() * 6) : null;
  const total = d1 + (d2 || 0);
  const action = { type: 'W8_MOVE_ROLL', teamId: myTeamId, diceResult: { d1, d2, total }, ts: Date.now() };
  console.log('[W8] rollDice: myRole=', myRole, 'action=', action);
  showDiceAnim(d1, d2, total);
  setHud(`<div style="font-size:0.78rem;color:rgba(255,255,255,0.6);">骰子已擲出</div>
    <div style="color:var(--yellow);font-weight:900;font-size:1rem;">請看老師畫面...</div>`);
  if (myRole === 'student') {
    try { window.parent.postMessage({ type: 'W8_ROLL', ...action }, '*'); } catch(e) {}
    try { localStorage.setItem('W8_ROLL', JSON.stringify(action)); console.log('[W8] W8_ROLL written to localStorage'); } catch(e) {}
    try { const roomId = window.parent?.state?.roomId; if (parentDb && roomId) parentDb.collection('rooms').doc(roomId).update({ w8Action: action }); } catch(e) {}
  } else {
    // 老師端直接處理（單機測試）
    processAction(action);
  }
}

function movePiece() {
  const gs = gameState;
  const tid = gs.currentTurn;
  const tidStr = String(tid);
  // teams key 在 JSON 序列化後全是字串，優先用字串 key
  const team = gs.teams[tidStr] || gs.teams[tid];
  if (!team) return;
  const steps = gs.diceResult?.total || 1;
  const startPos = team.position;
  const finalPos = (startPos + steps) % TOTAL;

  let step = 0;
  function moveStep() {
    step++;
    const curPos = (startPos + step) % TOTAL;
    // 同時更新數字key和字串key（確保找得到）
    const _t = gameState.teams[tidStr] || gameState.teams[tid];
    if (_t) { _t.position = curPos; gameState.teams[tidStr] = _t; gameState.teams[tid] = _t; }
    renderPieces();
    
    if (myRole === 'student') centerOnMyPiece();

    if (step < steps) {
      setTimeout(moveStep, 180);
    } else {
      setTimeout(() => {
        const t = { ...gameState.teams };
        if (t[tid]) t[tid] = { ...t[tid], position: finalPos };
        if (t[tidStr]) t[tidStr] = { ...t[tidStr], position: finalPos };
        gameState = { ...gameState, teams: t };
        broadcast();
        renderPieces();
        setTimeout(() => triggerEvent(CTYPES[finalPos], finalPos), 200);
      }, 200);
    }
  }
  moveStep();
}

function triggerEvent(type) {
  const tid = gameState.currentTurn;
  const tidStr = String(tid);
  const _curTeam = gameState.teams[tidStr] || gameState.teams[tid] || {};
  if (type === 'start') {
    showToast('🏁 經過起點！+1分');
    updateTeam(tid, { score: (_curTeam.score || 0) + 1 });
    updateState({ phase: 'done', event: null });
  }
  else if (type === 'q') { updateState({ phase: 'answering', event: null }); fetchQ(false); }
  else if (type === 'special') { updateState({ phase: 'answering', event: { specialQ: true } }); fetchQ(true); }
  else if (type === 'lucky') doLucky(tid);
  else if (type === 'bad') doBad(tid);
  else updateState({ phase: 'done', event: null });
}

const LUCKY = [
  { title: '幸運之星！', desc: '+3 分！', fx: (tid, gs) => updateTeam(tid, { score: (gs.teams[tid].score || 0) + 3 }) },
  { title: '順風！', desc: '前進 2 格！', fx: (tid, gs) => { updateTeam(tid, { position: (gs.teams[tid].position + 2) % TOTAL }); } },
  { title: '全組加分！', desc: '所有組各 +1 分！', fx: (tid, gs) => {
    const t2 = { ...gs.teams }; Object.values(t2).forEach(t => { t2[t.id] = { ...t2[t.id], score: (t2[t.id].score || 0) + 1 }; }); updateState({ teams: t2 }); } },
  { title: '🎲 獲得第二顆骰子！', desc: '之後每回合擲兩顆！', fx: (tid) => updateTeam(tid, { extraDice: true }) },
  { title: '神秘禮物！', desc: '+2 分！', fx: (tid, gs) => updateTeam(tid, { score: (gs.teams[tid].score || 0) + 2 }) },
];
const BAD = [
  { title: '倒楣！', desc: '-1 分', fx: (tid, gs) => updateTeam(tid, { score: Math.max(0, (gs.teams[tid].score || 0) - 1) }) },
  { title: '滑倒！', desc: '退後 2 格', fx: (tid, gs) => { updateTeam(tid, { position: ((gs.teams[tid].position - 2) + TOTAL) % TOTAL }); } },
  { title: '⏸ 停一回合！', desc: '下回合跳過', fx: (tid) => updateTeam(tid, { skipTurn: true }) },
];

function doLucky(tid) {
  const ev = LUCKY[Math.floor(Math.random() * LUCKY.length)];
  ev.fx(tid, gameState);
  updateState({ phase: 'event', event: { type: 'lucky', title: ev.title, desc: ev.desc } });
  showToast(`🍀 ${ev.title}`); showPop('+', 'var(--green)');
}
function doBad(tid) {
  const ev = BAD[Math.floor(Math.random() * BAD.length)];
  ev.fx(tid, gameState);
  updateState({ phase: 'event', event: { type: 'bad', title: ev.title, desc: ev.desc } });
  showToast(`💀 ${ev.title}`); showPop('-1', 'var(--red)');
}

async function fetchQ(isSpecial) {
  const subs = ['生活常識、自然科學', '國語（成語、字義、造句）'];
  const sub = subs[Math.floor(Math.random() * subs.length)];
  const diff = isSpecial ? '中難度，適合國小高年級' : '簡單到中等，適合國小混齡';
  const prompt = `你是小學老師，出一題${sub}選擇題。難度：${diff}。JSON格式，不含其他文字：\n{"question":"題目","optionA":"A選項","optionB":"B選項","answer":"A或B","explanation":"解釋1~2句"}`;
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': '', 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-3-5-sonnet-20241022', max_tokens: 400, messages: [{ role: 'user', content: prompt }] })
    });
    if (!resp.ok) throw new Error('api');
    const data = await resp.json();
    const text = data.content?.[0]?.text || '';
    const q = JSON.parse(text.replace(/```[\w]*|```/g, '').trim());
    updateState({ question: q, phase: 'answering' });
  } catch (e) {
    const pool = [
      { question: '「一石二鳥」的意思是？', optionA: '做一件事達成兩個目的', optionB: '用石頭打兩隻鳥', answer: 'A', explanation: '一石二鳥比喻做一件事情，同時達到兩個目的。' },
      { question: '地球上面積最大的海洋是？', optionA: '大西洋', optionB: '太平洋', answer: 'B', explanation: '太平洋是地球上最大的海洋，約佔地球表面積三分之一。' },
      { question: '植物光合作用需要什麼？', optionA: '陽光和二氧化碳', optionB: '陽光和氧氣', answer: 'A', explanation: '植物利用陽光、水和二氧化碳進行光合作用，並釋放氧氣。' },
      { question: '「半途而廢」的意思？', optionA: '做事到一半就放棄', optionB: '做事非常努力', answer: 'A', explanation: '半途而廢形容事情做到一半就放棄，沒有堅持到底。' },
      { question: '台灣最高的山是？', optionA: '雪山', optionB: '玉山', answer: 'B', explanation: '玉山海拔3952公尺，是台灣第一高峰。' }
    ];
    updateState({ question: pool[Math.floor(Math.random() * pool.length)], phase: 'answering' });
  }
}

function selectAnswer(ans) {
  selectedAnswer = ans;
  updateState({ selectedAnswer: ans });
  renderEventPanel();
}

function publishAnswer() {
  const gs = gameState;
  if (!gs.selectedAnswer) { showToast('請先選擇答案！'); return; }
  const correct = gs.selectedAnswer === gs.question.answer;
  const bonus = gs.event?.specialQ ? 4 : 2;
  if (correct) {
    updateTeam(gs.currentTurn, { score: (gs.teams[gs.currentTurn].score || 0) + bonus });
    showPop('+' + bonus, 'var(--green)');
  }
  updateState({ phase: 'revealing' });
  showToast(correct ? `🎉 答對！+${bonus}分` : '❌ 答錯了！');
}

function nextTurn() {
  const gs = gameState;
  const orderArray = gs.playOrder && gs.playOrder.length > 0 ? gs.playOrder : TEAMS.map(t=>t.id);
  
  const currentIdx = orderArray.findIndex(id => Number(id) === Number(gs.currentTurn));
  let nextIdx = (currentIdx + 1) % orderArray.length;
  let safe = 0;
  
  while (safe < orderArray.length) {
    let nextId = orderArray[nextIdx];
    if (gs.teams[nextId]?.skipTurn) {
      updateTeam(nextId, { skipTurn: false });
      const icon = TEAMS.find(t=>t.id==nextId)?.icon || '';
      showToast(`⏸ ${icon} 停一回合，跳過！`);
      nextIdx = (nextIdx + 1) % orderArray.length;
      safe++;
    } else {
      break;
    }
  }
  const finalNextId = orderArray[nextIdx];
  updateState({ currentTurn: finalNextId, phase: 'waiting_roll', diceResult: null, event: null, question: null, selectedAnswer: null });
}

function showResult() {
  const rs = document.getElementById('result-screen'); rs.style.display = 'flex';
  const sorted = Object.values(gameState.teams).sort((a, b) => b.score - a.score);
  const rl = document.getElementById('r-list'); rl.innerHTML = '';
  const medals = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣'];
  sorted.forEach((team, i) => {
    const t = TEAMS.find(x => x.id === team.id);
    const item = document.createElement('div'); item.className = 'r-item';
    item.style.animationDelay = (i * 0.12) + 's';
    item.innerHTML = `<span class=\"r-rank\">${medals[i]}</span><span class=\"r-icon\">${t.icon}</span>
      <span class=\"r-name\">${t.name}</span><span class=\"r-score\">${team.score}分</span>`;
    rl.appendChild(item);
  });
  const wrap = document.getElementById('confetti-wrap');
  const cols = ['#FFD700', '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#CE93D8'];
  for (let i = 0; i < 70; i++) {
    const p = document.createElement('div'); p.className = 'confetti-bit';
    p.style.cssText = `left:${Math.random() * 100}vw; background:${cols[Math.floor(Math.random() * cols.length)]};
      animation-duration:${2 + Math.random() * 3}s; animation-delay:${Math.random() * 2}s;
      width:${6 + Math.random() * 10}px; height:${6 + Math.random() * 10}px`;
    wrap.appendChild(p);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function showPop(text, color) {
  const p = document.createElement('div'); p.className = 'score-pop'; p.textContent = text; p.style.color = color;
  p.style.left = (30 + Math.random() * 40) + 'vw'; p.style.top = '40vh';
  document.body.appendChild(p); setTimeout(() => p.remove(), 1400);
}
</script>
