<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>W8 з’°йҒҠеӨ§еҜҢзҝҒ</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --font: 'Noto Sans TC', 'Nunito', sans-serif;
  --orange: #FF8C00; --orange2: #E65100;
  --green: #00e676; --green2: #00c853;
  --red: #ff1744; --red2: #d50000;
  --purple: #d500f9;
  --yellow: #ffd600;
  --blue: #00e5ff;
  --sand: #FFE082;
  --bg-dark: #050505;
  --panel-bg: rgba(15, 15, 18, 0.92);

  --outline: #4a3b32;
  
  /* зІүеҪ©иүІзі» */
  --p-purple: #c5a3ff;
  --p-yellow: #ffdf70;
  --p-green:  #81ecec;
  --p-red:    #ff9ff3;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body, button, input, select, textarea { font-family: var(--font); }
body { 
  background: var(--bg-dark); 
  width: 100%; height: 100vh; height: 100dvh;
  overflow: hidden;
  color: #fff;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  -webkit-text-size-adjust: 100%;
  touch-action: manipulation;
}

/* жҳҹз©әиғҢжҷҜзү№ж•Ҳ */
.stars { 
  position: fixed; inset: 0; pointer-events: none; z-index: 0; 
  background: url('data:image/svg+xml;utf8,<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="1.5" fill="white" opacity="0.3"/><circle cx="150" cy="80" r="2" fill="white" opacity="0.6"/><circle cx="80" cy="150" r="1" fill="white" opacity="0.2"/></svg>') repeat; 
}

/* LOADING */
#loading {
  position: fixed; inset: 0; background: #000;
  display: flex; flex-direction: column; align-items: center; justify-content: center; 
  z-index: 9999; transition: opacity 0.5s;
}
.logo { font-size: 3.5rem; color: #fff; font-weight: 900; margin-bottom: 0.5rem; text-shadow: 0 0 20px var(--blue); }
.sub { color: rgba(255,255,255,0.7); margin-bottom: 1.5rem; }
.spinner { width: 42px; height: 42px; border: 4px solid rgba(255,255,255,0.2); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   TEACHER VIEW (е…Ёиһўе№•жЈӢзӣӨ + ж‘әз–ҠеҒҙйӮҠж¬„)
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
#teacher-view { 
  display: none; 
  width: 100%; height: 100vh; height: 100dvh; 
  position: fixed; inset: 0;
  overflow: hidden; 
}

.board-container {
  position: absolute; inset: 0; z-index: 10;
  display: flex; align-items: center; justify-content: center;
}

/* дәӢд»¶йқўжқҝпјҡиҮӘйҒ©жҮүеҜ¬еәҰпјҢжүӢж©ҹдёҠзё®е°Ҹ */
.event-float {
  position: absolute; top: 12px; left: 12px; z-index: 400;
  width: min(300px, calc(100vw - 320px));
  min-width: 200px;
  background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 16px; 
  -webkit-backdrop-filter: blur(15px);
  backdrop-filter: blur(15px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.7);
  display: flex; flex-direction: column; overflow: hidden;
}

/* ж‘әз–ҠеҒҙйӮҠж¬„ */
.sidebar {
  position: absolute; right: 0; top: 12px; bottom: 12px; 
  width: clamp(200px, 22vw, 260px);
  background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.1);
  border-right: none; border-radius: 16px 0 0 16px;
  transform: translateX(0); transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 500; display: flex; flex-direction: column;
  -webkit-backdrop-filter: blur(15px);
  backdrop-filter: blur(15px); box-shadow: -5px 0 30px rgba(0,0,0,0.8);
}
.sidebar.collapsed { transform: translateX(100%); }

.toggle-btn {
  position: absolute; left: -42px; top: 20px; width: 42px; height: 90px;
  background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.1);
  border-right: none; border-radius: 12px 0 0 12px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; color: white; font-weight: 900; font-size: 0.9rem; gap: 5px;
  backdrop-filter: blur(15px); box-shadow: -5px 0 10px rgba(0,0,0,0.5);
  writing-mode: vertical-lr; letter-spacing: 2px;
}
.toggle-icon { transform: rotate(90deg); font-size: 1.2rem; }

.sidebar-content { padding: 16px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 12px; }
.sidebar-content::-webkit-scrollbar { width: 4px; }
.sidebar-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

.panel {
  background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px; padding: 12px;
}
.panel-title {
  font-size: 0.75rem; font-weight: 900; color: rgba(255,255,255,0.5);
  letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px;
}

.score-row { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 10px; margin-bottom: 4px; transition: background 0.2s; }
.score-row.active { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); }
.sr-icon { font-size: 1.4rem; } .sr-name { flex: 1; color: #fff; font-weight: 700; font-size: 0.85rem; }
.sr-pts { font-weight: 900; font-size: 1.1rem; color: var(--yellow); }
.sr-tag { font-size: 0.65rem; font-weight: 700; color: var(--orange); background: rgba(255,140,0,0.2); padding: 2px 6px; border-radius: 6px; }

.event-box {
  background: rgba(0,0,0,0.5); border-radius: 12px; padding: 12px; min-height: 80px;
  margin-bottom: 0px; color: #fff; font-size: 0.88rem; line-height: 1.6; border: 1px solid rgba(255,255,255,0.1);
}
.q-text { font-weight: 900; font-size: 0.95rem; margin-bottom: 10px; color: #fff; }
.opt-btn {
  display: block; width: 100%; padding: 10px 12px; margin-bottom: 6px; border-radius: 10px;
  border: 2px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: #fff;
  cursor: pointer; font-family: var(--font); font-size: 0.85rem; font-weight: 900; text-align: left; transition: all 0.2s;
}
.opt-btn:hover { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.1); }
.opt-btn.selected { border-color: var(--yellow); background: rgba(255, 214, 0, 0.15); box-shadow: 0 0 10px rgba(255,214,0,0.3); }
.opt-btn.correct { border-color: var(--green); background: rgba(0, 230, 118, 0.15); color: var(--green); }
.opt-btn.wrong { border-color: var(--red); background: rgba(255, 23, 68, 0.15); color: var(--red); }

.explain-box {
  background: rgba(255, 214, 0, 0.1); border-left: 3px solid var(--yellow);
  border-radius: 0 8px 8px 0; padding: 10px; font-size: 0.8rem; color: rgba(255,255,255,0.8);
  display: none; margin-bottom: 8px;
}

.btn-pub, .btn-next, .btn-settle {
  width: 100%; padding: 12px; border: none; border-radius: 12px;
  font-family: var(--font); font-weight: 900; font-size: 0.95rem; cursor: pointer;
  transition: all 0.2s; margin-bottom: 6px;
}
.btn-pub { background: linear-gradient(135deg, #d500f9, #aa00ff); color: #fff; display: none; box-shadow: 0 4px 15px rgba(213,0,249,0.3); }
.btn-next { background: linear-gradient(135deg, #00e676, #00c853); color: #000; display: none; box-shadow: 0 4px 15px rgba(0,230,118,0.3); }
.btn-settle { background: linear-gradient(135deg, #FF8C00, #E65100); color: #fff; box-shadow: 0 4px 15px rgba(255,140,0,0.3); }
.btn-pub:active, .btn-next:active, .btn-settle:active { transform: scale(0.96); }

.ldots { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 1rem; color: rgba(255,255,255,0.5); }
.ldots span { width: 8px; height: 8px; background: var(--blue); border-radius: 50%; animation: db 0.7s ease-in-out infinite; }
.ldots span:nth-child(2) { animation-delay: 0.15s; } .ldots span:nth-child(3) { animation-delay: 0.3s; }
@keyframes db { 0%, 100% { transform: translateY(0); box-shadow: 0 0 0 rgba(0,229,255,0); } 50% { transform: translateY(-6px); box-shadow: 0 0 10px rgba(0,229,255,0.8); } }

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   STUDENT VIEW - е…Ёиһўе№•ең°ең–жЁЎејҸ
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
#student-view { 
  display: none; flex-direction: column; 
  width: 100vw; height: 100vh; height: 100dvh;
  position: fixed; inset: 0;
  z-index: 10; overflow: hidden;
}
/* еҲҶж•ёжўқпјҡз·ҠиІјй ӮйғЁпјҢеҗ«зө„еҲҘжЁҷиӯҳ */
.s-scores { 
  position: absolute; top: 0; left: 0; right: 0; z-index: 300;
  display: flex; gap: 5px; flex-wrap: nowrap; align-items: center;
  padding: env(safe-area-inset-top, 6px) 10px 5px;
  background: rgba(5,5,8,0.88); 
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.08); overflow-x: auto;
  height: calc(40px + env(safe-area-inset-top, 0px)); flex-shrink: 0;
  padding-top: max(6px, env(safe-area-inset-top, 6px));
}
.my-badge {
  background: rgba(0, 229, 255, 0.2); color: var(--blue); font-weight: 900; font-size: 0.8rem;
  padding: 3px 10px; border-radius: 50px; display: flex; align-items: center; gap: 4px;
  border: 1px solid rgba(0,229,255,0.4); white-space: nowrap; flex-shrink: 0; margin-right: 4px;
}
.score-chip {
  display: flex; align-items: center; gap: 4px; background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1); padding: 3px 9px; border-radius: 50px;
  font-weight: 900; font-size: 0.75rem; color: rgba(255,255,255,0.7); white-space: nowrap; flex-shrink: 0;
}
.score-chip.mine { background: rgba(0, 229, 255, 0.15); border-color: var(--blue); color: var(--blue); }

/* ең°ең–е®№еҷЁ */
.s-map {
  position: absolute; 
  top: calc(40px + env(safe-area-inset-top, 0px)); 
  left: 0; right: 0; 
  bottom: calc(110px + env(safe-area-inset-bottom, 0px));
  overflow: hidden; touch-action: none; background: transparent;
}
.s-map-inner { 
  position: absolute; left: 0; top: 0; 
  transition: transform 0.3s ease-out; /* и®“и·ҹйҡЁжң¬зө„жЈӢеӯҗзҡ„йҒӢйҸЎжӣҙе№іж»‘ */
}
.s-map .iso-scene {
  position: absolute; perspective: 2000px; overflow: visible;
}

/* е…Ёиһўе№•зӯүеҫ…йҒ®зҪ© */
.wait-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.72); 
  -webkit-backdrop-filter: blur(4px);
  backdrop-filter: blur(4px);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
}
.wait-overlay-icon { font-size: 3.5rem; animation: bounce 1.5s ease-in-out infinite; }
.wait-overlay-text {
  color: rgba(255,255,255,0.9); font-weight: 900; font-size: 1.2rem;
  text-shadow: 0 2px 8px rgba(0,0,0,0.8); text-align: center; line-height: 1.5;
}

/* еә•йғЁActionеҚҖ */
.s-action {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 300; 
  height: calc(110px + env(safe-area-inset-bottom, 0px));
  background: rgba(8,8,14,0.94); border-top: 1px solid rgba(255,255,255,0.1);
  padding: 10px 20px; 
  padding-bottom: max(10px, env(safe-area-inset-bottom, 10px));
  text-align: center; 
  -webkit-backdrop-filter: blur(14px);
  backdrop-filter: blur(14px);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}

/* еӯёз”ҹз«Ҝе°Ҳеұ¬ж“ІйӘ°е„ҖиЎЁжқҝ (еҸідёӢи§’) */
.s-roll-dashboard {
  position: absolute; 
  bottom: calc(130px + env(safe-area-inset-bottom, 0px)); 
  right: 20px;
  z-index: 350; 
  display: flex; align-items: center; gap: 12px;
  animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn {
  from { transform: scale(0.3) translateY(50px); opacity: 0; }
  to { transform: scale(1) translateY(0); opacity: 1; }
}

.dice-preview-box {
  display: flex; gap: 8px; background: rgba(0,0,0,0.65); padding: 10px 16px;
  border-radius: 30px; border: 2px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(10px); box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}
.dice-mini { 
  font-size: 2.2rem; line-height: 1; 
  filter: drop-shadow(0 2px 5px rgba(0,0,0,0.6)); 
  animation: floatMini 2s infinite ease-in-out; 
}
.dice-mini:nth-child(2) { animation-delay: 0.3s; }
@keyframes floatMini {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}

/* з«Ӣй«”ең“еҪўжҢүйҲ• */
.btn-round-roll {
  width: 85px; height: 85px; border-radius: 50%; border: none;
  background: radial-gradient(circle at 30% 30%, #ffeb3b, #fbc02d);
  box-shadow: 0 8px 0 #c89000, 0 15px 25px rgba(0,0,0,0.6), inset 0 4px 5px rgba(255,255,255,0.6);
  color: #b71c1c; font-family: var(--font); font-weight: 900; font-size: 1.5rem; 
  text-shadow: 0 2px 2px rgba(255,255,255,0.4);
  cursor: pointer; outline: none; transition: transform 0.1s, box-shadow 0.1s;
  display: flex; align-items: center; justify-content: center;
}
.btn-round-roll:active {
  transform: translateY(8px);
  box-shadow: 0 0px 0 #c89000, 0 5px 10px rgba(0,0,0,0.6), inset 0 4px 5px rgba(255,255,255,0.6);
}


/* жЈӢзӣӨдёӯеҝғж“ІйӘ°еӢ•з•« */
.dice-anim-overlay {
  position: absolute; inset: 0; z-index: 400; pointer-events: none;
  display: flex; align-items: center; justify-content: center;
}
.dice-anim-box {
  background: rgba(5,5,10,0.88); border: 2px solid rgba(255,255,255,0.2);
  border-radius: 24px; padding: 24px 36px; text-align: center;
  backdrop-filter: blur(16px); box-shadow: 0 8px 40px rgba(0,0,0,0.8);
  animation: dicePopIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes dicePopIn { from { transform: scale(0.3); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.wait-msg { color: rgba(255,255,255,0.6); font-size: 0.95rem; display: flex; align-items: center; gap: 8px; font-weight: 700; }
.pulse { width: 10px; height: 10px; background: var(--blue); border-radius: 50%; animation: pulse 1.2s ease-in-out infinite; box-shadow: 0 0 8px var(--blue); }
@keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.6); } }

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   3D йӘ°еӯҗж—ӢиҪүиҲҮжӢӢиҗҪеӢ•з•«
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.dice-container {
  position: relative; width: 80px; height: 80px;
}
.dice-shadow {
  position: absolute; bottom: -15px; left: 10%; width: 80%; height: 15px;
  background: rgba(0,0,0,0.6); border-radius: 50%; filter: blur(4px);
  animation: diceShadow 1.2s both;
}
@keyframes diceShadow {
  0%   { transform: scale(0.2); opacity: 0; }
  20%  { transform: scale(0.4); opacity: 0.2; animation-timing-function: ease-in; }
  45%  { transform: scale(1); opacity: 0.8; animation-timing-function: ease-out; }
  65%  { transform: scale(0.6); opacity: 0.4; animation-timing-function: ease-in; }
  80%  { transform: scale(1); opacity: 0.8; animation-timing-function: ease-out; }
  90%  { transform: scale(0.8); opacity: 0.6; animation-timing-function: ease-in; }
  100% { transform: scale(1); opacity: 0.8; }
}

.dice3d-wrap {
  perspective: 600px; width: 100%; height: 100%; position: absolute; inset: 0;
  animation: diceThrow 1.2s both;
}
@keyframes diceThrow {
  0%   { transform: translateY(80px) scale(0.5); opacity: 0; }
  20%  { transform: translateY(-100px) scale(1.2); opacity: 1; animation-timing-function: ease-in; }
  45%  { transform: translateY(0px) scale(1); animation-timing-function: ease-out; }
  65%  { transform: translateY(-30px) scale(1); animation-timing-function: ease-in; }
  80%  { transform: translateY(0px) scale(1); animation-timing-function: ease-out; }
  90%  { transform: translateY(-10px) scale(1); animation-timing-function: ease-in; }
  100% { transform: translateY(0px) scale(1); opacity: 1; }
}

.dice3d {
  width: 100%; height: 100%; position: relative; transform-style: preserve-3d;
  animation: diceRoll 1.2s cubic-bezier(0.1, 0.9, 0.2, 1) both;
}
@keyframes diceRoll {
  0%   { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
  20%  { transform: rotateX(360deg) rotateY(180deg) rotateZ(90deg); }
  45%  { transform: rotateX(720deg) rotateY(540deg) rotateZ(180deg); } /* иҗҪең°1 */
  65%  { transform: rotateX(900deg) rotateY(720deg) rotateZ(270deg); } /* еҪҲиө· */
  80%  { transform: rotateX(calc(1080deg + var(--rx,0deg))) rotateY(calc(1080deg + var(--ry,0deg))) rotateZ(0deg); } /* иҗҪең°2 */
  100% { transform: rotateX(calc(1080deg + var(--rx,0deg))) rotateY(calc(1080deg + var(--ry,0deg))) rotateZ(0deg); }
}

.dice3d .face {
  position: absolute; width: 80px; height: 80px;
  background: #fff; border: 2px solid #ddd; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 2.2rem; box-shadow: inset 0 0 8px rgba(0,0,0,0.1);
  color: #000;
}
.dice3d .face.front  { transform: translateZ(40px); }
.dice3d .face.back   { transform: rotateY(180deg) translateZ(40px); }
.dice3d .face.right  { transform: rotateY(90deg)  translateZ(40px); }
.dice3d .face.left   { transform: rotateY(-90deg) translateZ(40px); }
.dice3d .face.top    { transform: rotateX(90deg)  translateZ(40px); }
.dice3d .face.bottom { transform: rotateX(-90deg) translateZ(40px); }

.dice-face {
  width: 70px; height: 70px; background: #fff; border-radius: 16px; color: #000;
  box-shadow: inset 0 -4px 0 rgba(0,0,0,0.1), 0 5px 15px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
  font-size: 2.8rem; animation: diceIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes diceIn { from { transform: scale(0.2) rotate(-60deg); opacity: 0; } to { transform: scale(1) rotate(0); opacity: 1; } }

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   ISO BOARD (зӯүи·қиҰ–и§’ + е®ҢзҫҺз„Ўжӯ»и§’ 3D з«Ӣй«”)
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */

  width: 100%; height: 100%; overflow: hidden;
}
.iso-board { 
  position: relative; transform-style: preserve-3d;

/* дёӯеӨ®еҚҖеҹҹеә•жқҝ */
.board-center {

/* еҹәжң¬ж јеӯҗйЎҸиүІдё»йЎҢ */
.cell.type-q { --c-color: var(--p-yellow); }

/* 3D еҜҰй«”ж јеӯҗзөҗж§Ӣ */

/* й Ӯйқўпјҡзҹ©еҪўзҙ”иүІеЎ«ж»ҝпјҢи§’иҗҪе…ЁзҷҪ */
.cell-top {

}

/* ж јеӯҗе…§зҡ„ж—ӢиҪүе…§е®№еҚҖ */

/* ж–№еЎҠзҡ„еҺҡеәҰйқў - еҫһй Ӯйқў(Z=20)еҗ‘дёӢе»¶дјёеҲ°еә•йқў(Z=0) */
/* й«ҳеәҰ=20px еүӣеҘҪзӯүж–ј translateZ(20px) зҡ„еҺҡеәҰ */
.cell-s {
  position: absolute;

  background: #b0b0b0;

  transform-origin: bottom center;

}

  position: absolute;
  left: 0; top: 0; width: 100%; height: 20px;
  background: #999;
  border: 1px solid var(--outline);
  transform-origin: top center;
  transform: translateZ(20px) rotateX(-90deg);
}

  position: absolute;
  right: 0; top: 0; width: 20px; height: 100%;
  background: #aaa;
  border: 1px solid var(--outline);
  transform-origin: right center;
  transform: translateZ(20px) rotateY(-90deg);

.cell-w {

  to   { filter: brightness(1.15); box-shadow: inset 0 0 15px rgba(255,255,255,0.8), 0 0 25px rgba(255,255,255,0.8); }
}

/* зӣҙз«Ӣ 3D жЈӢеӯҗ */
.piece { 
  position: absolute; width: 0; height: 0; transform-style: preserve-3d; z-index: 100;
  transition: left 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), top 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.piece-shadow {
  position: absolute; width: 34px; height: 34px; background: rgba(0,0,0,0.8);
  border-radius: 50%; transform: translate(-50%, -50%) translateZ(21px); filter: blur(3px);
  animation: shadowPulse 2s infinite ease-in-out;
}
@keyframes shadowPulse {
  0%, 100% { transform: translate(-50%, -50%) translateZ(21px) scale(1); opacity: 0.8; }
  50% { transform: translate(-50%, -50%) translateZ(21px) scale(0.6); opacity: 0.4; }
}

.piece-sprite {
  position: absolute; font-size: 2.8rem;
  /* жҠөж¶ҲжЈӢзӣӨзҡ„ж—ӢиҪүпјҢи®“жЈӢеӯҗж°ёйҒ жӯЈе°Қз•«йқўпјҢдёҰеҫҖдёҠжҸҗеҚҮз«ҷеңЁж јеӯҗдёҠ */
  transform-origin: bottom center;
  animation: floatPiece 2s infinite ease-in-out;
  filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));

/* жҮёжө®и·іеӢ•еӢ•з•«пјҡеңЁ Z=20px иЎЁйқўдёҠж–№жө®еӢ• */
@keyframes floatPiece { 
  0%, 100% { transform: translate(-50%, -100%) translateZ(20px) rotateZ(45deg) rotateX(-55deg); } 
  50% { transform: translate(-50%, -100%) translateZ(35px) rotateZ(45deg) rotateX(-55deg); } 
}

.stop-badge {

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ

   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */

   EVENT PANEL - е·ҰдёҠи§’жө®еӢ•

<script>
// еӢ•ж…Ӣзө„еҲҘзі»зөұпјҡе°ҮжңғиҮӘеӢ•жҠ“еҸ–дё»е№іеҸ° index.html е…§еӯёз”ҹйҒёеҘҪзҡ„з¬Ұиҷҹ(й ӯеғҸ)
let TEAMS = [
  {id: 1, name: 'з¬¬1зө„', icon: 'рҹҗ»', color: '#FF8A65'},
  {id: 2, name: 'з¬¬2зө„', icon: 'рҹҗј', color: '#81C784'},
  {id: 3, name: 'з¬¬3зө„', icon: 'рҹҰҠ', color: '#FFB74D'},
  {id: 4, name: 'з¬¬4зө„', icon: 'рҹҗё', color: '#4FC3F7'},
  {id: 5, name: 'з¬¬5зө„', icon: 'рҹҗ§', color: '#CE93D8'},
];

// иҮӘеӢ•еҗ‘дё»е№іеҸ°еҗҢжӯҘй ӯеғҸиҲҮйҡҠдјҚиіҮж–ҷ
function syncTeamsFromParent() {
  try {
    if (window.parent && window.parent.state && window.parent.state.players) {
      const parentPlayers = window.parent.state.players;
      if (parentPlayers.length > 0) {
        const colors = ['#FF8A65', '#81C784', '#FFB74D', '#4FC3F7', '#CE93D8', '#FFD54F', '#4DB6AC', '#7986CB'];
        const newTeams = [];
        parentPlayers.forEach((p, i) => {
          const gId = parseInt(String(p.group).replace(/\D/g, '')) || (i + 1);
          if (!newTeams.find(t => t.id === gId)) {
            newTeams.push({ id: gId, name: p.name || `з¬¬${gId}зө„`, icon: p.symbol || p.avatar || 'рҹҗ»', color: colors[newTeams.length % colors.length] });
          }
        });
        if (newTeams.length > 0) { TEAMS = newTeams; teamCount = TEAMS.length; return; }
      }
    }
  } catch(e) {}
  try {
    const p = new URLSearchParams(location.search);
    const playersRaw = p.get('players');
    if (playersRaw) {
      const colors = ['#FF8A65', '#81C784', '#FFB74D', '#4FC3F7', '#CE93D8', '#FFD54F', '#4DB6AC', '#7986CB'];
      const parsed = JSON.parse(decodeURIComponent(playersRaw));
      const newTeams = [];
      parsed.forEach((pl, i) => {
        const gId = parseInt(String(pl.group).replace(/\D/g, '')) || (i + 1);
        if (!newTeams.find(t => t.id === gId)) {
          newTeams.push({ id: gId, name: pl.name || `з¬¬${gId}зө„`, icon: pl.symbol || 'рҹҗ»', color: colors[newTeams.length % colors.length] });
        }
      });
      if (newTeams.length > 0) { TEAMS = newTeams; teamCount = TEAMS.length; }
    }
  } catch(e) {}
}

// еҫһ gameState иЈңе…Ё TEAMSпјҲзўәдҝқжҜҸеҖӢ team.id жңүе°ҚжҮүй …зӣ®пјү
function syncTeamsFromState() {
  if (!gameState || !gameState.teams) return;
  const colors = ['#FF8A65','#81C784','#FFB74D','#4FC3F7','#CE93D8','#FFD54F','#4DB6AC','#7986CB'];
  let changed = false;
  Object.values(gameState.teams).forEach((team, i) => {
    if (!TEAMS.find(t => t.id == team.id)) {
      TEAMS.push({ id: team.id, name: `з¬¬${team.id}зө„`, icon: 'рҹҗ»', color: colors[i % colors.length] });
      changed = true;
    }
  });
  if (changed) teamCount = TEAMS.length;
}

const TOTAL = 28;
const C = 120; // и§’иҗҪж јеӯҗеӨ§е°Ҹ
const M = 80;  // йӮҠз·Јж јеӯҗзҹӯйӮҠеӨ§е°Ҹ
const BOARD_SIZE = 720; 

const CTYPES = [
  'start','q','lucky','q','bad','q','lucky',
  'special','q','bad','q','lucky','q','bad',
  'special','q','lucky','q','bad','q','lucky',
  'special','q','bad','q','lucky','q','bad'
];
const CICONS = { q:'вқ“', lucky:'рҹҚҖ', bad:'рҹ’Җ', special:'вӯҗ' };

function getBoardLayout() {
  const path = [];
  // е·ҰдёӢй–Ӣе§Ӣж јпјҢеҗ‘еҸіеүҚйҖІ
  path.push({x: 0, y: C + 6*M, type: 'corner', angle: 90}); 
  for(let i=5; i>=0; i--) path.push({x: 0, y: C + i*M, type: 'left', angle: 90}); 
  path.push({x: 0, y: 0, type: 'corner', angle: -45}); 
  for(let i=0; i<6; i++) path.push({x: C + i*M, y: 0, type: 'top', angle: 180}); 
  path.push({x: C + 6*M, y: 0, type: 'corner', angle: 45}); 
  for(let i=0; i<6; i++) path.push({x: C + 6*M, y: C + i*M, type: 'right', angle: -90}); 
  path.push({x: C + 6*M, y: C + 6*M, type: 'corner', angle: -45}); 
  for(let i=5; i>=0; i--) path.push({x: C + i*M, y: C + 6*M, type: 'bottom', angle: 0}); 
  return path;
}

let myRole = '', myTeamId = 1, teamCount = 4;
let gameState = null, boardPos = [];
let selectedAnswer = null;

// еҸ–еҫ—дё»е№іеҸ°иіҮж–ҷеә«жҚ·еҫ‘ (еҰӮжһңжңүзҡ„и©ұ)
let parentDb = null;
try {
  if (window.parent && window.parent.firebase) {
    parentDb = window.parent.firebase.firestore();
  } else if (window.parent && window.parent.db) {
    parentDb = window.parent.db;
  }
} catch(e) {}

// ====== еј·еҠӣи·ЁиЈқзҪ®иҮӘеӢ•еҗҢжӯҘж©ҹеҲ¶ ======
let _lastStateStr = '';
let _lastActionTs = 0;

function attachSync() {
  // еҳ—и©ҰдҪҝз”Ё Firebase еҚіжҷӮзӣЈиҒҪ
  try {
    const roomId = window.parent && window.parent.state ? window.parent.state.roomId : null;
    if (parentDb && roomId) {
      parentDb.collection('rooms').doc(roomId).onSnapshot(doc => {
        const data = doc.data();
        if (data && data.w8State && myRole === 'student') {
          const stateStr = JSON.stringify(data.w8State);
          if (stateStr !== _lastStateStr) {
            _lastStateStr = stateStr;
            gameState = data.w8State;
            syncTeamsFromParent(); syncTeamsFromState();
            render(); centerOnMyPiece();
          }
        }
        if (data && data.w8Action && myRole === 'teacher') {
          processAction(data.w8Action);
        }
      });
      return; 
    }
  } catch(e) {}

  // з«ӢеҚіијӘи©ўдёҖж¬Ў
  const pollNow = () => {
    try {
      if (myRole === 'student') {
        const raw = localStorage.getItem('W8_STATE');
        if (raw && raw !== _lastStateStr) {
          _lastStateStr = raw;
          gameState = JSON.parse(raw);
          syncTeamsFromParent(); syncTeamsFromState();
          render(); centerOnMyPiece();
        }
      }
      if (myRole === 'teacher') {
        const raw = localStorage.getItem('W8_ROLL');
        if (raw) {
          const action = JSON.parse(raw);
          if (action.ts && action.ts !== _lastActionTs) processAction(action);
        }
      }
    } catch(e) {}
  };
  pollNow(); // з«ӢеҚіеҹ·иЎҢдёҖж¬Ў
  setInterval(pollNow, 500); // зё®зҹӯеҲ°500ms
}

function processAction(action) {
  if (!gameState) return;
  // еҜ¬й¬ҶжҜ”ијғйҒҝе…ҚеһӢж…ӢдёҚз¬Ұ
  if (action.ts === _lastActionTs) return;
  if (Number(action.teamId) !== Number(gameState.currentTurn)) return;
  _lastActionTs = action.ts;
  const d = action.diceResult;
  showDiceAnim(d.d1, d.d2, d.total, 't');
  updateState({ phase: 'rolled', diceResult: d });
  const team = TEAMS.find(t => t.id == action.teamId);
  showToast(`рҹҺІ ${team?.icon || ''} ж“ІеҮә ${d.total} жӯҘпјҒ`);
}

let _launched = false;

// players йҷЈеҲ— вҶ’ TEAMS ж јејҸ
function applyPlayers(players) {
  if (!players || players.length === 0) return false;
  const colors = ['#FF8A65','#81C784','#FFB74D','#4FC3F7','#CE93D8','#FFD54F','#4DB6AC','#7986CB'];
  const newTeams = [];
  players.forEach((p, i) => {
    const gId = parseInt(String(p.group || '').replace(/\D/g, '')) || (i + 1);
    if (!newTeams.find(t => t.id === gId)) {
      newTeams.push({ id: gId, name: p.name || `з¬¬${gId}зө„`, icon: p.symbol || p.avatar || 'рҹҗ»', color: colors[newTeams.length % colors.length] });
    }
  });
  if (newTeams.length > 0) { TEAMS = newTeams; teamCount = TEAMS.length; return true; }
  return false;
}

function updateBadge() {
  const myT = TEAMS.find(t => t.id == myTeamId);
  const badge = document.getElementById('my-badge');
  if (badge) badge.innerHTML = myT ? `${myT.icon} ${myT.name}` : `рҹҗ» з¬¬${myTeamId}зө„`;
}

window.addEventListener('message', e => {
  if (!e.data) return;
  if (e.data.type === 'PLATFORM_START') {
    const { role, teamId, players } = e.data;
    myRole = role || 'student';
    let parsedId = parseInt(String(teamId || '').replace(/\D/g, ''));
    myTeamId = isNaN(parsedId) || parsedId === 0 ? 1 : parsedId;

    // players жңүеӮіе°ұз”ЁпјҢеҗҰеүҮеҳ—и©Ұи·Ё origin и®Җ
    if (!applyPlayers(players)) syncTeamsFromParent();
    updateBadge();

    if (!_launched) {
      launch();
    } else {
      const ov = document.getElementById('s-wait-overlay');
      if (ov) ov.style.display = 'none';
      if (myRole === 'teacher') {
        document.getElementById('teacher-view').style.display = 'block';
        document.getElementById('student-view').style.display = 'none';
        if (!gameState) { gameState = makeInit(); broadcast(); }
        render();
      } else {
        document.getElementById('teacher-view').style.display = 'none';
        document.getElementById('student-view').style.display = 'flex';
        render(); centerOnMyPiece();
      }
    }
  }
  if (e.data.type === 'W8_STATE' && myRole === 'student') {
    gameState = e.data.state; syncTeamsFromParent(); syncTeamsFromState(); render();
  }
  if (e.data.type === 'W8_ROLL' && myRole === 'teacher') {
    processAction(e.data);
  }
});
window.addEventListener('storage', e => {
  if (e.key === 'W8_STATE' && myRole === 'student') { gameState = JSON.parse(e.newValue); syncTeamsFromParent(); render(); }
  if (e.key === 'W8_ROLL' && myRole === 'teacher') { processAction(JSON.parse(e.newValue)); }
});

window.addEventListener('load', () => {
  if (window.parent !== window) {
    const btnSettle = document.getElementById('btn-settle');
    if (btnSettle) btnSettle.style.display = 'none';
  }
  
  setTimeout(() => {
    const p = new URLSearchParams(location.search);
    if (p.get('role')) {
      myRole = p.get('role') || 'student';
      myTeamId = parseInt(String(p.get('team')).replace(/\D/g, '')) || 1;
      launch();
    } else if (!window.parent || window.parent === window) {
      myRole = 'teacher'; launch();
    } else {
      // еңЁ iframe е…§пјҡе…Ҳд»Ҙ student йЎҜзӨәжЈӢзӣӨпјҢзӯү PLATFORM_START
      myRole = 'student';
      document.getElementById('loading').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
        syncTeamsFromParent();
        boardPos = getBoardLayout();
        buildBoard();
        document.getElementById('student-view').style.display = 'flex';
        document.getElementById('s-action').innerHTML =
          `<div class="wait-msg"><div class="pulse"></div><span>зӯүеҫ…йҒҠжҲІй–Ӣе§Ӣ...</span></div>`;
        initStudentMap();
        resizeStudentBoard();
        resizeBoard();
        attachSync();
        _launched = true;
      }, 500);
    }
  }, 500);
});

function launch() {
  _launched = true;
  document.getElementById('loading').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('loading').style.display = 'none';
    syncTeamsFromParent();
    boardPos = getBoardLayout();
    buildBoard();
    if (myRole === 'teacher') {
      document.getElementById('teacher-view').style.display = 'block';
      document.getElementById('student-view').style.display = 'none';
      gameState = makeInit();
      render(); broadcast();
    } else {
      document.getElementById('teacher-view').style.display = 'none';
      document.getElementById('student-view').style.display = 'flex';
      updateBadge();
      initStudentMap();
      resizeStudentBoard();
      // еҳ—и©Ұи®ҖеҸ–еҝ«еҸ–state
      try {
        const cached = localStorage.getItem('W8_STATE');
        if (cached) {
          gameState = JSON.parse(cached);
          syncTeamsFromState();
        }
      } catch(e) {}
      if (gameState) {
        render();
        centerOnMyPiece();
      } else {
        // з«ӢеҚіијӘи©ўдёҖж¬ЎпјҲжңүдәӣиЁӯеӮҷ localStorage йңҖиҰҒе»¶йҒІжүҚиғҪи®ҖеҲ°пјү
        setTimeout(() => {
          try {
            const cached2 = localStorage.getItem('W8_STATE');
            if (cached2 && !gameState) {
              gameState = JSON.parse(cached2);
              syncTeamsFromState();
              render();
              centerOnMyPiece();
            }
          } catch(e) {}
          if (!gameState) {
            document.getElementById('s-action').innerHTML =
              `<div class="wait-msg"><div class="pulse"></div><span>зӯүеҫ…йҒҠжҲІй–Ӣе§Ӣ...</span></div>`;
          }
        }, 300);
      }
    }
    resizeBoard();
    attachSync();
  }, 500);
}

function buildBoard() {
  ['board', 's-board'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '';
    
    el.style.width = BOARD_SIZE + 'px';
    el.style.height = BOARD_SIZE + 'px';

    const center = document.createElement('div');
    center.className = 'board-center';
    center.innerHTML = `
      <div style="transform: rotateZ(45deg); display: flex; flex-direction: column; align-items: center;">
        <div class="center-logo">вңҲпёҸ з’°йҒҠеӨ§еҜҢзҝҒ</div>
        <div class="center-sub">WORLD TOUR</div>
      </div>
    `;
    el.appendChild(center);

    boardPos.forEach((bp, i) => {
      const type = CTYPES[i] || 'q';
      const cell = document.createElement('div');
      // Startж јеј·еҲ¶cornerйЎһеһӢ + дёҚж—ӢиҪүе…§е®№
      const isStart = i === 0;
      cell.className = `cell type-${type} ${isStart ? 'corner' : bp.type}`;

      const cellW = (bp.type === 'top' || bp.type === 'bottom') ? M : C;
      const cellH = (bp.type === 'left' || bp.type === 'right') ? M : C;
      const finalW = isStart ? C : cellW;
      const finalH = isStart ? C : cellH;

      cell.style.width = finalW + 'px';
      cell.style.height = finalH + 'px';
      cell.id = (id === 'board' ? 'cell-' : 'sc-') + i;
      cell.style.left = bp.x + 'px';
      cell.style.top = bp.y + 'px';

      const contentAngle = isStart ? 0 : bp.angle;

      // Startж јеңЁе·ҰдёӢи§’(index=0)
      // ж јеӯҗжң¬ең°гҖҢеҗ‘дёҠ(вҶ‘)гҖҚ= зӯүи·қз•«йқўдёҠжЈӢеӯҗзҡ„з§»еӢ•ж–№еҗ‘пјҲжІҝе·ҰеҒҙеҫҖдёҠиө°пјү
      // зүҲйқўпјҡдёҠж–№еӨ§з®ӯй ӯвҶ‘пјҢдёӯй–“STARTпјҢдёӢж–№+1зҙ…иүІжЁҷзұӨ
      const contentHtml = i === 0 
        ? `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;height:100%;padding:5px;">
             <svg width="36" height="36" viewBox="0 0 24 24" fill="var(--red)" style="filter:drop-shadow(0 2px 3px rgba(0,0,0,0.35));">
               <path d="M12 2 L20 13 L15.5 13 L15.5 22 L8.5 22 L8.5 13 L4 13 Z"/>
             </svg>
             <span style="font-size:0.9rem;font-weight:900;color:var(--red);letter-spacing:1px;line-height:1.1;">START</span>
             <span style="font-size:0.7rem;font-weight:900;color:#fff;background:var(--red);padding:1px 7px;border-radius:5px;line-height:1.5;">+1</span>
           </div>`
        : `<span class="c-icon">${CICONS[type] || 'вқ“'}</span>`;

      cell.innerHTML = `
        <div class="cell-top">
          <div class="cell-content" style="transform: rotate(${contentAngle}deg);">
            ${contentHtml}
          </div>
        </div>
        <div class="cell-s"></div>
        <div class="cell-n"></div>
        <div class="cell-e"></div>
        <div class="cell-w"></div>`;
      el.appendChild(cell);
    });
  });
}

function makeInit() {
  syncTeamsFromParent();

  // еҰӮжһң TEAMS еҸӘжңүй җиЁӯ1зө„пјҢеҳ—и©Ұеҫһ URL ?teams=N ж“ҙеұ•
  const urlP = new URLSearchParams(location.search);
  const urlTeamCount = parseInt(urlP.get('teams')) || 0;
  if (urlTeamCount > TEAMS.length) {
    const colors = ['#FF8A65','#81C784','#FFB74D','#4FC3F7','#CE93D8','#FFD54F','#4DB6AC','#7986CB'];
    const icons = ['рҹҗ»','рҹҗј','рҹҰҠ','рҹҗё','рҹҗ§','рҹҰҒ','рҹҗҜ','рҹҗЁ'];
    while (TEAMS.length < urlTeamCount) {
      const n = TEAMS.length + 1;
      TEAMS.push({ id: n, name: `з¬¬${n}зө„`, icon: icons[(n-1) % icons.length], color: colors[(n-1) % colors.length] });
    }
    teamCount = TEAMS.length;
  }

  const teams = {};
  TEAMS.forEach(t => {
    teams[t.id] = { id: t.id, position: 0, score: 0, extraDice: false, skipTurn: false };
  });
  const firstTurnId = TEAMS.length > 0 ? TEAMS[0].id : 1;
  return { teams, currentTurn: firstTurnId, phase: 'waiting_roll', diceResult: null, event: null, question: null, selectedAnswer: null, teamCount: TEAMS.length };
}

function broadcast() {
  if (myRole !== 'teacher') return;
  try { window.parent.postMessage({ type: 'W8_STATE', state: gameState }, '*'); } catch (e) {}
  try { localStorage.setItem('W8_STATE', JSON.stringify(gameState)); } catch (e) {}
  
  try {
    const roomId = window.parent && window.parent.state ? window.parent.state.roomId : null;
    if (parentDb && roomId) {
      parentDb.collection('rooms').doc(roomId).update({ w8State: gameState });
    } else if (window.parent && window.parent.state && typeof window.parent.saveRooms === 'function') {
      window.parent.state.w8State = gameState;
      window.parent.saveRooms(); // зөӮжҘөеҗҢжӯҘеӮҷжҸҙ
    }
  } catch(e) {}
}

function updateState(patch) {
  gameState = { ...gameState, ...patch };
  render(); broadcast();
}
function updateTeam(tid, patch) {
  const t = { ...gameState.teams };
  t[tid] = { ...t[tid], ...patch };
  updateState({ teams: t });
}

function render() {
  const isT = myRole === 'teacher';
  document.getElementById('teacher-view').style.display = isT ? 'block' : 'none';
  document.getElementById('student-view').style.display = isT ? 'none' : 'flex';
  if (!gameState) return;
  syncTeamsFromState(); // зўәдҝқжүҖжңү team йғҪжңүе°ҚжҮүзҡ„ TEAMS й …зӣ®
  renderPieces();
  if (isT) renderTeacher(); else renderStudent();
}

function renderPieces() {
  if (!gameState) return;
  const cellCounts = {};
  Object.values(gameState.teams || {}).forEach(team => {
    const pos = team.position % TOTAL;
    cellCounts[pos] = (cellCounts[pos] || 0) + 1;
  });

  // еҸӘжёІжҹ“еӯҳеңЁзҡ„жЈӢзӣӨпјҲteacher/studentеҗ„иҮӘдёҖеҖӢпјү
  const boardIds = myRole === 'teacher' ? ['board'] : ['s-board'];
  boardIds.forEach(id => {
    const el = document.getElementById(id); if (!el) return;
    el.querySelectorAll('.piece').forEach(p => p.remove());
    
    const cellIndices = {};
    Object.values(gameState.teams || {}).forEach(team => {
      // еҜ¬й¬ҶжҜ”ијғ idпјҲйҒҝе…Қж•ёеӯ—/еӯ—дёІеһӢж…ӢдёҚз¬Ұпјү
      const t = TEAMS.find(x => x.id == team.id);
      if (!t) return;
      const pos = team.position % TOTAL;
      const bp = boardPos[pos]; if (!bp) return;
      
      const totalOnCell = cellCounts[pos];
      const idx = cellIndices[pos] || 0;
      cellIndices[pos] = idx + 1;

      const cellW = bp.type === 'top' || bp.type === 'bottom' ? M : C;
      const cellH = bp.type === 'left' || bp.type === 'right' ? M : C;
      
      let centerX = bp.x + cellW / 2;
      let centerY = bp.y + cellH / 2;

      let ox = 0, oy = 0;
      if (totalOnCell > 1) {
        const angle = (idx / totalOnCell) * Math.PI * 2;
        const radius = 20;
        ox = Math.cos(angle) * radius;
        oy = Math.sin(angle) * radius;
      }

      const piece = document.createElement('div');
      piece.className = 'piece';
      piece.style.left = (centerX + ox) + 'px';
      piece.style.top = (centerY + oy) + 'px';
      
      let badgeHtml = team.skipTurn ? `<div class="stop-badge">еҒң</div>` : '';
      piece.innerHTML = `
        <div class="piece-shadow"></div>
        <div class="piece-sprite">${t.icon}${badgeHtml}</div>
      `;
      el.appendChild(piece);
    });

    el.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
    if (gameState.currentTurn) {
      const team = Object.values(gameState.teams).find(t => t.id == gameState.currentTurn);
      if (team) {
        const cel = document.getElementById((id === 'board' ? 'cell-' : 'sc-') + (team.position % TOTAL));
        if (cel) cel.classList.add('active');
      }
    }
  });
}

function renderTeacher() {
  const gs = gameState;
  const ct = TEAMS.find(t => t.id === gs.currentTurn);
  const chipEl = document.getElementById('turn-chip');
  if (ct && chipEl) chipEl.textContent = `${ct.icon} ${ct.name} зҡ„еӣһеҗҲ`;
  
  const sc = document.getElementById('t-scores'); sc.innerHTML = '';
  Object.values(gs.teams).forEach(team => {
    const t = TEAMS.find(x => x.id === team.id);
    if (!t) return;
    const row = document.createElement('div');
    row.className = 'score-row' + (team.id === gs.currentTurn ? ' active' : '');
    row.innerHTML = `<span class="sr-icon">${t.icon}</span>
      <span class="sr-name" style="color:${t.color}">${t.name}</span>
      ${team.extraDice ? '<span class="sr-tag">рҹҺІрҹҺІ</span>' : ''}
      ${team.skipTurn ? '<span class="sr-tag" style="color:var(--red)">вҸё</span>' : ''}
      <span class="sr-pts">${team.score}еҲҶ</span>`;
    sc.appendChild(row);
  });
  renderEventPanel();
}

function renderEventPanel() {
  const gs = gameState;
  const eb = document.getElementById('event-box');
  const exb = document.getElementById('explain-box');
  const bpub = document.getElementById('btn-pub');
  const bnext = document.getElementById('btn-next');
  exb.style.display = 'none'; bpub.style.display = 'none'; bnext.style.display = 'none';
  const ph = gs.phase;

  if (ph === 'waiting_roll') {
    eb.className = 'event-box';
    const ct = TEAMS.find(t => t.id === gs.currentTurn);
    eb.innerHTML = `<div class="wait-msg" style="justify-content:center;padding:1rem"><div class="pulse"></div> зӯүеҫ… ${ct?.icon || ''} ж“ІйӘ°...</div>`;
  } else if (ph === 'rolled') {
    eb.className = 'event-box';
    const d = gs.diceResult; const f = ['вҡҖ', 'вҡҒ', 'вҡӮ', 'вҡғ', 'вҡ„', 'вҡ…'];
    eb.innerHTML = `<div style="text-align:center">
      <div style="font-size:0.8rem;color:rgba(255,255,255,0.5);margin-bottom:8px">йӘ°еӯҗзөҗжһң</div>
      <div class="dice-show"><div class="dice-face">${f[(d.d1 || 1) - 1]}</div>${d.d2 ? `<div class="dice-face">${f[(d.d2 || 1) - 1]}</div>` : ''}</div>
      <div class="dice-total">е…ұ ${d.total} жӯҘ</div></div>`;
    bnext.style.display = 'block'; bnext.textContent = 'в–¶ з§»еӢ•жЈӢеӯҗ'; bnext.onclick = () => movePiece();

    bnext.style.display = 'block'; bnext.textContent = 'вһЎпёҸ дёӢдёҖзө„'; bnext.onclick = () => nextTurn();
  }
}

function resizeBoard() {
  const VW = BOARD_SIZE * 1.414;
  const VH = BOARD_SIZE * 1.22;
  const vw = window.visualViewport ? window.visualViewport.width : window.innerWidth;
  const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;

  let scale;
  if (myRole === 'teacher') {
    const sidebar = document.getElementById('t-sidebar');
    const sidebarW = (sidebar && !sidebar.classList.contains('collapsed')) ? Math.min(260, vw * 0.22) : 42;
    const eventW = Math.min(300, Math.max(180, vw - sidebarW - 80));
    const availW = Math.max(150, vw - eventW - 20 - sidebarW - 16);
    const availH = vh - 16;
    scale = Math.min(availW / VW, availH / VH);
    const board = document.getElementById('board');
    if (board) board.style.transform = `scale(${scale}) rotateX(55deg) rotateZ(-45deg)`;
  } else {
    // еӯёз”ҹз«Ҝпјҡж”ҫеӨ§йЎҜзӨә (д№ҳдёҠ 2.5 ж”ҫеӨ§еҖҚзҺҮ)пјҢзҮҹйҖ жІүжөёеұҖйғЁиҰ–и§’
    const topH = 40;
    const botH = 110;
    const availW = vw;
    const availH = vh - topH - botH;
    scale = Math.min(availW / VW, availH / VH) * 2.5;
    const sboard = document.getElementById('s-board');
    if (sboard) sboard.style.transform = `scale(${scale}) rotateX(55deg) rotateZ(-45deg)`;

    // жӣҙж–° iso-scene е®ҡдҪҚи®“жЈӢзӣӨе№ҫдҪ•дёӯеҝғеңЁ (0,0)
    const scene = document.getElementById('s-iso-scene');
    if (scene) {
      const half = (BOARD_SIZE / 2) * scale;
      scene.style.left = (-half) + 'px';
      scene.style.top = (-half) + 'px';
      scene.style.width = (BOARD_SIZE * scale) + 'px';
      scene.style.height = (BOARD_SIZE * scale) + 'px';
    }
  }
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// еӯёз”ҹз«Ҝең°ең–иҮӘеӢ•и·ҹйҡЁ (дёҚеҸҜжӢ–еӢ•)
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
let _mapX = 0, _mapY = 0;

function initStudentMap() {
  const map = document.getElementById('s-map');
  if (!map) return;

  const vw = window.innerWidth;
  // еӯёз”ҹз«Ҝж”ҫеӨ§еҖҚзҺҮ 2.5
  const sScale = (vw / (BOARD_SIZE * Math.SQRT2)) * 2.5;
  const sboard = document.getElementById('s-board');
  if (sboard) sboard.style.transform = `scale(${sScale}) rotateX(55deg) rotateZ(-45deg)`;

  const scene = document.getElementById('s-iso-scene');
  if (scene) {
    const halfScaled = (BOARD_SIZE / 2) * sScale;
    scene.style.left = (-halfScaled) + 'px';
    scene.style.top = (-halfScaled) + 'px';
    scene.style.width = (BOARD_SIZE * sScale) + 'px';
    scene.style.height = (BOARD_SIZE * sScale) + 'px';
  }

  // иө·е§ӢзҪ®дёӯ
  const mapRect = map.getBoundingClientRect();
  _mapX = mapRect.width / 2;
  _mapY = mapRect.height / 2;
  applyMapTransform();
  
  // з§»йҷӨжүҖжңү drag иҲҮ touch зӣЈиҒҪеҷЁпјҢзўәдҝқең°ең–дёҚеҸҜжүӢеӢ•жӢ–жӣі
}

function applyMapTransform() {
  const inner = document.getElementById('s-map-inner');
  if (inner) inner.style.transform = `translate(${_mapX}px, ${_mapY}px)`;
}

function centerOnMyPiece() {
  if (!gameState || !boardPos.length) return;
  // ж°ёйҒ йҺ–е®ҡи·ҹйҡЁиҮӘе·ұзө„еҲҘзҡ„жЈӢеӯҗпјҢй«”зҸҫгҖҢз•¶зө„жЈӢеӯҗзӮәдёӯеҝғгҖҚ
  const myTeam = gameState.teams?.[myTeamId] || gameState.teams?.[String(myTeamId)];
  if (!myTeam) return;
  const pos = myTeam.position % TOTAL;
  const bp = boardPos[pos];
  if (!bp) return;

  const cellW = (bp.type === 'top' || bp.type === 'bottom') ? M : C;
  const cellH = (bp.type === 'left' || bp.type === 'right') ? M : C;
  const pieceLocalX = bp.x + cellW / 2;
  const pieceLocalY = bp.y + cellH / 2;

  const sboard = document.getElementById('s-board');
  if (!sboard) return;
  const scaleMatch = sboard.style.transform.match(/scale\(([^)]+)\)/);
  const sScale = scaleMatch ? parseFloat(scaleMatch[1]) : 1;

  const relX = (pieceLocalX - BOARD_SIZE / 2) * sScale;
  const relY = (pieceLocalY - BOARD_SIZE / 2) * sScale;

  const angle = -45 * Math.PI / 180;
  const cos45 = Math.cos(angle), sin45 = Math.sin(angle);
  const screenX = relX * cos45 - relY * sin45;
  const screenY = (relX * sin45 + relY * cos45) * Math.sin(55 * Math.PI / 180);

  // з”Ё visualViewport еҸ–еҫ—жӯЈзўәеҸҜиҰӢй«ҳеәҰ
  const vvw = window.visualViewport ? window.visualViewport.width : window.innerWidth;
  const vvh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  const headerH = 86; // s-header + s-scores еҗҲиЁҲй«ҳеәҰ
  const actionH = 110; // s-action й«ҳеәҰ
  const mapH = vvh - headerH - actionH;

  const cx = vvw / 2;
  const cy = headerH + mapH / 2;

  _mapX = cx - screenX;
  _mapY = cy - screenY;
  applyMapTransform();
}

// йӘ°еӯҗйқўзҡ„ emoji е°ҚжҮү
const DICE_FACES = ['вҡҖ','вҡҒ','вҡӮ','вҡғ','вҡ„','вҡ…'];
// жҜҸеҖӢй»һж•ёе°ҚжҮүйӘ°еӯҗгҖҢfrontйқўгҖҚйңҖиҰҒж—ӢиҪүзҡ„и§’еәҰпјҲи®“frontйқўйЎҜзӨәжӯЈзўәй»һж•ёпјү
const DICE_RX = [0,   -90,  0,   0,  90,  0];
const DICE_RY = [0,    0,   90, -90,   0, 180];

function makeDice3D(val, index = 0) {
  // val = 1-6пјҢиҝ”еӣһ 3D йӘ°еӯҗ HTML
  const rx = DICE_RX[(val||1)-1];
  const ry = DICE_RY[(val||1)-1];
  const delay = index * 0.15; // и®“з¬¬дәҢйЎҶйӘ°еӯҗзЁҚеҫ®жҷҡдёҖй»һжӢӢеҮәпјҢйЎҜеҫ—жӣҙиҮӘз„¶
  return `<div class="dice-container" style="animation-delay: ${delay}s">
    <div class="dice-shadow" style="animation-delay: ${delay}s"></div>
    <div class="dice3d-wrap" style="animation-delay: ${delay}s">
      <div class="dice3d" style="--rx:${rx}deg;--ry:${ry}deg; animation-delay: ${delay}s">
        <div class="face front">вҡҖ</div>
        <div class="face back">вҡ…</div>
        <div class="face right">вҡӮ</div>
        <div class="face left">вҡғ</div>
        <div class="face top">вҡҒ</div>
        <div class="face bottom">вҡ„</div>
      </div>
    </div>
  </div>`;
}

      ${d2?`<div class="dice-face">${DICE_FACES[(d2||1)-1]}</div>`:''}
    </div>
    <div class="dice-total">е…ұ ${total} жӯҘ</div>`;

  const showIn = (boxId, overlayId) => {
    const box = document.getElementById(boxId);
    const overlay = document.getElementById(overlayId);
    if (!box || !overlay) return;
    box.innerHTML = spinHtml;
    overlay.style.display = 'flex';
    // й…ҚеҗҲеӢ•з•«жҷӮй–“ (1.2s + 0.15s) иЁӯе®ҡи¶…жҷӮ
    setTimeout(() => { box.innerHTML = resultHtml; }, 1450); 
    setTimeout(() => { overlay.style.display = 'none'; }, 2950);
  };

  if (onBoard === 's') {
    showIn('s-dice-box', 's-dice-overlay');
  } else {
    const existing = document.getElementById('t-dice-overlay');
    if (existing) existing.remove();
    const el = document.createElement('div');
    el.id = 't-dice-overlay';
    el.style.cssText = 'position:absolute;inset:0;z-index:400;pointer-events:none;display:flex;align-items:center;justify-content:center;';
    el.innerHTML = `<div class="dice-anim-box" id="t-dice-box">${spinHtml}</div>`;
    const bc = document.querySelector('.board-container');
    if (bc) {
      bc.appendChild(el);
      setTimeout(() => { const b = document.getElementById('t-dice-box'); if(b) b.innerHTML = resultHtml; }, 1450);
      setTimeout(() => el.remove(), 2950);
    }
  }
}

function rollDice() {
  // еј·еҲ¶ж•ёеӯ—жҜ”ијғйҳІжӯўеһӢж…ӢдёҚз¬Ұ
  if (!gameState || Number(gameState.currentTurn) !== Number(myTeamId)) return;
  const team = gameState.teams[myTeamId] || gameState.teams[String(myTeamId)];
  if (!team || team.skipTurn) return;
  const d1 = Math.ceil(Math.random() * 6);
  let d2 = null; if (team.extraDice) d2 = Math.ceil(Math.random() * 6);
  const total = d1 + (d2 || 0);
  
  const action = { teamId: myTeamId, diceResult: { d1, d2, total }, ts: Date.now() };

  // еӯёз”ҹз«Ҝпјҡз«ӢеҚійЎҜзӨәеӢ•з•«
  showDiceAnim(d1, d2, total, 's');

  if (myRole === 'student') {
    try { window.parent.postMessage({ type: 'W8_ROLL', ...action }, '*'); } catch (e) {}
    try { localStorage.setItem('W8_ROLL', JSON.stringify(action)); } catch(e) {}
    try {
      const roomId = window.parent && window.parent.state ? window.parent.state.roomId : null;
      if (parentDb && roomId) {
        parentDb.collection('rooms').doc(roomId).update({ w8Action: action });
      } else if (window.parent && window.parent.state && typeof window.parent.saveRooms === 'function') {
        window.parent.state.w8Action = action;
        window.parent.saveRooms();
      }
    } catch(e) {}
    const sa = document.getElementById('s-action');
    if (sa) sa.innerHTML = `<div class="wait-msg"><div class="pulse"></div><span>йӘ°еӯҗе·Іж“ІеҮәпјҢи«ӢзңӢиҖҒеё«з•«йқў...</span></div>`;
  } else {
    processAction(action);
  }
}

function movePiece() {
  const gs = gameState;
  const tid = gs.currentTurn;
  // teams зҡ„ key еңЁ JSON еәҸеҲ—еҢ–еҫҢйғҪжҳҜеӯ—дёІпјҢз”Ё String() зўәдҝқжүҫеҫ—еҲ°
  const tidStr = String(tid);
  const team = gs.teams[tid] || gs.teams[tidStr];
  if (!team) { console.warn('movePiece: жүҫдёҚеҲ° team', tid, Object.keys(gs.teams)); return; }
  const steps = gs.diceResult?.total || 1;
  const startPos = team.position;
  const finalPos = (startPos + steps) % TOTAL;

  let step = 0;
  function moveStep() {
    step++;
    const curPos = (startPos + step) % TOTAL;
    // еҗҢжҷӮжӣҙж–°ж•ёеӯ—keyе’Ңеӯ—дёІkeyзўәдҝқжүҫеҫ—еҲ°
    if (gameState.teams[tid] !== undefined) gameState.teams[tid].position = curPos;
    if (gameState.teams[tidStr] !== undefined) gameState.teams[tidStr].position = curPos;
    renderPieces();
    
    // еҰӮжһңжҳҜеӯёз”ҹз«ҜпјҢи®“йҸЎй ӯеҚіжҷӮи·ҹйҡЁжңҖж–°дҪҚзҪ®е№іж»‘з§»еӢ•
    if (myRole === 'student') centerOnMyPiece();

    if (step < steps) {
      setTimeout(moveStep, 180);
    } else {
      setTimeout(() => {
        // жңҖеҫҢиө°е®ҢпјҡзӣҙжҺҘжӣҙж–°дёҰе»Јж’ӯпјҢдёҚеҶҚе‘јеҸ« triggerEvent еүҚе…Ҳжӣҙж–°
        const t = { ...gameState.teams };
        const tEntry = t[tid] || t[tidStr];
        if (t[tid]) t[tid] = { ...t[tid], position: finalPos };
        if (t[tidStr]) t[tidStr] = { ...t[tidStr], position: finalPos };
        gameState = { ...gameState, teams: t };
        broadcast();
        renderPieces();
        setTimeout(() => triggerEvent(CTYPES[finalPos], finalPos), 200);
      }, 200);
    }
  }
  moveStep();
}

function triggerEvent(type) {
  const tid = gameState.currentTurn;
  if (type === 'start') {
    showToast('рҹҸҒ з¶“йҒҺиө·й»һпјҒ+1еҲҶ');
    updateTeam(tid, { score: (gameState.teams[tid].score || 0) + 1 });
    updateState({ phase: 'done', event: null });
  }
  else if (type === 'q') { updateState({ phase: 'answering', event: null }); fetchQ(false); }
  else if (type === 'special') { updateState({ phase: 'answering', event: { specialQ: true } }); fetchQ(true); }
  else if (type === 'lucky') doLucky(tid);
  else if (type === 'bad') doBad(tid);
  else updateState({ phase: 'done', event: null });
}

const LUCKY = [
  { title: 'е№ёйҒӢд№ӢжҳҹпјҒ', desc: '+3 еҲҶпјҒ', fx: (tid, gs) => updateTeam(tid, { score: (gs.teams[tid].score || 0) + 3 }) },
  { title: 'й ҶйўЁпјҒ', desc: 'еүҚйҖІ 2 ж јпјҒ', fx: (tid, gs) => { updateTeam(tid, { position: (gs.teams[tid].position + 2) % TOTAL }); } },
  { title: 'е…Ёзө„еҠ еҲҶпјҒ', desc: 'жүҖжңүзө„еҗ„ +1 еҲҶпјҒ', fx: (tid, gs) => {
    const t2 = { ...gs.teams }; Object.values(t2).forEach(t => { t2[t.id] = { ...t2[t.id], score: (t2[t.id].score || 0) + 1 }; }); updateState({ teams: t2 }); } },
  { title: 'рҹҺІ зҚІеҫ—з¬¬дәҢйЎҶйӘ°еӯҗпјҒ', desc: 'д№ӢеҫҢжҜҸеӣһеҗҲж“Іе…©йЎҶпјҒ', fx: (tid) => updateTeam(tid, { extraDice: true }) },
  { title: 'зҘһз§ҳзҰ®зү©пјҒ', desc: '+2 еҲҶпјҒ', fx: (tid, gs) => updateTeam(tid, { score: (gs.teams[tid].score || 0) + 2 }) },
];
const BAD = [
  { title: 'еҖ’жҘЈпјҒ', desc: '-1 еҲҶ', fx: (tid, gs) => updateTeam(tid, { score: Math.max(0, (gs.teams[tid].score || 0) - 1) }) },
  { title: 'ж»‘еҖ’пјҒ', desc: 'йҖҖеҫҢ 2 ж ј', fx: (tid, gs) => { updateTeam(tid, { position: ((gs.teams[tid].position - 2) + TOTAL) % TOTAL }); } },
  { title: 'вҸё еҒңдёҖеӣһеҗҲпјҒ', desc: 'дёӢеӣһеҗҲи·ійҒҺ', fx: (tid) => updateTeam(tid, { skipTurn: true }) },
];

function doLucky(tid) {
  const ev = LUCKY[Math.floor(Math.random() * LUCKY.length)];
  ev.fx(tid, gameState);
  updateState({ phase: 'event', event: { type: 'lucky', title: ev.title, desc: ev.desc } });
  showToast(`рҹҚҖ ${ev.title}`); showPop('+', 'var(--green)');
}
function doBad(tid) {
  const ev = BAD[Math.floor(Math.random() * BAD.length)];
  ev.fx(tid, gameState);
  updateState({ phase: 'event', event: { type: 'bad', title: ev.title, desc: ev.desc } });
  showToast(`рҹ’Җ ${ev.title}`); showPop('-1', 'var(--red)');
}

async function fetchQ(isSpecial) {
  const subs = ['з”ҹжҙ»еёёиӯҳгҖҒиҮӘз„¶з§‘еӯё', 'еңӢиӘһпјҲжҲҗиӘһгҖҒеӯ—зҫ©гҖҒйҖ еҸҘпјү'];
  const sub = subs[Math.floor(Math.random() * subs.length)];
  const diff = isSpecial ? 'дёӯйӣЈеәҰпјҢйҒ©еҗҲеңӢе°Ҹй«ҳе№ҙзҙҡ' : 'з°Ўе–®еҲ°дёӯзӯүпјҢйҒ©еҗҲеңӢе°Ҹж··йҪЎ';
  const prompt = `дҪ жҳҜе°ҸеӯёиҖҒеё«пјҢеҮәдёҖйЎҢ${sub}йҒёж“ҮйЎҢгҖӮйӣЈеәҰпјҡ${diff}гҖӮJSONж јејҸпјҢдёҚеҗ«е…¶д»–ж–Үеӯ—пјҡ\n{"question":"йЎҢзӣ®","optionA":"AйҒёй …","optionB":"BйҒёй …","answer":"AжҲ–B","explanation":"и§ЈйҮӢ1~2еҸҘ"}`;
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': '', 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-3-5-sonnet-20241022', max_tokens: 400, messages: [{ role: 'user', content: prompt }] })
    });
    if (!resp.ok) throw new Error('api');
    const data = await resp.json();
    const text = data.content?.[0]?.text || '';
    const q = JSON.parse(text.replace(/```[\w]*|```/g, '').trim());
    updateState({ question: q, phase: 'answering' });
  } catch (e) {
    const pool = [
      { question: 'гҖҢдёҖзҹідәҢйіҘгҖҚзҡ„ж„ҸжҖқжҳҜпјҹ', optionA: 'еҒҡдёҖд»¶дәӢйҒ”жҲҗе…©еҖӢзӣ®зҡ„', optionB: 'з”Ёзҹій ӯжү“е…©йҡ»йіҘ', answer: 'A', explanation: 'дёҖзҹідәҢйіҘжҜ”е–»еҒҡдёҖд»¶дәӢжғ…пјҢеҗҢжҷӮйҒ”еҲ°е…©еҖӢзӣ®зҡ„гҖӮ' },
      { question: 'ең°зҗғдёҠйқўз©ҚжңҖеӨ§зҡ„жө·жҙӢжҳҜпјҹ', optionA: 'еӨ§иҘҝжҙӢ', optionB: 'еӨӘе№іжҙӢ', answer: 'B', explanation: 'еӨӘе№іжҙӢжҳҜең°зҗғдёҠжңҖеӨ§зҡ„жө·жҙӢпјҢзҙ„дҪ”ең°зҗғиЎЁйқўз©ҚдёүеҲҶд№ӢдёҖгҖӮ' },
      { question: 'жӨҚзү©е…үеҗҲдҪңз”ЁйңҖиҰҒд»Җйәјпјҹ', optionA: 'йҷҪе…үе’ҢдәҢж°§еҢ–зўі', optionB: 'йҷҪе…үе’Ңж°§ж°Ј', answer: 'A', explanation: 'жӨҚзү©еҲ©з”ЁйҷҪе…үгҖҒж°ҙе’ҢдәҢж°§еҢ–зўійҖІиЎҢе…үеҗҲдҪңз”ЁпјҢдёҰйҮӢж”ҫж°§ж°ЈгҖӮ' },
      { question: 'гҖҢеҚҠйҖ”иҖҢе»ўгҖҚзҡ„ж„ҸжҖқпјҹ', optionA: 'еҒҡдәӢеҲ°дёҖеҚҠе°ұж”ҫжЈ„', optionB: 'еҒҡдәӢйқһеёёеҠӘеҠӣ', answer: 'A', explanation: 'еҚҠйҖ”иҖҢе»ўеҪўе®№дәӢжғ…еҒҡеҲ°дёҖеҚҠе°ұж”ҫжЈ„пјҢжІ’жңүе …жҢҒеҲ°еә•гҖӮ' },
      { question: 'еҸ°зҒЈжңҖй«ҳзҡ„еұұжҳҜпјҹ', optionA: 'йӣӘеұұ', optionB: 'зҺүеұұ', answer: 'B', explanation: 'зҺүеұұжө·жӢ”3952е…¬е°әпјҢжҳҜеҸ°зҒЈз¬¬дёҖй«ҳеі°гҖӮ' }
    ];
    updateState({ question: pool[Math.floor(Math.random() * pool.length)], phase: 'answering' });
  }
}

function selectAnswer(ans) {
  selectedAnswer = ans;
  updateState({ selectedAnswer: ans });
  renderEventPanel();
}

function publishAnswer() {
  const gs = gameState;
  if (!gs.selectedAnswer) { showToast('и«Ӣе…ҲйҒёж“Үзӯ”жЎҲпјҒ'); return; }
  const correct = gs.selectedAnswer === gs.question.answer;
  const bonus = gs.event?.specialQ ? 4 : 2;
  if (correct) {
    updateTeam(gs.currentTurn, { score: (gs.teams[gs.currentTurn].score || 0) + bonus });
    showPop('+' + bonus, 'var(--green)');
  }
  updateState({ phase: 'revealing' });
  showToast(correct ? `рҹҺү зӯ”е°ҚпјҒ+${bonus}еҲҶ` : 'вқҢ зӯ”йҢҜдәҶпјҒ');
}

function nextTurn() {
  const gs = gameState;
  const currentIdx = TEAMS.findIndex(t => t.id === gs.currentTurn);
  let nextIdx = (currentIdx + 1) % TEAMS.length;
  let safe = 0;
  
  while (safe < TEAMS.length) {
    let nextId = TEAMS[nextIdx].id;
    if (gs.teams[nextId]?.skipTurn) {
      updateTeam(nextId, { skipTurn: false });
      showToast(`вҸё ${TEAMS[nextIdx].icon} еҒңдёҖеӣһеҗҲпјҢи·ійҒҺпјҒ`);
      nextIdx = (nextIdx + 1) % TEAMS.length;
      safe++;
    } else {
      break;
    }
  }
  const finalNextId = TEAMS[nextIdx].id;
  updateState({ currentTurn: finalNextId, phase: 'waiting_roll', diceResult: null, event: null, question: null, selectedAnswer: null });
}

function showResult() {
  const rs = document.getElementById('result-screen'); rs.style.display = 'flex';
  const sorted = Object.values(gameState.teams).sort((a, b) => b.score - a.score);
  const rl = document.getElementById('r-list'); rl.innerHTML = '';
  const medals = ['рҹҘҮ', 'рҹҘҲ', 'рҹҘү', '4пёҸвғЈ', '5пёҸвғЈ'];
  sorted.forEach((team, i) => {
    const t = TEAMS.find(x => x.id === team.id);
    const item = document.createElement('div'); item.className = 'r-item';
    item.style.animationDelay = (i * 0.12) + 's';
    item.innerHTML = `<span class="r-rank">${medals[i]}</span><span class="r-icon">${t.icon}</span>
      <span class="r-name">${t.name}</span><span class="r-score">${team.score}еҲҶ</span>`;
    rl.appendChild(item);
  });
  const wrap = document.getElementById('confetti-wrap');
  const cols = ['#FFD700', '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#CE93D8'];
  for (let i = 0; i < 70; i++) {
    const p = document.createElement('div'); p.className = 'confetti-bit';
    p.style.cssText = `left:${Math.random() * 100}vw; background:${cols[Math.floor(Math.random() * cols.length)]};
      animation-duration:${2 + Math.random() * 3}s; animation-delay:${Math.random() * 2}s;
      width:${6 + Math.random() * 10}px; height:${6 + Math.random() * 10}px`;
    wrap.appendChild(p);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function showPop(text, color) {
  const p = document.createElement('div'); p.className = 'score-pop'; p.textContent = text; p.style.color = color;
  p.style.left = (30 + Math.random() * 40) + 'vw'; p.style.top = '40vh';
  document.body.appendChild(p); setTimeout(() => p.remove(), 1400);
}
</script>
