<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>記憶力大考驗 — W8</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS（與平台一致）── */
:root{
  --bg:#0e0e14;--surface:#16161f;--surface2:#1e1e2e;--border:#2e2e42;
  --accent:#f7c948;--accent2:#ff5c5c;--accent3:#4ecdc4;--accent4:#a78bfa;
  --text:#e8e8f0;--muted:#6b6b8a;--green:#34d399;--red:#f87171;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'Noto Sans TC',sans-serif;touch-action:none;user-select:none;-webkit-user-select:none;}

/* ── 背景星星 ── */
#star-bg{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ── 紅閃錯誤特效 ── */
#error-flash{position:fixed;inset:0;background:rgba(248,113,113,.35);z-index:300;display:none;pointer-events:none;border-radius:0;}

/* ── 共用按鈕 ── */
.btn{font-family:'Space Mono',monospace;font-size:13px;border:none;border-radius:8px;
  padding:12px 20px;cursor:pointer;transition:all .15s;font-weight:700;display:inline-flex;align-items:center;justify-content:center;gap:8px;}
.btn:active{transform:scale(.97);}
.btn-yellow{background:var(--accent);color:#000;}
.btn-red{background:var(--accent2);color:#fff;}
.btn-green{background:var(--green);color:#000;}
.btn-teal{background:var(--accent3);color:#000;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text);}
.btn-muted{background:var(--surface2);border:1px solid var(--border);color:var(--muted);}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.btn-wide{width:100%;max-width:340px;}

/* ── pill 標籤 ── */
.pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-family:'Space Mono',monospace;
  background:var(--surface2);border:1px solid var(--border);padding:4px 12px;border-radius:20px;color:var(--muted);}
.pill.live{border-color:var(--accent2);color:var(--accent2);}
.pill.ok{border-color:var(--green);color:var(--green);}
.pill.wait{border-color:var(--accent);color:var(--accent);}

/* ── HEADER ── */
#ui-header{
  position:fixed;top:0;left:0;right:0;height:56px;display:none;
  align-items:center;justify-content:space-between;padding:0 16px;
  background:rgba(14,14,20,.92);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);z-index:100;
}
#ui-header.on{display:flex;}
#header-part{font-size:10px;font-family:'Space Mono',monospace;color:var(--muted);letter-spacing:.1em;}
#header-lvl{font-size:15px;font-weight:900;color:var(--text);font-family:'Space Mono',monospace;}
#header-score-box{display:flex;flex-direction:column;align-items:center;gap:1px;}
#header-score-label{font-size:9px;font-family:'Space Mono',monospace;color:var(--muted);}
#header-score{font-size:18px;font-weight:700;font-family:'Space Mono',monospace;color:var(--accent);}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;
  padding-top:56px;overflow:hidden;z-index:10;}
.screen.active{display:flex;}

/* ── MAIN MENU ── */
#main-menu{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:20px;z-index:200;padding:24px;}
#main-menu.hidden{display:none;}
.menu-title{font-size:22px;font-weight:900;color:var(--accent);font-family:'Space Mono',monospace;
  text-align:center;line-height:1.4;letter-spacing:-.02em;}
.menu-subtitle{font-size:12px;color:var(--muted);font-family:'Space Mono',monospace;text-align:center;margin-top:-8px;}
.menu-divider{width:200px;height:1px;background:var(--border);margin:4px 0;}
.part-card{width:100%;max-width:340px;background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:18px 20px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:16px;}
.part-card:active{transform:scale(.98);border-color:var(--accent);}
.part-card-icon{font-size:32px;flex-shrink:0;}
.part-card-body{text-align:left;}
.part-card-name{font-size:14px;font-weight:900;color:var(--text);}
.part-card-desc{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.5;}

/* ── STATUS MODAL ── */
#status-modal{position:fixed;inset:0;background:rgba(14,14,20,.92);display:flex;align-items:center;
  justify-content:center;z-index:250;padding:24px;}
#status-modal.hidden{display:none;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:32px 24px;width:100%;max-width:380px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px;}
.modal-icon{font-size:52px;}
.modal-title{font-size:20px;font-weight:900;font-family:'Space Mono',monospace;}
.modal-desc{font-size:13px;color:var(--muted);line-height:1.7;white-space:pre-wrap;}
.modal-score-badge{font-family:'Space Mono',monospace;font-size:13px;color:var(--accent);
  background:var(--surface2);border:1px solid var(--border);padding:6px 16px;border-radius:20px;}

/* ── 倒數大字 ── */
.countdown-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  z-index:50;background:rgba(14,14,20,.7);flex-direction:column;gap:12px;}
.countdown-num{font-family:'Space Mono',monospace;font-size:88px;font-weight:700;
  color:var(--accent);text-shadow:0 0 40px rgba(247,201,72,.5);animation:cdPop .4s cubic-bezier(.175,.885,.32,1.275);}
.countdown-label{font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);letter-spacing:.15em;}
@keyframes cdPop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}

/* ── 頂部 phase banner ── */
.phase-banner{position:absolute;top:12px;left:50%;transform:translateX(-50%);
  font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.1em;
  background:var(--accent2);color:#fff;padding:6px 20px;border-radius:20px;z-index:60;display:none;white-space:nowrap;}

/* ════════════════════════════════════
   PART 1：記憶翻牌
   ════════════════════════════════════ */
#screen-1{justify-content:flex-start;overflow:hidden;}
#flip-header{
  width:100%;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;border-bottom:1px solid var(--border);background:rgba(14,14,20,.6);
}
#flip-phase-label{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.08em;}
#flip-phase-label.mem{color:var(--accent2);}
#flip-phase-label.play{color:var(--green);}
#flip-pairs-left{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);}

#flip-grid-wrap{
  flex:1;min-height:0;width:100%;display:flex;align-items:center;justify-content:center;
  padding:8px 10px;overflow:hidden;position:relative;
}
#flip-grid{
  display:grid;gap:6px;
}
.flip-cell{display:flex;align-items:center;justify-content:center;}
.card-flipper{
  width:100%;height:100%;position:relative;
  transform-style:preserve-3d;
  transition:transform .45s cubic-bezier(.4,0,.2,1);
  cursor:pointer;
}
.card-flipper.flipped{transform:rotateY(180deg);}
.card-flipper.matched{transform:rotateY(180deg);}
.card-face{
  position:absolute;inset:0;border-radius:10px;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.card-back{background:var(--surface2);border:1px solid var(--border);}
.card-back-canvas{width:100%;height:100%;display:block;border-radius:9px;}
.card-front{background:var(--surface);border:2px solid var(--border);transform:rotateY(180deg);}
.card-front canvas{display:block;border-radius:8px;}
.card-flipper.matched .card-front{border-color:var(--green);box-shadow:0 0 16px rgba(52,211,153,.35);}
.card-flipper.wrong .card-front{
  border-color:var(--red)!important;box-shadow:0 0 14px rgba(248,113,113,.4)!important;
  animation:wrongShake .45s ease-out;
}
@keyframes wrongShake{
  0%,100%{transform:rotateY(180deg) translateX(0);}
  20%{transform:rotateY(180deg) translateX(-7px);}
  60%{transform:rotateY(180deg) translateX(7px);}
  80%{transform:rotateY(180deg) translateX(-4px);}
}
#flip-mem-overlay{
  position:absolute;inset:0;background:rgba(14,14,20,.6);
  display:flex;align-items:flex-end;justify-content:center;z-index:30;pointer-events:none;
  padding-bottom:18px;
}
#flip-mem-overlay.hidden{display:none;}
#flip-mem-bar{
  display:flex;align-items:center;gap:10px;
  background:rgba(14,14,20,.85);border:1px solid var(--border);
  border-radius:24px;padding:8px 20px;
}
#flip-mem-label{font-family:'Space Mono',monospace;font-size:11px;color:var(--accent2);letter-spacing:.08em;}
#flip-mem-count{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;color:var(--accent);min-width:2ch;text-align:center;}

/* ════════════════════════════════════
   PART 2：動果大遊行
   ════════════════════════════════════ */
#screen-2{justify-content:flex-start;overflow-y:auto;gap:0;}

#parade-stage{
  width:100%;height:200px;flex-shrink:0;position:relative;overflow:hidden;
  background:linear-gradient(180deg,#0a1628 0%,#0f2040 60%,#1a3055 100%);
  border-bottom:1px solid var(--border);
}
/* 舞台地板 */
#parade-stage::after{content:'';position:absolute;bottom:0;left:0;right:0;height:40px;
  background:linear-gradient(180deg,transparent,rgba(247,201,72,.06));border-top:1px solid rgba(247,201,72,.15);}
/* 星星裝飾點 */
#parade-stage::before{content:'✦  ✦  ✦  ✦  ✦  ✦  ✦  ✦  ✦  ✦  ✦  ✦  ✦  ✦  ✦  ✦';
  position:absolute;top:12px;left:0;right:0;font-size:8px;color:rgba(255,255,255,.15);
  letter-spacing:24px;overflow:hidden;white-space:nowrap;}

.runner{position:absolute;font-size:64px;bottom:36px;right:-120px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.5));}

#parade-input{width:100%;display:flex;flex-direction:column;align-items:center;padding:14px 16px;gap:10px;}
#parade-input.hidden{display:none;}

.parade-instruction{font-size:11px;font-family:'Space Mono',monospace;color:var(--muted);letter-spacing:.05em;}

#user-seq-bar{
  display:flex;gap:6px;min-height:58px;width:100%;max-width:420px;
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:8px 12px;align-items:center;flex-wrap:wrap;
}
.seq-tag{
  font-size:26px;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:4px 6px;position:relative;flex-shrink:0;
}
.seq-tag-num{
  position:absolute;top:-7px;left:-5px;font-size:9px;font-family:'Space Mono',monospace;
  font-weight:700;background:var(--accent);color:#000;padding:1px 4px;border-radius:4px;
}

.grid-selector{
  display:grid;grid-template-columns:repeat(6,1fr);gap:8px;width:100%;max-width:420px;
}
.item-icon{
  aspect-ratio:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;
  font-size:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .1s;
}
.item-icon:active{background:var(--surface2);border-color:var(--accent);transform:scale(.93);}
/* 錯誤圖案閃爍 */
.item-icon.error-blink{
  animation:iconErrorBlink .5s ease-in-out 4;
  border-color:var(--red);background:rgba(248,113,113,.15);
}
@keyframes iconErrorBlink{
  0%,100%{transform:scale(1);border-color:var(--red);background:rgba(248,113,113,.15);}
  50%{transform:scale(1.18);border-color:var(--red);background:rgba(248,113,113,.35);box-shadow:0 0 10px rgba(248,113,113,.5);}
}

.parade-btns{display:flex;gap:10px;width:100%;max-width:420px;}

/* 未輸入完提醒 */
#parade-hint{
  font-family:'Space Mono',monospace;font-size:11px;color:var(--accent2);
  text-align:center;letter-spacing:.04em;
  opacity:0;transition:opacity .2s;height:16px;
}
#parade-hint.show{opacity:1;}
/* user-seq-bar 錯誤狀態 */
#user-seq-bar.incomplete{
  border-color:var(--accent2);
  animation:seqBarShake .35s ease-out;
}
@keyframes seqBarShake{
  0%,100%{transform:translateX(0);}
  25%{transform:translateX(-6px);}
  75%{transform:translateX(6px);}
}
/* seq-tag 錯誤閃爍 */
.seq-tag.wrong{
  animation:tagWrong .45s ease-in-out 3;
  background:rgba(248,113,113,.25);border-color:var(--red);
}
@keyframes tagWrong{
  0%,100%{transform:scale(1);background:rgba(248,113,113,.2);}
  50%{transform:scale(1.22);background:rgba(248,113,113,.45);box-shadow:0 0 8px rgba(248,113,113,.6);}
}

/* ════════════════════════════════════
   PART 3：金庫解碼
   ════════════════════════════════════ */
#screen-3{justify-content:flex-start;gap:0;overflow:hidden;}
#safe-layout{
  flex:1;min-height:0;width:100%;display:flex;flex-direction:column;align-items:center;
  justify-content:space-evenly;padding:8px 16px 16px;gap:6px;
}

/* 指令顯示區 */
#safe-cmd-view{
  font-family:'Space Mono',monospace;font-size:48px;font-weight:700;color:var(--accent);
  height:80px;display:flex;align-items:center;justify-content:center;
  text-shadow:0 0 24px rgba(247,201,72,.5);letter-spacing:.05em;
}

/* 金庫 canvas */
#safe-canvas-wrap{
  position:relative;
  width:min(240px,52vw);height:min(240px,52vw);
  flex-shrink:0;
}
#safeCanvas{display:block;width:100%;height:100%;}

/* 解鎖記錄 */
#safe-history{
  width:100%;max-width:320px;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;font-size:11px;font-family:'Space Mono',monospace;
  max-height:80px;overflow-y:auto;
}
#safe-history-label{color:var(--muted);font-size:10px;margin-bottom:6px;letter-spacing:.08em;}
#safe-history-list{display:flex;flex-direction:column;gap:4px;}
.history-entry{color:var(--green);font-size:11px;}
.history-entry.fail{color:var(--red);}

/* 控制按鈕 */
#safe-controls{display:flex;align-items:center;gap:20px;}
#safe-controls.hidden{display:none;}
.round-btn{
  width:68px;height:68px;background:var(--surface2);border:1px solid var(--border);
  border-radius:50%;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 0 rgba(0,0,0,.4);transition:all .1s;
}
.round-btn:active{transform:translateY(4px);box-shadow:none;background:var(--surface);border-color:var(--accent);}
#safe-ok-btn{
  width:80px;height:80px;border-radius:50%;background:var(--green);color:#000;
  font-family:'Space Mono',monospace;font-size:13px;font-weight:700;
  border:none;cursor:pointer;box-shadow:0 4px 0 #169030,0 0 20px rgba(52,211,153,.3);
  transition:all .1s;
}
#safe-ok-btn:active{transform:translateY(4px);box-shadow:none;}

#safe-tip{font-size:11px;font-family:'Space Mono',monospace;color:var(--muted);text-align:center;}
#safe-skip-btn{
  font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);
  background:transparent;border:1px solid var(--border);border-radius:20px;
  padding:5px 14px;cursor:pointer;transition:all .15s;letter-spacing:.05em;
}
#safe-skip-btn:active{background:var(--surface2);}
#safe-skip-btn.hidden{display:none;}

/* ── 通用 ── */
.hidden{display:none!important;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
@keyframes pulse{from{opacity:1}to{opacity:.35}}
@keyframes scoreFloat{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-40px);opacity:0}}
.score-float{position:fixed;font-family:'Space Mono',monospace;font-weight:700;font-size:18px;
  color:var(--accent);pointer-events:none;z-index:500;animation:scoreFloat .9s ease-out forwards;}
</style>
</head>
<body>

<canvas id="star-bg"></canvas>
<div id="error-flash"></div>

<!-- ═══ HEADER ═══ -->
<div id="ui-header">
  <div>
    <div id="header-part" style="font-size:10px;color:var(--muted);">PART 1</div>
    <div id="header-lvl" style="font-size:15px;font-weight:900;font-family:'Space Mono',monospace;">LV 1 / 10</div>
  </div>
  <div id="header-timer-box" style="display:none;flex-direction:column;align-items:center;gap:1px;">
    <div style="font-size:9px;font-family:'Space Mono',monospace;color:var(--muted);">TIME</div>
    <div id="header-timer" style="font-size:18px;font-weight:700;font-family:'Space Mono',monospace;color:var(--accent3);">0.0</div>
  </div>
  <div id="header-score-box">
    <div id="header-score-label">SCORE</div>
    <div id="header-score">0</div>
  </div>
  <button class="btn btn-ghost" style="font-size:11px;padding:8px 14px;" onclick="backToMenu()">← 離開</button>
</div>

<!-- ═══ MAIN MENU ═══ -->
<div id="main-menu">
  <div class="menu-title">記憶力大考驗 🧠</div>
  <div class="menu-subtitle">W8 · MEMORY CHALLENGE</div>
  <div class="menu-divider"></div>

  <div class="part-card" onclick="startPart(1)">
    <div class="part-card-icon">🃏</div>
    <div class="part-card-body">
      <div class="part-card-name">第一關：記憶翻牌</div>
      <div class="part-card-desc">觀察所有牌的圖案位置<br>翻開找出所有配對</div>
    </div>
  </div>

  <div class="part-card" onclick="startPart(2)">
    <div class="part-card-icon">🎪</div>
    <div class="part-card-body">
      <div class="part-card-name">第二關：動果大遊行</div>
      <div class="part-card-desc">記住遊行物品的出場順序<br>從頭到尾準確還原</div>
    </div>
  </div>

  <div class="part-card" onclick="startPart(3)">
    <div class="part-card-icon">🔐</div>
    <div class="part-card-body">
      <div class="part-card-name">第三關：金庫解碼</div>
      <div class="part-card-desc">記住轉盤方向與次數<br>精準操作打開金庫</div>
    </div>
  </div>
</div>

<!-- ═══ SCREEN 1：記憶翻牌 ═══ -->
<div id="screen-1" class="screen">
  <div id="flip-header">
    <div id="flip-phase-label" class="mem">👁 記住位置</div>
    <div id="flip-pairs-left"></div>
  </div>
  <div id="flip-grid-wrap">
    <div id="flip-grid"></div>
    <!-- 觀察倒數覆蓋層 -->
    <div id="flip-mem-overlay">
      <div id="flip-mem-bar">
        <div id="flip-mem-label">記憶中</div>
        <div id="flip-mem-count">5</div>
        <div style="font-size:10px;font-family:'Space Mono',monospace;color:var(--muted);">秒</div>
      </div>
    </div>
  </div>
</div>

<!-- ═══ SCREEN 2：動果大遊行 ═══ -->
<div id="screen-2" class="screen">
  <div id="parade-stage"></div>
  <div id="parade-input" class="hidden">
    <div class="parade-instruction">依序選出剛才出現的物品</div>
    <div id="user-seq-bar"></div>
    <div id="parade-hint">⚠ 還有 <span id="parade-hint-num"></span> 個未填</div>
    <div class="grid-selector" id="grid-selector"></div>
    <div class="parade-btns">
      <button class="btn btn-green" style="flex:1;" onclick="checkParadeOrder()">✓ 確認提交</button>
      <button class="btn btn-ghost" style="flex:0 0 80px;" onclick="resetParadeInput()">重填</button>
    </div>
  </div>
</div>

<!-- ═══ SCREEN 3：金庫解碼 ═══ -->
<div id="screen-3" class="screen">
  <div id="safe-layout">
    <div id="safe-cmd-view">READY?</div>

    <!-- 金庫轉盤 canvas -->
    <div id="safe-canvas-wrap">
      <canvas id="safeCanvas"></canvas>
    </div>

    <div id="safe-history">
      <div id="safe-history-label">解鎖記錄</div>
      <div id="safe-history-list"></div>
    </div>

    <div id="safe-controls" class="hidden">
      <div class="round-btn" onclick="operateGear(-1)">⬅</div>
      <button id="safe-ok-btn" onclick="confirmSafeCommand()">OK</button>
      <div class="round-btn" onclick="operateGear(1)">➡</div>
    </div>

    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <div id="safe-tip">記住指令順序...</div>
      <button id="safe-skip-btn" class="hidden" onclick="triggerSkipInstructions()">跳過觀察 ⏩</button>
    </div>
  </div>
</div>

  gap:16px;z-index:450;text-align:center;">

  <div style="font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);">等待老師繼續...</div>
</div>

<script>
// ════════════════════════════════════
// 背景星星
// ════════════════════════════════════
const bgCanvas=document.getElementById('star-bg');
const bgCtx=bgCanvas.getContext('2d');
const bgStars=Array.from({length:120},()=>({
  x:Math.random(),y:Math.random(),s:.4+Math.random()*1.4,o:Math.random()*Math.PI*2,v:.008+Math.random()*.018
}));
function drawStars(){
  bgCanvas.width=window.innerWidth; bgCanvas.height=window.innerHeight;
  bgCtx.fillStyle='#0e0e14'; bgCtx.fillRect(0,0,bgCanvas.width,bgCanvas.height);
  bgStars.forEach(s=>{
    s.o+=s.v;
    const alpha=.15+Math.abs(Math.sin(s.o))*.55;
    bgCtx.fillStyle=`rgba(255,255,255,${alpha})`;
    bgCtx.beginPath(); bgCtx.arc(s.x*bgCanvas.width,s.y*bgCanvas.height,s.s,0,Math.PI*2); bgCtx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();

// ════════════════════════════════════
// Seeded Random（同步用）
// ════════════════════════════════════
let _seed=1;
function setSeed(v){_seed=v;}
function seededRandom(){_seed=(_seed*9301+49297)%233280;return _seed/233280;}

// ════════════════════════════════════
// 遊戲狀態
// ════════════════════════════════════
let curPart=0,curLvl=1,score=0,currentRetryCount=0,skipRequested=false;

// ── 平台模式 ──
let platformMode=false;  // 是否由平台啟動（iframe 嵌入）
let platformGroup='';    // 組別名稱

// PLATFORM_START / PAUSE / RESUME 監聽
let _pausedByPlatform=false;
let _pausedFlipTimer=null;    // 暫停時儲存 flipMemSeconds 剩餘
let _pausedTimerElapsed=0;    // 暫停時儲存已過秒數

window.addEventListener('message', e=>{
  if(!e.data?.type) return;
  const d=e.data;

  // ── PLATFORM_PAUSE ──
  if(d.type==='PLATFORM_PAUSE'){
    _pausedByPlatform=true;
    // 停計時器
    stopGameTimer();
    if(flipMemTimer){ clearInterval(flipMemTimer); _pausedFlipTimer=flipMemSeconds; }
    if(skipRequested===false && typeof safeCmds!=='undefined'){ /* Part3 的 waitWithSkip 會靠 skipRequested 自然暫停 */ }
    // 顯示暫停覆蓋層
    document.getElementById('pause-overlay').classList.remove('hidden');
    return;
  }

  // ── PLATFORM_RESUME ──
  if(d.type==='PLATFORM_RESUME'){
    _pausedByPlatform=false;
    document.getElementById('pause-overlay').classList.add('hidden');
    // 恢復計時器（若有在跑）
    if(_timerStart>0 && !_timerRAF) startGameTimer();
    // 恢復翻牌記憶倒數
    if(_pausedFlipTimer!==null && flipPhase==='MEM'){
      flipMemSeconds=_pausedFlipTimer;
      _pausedFlipTimer=null;
      flipMemTimer=setInterval(()=>{
        if(_pausedByPlatform) return; // 再次暫停時不倒數
        flipMemSeconds--;
        document.getElementById('flip-mem-count').textContent=flipMemSeconds;
        if(flipMemSeconds<=0){
          clearInterval(flipMemTimer); flipMemTimer=null;
          flipCards.forEach(c=>{c.el.classList.remove('flipped');c.flipped=false;});
          flipPhase='PLAY';
          document.getElementById('flip-phase-label').textContent='🃏 找出配對';
          document.getElementById('flip-phase-label').className='play';
          document.getElementById('flip-mem-overlay').classList.add('hidden');
          if(!_timerRAF) startGameTimer();
        }
      },1000);
    }
    return;
  }

  // ── PLATFORM_START ──
  if(d.type!=='PLATFORM_START') return;
  const {level, group} = d;
  platformMode=true;
  platformGroup=group||'';
  const part=Math.max(1,Math.min(3,parseInt(level)||1));
  document.getElementById('wait-teacher-overlay').classList.add('hidden');
  document.getElementById('pause-overlay').classList.add('hidden');
  document.getElementById('main-menu').classList.add('hidden');
  document.getElementById('ui-header').classList.add('on');
  const leaveBtn=document.querySelector('#ui-header .btn-ghost');
  if(leaveBtn) leaveBtn.style.display='none';
  startPart(part, platformMode && curPart>0);
});

function startPart(part, keepScore=false){
  curPart=part;
  curLvl=1;
  if(!keepScore) score=0; // 獨立模式才歸零；平台模式跨 Part 累加
  currentRetryCount=0;
  document.getElementById('main-menu').classList.add('hidden');
  document.getElementById('ui-header').classList.add('on');
  document.getElementById('header-part').textContent=`PART ${part}`;
  loadLevel();
}

function backToMenu(){
  stopGameTimer();
  document.getElementById('header-timer-box').style.display='none';
  [1,2,3].forEach(i=>{
    const s=document.getElementById(`screen-${i}`);
    if(s) s.classList.remove('active');
  });
  document.getElementById('status-modal').classList.add('hidden');
  document.getElementById('ui-header').classList.remove('on');
  document.getElementById('main-menu').classList.remove('hidden');
}

function loadLevel(isRetry=false){
  if(!isRetry){
    stopGameTimer();
    document.getElementById('header-timer-box').style.display='none';
  }
  document.getElementById('status-modal').classList.add('hidden');
  document.getElementById('header-lvl').textContent=`LV ${curLvl} / 10`;
  document.getElementById('header-score').textContent=score;
  [1,2,3].forEach(i=>document.getElementById(`screen-${i}`).classList.remove('active'));
  document.getElementById(`screen-${curPart}`).classList.add('active');
  setSeed(curPart*1000+curLvl);
  // requestAnimationFrame 確保 screen active 後瀏覽器 layout 完成，
  // 才讓各關讀取 clientWidth/clientHeight（否則下一關卡片尺寸會算出 0）
  requestAnimationFrame(()=>{
    if(curPart===1) startFlip();
    else if(curPart===2) startParade();
    else if(curPart===3) startSafe();
  });
}

function nextLevel(){
  if(curLvl<10){ curLvl++; currentRetryCount=0; loadLevel(); }
  else showFinalResult();
}

function showStatus(icon, title, desc, isWin, pts){
  const modal=document.getElementById('status-modal');
  modal.classList.remove('hidden');
  document.getElementById('modal-icon').textContent=icon;
  document.getElementById('status-title').textContent=title;
  document.getElementById('status-title').style.color=isWin?'var(--green)':'var(--red)';
  document.getElementById('status-desc').textContent=desc;

  const badge=document.getElementById('modal-score-badge');
  if(isWin&&pts>0){ badge.textContent=`+${pts} 分`; badge.style.display=''; }
  else badge.style.display='none';

  const nextBtn=document.getElementById('modal-next-btn');
  const retryBtn=document.getElementById('modal-retry-btn');
  if(isWin){
    if(platformMode){
      // 平台模式：成功後立即回報當前累計分數（讓結算可以拿到小節分數）
      try{
        window.parent.postMessage({
          type:'W8_PROGRESS',
          group: platformGroup,
          part: curPart,
          score  // 當前累計（含本關）
        },'*');
      }catch(e){}
      // 短暫顯示得分，1.5 秒後自動進下一關
      nextBtn.style.display='none';
      retryBtn.style.display='none';
      setTimeout(()=>{
        modal.classList.add('hidden');
        nextLevel();
      },1500);
    } else {
      nextBtn.textContent=curLvl<10?'前進下一關 →':'完成挑戰！';
      nextBtn.onclick=nextLevel; nextBtn.style.display='';
      retryBtn.style.display='none';
    }
  } else {
    nextBtn.style.display='none';
    retryBtn.style.display=''; retryBtn.onclick=()=>loadLevel(true);
  }
}

// ── 分數浮字動畫 ──
function showScoreFloat(pts, x, y){
  const el=document.createElement('div');
  el.className='score-float';
  el.textContent=(pts>0?'+':'')+pts;
  el.style.left=x+'px'; el.style.top=y+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),900);
}

// ════════════════════════════════════
// 計時器系統
// ════════════════════════════════════
let _timerStart=0, _timerRAF=null;

function startGameTimer(){
  _timerStart=performance.now();
  document.getElementById('header-timer-box').style.display='flex';
  function tick(){
    const s=(performance.now()-_timerStart)/1000;
    document.getElementById('header-timer').textContent=s.toFixed(1);
    _timerRAF=requestAnimationFrame(tick);
  }
  if(_timerRAF) cancelAnimationFrame(_timerRAF);
  _timerRAF=requestAnimationFrame(tick);
}

function stopGameTimer(){
  if(_timerRAF){ cancelAnimationFrame(_timerRAF); _timerRAF=null; }
}

function getElapsed(){ return (performance.now()-_timerStart)/1000; }

// 計算時間分（elapsed 秒，base 基礎滿分，penalty 每秒扣分）
function calcTimeBonus(elapsed, base, penalty){
  return Math.max(0, Math.round(base - elapsed*penalty));
}

// ════════════════════════════════════
// PART 1：記憶翻牌
// LV1=12, LV2=14, LV3=16, LV4=18, LV5=20,
// LV6=24, LV7=25, LV8=28, LV9=30, LV10=30(挑戰模式)
// ════════════════════════════════════

const FLIP_TOTALS=[12,12,16,16,20,20,24,24,30,30];
// 直向撲克牌（2:3）格子配置
// 12=3×4, 16=4×4, 20=4×5, 24=4×6, 30=5×6
const FLIP_COLS=[3,3,4,4,4,4,4,4,5,5];
const FLIP_ROWS=[4,4,4,4,5,5,6,6,6,6];

// ── Emoji 池：由易到難，各關指定使用的 emoji 集合 ──
//
// 難度軸：
//   易：形狀顏色差異大，一眼就認得出來
//   中：同大類但顏色或形狀有明顯差異
//   難：形狀顏色高度相似，需要仔細辨認
//
// 全域 emoji 清單（15種，對應最多 15 對）
const CARD_EMOJIS = [
  // 【易識別】形狀、顏色完全不同
  '🍎','🍌','⭐','🐶','🏀',   // 0–4：紅蘋果、黃香蕉、星星、狗臉、橘球
  // 【中識別】同大類，顏色接近但形狀有別
  '🌸','🌻','🌊','🍇','🦋',   // 5–9：粉花、黃花、藍波、紫葡、蝴蝶
  // 【難識別】形狀顏色高度相近
  '😀','😄','😁','❤️','🧡',   // 10–14：笑臉系＋心形系（最難）
];

// 各關使用的 emoji 索引範圍（數字越大越難）
// LV1：6對，只用 0–5（最易識別的前6種）
// LV2：7對，用 0–6
// LV3：8對，用 0–7
// LV4：9對，用 0–8（開始混入中等難度）
// LV5：10對，用 0–9（全部中等難度以上）
// LV6–10：12–15對，逐步引入 10–14（難識別）
const LEVEL_EMOJI_COUNT = [6,7,8,9,10,11,12,12,15,15];
// 每關從前 N 種 emoji 裡選（N = LEVEL_EMOJI_COUNT[lvIdx]）
// pairCount 張牌對，從這 N 種循環取

// 卡背 canvas：菱形格紋 + 紫青漸層邊框 + 中心圓
function drawCardBack(canvas,w,h){
  const ctx=canvas.getContext('2d');
  canvas.width=w; canvas.height=h;
  const bg=ctx.createLinearGradient(0,0,w,h);
  bg.addColorStop(0,'#1a1a2e'); bg.addColorStop(1,'#12121e');
  ctx.fillStyle=bg; ctx.fillRect(0,0,w,h);
  // 菱形格紋
  const sz=Math.min(w,h)*.25;
  ctx.strokeStyle='rgba(167,139,250,.15)'; ctx.lineWidth=.8;
  for(let row=-1;row<h/sz+2;row++){
    for(let col=-1;col<w/sz+2;col++){
      const ox=(row%2===0)?0:sz/2;
      const cx2=col*sz+ox, cy2=row*sz*.6;
      ctx.beginPath();
      ctx.moveTo(cx2,cy2-sz*.4); ctx.lineTo(cx2+sz*.5,cy2);
      ctx.lineTo(cx2,cy2+sz*.4); ctx.lineTo(cx2-sz*.5,cy2);
      ctx.closePath(); ctx.stroke();
    }
  }
  // 漸層邊框
  const brd=ctx.createLinearGradient(0,0,w,h);
  brd.addColorStop(0,'rgba(167,139,250,.55)'); brd.addColorStop(1,'rgba(78,205,196,.45)');
  ctx.strokeStyle=brd; ctx.lineWidth=1.8;
  const r=6;
  ctx.beginPath(); ctx.moveTo(r,0); ctx.lineTo(w-r,0); ctx.arcTo(w,0,w,r,r);
  ctx.lineTo(w,h-r); ctx.arcTo(w,h,w-r,h,r); ctx.lineTo(r,h); ctx.arcTo(0,h,0,h-r,r);
  ctx.lineTo(0,r); ctx.arcTo(0,0,r,0,r); ctx.closePath(); ctx.stroke();
  // 中心裝飾（用短邊計算半徑）
  const cx=w/2, cy=h/2, ir=Math.min(w,h)*.2;
  ctx.strokeStyle='rgba(167,139,250,.3)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(cx,cy,ir,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle='rgba(167,139,250,.18)';
  ctx.beginPath(); ctx.arc(cx,cy,ir*.5,0,Math.PI*2); ctx.fill();
  // 四角小花紋
  [[w*.18,h*.18],[w*.82,h*.18],[w*.18,h*.82],[w*.82,h*.82]].forEach(([px,py])=>{
    ctx.strokeStyle='rgba(167,139,250,.2)'; ctx.lineWidth=.6;
    ctx.beginPath(); ctx.arc(px,py,ir*.22,0,Math.PI*2); ctx.stroke();
  });
}

// 卡面：用 canvas 畫 emoji（確保清晰不失真）
function drawCardFront(canvas,w,h,emoji){
  const ctx=canvas.getContext('2d');
  canvas.width=w; canvas.height=h;
  // 背景
  const bg=ctx.createLinearGradient(0,0,w,h);
  bg.addColorStop(0,'#1e1e2e'); bg.addColorStop(1,'#16161f');
  ctx.fillStyle=bg; ctx.fillRect(0,0,w,h);
  // emoji：用 sans-serif 確保系統 emoji 字型被使用，不指定 serif
  // 字型大小基於寬度（短邊，因為現在是直向卡片），約佔 55%
  const fs=Math.floor(w*.55);
  ctx.font=`${fs}px sans-serif`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(emoji, w/2, h/2);
}

let flipCards=[],flipFirst=null,flipSecond=null,flipLock=false;
let flipPairsLeft=0,flipMemTimer=null,flipPhase='MEM',flipMemSeconds=0;
let _flipPairCount=0; // 提升為模組級，讓 onFlipClick 計分時取到正確值

function startFlip(){
  flipPhase='MEM'; flipFirst=null; flipSecond=null; flipLock=false;
  if(flipMemTimer){clearInterval(flipMemTimer);flipMemTimer=null;}

  const lvIdx=curLvl-1;
  const total=FLIP_TOTALS[lvIdx];
  const pairCount=total/2;
  flipPairsLeft=pairCount;
  _flipPairCount=pairCount; // 同步更新模組級變數

  const cols=FLIP_COLS[lvIdx];
  const rows=FLIP_ROWS[lvIdx];
  const slotCount=cols*rows;

  // 建牌池：各關從前 N 種 emoji 取（N = LEVEL_EMOJI_COUNT[lvIdx]），由易到難
  const availCount = LEVEL_EMOJI_COUNT[lvIdx]; // 本關可用的 emoji 種數
  const emojiPool=[];
  for(let i=0;i<pairCount;i++){
    const eidx = i % availCount; // 在可用範圍內循環
    emojiPool.push(eidx, eidx);
  }
  for(let i=emojiPool.length-1;i>0;i--){
    const j=Math.floor(seededRandom()*(i+1));
    [emojiPool[i],emojiPool[j]]=[emojiPool[j],emojiPool[i]];
  }

  // 尺寸計算：若 wrap 還沒有尺寸（layout 未完成），保存 pool 後下一幀重試
  _buildFlipGrid(cols, rows, slotCount, emojiPool, pairCount, lvIdx);
}

function _buildFlipGrid(cols, rows, slotCount, emojiPool, pairCount, lvIdx){
  const wrap=document.getElementById('flip-grid-wrap');
  if(!wrap||wrap.clientWidth<10){
    requestAnimationFrame(()=>_buildFlipGrid(cols,rows,slotCount,emojiPool,pairCount,lvIdx));
    return;
  }
  const gapPx=6;
  const padW=10, padH=8;
  const availW=wrap.clientWidth-padW*2;
  const availH=wrap.clientHeight-padH*2;

  // ── 強制直向撲克牌（高 > 寬，比例 2:3）──
  // 先由寬度算 cellW（限制列數）
  let cellW=Math.floor((availW-(cols-1)*gapPx)/cols);
  let cellH=Math.round(cellW*3/2); // 高 = 寬 × 1.5（直向）
  // 若高度超出可用空間，由高度反推
  if(cellH*rows+(rows-1)*gapPx > availH){
    cellH=Math.floor((availH-(rows-1)*gapPx)/rows);
    cellW=Math.round(cellH*2/3);
  }
  // 安全防線：cellH 至少等於 cellW（確保直向），最小寬 28px
  cellW=Math.max(cellW, 28);
  if(cellH<=cellW) cellH=Math.round(cellW*3/2);
  // canvas 用 2x 解析度確保清晰
  const cvW=cellW*2, cvH=cellH*2;

  const grid=document.getElementById('flip-grid');
  grid.innerHTML='';
  grid.style.cssText=`
    display:grid;
    grid-template-columns:repeat(${cols},${cellW}px);
    grid-template-rows:repeat(${rows},${cellH}px);
    gap:${gapPx}px;
    width:fit-content;height:fit-content;
  `;

  flipCards=[];

  for(let i=0;i<slotCount;i++){
    const cell=document.createElement('div');
    // 25張：第25格（index=24）是空的
    const isEmpty=(i>=emojiPool.length);
    if(isEmpty){
      cell.style.cssText=`width:${cellW}px;height:${cellH}px;visibility:hidden;`;
      grid.appendChild(cell); continue;
    }
    const emojiIdx=emojiPool[i];
    const emoji=CARD_EMOJIS[emojiIdx%CARD_EMOJIS.length];

    cell.style.cssText=`width:${cellW}px;height:${cellH}px;`;

    const flipper=document.createElement('div');
    flipper.className='card-flipper';

    // 卡背
    const back=document.createElement('div');
    back.className='card-face card-back';
    const backCv=document.createElement('canvas');
    backCv.style.cssText=`width:${cellW}px;height:${cellH}px;display:block;border-radius:9px;`;
    drawCardBack(backCv,cvW,cvH);
    back.appendChild(backCv);

    // 卡面
    const front=document.createElement('div');
    front.className='card-face card-front';
    const frontCv=document.createElement('canvas');
    frontCv.style.cssText=`width:${cellW}px;height:${cellH}px;display:block;border-radius:9px;`;
    drawCardFront(frontCv,cvW,cvH,emoji);
    front.appendChild(frontCv);

    flipper.appendChild(back); flipper.appendChild(front);
    cell.appendChild(flipper); grid.appendChild(cell);

    const cardObj={id:i,emojiIdx,emoji,matched:false,flipped:false,el:flipper};
    flipCards.push(cardObj);
    flipper.addEventListener('click',()=>onFlipClick(cardObj));
    flipper.addEventListener('touchend',e=>{e.preventDefault();onFlipClick(cardObj);},{passive:false});
  }

  document.getElementById('flip-phase-label').textContent='👁 觀察牌面';
  document.getElementById('flip-phase-label').className='mem';
  document.getElementById('flip-pairs-left').textContent=`${pairCount} 組配對`;
  document.getElementById('flip-mem-overlay').classList.remove('hidden');

  // 全部翻開記憶
  flipCards.forEach(c=>c.el.classList.add('flipped'));
  // 記憶時間：LV1=8s，每關+0.5s（牌越多給越久），最多16s
  flipMemSeconds=Math.min(16, 8+Math.floor(lvIdx*.9));
  document.getElementById('flip-mem-count').textContent=flipMemSeconds;

  flipMemTimer=setInterval(()=>{
    flipMemSeconds--;
    document.getElementById('flip-mem-count').textContent=flipMemSeconds;
    if(flipMemSeconds<=0){
      clearInterval(flipMemTimer); flipMemTimer=null;
      flipCards.forEach(c=>{c.el.classList.remove('flipped');c.flipped=false;});
      flipPhase='PLAY';
      document.getElementById('flip-phase-label').textContent='🃏 找出配對';
      document.getElementById('flip-phase-label').className='play';
      document.getElementById('flip-mem-overlay').classList.add('hidden');
      // 蓋牌後才計時；重試時計時已在跑，只有第一次（_timerRAF為null）才啟動
      if(!_timerRAF) startGameTimer();
    }
  },1000);
}

function onFlipClick(card){
  if(_pausedByPlatform) return; // 暫停中禁止操作
  if(flipPhase!=='PLAY') return;
  if(flipLock||card.matched||card.flipped) return;
  card.flipped=true; card.el.classList.add('flipped');
  if(!flipFirst){flipFirst=card; return;}
  flipSecond=card; flipLock=true;
  if(flipFirst.emojiIdx===flipSecond.emojiIdx){
    // 配對成功
    flipFirst.matched=flipSecond.matched=true;
    flipFirst.el.classList.add('matched'); flipSecond.el.classList.add('matched');
    flipPairsLeft--;
    score+=100; document.getElementById('header-score').textContent=score;
    document.getElementById('flip-pairs-left').textContent=`剩 ${flipPairsLeft} 組`;
    flipFirst=flipSecond=null; flipLock=false;
    if(flipPairsLeft===0){
      stopGameTimer();
      const elapsed=getElapsed();
      // 基礎分：每對 80 分
      const base=_flipPairCount*80;
      const timePar=_flipPairCount*4;
      const timeBonus=calcTimeBonus(elapsed, timePar*15, 15);
      const total=base+timeBonus;
      score+=total; document.getElementById('header-score').textContent=score;
      const desc=`用時 ${elapsed.toFixed(1)} 秒\n基礎分 +${base}　時間分 +${timeBonus}`;
      setTimeout(()=>showStatus('🃏','全數配對！',desc,true,total),400);
    }
  } else {
    // 不配對：閃紅後蓋回
    setTimeout(()=>{
      flipFirst.el.classList.add('wrong'); flipSecond.el.classList.add('wrong');
      setTimeout(()=>{
        flipFirst.flipped=flipSecond.flipped=false;
        flipFirst.el.classList.remove('flipped','wrong');
        flipSecond.el.classList.remove('flipped','wrong');
        document.getElementById('error-flash').style.display='block';
        setTimeout(()=>document.getElementById('error-flash').style.display='none',150);
        flipFirst=flipSecond=null; flipLock=false;
      },480);
    },700);
  }
}

// PART 2：動果大遊行
// LV1=6, LV2=7, LV3=8, LV4=9, LV5=9,
// LV6=10, LV7=10, LV8=11, LV9=11, LV10=12
// LV3起：連播模式（2~3個快速連發，間隔壓縮）
// 連續相同圖案不超過2個
// ════════════════════════════════════
const PARADE_COUNTS=[6,7,8,9,9,10,10,11,11,12];
const PARADE_ITEMS=['🐶','🐱','🐥','🦆','🐑','🐄','🐎','🍎','🍌','🍇','🍉','🍒'];
let paradeSeq=[],paradeUserSeq=[];

// 生成序列：連續相同不超過2個
function genParadeSeq(count){
  const seq=[];
  let sameRun=0, lastItem=null;
  for(let i=0;i<count;i++){
    let pick, tries=0;
    do {
      pick=PARADE_ITEMS[Math.floor(seededRandom()*PARADE_ITEMS.length)];
      tries++;
    } while(pick===lastItem && sameRun>=2 && tries<20);
    if(pick===lastItem) sameRun++; else sameRun=1;
    lastItem=pick;
    seq.push(pick);
  }
  return seq;
}

// 生成「出場計畫」：決定每個圖案的間隔時間
// LV1-2：固定正常間隔
// LV3+：部分圖案以「連播組」方式出現（組內間隔短，組間正常）
function genParadeSchedule(seq, lv){
  // schedule: [{emoji, gapBefore}]  gapBefore = 播完前一個後等待的 ms
  const normalGap=380;   // 正常間隔
  const burstGap=80;     // 連播內間隔（幾乎不停）
  const schedule=seq.map((emoji,i)=>({emoji, gapBefore: i===0?0:normalGap}));
  if(lv<3) return schedule;

  // LV3起：每隔幾個圖案插入一組連播（2或3個）
  // 連播頻率隨關卡提升：LV3約1組, LV5約2組, LV7+約3組
  const burstCount=Math.min(Math.floor((lv-2)/2)+1, 3);
  // 選出要連播的起始位置（避開第一個和最後一個）
  const candidates=[];
  for(let i=1;i<seq.length-2;i++) candidates.push(i);
  // seeded shuffle candidates
  for(let i=candidates.length-1;i>0;i--){
    const j=Math.floor(seededRandom()*(i+1));
    [candidates[i],candidates[j]]=[candidates[j],candidates[i]];
  }
  // 標記連播位置，連播長度2或3
  const burstPositions=new Set();
  let placed=0;
  for(let ci=0;ci<candidates.length&&placed<burstCount;ci++){
    const start=candidates[ci];
    const len=(seededRandom()>0.5)?3:2;
    // 確保不重疊
    let overlap=false;
    for(let k=start;k<Math.min(start+len,seq.length);k++){
      if(burstPositions.has(k)){overlap=true;break;}
    }
    if(!overlap){
      for(let k=start;k<Math.min(start+len,seq.length);k++){
        burstPositions.add(k);
      }
      placed++;
    }
  }
  // 套用間隔
  for(let i=1;i<schedule.length;i++){
    if(burstPositions.has(i)) schedule[i].gapBefore=burstGap;
  }
  return schedule;
}

async function startParade(){
  _paradeSubmitting=false; // 【修復 Bug 3】重置鎖定
  document.getElementById('parade-input').classList.add('hidden');
  const stage=document.getElementById('parade-stage');
  stage.innerHTML=''; paradeUserSeq=[]; updateParadeUI();

  // 倒數覆蓋
  const cdDiv=document.createElement('div');
  cdDiv.style.cssText='position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;';
  cdDiv.innerHTML='<div style="font-family:Space Mono,monospace;font-size:64px;font-weight:700;color:#f7c948;text-shadow:0 0 30px rgba(247,201,72,.5)" id="p-cd">3</div><div style="font-size:11px;font-family:Space Mono,monospace;color:rgba(255,255,255,.4);letter-spacing:.1em;">準備好了嗎</div>';
  stage.appendChild(cdDiv);
  for(let i=3;i>0;i--){
    document.getElementById('p-cd').textContent=i;
    await new Promise(r=>setTimeout(r,900));
  }
  cdDiv.remove();

  const count=PARADE_COUNTS[curLvl-1];
  paradeSeq=genParadeSeq(count);
  const schedule=genParadeSchedule(paradeSeq, curLvl);

  // 選擇器（12 種圖案，4×3 格）
  const selector=document.getElementById('grid-selector');
  selector.innerHTML='';
  PARADE_ITEMS.forEach(emoji=>{
    const d=document.createElement('div'); d.className='item-icon'; d.textContent=emoji;
    d.onclick=()=>{ if(_pausedByPlatform) return; if(paradeUserSeq.length<paradeSeq.length){ paradeUserSeq.push(emoji); updateParadeUI(); }};
    selector.appendChild(d);
  });

  // 依 schedule 播放
  for(const item of schedule){
    if(item.gapBefore>0) await new Promise(r=>setTimeout(r,item.gapBefore));
    await spawnRunner(item.emoji, item.gapBefore<200);
  }
  document.getElementById('parade-input').classList.remove('hidden');
  if(!_timerRAF) startGameTimer(); // 輸入頁出現後才開始計時；重試時繼續跑
}

function spawnRunner(emoji, isBurst=false){
  return new Promise(resolve=>{
    const stage=document.getElementById('parade-stage');
    const el=document.createElement('div'); el.className='runner'; el.textContent=emoji;
    // 連播時跑者稍小、速度更快，視覺上有「快速閃過」的感覺
    if(isBurst) el.style.cssText='font-size:48px;filter:drop-shadow(0 2px 6px rgba(247,201,72,.5))';
    stage.appendChild(el);
    const dur=isBurst?700:1100; // 連播時快 40%
    let t0=null;
    function move(t){
      if(!t0) t0=t;
      const p=(t-t0)/dur;
      const x=window.innerWidth+100+(-window.innerWidth-250)*p;
      el.style.left=x+'px';
      if(p<1) requestAnimationFrame(move); else { el.remove(); resolve(); }
    }
    requestAnimationFrame(move);
  });
}

  document.getElementById('user-seq-bar').innerHTML=paradeUserSeq.length===0

}

let _paradeSubmitting=false; // 防止重複提交

function checkParadeOrder(){
  if(_paradeSubmitting) return; // 【修復 Bug 3】鎖定中，忽略重複點擊
  const remaining=paradeSeq.length-paradeUserSeq.length;
  if(remaining>0){
    // ── 未輸入完：提示還差幾個 ──
    const hint=document.getElementById('parade-hint');

    bar.classList.add('incomplete');
    setTimeout(()=>{
      hint.classList.remove('show');
      bar.classList.remove('incomplete');
    },2000);
    return;
  }

  _paradeSubmitting=true; // 鎖定，防止動畫期間重複觸發

  if(JSON.stringify(paradeSeq)===JSON.stringify(paradeUserSeq)){
    stopGameTimer();
    const elapsed=getElapsed();
    const base=500;
    const timeBonus=calcTimeBonus(elapsed, 400, 12);
    const total=base+timeBonus;
    score+=total; document.getElementById('header-score').textContent=score;
    const desc=`用時 ${elapsed.toFixed(1)} 秒\n基礎分 +${base}　時間分 +${timeBonus}`;
    showStatus('🎪','記憶精準！',desc,true,total);
    // 成功後不需要解鎖（進入下一關會重置）
  } else {
    // ── 輸入錯誤：找出所有錯誤位置並閃爍 ──
    const wrongEmojis=new Set();
    const tags=document.querySelectorAll('#user-seq-bar .seq-tag');
    paradeUserSeq.forEach((e,i)=>{
      if(e!==paradeSeq[i]){
        wrongEmojis.add(e);
        wrongEmojis.add(paradeSeq[i]);
        if(tags[i]){
          tags[i].classList.remove('wrong');
          tags[i].offsetHeight;
          tags[i].classList.add('wrong');
        }
      }
    });
    document.querySelectorAll('#grid-selector .item-icon').forEach(el=>{
      if(wrongEmojis.has(el.textContent.trim())){
        el.classList.remove('error-blink');
        el.offsetHeight;
        el.classList.add('error-blink');
        setTimeout(()=>el.classList.remove('error-blink'),2200);
      }
    });
    setTimeout(()=>document.querySelectorAll('.seq-tag.wrong').forEach(t=>t.classList.remove('wrong')),1400);
    currentRetryCount++;
    setTimeout(()=>{
      showStatus('😵','記憶模糊...','有些順序錯了，再試一次！',false,0);
      _paradeSubmitting=false; // 顯示 modal 後解鎖（讓重試按鈕可以再次觸發）
    },600);
  }
}

let safeCmds=[],safeStep=0,safeSubStep=0,gearRotation=0,userDir=0;
let safeDialAngle=0;      // 轉盤當前角度（度，持續累加）
let safeAnimAngle=0;      // 動畫插值角度
let safeAnimRAF=null;

// ── Canvas 繪製金庫轉盤 ──
const sc=document.getElementById('safeCanvas');
const sctx=sc.getContext('2d');

function initSafeCanvas(){
  const wrap=document.getElementById('safe-canvas-wrap');
  const size=wrap.offsetWidth||220;
  sc.width=size*2; sc.height=size*2;   // 2x 解析度
  sc.style.width=size+'px'; sc.style.height=size+'px';
}

function drawSafe(dialDeg){
  const W=sc.width, H=sc.height, cx=W/2, cy=H/2;
  const R=W*0.46;   // 外框半徑
  sctx.clearRect(0,0,W,H);

  // ── 1. 金庫門外框（厚鋼板感）──
  // 外圓陰影
  sctx.save();
  sctx.shadowBlur=W*.08; sctx.shadowColor='rgba(0,0,0,.7)';
  sctx.beginPath(); sctx.arc(cx,cy,R+W*.03,0,Math.PI*2);
  sctx.fillStyle='#0a0a0f'; sctx.fill();
  sctx.restore();

  // 鋼板外環（深鋼色漸層）
  const outerGrad=sctx.createRadialGradient(cx-R*.15,cy-R*.15,0,cx,cy,R+W*.03);
  outerGrad.addColorStop(0,'#4a5568');
  outerGrad.addColorStop(.5,'#2d3748');
  outerGrad.addColorStop(1,'#1a202c');
  sctx.beginPath(); sctx.arc(cx,cy,R+W*.03,0,Math.PI*2);
  sctx.fillStyle=outerGrad; sctx.fill();

  // 螺栓（四角）
  const boltR=W*.028;
  [[0.72,0.72],[0.28,0.72],[0.72,0.28],[0.28,0.28]].forEach(([bx,by])=>{
    const px=cx+(bx-.5)*R*1.72, py=cy+(by-.5)*R*1.72;
    const bg=sctx.createRadialGradient(px-boltR*.3,py-boltR*.4,0,px,py,boltR);
    bg.addColorStop(0,'#718096'); bg.addColorStop(1,'#2d3748');
    sctx.beginPath(); sctx.arc(px,py,boltR,0,Math.PI*2);
    sctx.fillStyle=bg; sctx.fill();
    // 螺栓十字槽
    sctx.save(); sctx.strokeStyle='rgba(0,0,0,.5)'; sctx.lineWidth=W*.004;
    sctx.beginPath(); sctx.moveTo(px-boltR*.6,py); sctx.lineTo(px+boltR*.6,py); sctx.stroke();
    sctx.beginPath(); sctx.moveTo(px,py-boltR*.6); sctx.lineTo(px,py+boltR*.6); sctx.stroke();
    sctx.restore();
  });

  // ── 2. 轉盤底盤（固定不動）──
  const baseGrad=sctx.createRadialGradient(cx,cy,0,cx,cy,R*.85);
  baseGrad.addColorStop(0,'#3d4a5c');
  baseGrad.addColorStop(.6,'#2a3544');
  baseGrad.addColorStop(1,'#1e2a38');
  sctx.beginPath(); sctx.arc(cx,cy,R*.85,0,Math.PI*2);
  sctx.fillStyle=baseGrad; sctx.fill();
  // 底盤邊緣暗環
  sctx.beginPath(); sctx.arc(cx,cy,R*.85,0,Math.PI*2);
  sctx.strokeStyle='rgba(0,0,0,.5)'; sctx.lineWidth=W*.012; sctx.stroke();

  // ── 3. 刻度環（固定，數字 0-9 * 4 = 40 格）──
  const tickR=R*.82, numR=R*.68;
  for(let i=0;i<40;i++){
    const ang=(i/40)*Math.PI*2 - Math.PI/2;
    const isMajor=(i%4===0);
    const tLen=isMajor ? W*.04 : W*.022;
    const tW=isMajor ? W*.006 : W*.003;
    const x1=cx+Math.cos(ang)*(tickR-tLen), y1=cy+Math.sin(ang)*(tickR-tLen);
    const x2=cx+Math.cos(ang)*tickR, y2=cy+Math.sin(ang)*tickR;
    sctx.save();
    sctx.strokeStyle=isMajor?'rgba(255,255,255,.7)':'rgba(255,255,255,.25)';
    sctx.lineWidth=tW;
    sctx.beginPath(); sctx.moveTo(x1,y1); sctx.lineTo(x2,y2); sctx.stroke();
    sctx.restore();
    // 數字（每10格一個）
    if(i%4===0){
      const num=(i/4);
      const nx=cx+Math.cos(ang)*numR, ny=cy+Math.sin(ang)*numR;
      sctx.save();
      sctx.fillStyle='rgba(255,255,255,.5)';
      sctx.font=`bold ${W*.045}px 'Space Mono',monospace`;
      sctx.textAlign='center'; sctx.textBaseline='middle';
      sctx.fillText(num,nx,ny);
      sctx.restore();
    }
  }

  // ── 4. 轉盤主體（旋轉部分）──
  sctx.save();
  sctx.translate(cx,cy);
  sctx.rotate(dialDeg*Math.PI/180);

  const dialR=R*.58;
  // 轉盤金屬漸層
  const dialGrad=sctx.createRadialGradient(-dialR*.2,-dialR*.25,0,0,0,dialR);
  dialGrad.addColorStop(0,'#8a9ab0');
  dialGrad.addColorStop(.35,'#6b7d94');
  dialGrad.addColorStop(.7,'#4a5c70');
  dialGrad.addColorStop(1,'#2d3a4a');
  sctx.beginPath(); sctx.arc(0,0,dialR,0,Math.PI*2);
  sctx.fillStyle=dialGrad; sctx.fill();

  // 轉盤邊緣凸紋（滾花）
  const kN=24;
  for(let i=0;i<kN;i++){
    const a=(i/kN)*Math.PI*2;
    const kr1=dialR*.92, kr2=dialR*1.0;
    const w=Math.PI/kN*.7;
    sctx.beginPath();
    sctx.arc(0,0,kr1,a-w,a+w);
    sctx.arc(0,0,kr2,a+w,a-w,true);
    sctx.closePath();
    const isEven=i%2===0;
    sctx.fillStyle=isEven?'rgba(255,255,255,.12)':'rgba(0,0,0,.2)';
    sctx.fill();
  }

  // 轉盤刻度線（隨盤旋轉，每9度一格=40格）
  for(let i=0;i<40;i++){
    const a=(i/40)*Math.PI*2;
    const isMaj=(i%4===0);
    const r1=dialR*.78, r2=dialR*.9;
    sctx.save();
    sctx.strokeStyle=isMaj?'rgba(255,255,255,.55)':'rgba(255,255,255,.2)';
    sctx.lineWidth=isMaj?W*.005:W*.0025;
    sctx.beginPath(); sctx.moveTo(Math.cos(a)*r1,Math.sin(a)*r1);
    sctx.lineTo(Math.cos(a)*r2,Math.sin(a)*r2); sctx.stroke();
    sctx.restore();
  }

  // 轉盤光澤（高光弧）
  const shineGrad=sctx.createLinearGradient(-dialR*.5,-dialR*.7,dialR*.3,dialR*.4);
  shineGrad.addColorStop(0,'rgba(255,255,255,.18)');
  shineGrad.addColorStop(.5,'rgba(255,255,255,.05)');
  shineGrad.addColorStop(1,'rgba(255,255,255,0)');
  sctx.beginPath(); sctx.arc(0,0,dialR*.9,0,Math.PI*2);
  sctx.fillStyle=shineGrad; sctx.fill();

  // 中央握把環
  const handleR=dialR*.38;
  const handleGrad=sctx.createRadialGradient(-handleR*.2,-handleR*.3,0,0,0,handleR);
  handleGrad.addColorStop(0,'#c8a85a');
  handleGrad.addColorStop(.4,'#9a7a3a');
  handleGrad.addColorStop(.8,'#6b5220');
  handleGrad.addColorStop(1,'#3d2e0f');
  sctx.beginPath(); sctx.arc(0,0,handleR,0,Math.PI*2);
  sctx.fillStyle=handleGrad; sctx.fill();
  // 握把邊框
  sctx.beginPath(); sctx.arc(0,0,handleR,0,Math.PI*2);
  sctx.strokeStyle='rgba(200,168,90,.4)'; sctx.lineWidth=W*.006; sctx.stroke();

  // 握把上的輻射紋（4條）
  for(let i=0;i<4;i++){
    const a=(i/4)*Math.PI*2;
    sctx.save(); sctx.strokeStyle='rgba(0,0,0,.35)'; sctx.lineWidth=W*.007;
    sctx.beginPath();
    sctx.moveTo(Math.cos(a)*handleR*.22,Math.sin(a)*handleR*.22);
    sctx.lineTo(Math.cos(a)*handleR*.78,Math.sin(a)*handleR*.78);
    sctx.stroke(); sctx.restore();
  }
  // 中心點
  const dotGrad=sctx.createRadialGradient(-W*.01,-W*.012,0,0,0,W*.025);
  dotGrad.addColorStop(0,'#e8c870'); dotGrad.addColorStop(1,'#7a5a18');
  sctx.beginPath(); sctx.arc(0,0,W*.025,0,Math.PI*2);
  sctx.fillStyle=dotGrad; sctx.fill();

  sctx.restore(); // 結束旋轉 transform

  // ── 5. 頂部固定指針 ──
  const pW=W*.022, pLen=R*.24;
  const pX=cx, pY=cy-R*.79;
  sctx.save();
  // 指針陰影
  sctx.shadowBlur=W*.02; sctx.shadowColor='rgba(248,113,113,.6)';
  // 指針三角形
  sctx.beginPath();
  sctx.moveTo(pX, pY-pLen*.6);
  sctx.lineTo(pX-pW, pY+pLen*.4);
  sctx.lineTo(pX+pW, pY+pLen*.4);
  sctx.closePath();
  const pGrad=sctx.createLinearGradient(pX-pW,pY-pLen*.6,pX+pW,pY+pLen*.4);
  pGrad.addColorStop(0,'#ff6b6b'); pGrad.addColorStop(1,'#cc2222');
  sctx.fillStyle=pGrad; sctx.fill();
  sctx.strokeStyle='rgba(255,255,255,.4)'; sctx.lineWidth=W*.004; sctx.stroke();
  sctx.restore();

  // 指針底座小圓
  const pbGrad=sctx.createRadialGradient(pX-W*.005,pY+pLen*.4-W*.008,0,pX,pY+pLen*.4,W*.022);
  pbGrad.addColorStop(0,'#999'); pbGrad.addColorStop(1,'#333');
  sctx.beginPath(); sctx.arc(pX,pY+pLen*.4,W*.022,0,Math.PI*2);
  sctx.fillStyle=pbGrad; sctx.fill();
}

// 動畫插值轉動
function animateDial(targetDeg){
  if(safeAnimRAF) cancelAnimationFrame(safeAnimRAF);
  const startAngle=safeAnimAngle;
  const diff=targetDeg-startAngle;
  const start=performance.now();
  const dur=350;
  function step(now){
    const p=Math.min(1,(now-start)/dur);
    const ease=1-Math.pow(1-p,3); // easeOutCubic
    safeAnimAngle=startAngle+diff*ease;
    drawSafe(safeAnimAngle);
    if(p<1) safeAnimRAF=requestAnimationFrame(step);
    else safeAnimRAF=null;
  }
  safeAnimRAF=requestAnimationFrame(step);
}

async function startSafe(){
  initSafeCanvas();
  document.getElementById('safe-controls').classList.add('hidden');
  document.getElementById('safe-history-list').innerHTML='';
  document.getElementById('safe-tip').textContent='準備記住指令...';
  document.getElementById('safe-skip-btn').classList.add('hidden');
  document.getElementById('safe-cmd-view').textContent='READY?';
  safeStep=0; safeSubStep=0; gearRotation=0; userDir=0;
  safeDialAngle=0; safeAnimAngle=0;
  drawSafe(0);
  skipRequested=false;

  // 倒數
  for(let i=3;i>0;i--){
    document.getElementById('safe-cmd-view').textContent=i;
    await new Promise(r=>setTimeout(r,900));
  }
  document.getElementById('safe-cmd-view').textContent='GO!';
  await new Promise(r=>setTimeout(r,700));

  // 產生指令
  // LV1→5, LV10→10，每關約增加 0.56 個
  let cmdCount=5+Math.floor((curLvl-1)*0.56);
  safeCmds=Array.from({length:cmdCount},()=>({
    dir:seededRandom()>.5?'L':'R',
    val:Math.floor(seededRandom()*6)+1
  }));

  if(currentRetryCount>0) document.getElementById('safe-skip-btn').classList.remove('hidden');

  // 逐一顯示指令（同時動畫轉動轉盤示意）
  for(const cmd of safeCmds){
    if(skipRequested) break;
    const arrow=cmd.dir==='L'?'←':'→';
    document.getElementById('safe-cmd-view').innerHTML=
      `<span style="font-size:52px;font-weight:900;color:${cmd.dir==='L'?'#4ecdc4':'#a78bfa'}">${arrow}</span>&nbsp;<span style="font-size:58px;font-weight:900;color:var(--accent)">${cmd.val}</span>`;
    // 示意轉動（轉 val 格 = val * 9度）
    const delta=(cmd.dir==='L'?-1:1)*cmd.val*9;
    safeDialAngle+=delta; animateDial(safeDialAngle);
    await waitWithSkip(2500);
    if(skipRequested) break;
    document.getElementById('safe-cmd-view').textContent='';
    await waitWithSkip(1200);
  }

  document.getElementById('safe-skip-btn').classList.add('hidden');
  document.getElementById('safe-cmd-view').textContent='解鎖！';
  document.getElementById('safe-tip').textContent='轉動後按 OK 確認';
  // 歸零顯示
  safeDialAngle=0; safeAnimAngle=0; drawSafe(0);
  gearRotation=0;
  document.getElementById('safe-controls').classList.remove('hidden');
  if(!_timerRAF) startGameTimer(); // 開始操作才計時；重試時繼續跑
}

function waitWithSkip(ms){
  return new Promise(resolve=>{
    const iv=setInterval(()=>{ if(skipRequested){ clearInterval(iv); clearTimeout(to); resolve(); }},50);
    const to=setTimeout(()=>{ clearInterval(iv); resolve(); },ms);
  });
}
function triggerSkipInstructions(){ skipRequested=true; document.getElementById('safe-skip-btn').classList.add('hidden'); }

function operateGear(dir){
  if(_pausedByPlatform) return;
  gearRotation+=dir; userDir=dir; safeSubStep++;
  safeDialAngle+=dir*9; animateDial(safeDialAngle);
}

function confirmSafeCommand(){
  if(_pausedByPlatform) return;
  const target=safeCmds[safeStep];
  const targetDir=target.dir==='L'?-1:1;
  if(safeSubStep===target.val&&userDir===targetDir){
    const arrow=target.dir==='L'?'←':'→';
    const entry=document.createElement('div');
    entry.className='history-entry';
    entry.textContent=`✓ ${arrow} ${target.val}`;
    document.getElementById('safe-history-list').appendChild(entry);
    safeStep++; safeSubStep=0; userDir=0; gearRotation=0;
    // 指針對齊歸零動畫
    safeDialAngle=Math.round(safeDialAngle/360)*360; animateDial(safeDialAngle);
    if(safeStep===safeCmds.length){
      stopGameTimer();
      const elapsed=getElapsed();
      // 基礎分：每個指令 120 分
      const base=safeCmds.length*120;
      // 時間分：基準 = 指令數 × 5s，每超過1秒扣20分
      const timePar=safeCmds.length*5;
      const timeBonus=calcTimeBonus(elapsed, timePar*20, 20);
      const total=base+timeBonus;
      score+=total; document.getElementById('header-score').textContent=score;
      const desc=`用時 ${elapsed.toFixed(1)} 秒\n基礎分 +${base}　時間分 +${timeBonus}`;
      // 開鎖動畫：快速旋轉一圈
      setTimeout(()=>{ safeDialAngle+=360; animateDial(safeDialAngle); },200);
      setTimeout(()=>showStatus('🔓','金庫大開！',desc,true,total),700);
    }
  } else {
    triggerSafeError();
  }
}

function triggerSafeError(){
  document.getElementById('error-flash').style.display='block';
  setTimeout(()=>document.getElementById('error-flash').style.display='none',220);
  // 抖動動畫
  let shakes=0;
  const shakeDir=[1,-1,1,-1,1,-1];
  function shake(){
    if(shakes>=shakeDir.length){ drawSafe(safeDialAngle); return; }
    drawSafe(safeDialAngle+shakeDir[shakes]*8);
    shakes++; setTimeout(shake,55);
  }
  shake();
  currentRetryCount++;
  showStatus('💥','解碼失敗！','指令錯誤，齒輪鎖死了。重新來過！',false,0);
}

function updateGearUI(){ /* canvas 版不需要這個，保留避免殘留呼叫 */ }

function showFinalResult(){
  stopGameTimer();
  if(platformMode){
    // 平台模式：隱藏遊戲畫面，顯示等待老師畫面，並發 W8_COMPLETE
    document.getElementById('status-modal').classList.add('hidden');
    const ov=document.getElementById('wait-teacher-overlay');
    ov.classList.remove('hidden');
    document.getElementById('wt-icon').textContent='🏆';
    document.getElementById('wt-title').textContent='本關完成！';
    const partNames=['','🃏 翻牌','🎪 遊行','🔐 解碼'];
    document.getElementById('wt-desc').textContent=`${partNames[curPart]||''} 所有關卡完成\n等待老師進入下一關...`;
    document.getElementById('wt-score').textContent=`本關總分：${score} 分`;
    try{
      window.parent.postMessage({
        type:'W8_COMPLETE',
        group: platformGroup,
        part: curPart,
        score,
        elapsed: getElapsed().toFixed(1)
      },'*');
    }catch(e){}
  } else {
    // 獨立模式
    showStatus('👑','記憶大師！',`恭喜完成所有挑戰！\n最終得分：${score}`,true,0);
    document.getElementById('modal-score-badge').textContent=`總分 ${score}`;
    document.getElementById('modal-score-badge').style.display='';
    document.getElementById('modal-next-btn').textContent='回到大廳';
    document.getElementById('modal-next-btn').onclick=backToMenu;
  }
}
